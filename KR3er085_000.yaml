body:
  text: 附海內名公贈龔氏橋梓詩岐黃千載法更新道學源流貴得真一粒丹砂龍虎伏九回銀汞犬雞均功忝造化通今古脈診膏肓泣鬼神大展保元醫國手金聲玉振萬年春兩京三部尚書扶溝三川劉自強採藥攜琴問海涯閒閒白鶴弄煙霞詩成日醉東岩月春到瑤林獨有花巡撫南𪋏西吾王考民聞道山人醫最良白雲深處望仙鄉知君自是蓬萊客暫到人間施妙方巡撫順天長垣益齊成遜有美南州客翩翩海鶴群青囊傳世業丹井播清芬野杏和云種靈芝待雨分看君留妙訣東魯共稱聞魯藩泰興王安宇壽鏞賣藥歸來日已斜懸壺別自有仙家世人好事如相覓十里春云隱杏花周藩奉國將軍南渚詩書爰有豫章高士雲山千里邀遊狂飲燕臺豪傑酣聽趙地名謳己罷朱門彈挾來尋碧水群鷗烏紗高臥溱洧子常芳躅堪留江西參政扶溝中岩郝維喬彈鋏歸來意更深碧山高臥自長吟名傳國手輕黃屋風度春香滿杏林兵部員外郎扶溝見寰何出圖烏紗不變朱門貴碧水來尋白鳥居瑤瑟一揮春日落滿懷風月共清虛巡按山東扶溝中寰何出光施藥長安市宋清眇萬金杏開霞色曉泉落橘香陰丹火看初滅仙源望轉深未能凌漢寫聊且曳朝簪巡按福建扶溝西泉杜化中抱病林丘經歲時神丹獨仗得平危巢南嘶北誰無此燕雀銜恩有所忌湖廣僉事扶溝毅所劉自存草年交誼一離群矯首南鴻上白雲壺裹乾坤收市藥藜端風月滯斯文路經廬嶽心逾壯天入鄱湖水不分半日風帆能為我柴桑西去問陶君南康知府鄢陵水山劉巡殘年吾仗爾藥餌緩餘生復此江南別其如渭比情思心長一線客路計千程若變天台侶何時續舊盟成都知府鄢陵父泉梁策廬山深處獨逍遙採藥雲林不可招天柱峰逢王子晉玉笙吹入摘星橋思南知府太康杏樹何繼皎潔青霄月優遊滄海鷗如何隔咫尺迢遞若瀛洲武定知府扶溝如川劉懋武數載桐丘客秋風晝錦遊南云生故國北雁起滄洲為伴龔黃去應同李郭舟鷗盟頻在望莫戀晚泣樓河間府通判扶溝竹逄何岑岐伯術久湮典醫竟誰氏雲林山中人弱冠達神理劉歆發四家郭玉宗六技桐丘抱疴翁逄君疴即已感茲賦短什豕隸用酬知己祁州知州扶溝云亭劉自修岐黃伏異術云樹綰離情孤劍千金重扁舟一葉輕仙息隨遠舉丹藥慕長生莫惜江離晚忘歸冷舊盟扶溝天中王洛軒岐去已久千載得真傳夢想陶弘景神交葛稚川杏林酣𤜢日橘井暖生煙盡識懸壺意回生豈為錢扶溝東園趙繡君從豫章來手持金光草訪我雙洎邊一見如舊好仲尼逄程生傾蓋契懷抱共爾測沉置塵囂跡俱掃扶溝洞峰李時芳高隱白雲林巒聳翠鶴飛天表鹿遊山外共爾幽淒徘徊宇內一官是榮眇焉七貴名凝岐黃樂心自遂杖掛百錢客與日醉天地朝長吟無愧扶溝小亭劉武葉飄桐日心知友旆時陽煦遺潁葛春色又塘陂楓橘迎新目高挽舊思休將醫國手獨種杏園枝長葛明山張藎臣杯灑長亭送爾歸雲林結思渺難依願言莫道並州惡魚雁秋深亦正肥長葛文臺桑潤聞道西園此日行天涯秋色正含情也知去住同寰宇無那江南隔路程千里空勞連夜夢一尊未許幾時傾南村花柳明春盛杖履常來候遠旌許昌穎南張芹我愛南州龔夫子儒名醫道重推賢論懷正恨逢君晚把酒忽愁送客還萬里行囊惟藥物一江風月在樓船此行應念交遊義故國江山少滯漣許昌益庵李子謙別意揮毫愧贈金醫林當世幾知音故鄉此去多行樂還憶東堂夜聽琴許昌嵩東張寵南北各異氣標本判惟吾遠志醫能妙決明沉可蘇參苓高欲閣疴滯力為扶世上陰功滿芳名任有無臨穎筠軒尼汝讓之子從容器學成厚朴才江湖橫眼界丰度出塵埃剩有長生術因余濟世杯十年看許下無數杏花開臨穎洛川尼汝正醫國來江右聲華重潁濱青囊隨手檢紅杏滿林春臨穎純齊谷高寒風萬木疏遊子去天都今夕一杯酒明朝千里途野煙合復散云樹有還無燕地多奇蹟登𧳦興莫孤臨潁守玄杜琛獨到長亭送客歸無邊野色正悽悽賓鴻似與人同去故向天涯時落暉陳州前吾朱湛思忽憶交遊愴客情池亭兀坐空鐏觥初春話別河橋日楊柳青青未隱鶯古鄢孟門劉好生當年詩酒共陶情慷慨長歌醉下觥於今兩地懸愁思厭聽林園滿樹鶯古鄢夷門劉同生淮南招容衆食客總風流採藥成倘術曳裾恣宦遊清歌彈寶劍紅杏映方洲我有相如渴憑君幾書壽柳丘煙山路以旃雲林山上翠云流中有山人弄酒甌一笑不知鐘鼎貴醉騎白鹿九江遊柳丘小陘山人李後中原聲價抵南金頓起江鄉故國心鷗鳥一飛沙渚外疏林秋滿聽猿吟翰林庶吉士大梁明宇張同德秋風吹動故園思把酒河梁折柳枝今日君同鴻雁去與君期會雁來時巡按山西大梁觀峰田一麟寰區施藥濟人寬遙向山中隱一官彈鋏無心留傳舍垂綸有意傍江灘每尋瑤草云邊立獨把青囊月里看欒世陰功滿天下九苞雛鳳在琅玕吏部司務大梁魯源孫守業龔氏實天生行道於華夏袖珍用有時售玉得高價或言藥里玉咸贊醫中霸惠澤及人多繹絡踵門謝默命掌民生快睹調元化稽古上可同視今皆驚怕竹帛垂姓名蒲輪寵迎迓著書八種余陰功滿天下兵部左侍郎長垣鎮峰崔景榮
