front:
  text: 賀雲林龔君榮授魯府恩賜醫林狀元序僕聞昔人云丈夫生世間不為宰相當作名醫蓋有味乎其言之也今觀雲林龔君殆庶幾焉君諱廷賢字子才江右金溪之世族也乃父西園公醫名當世已授太醫院銜矣君以較藝不償所懷遂業父醫術直欲力追乎岐黃倉越之正派也且其事親孝待弟友宗族有不給者周之鄉鄰有臨難者濟之此其誼已於口人中求之已然猶以未足遍天下及後世也乃手製醫鑑回春仙方神彀等書俾疲癃殘疾者咸藉是以更生故君自嘉靖甲寅人僕中州縉紳先生僉禮貌之許昌之憲副若魏少穎徐毅罔鄢陵之郡守若劉水山梁及泉等首擊節之自是扶溝大司寇劉公三川方伯郝中岩柱史杜西泉何中環司馬何見環敦請焉握手談心蓋三十於茲矣開府王警吾張許東王竹溪大參彭豫齊又皆我省之人豪也疇不尊君為杏林之巨擘哉丙寅冬新鄭高相國聘君如京京之將相咸豔羡焉故定西侯蔣公授君為左府教胄三川劉公復為君勒太醫院吏目銜蓋皆以酬君之稚惠也後君以定省南旋越數載復由金陵抵大梁於時周藩海陽王安昌王京山王大宗正西亭俱以賢良稱翰林張玉陽高訥軒張明宇俱以文章名至如里都憲王廉憲陳憲副主僉憲又中州之當道者見泉魏中丞益齊成中丞霖環李中丞商鄉張春岩侍御崔振峰者乃燕趙之名流也數君子者其與君交也異姓而骨肉其感德也同心如肺腑然君之德愈茂業愈精初不以是而移志焉故侯王君公咸景慕其芳聲是以癸巳冬山東魯國王妃遘疾幾危遍訪海內名醫竟無寸效聞君名特遣官齎詔詣大梁以聘君君至授以良劑對證如神未幾而妃疾瘳矣國主甚得君恩賜君醫林狀元錫以儀衛饋以千金而君且曰醫林狀元世罕有也臣沐是是亦榮矣而千金曷為哉竟邁而不受國主於是亦嘉君誼至高乃為鐫其祕方名曰魯府禁方以公於世令君之寵恩闓澤翔洽於無涯也逮今榮轉大梁環我梁之宗藩士夫若竹君登亭田觀峰孫魯源柳省豫周用廷錢鶴峰朱太峰陳桂林陳雲臺輩素辱君愛最渥者欲藉是以稱賀乃徵文於僕僕曰僕感龔君未由一致謝㲋矧醫林狀元名重天下醫鑑之書功施奕禪尤僕所喜談而樂道者第其生平梗概魯國主與世子子諸藩及衍聖公縉紳已有旨音華之矣僕何以云賜進士第資政大夫太子太保南京戶部尚書大梁震峰張孟男撰並贈贈雲林龔君榮歷諸名公旌揚序夫士之修姱以自立者非交遊無以廣譽非行誼無以立名則委形宇內方目為世之疣又烏睹所謂士君子之自立哉金川有龔姓而云林號者飫經史業岐黃歷諸省而遊兩畿寄跡中原大梁間海內人豪望風眷注者不知其凡幾雖侯王公卿靡不寵錫若魯國母遘恙幾危復起酬以千金卻而不受主乃以醫林狀元褒之衍聖公以代天宣仁高師相以當世岐黃劉尚書以功同良相張都憲張翰林以澤惠萬民縉紳頌其德而扁其門已嘖嘖人口吻矣抑且著書八種澤及天下功垂萬世劉張朱李殆有以並驟而軼駕也耶余郡益藩王吳按院薛兵道韓郡守王郡丞董節推葛令尹諸大夫無病非其劑靡不神其伎又從而莫逆之其所以懷仁抱道未易窺測然睹其行誼又以百順事親十由盡孝隆恩撫弟克篤於友損金興祭敦義仁宗施棺收其暴露解衣衣其號寒賑饑饉而濟貧乏堅橋梁而修道路賻喪以助婚姻還鼠氣女以舉節義立家訓救顛運恤鰥寡技無辜種種德跡倘謂之懷仁抱道者非邪故兵憲公額以仁流奕世而旌其伎詳批其勸善戒惡之條而立其德於是令譽䶅䶈遐爾褒美即撫之王郡守陸郡倅麥節推贈之以仁壽恩榮臨之京令君以上池玄鏡信之陳郡守陳郡丞徐郡倅以回天啓後金之令君丁賢侯以仁孝傳家諸有司莫不優而禮焉汝之舒尚書徐光祿徐僉憲或序其著述或贈之詩章要皆旌揚其仁德之著者是以業大人爵儋御院而舉世之重望孰非交遊也邪又孰非行誼之卓榮而有以廣其令聞也邪至若光前裕後而亢其宗起死回生而神其術天心眷德而昌其後洊被貤恩名垂簡冊諸名公若揭日月而道之矣烏容置喙哉第旰都人士因讀其書而想望之喜其來而悲其晚也矧我同儕得蒙其澤而共享大和之仁恩者敢不濡穎而為之效顰前進士第尚書郎西江張壽明撰
