body:
  text: 兌集卷八外科癰疽凡諸浮數脈應當發熱其不發熱而反灑淅惡寒若有痛處必發癰疽脈微而遲反發熱弱而數反振寒當發瘡疽脈浮而數身體無熱形默默胸中微躁不知痛之所在其人必發癰疽凡癰疽未破毒攻臟腑一毫熱藥不可用若已破潰臟腑既虧飲食少進一毫冷藥不可用也凡人初覺發背欲結未結赤熱腫痛先以濕紙覆其上立視候之其紙先干處即是結癰頭也取大蒜切成片如當三錢厚薄安幹頭上用大艾炷灸之三壯即換一蒜片痛者灸之不痛不痛灸至痛時方住最要早覺早灸為上一日二日十灸十活三日四日六七活五六日三四活過七日則不可灸矣若有十數頭作一處生者即用大蒜研成膏作薄餅鋪頭上聚艾於蒜餅上燒之亦能活也若背上初發赤腫一片中間有一片黃粟頭豫使用獨蒜切去兩頭取中間半寸厚薄正安於瘡上著艾十四壯多至四十九壯神仙截毒法治癰疽發背一切惡瘡等毒預服此毒氣不內攻可保無虞真麻油一斤銀器內煎數干沸傾出候冷上用無灰酒兩碗入油內約四五碗許重湯煮溫稍熱通口服之以盡之為妙感疾數日亦宜急服之佳此屢試屢驗不可輕忽槐桃膏治背癰附骨疽乳癰及一切瘡腫痛未成膿者槐花炒一兩胡桃十個不油者連殼灰火煨熟去殼二味於盆內研爛如泥熱酒調和渣溫服如能飲酒多飲愈效一醉後癰腫散矣勝如槐花酒按上方治癰疽一切惡毒初起即宜服之千金消毒飲治癰疽發背發項髮鬢腰癰腸癰時毒便毒瘰癧結核初期末破者二三日內當用此亦須視人壯弱或一劑二三劑以大便內出赤色如魚鰾或濫渣為度及小便置錫器內如紅花水乃毒出也不可太多恐傷元氣消則已不消隨用活命飲正在將潰未潰之際宜之連翹一錢黃芩八分赤芍六分枳殼去穰五分升麻八分麻黃六分漏蘆八分白蘞五分白及七分甘草三分大黃一錢壯實者二錢上銼一劑水二鍾生薑三片煎至一鍾溫服凡在上部加桔梗食後服在下部加牛膝木瓜食前服按上方治癰疽等瘡初起腫痛者宜之加減真人活命飲治癰疽發背腸癰便毒初起即消已腫即潰血從大便中出當歸尾酒洗一錢半赤芍一錢白芷一錢木鱉子去殼一錢穿山甲蛤粉炒二大片金銀花三錢皂角刺一錢白殭蠶一錢瓜蔞仁去殼一錢天花粉一錢乳香一錢沒藥五分大黃二錢甘草節五分上銼作劑水一碗酒一碗煎至一碗空心溫服按上方治癰疽等瘡腫痛極惡不可忍者宜之內托散治癰疽發背腦疽乳癰諸惡瘡毒黃耆人參當歸川芎白芍防風白芷厚朴桔梗官桂瓜蔞仁金銀花甘草上銼每服一兩水二鍾煎七分入好酒半鍾去渣溫服日進二三服之後瘡口有黑血出者及有汗出者此藥之功也不問症候猛惡未成者即散已成者即潰矣痛甚加乳香沒藥倍當歸芍藥按上方治癰疽等瘡將潰已潰托裡宜服神仙化毒丹治一切癰疽發背對口諸瘡惡毒瘰癧痔漏手足指疽諸發服此無膿即散有膿即潰瘡口潰爛者即合其效如神萬不失一大解百毒久服見功黃蠟二兩蜂蜜二錢白礬一兩二錢辰砂一錢雄黃四分上先將白礬辰砂雄黃另各研細末合和一處又研極細將蠟蜜入銅勺內熔化卻離火置於別所候蠟蜜四邊稍凝取入前末和作一塊令一人近火旁烘將手轉側勿使火化又一人作丸如梧子大每服三十丸或四十丸空心滾白湯下按上方治癰疽潰後宜以托裡散化毒丹二藥兼進治發背如墨不疼痛者為陰也艾葉一斤雄黃硫黃各半兩上二味用水煮艾半日後溫敷之再煮別艾又換以敷十餘遍若疼痛則可瘳必不死如不疼痛出黑血者必死矣治發背癰疽腫痛或將潰未潰一帖如神芙蓉葉或根或皮黃荊子為末等分上石臼內搗爛雞蛋清調塗瘡上留頂如煙起立效治發背用公豬腦子一個搗爛攤布上後用乳香五分沒藥五分三七五分麝香一分破則不用麝共為細末敷瘡上對日即破出膿即已一方癰疽發背已潰未潰芝麻一碗炒烰入枯礬七錢再炒搗成餅敷患處三日一換透膿散郤竹溪方治瘡毒已有膿瘡口不破者雞子一枚開頂略去白用白丁香黑丁香各用雄者七粒黃蠟三分填入雞子內攪勻坐灰火中候將熟加炭火煅存性為末香油調搽即破頂出膿按上方外治之劑加味十全大補湯治癰疽潰後補氣血進飲食實為切要凡膿血出多陰陽兩虛此藥有回生起死之功但不分經絡不載時令觸類而長之可也或見腫平痛寬遂以為安漫不知省無補接調養之功愈後虛症復見因而轉為他症而危劇者多矣方見補益參朮膏如瘡出膿之後血氣大虛急宜用此人參一斤切片另熬成膏裝入罐內去火性白朮去蘆一斤切片另熬成膏裝入罐內去火性每日早晚二次用之如不喜歡飲食以白朮膏二匙人參膏一匙加無灰酒調服如氣弱或多睡以人參膏二匙白朮膏一匙酒調服如常各一匙均服若服盡此藥必須發童生氣血壯健神效托裡收功散治癰疽已破潰爛出膿已多敗肉已去不能收功者嫩黃耆二錢用桂三分煎湯拌炒人參二錢當歸身酒洗二錢川芎一錢白茯苓一錢白朮去蘆一錢防風一錢甘草炙五錢上水煎食遠服治瘡疽久不愈陳省齋黃耆二兩當歸一兩半白芍一兩白茯苓一兩白芷三錢川烏泡一兩厚朴五錢陳皮一兩甘草炙二錢上薑棗煎服人病癰疽多有愈後發渴而不救者治之惟加減八味丸最妙疽安而渴者服此丸則渴止疽安而未渴者預服此丸則永不生渴氣血加壯或未疽而先發渴者服此不惟渴止疽亦不作加減八味丸治常人平日口乾作渴因飲酒食炙煿補劑房勞凡若此類過多致令腎水枯竭不能上制心火故有此症後必有疽發也宜先服此以絶其源及癰後服此有益懷慶大生地黃酒浸二兩懷山藥一兩白茯苓去皮八錢山茱萸酒蒸去核一兩肉桂五錢牡丹皮八錢澤瀉酒浸飯上蒸過焙乾八錢遼五味子去梗一兩半上精製稱明合一處入石臼內搗爛成餅曬乾磨為細末煉蜜為丸梧子大每服三錢溫酒鹽湯任下按上方治癰疽收功保後之劑生肌散斂瘡口止痛生肌官粉火煅黃色一錢黃柏一錢黃連乳香沒藥孩兒茶各五分上為細末摻瘡口西園公加爐甘石煅黃連湯淬二錢輕粉一錢冰片三分回陽玉龍膏治癰疽屬陰寒而醫俱以涼藥敷之以致癰腫堅硬不痛肉色不變久而不潰潰而不斂或筋骨攣骨痛一切冷症又治跌僕所傷為敷涼藥或人元氣虛寒腫不消散或不潰斂草烏三兩炒南星一兩煨乾薑二兩煨白芷一兩赤芍一兩炒肉桂五錢上為末蔥湯調搽療惡寒嗇嗇似欲發背或已生瘡腫隱疹起地霜即朴硝三兩以熱水一碗化硝待冷取故青布揲三重可似赤處方圓濕布竭熱即換頻易之差玉容膏治發背癰疽潰爛用此生肌止痛香油二兩黃蠟一兩二味火化開入黃丹末一錢寒水石火煅一兩上為末溶化為膏紙攤貼患處神異膏治癰疽發背諸瘡毒不拘已成已潰未潰者皆可用之瘡毒甚者每日換兩三次中毒換一次其藥力方能勝毒當歸尾五錢川芎五錢赤芍二錢生地黃四錢防風五錢羌活五錢白芷五錢玄參五錢黃耆五錢官桂三錢桃仁四十九粒杏仁四十九粒木鱉子十四個何首烏三錢牛蒡子五錢川山甲四錢露蜂房三錢蛇退二錢大黃二錢黃柏二錢乳發男者一團如雞子大槐柳枝四十九節每長一寸上用芝麻油二斤四兩將藥入鍋內浸春五夏三秋七冬十日以桑柴文武火煎油黑色以穿山甲浮起黑為度絹濾去渣再煎油滴水成珠陸續下黃丹十四兩柳條攪不住手成膏軟硬得宜再下乳香沒藥各五錢血竭三錢降香末三錢次冷定下麝香末二錢水浸二三日去火性攤貼患處按上方皆外治之劑觀音萬化丸治一切發背癰疽無名腫毒諸般惡毒疔瘡及治破傷風陰症傷寒並楊梅瘡毒筋骨疼痛並皆一服見效蟾酥一錢血竭二錢銅緑二分半蝸牛二十個瓦上焙乾北人謂之麥牛兒肉殼皆用以上四味同研枯白礬一錢輕粉二錢二味同研硃砂三錢研細留一錢為衣上為細末用小兒母乳汁和丸如緑豆大硃砂為衣遇此病令患人自嚼生蔥一二根令爛取出裹藥三丸在內吞下卻以熱酒一二杯送下如重車行十里路遍身汗出據天氣斟酌衣被蓋易汗出毒散腫消如病人昏沉人代嚼蔥白如前服如疔瘡走黃過心者並出冷汗者難治病人不能嚼蔥研爛裹之瘡在上食後下食前服忌冷水黃瓜茄子油膩雞魚肉濕面一切發物不可食最宜戒之瘰癧瘰癧者經所謂結核是也或在耳前後連其頤額下連缺盆皆為瘰癧或在胸及胸之側下連兩脅皆為馬刀足少陽主之獨形而小者為結核續數連結者為瘰癧形長如蛤者為馬刀也繞項起核名曰蟠蛇癧延及胸前連腕下者名曰瓜藤癧左耳根腫核者名曰惠袋癧右耳根腫核者名曰蜂窩癧消毒化堅湯治瘰癧馬刀生耳前後或項下胸腋間纍纍如珠者破及未破者皆治當歸一錢白芍六分黃耆一錢玄參六分天花粉六分連翹一錢半柴胡一錢黃芩五分牛蒡子七分龍膽草四分升麻七分桔梗一錢陳皮八分羌活七分薄荷四分海昆布七分上水二鍾生薑三片煎加甘草節知母貝母海藻更佳按上方治瘰癧初起之劑益氣養榮湯治懷抱抑鬱瘰癧流注或四肢患腫肉色不變或日晡發熱或潰而不斂人參黃耆鹽水炒白茯苓白朮去蘆炒各二錢當歸酒洗川芎白芍酒炒陳皮熟地黃酒蒸香附貝母各一錢桔梗炒五分甘草炙五分生薑煎服化鳳膏治瘰癧有效方見結核抑氣內消丸治瘰癧兼諸瘤當歸川芎白芍酒炒白朮去蘆炒青皮去穰陳皮半夏薑炒白芷桔梗去蘆羌活獨活厚朴薑炒各八錢防風黃芩酒炒烏藥香附檳榔各一兩蘇子一兩半沉香三錢木香人參粉草各五錢上銼水煎溫服十數劑即消或制丸藥共為末酒糊丸梧子大每七十丸酒下按上方治瘰癧攻補兼施百發百中之劑必效散治瘰癧未成者消已潰者斂須元氣壯者可服南硼砂二錢半輕粉一錢斑貓四十枚去頭翅足糯米炒熟去米麝香五分白檳榔一個巴豆去殼心膜五粒上為末每服一錢五更用滾湯調下如小便滯澀或微痛此癧毒欲下也進益元散一服即下此方用斑貓巴豆似為峻劑然用巴豆乃解斑貓之毒用者勿畏按上方治瘰癧壯盛人宜之治痰核在喉嚨上下或生兩腋下皆是瘰癧黃仰溪防風一兩半山慈姑一兩川山甲七錢射干二兩紅內消二兩連翹一兩半牛蒡子一兩半烏藥一兩金銀花二兩夏枯草二兩薄荷一兩獨活一兩殭蠶一兩半夏一兩桔梗一兩半赤芍一兩半白芷梢一兩半車前子一兩防己二兩何首烏二兩皂角刺二兩小川芎一兩歸尾一兩甘草五錢上銼水煎食後服有潮熱加柴胡黃芩各五錢按上方治瘰癧專攻之劑余治一儒者患瘰癧已潰六脈微澀而數空心服六味丸已未時服益氣養榮湯臨臥服神仙化毒丹一日四次服無間百日全愈方見癰疽治老鼠瘡五七年不愈者服一二枚即斷根用貓一隻去毛腸令淨砍去頭另用將貓煨爛令患人食之其瘡若不收口將貓頭火烘乾煅存性又用蝙蝠一個燒存性同貓頭灰用香油調搽患處即愈如患人不肯服之以貓去頭剖淨切碎以粳米煮作羹用之甚妙治瘰癧妙方不問已破未破用烏雞子頂上開竅攪青黃勻卻以線系斑貓一個去頭翅足入雞子中紙糊蓋之飯上蒸熟剝去殼去斑貓空心吃雞子一日一個以瘥為度雄黃解毒丸方見中風治瘰癧瘡一料加斑貓十四個去頭翅足糯米炒為末麵糊為丸如緑豆大每五七丸臨臥冷茶下內消丸治瘰癧斑貓一兩去翅足用粟米一升同炒令米焦黃去米不用細研入干薄荷末四兩同研令勻以烏雞子清丸如緑豆大空心服茶下一丸加至五丸卻每日減一丸後每日服五丸神效治瘰癧用豬肚去淨勿洗刮膚上極細嫩油一層以蔥蜜搗爛上瘡即潰蝕舊干生新肉治瘰癧內消方蜈蚣不拘多少瓦焙乾為末用銀杏汁為丸如黍米大每服十丸鹽湯送下將被蓋出汗服數次而愈治瘰癧方爛至胸前兩腋下有塊如茄子大或牽至兩肩上四五年不能痊者並皆治之其項不能回頭數日效用荊芥根下段切碎煎沸待溫洗瘡良久看瘡爛破處紫黑用針刺一二出血再洗三四次用雄黃樟腦為細末真芝麻油調以雞毛掃瘡上以出水次日再洗再掃藥過三日又用韭菜地上蚯蚓糞早晨收作團虎口大炭火燒紅取出為末每一丸加乳香沒藥輕粉各半錢川山甲九片煅紅為末芝麻油調敷患處其效如神治瘰癧老鼠瘡豬懸蹄燒存性為末每服三錢黃酒送下一服立消千捶緑雲膏治遠年鼠癧瘡神效方松香半斤溶七次濾去渣乳香二錢半沒藥一錢半血竭一錢銅緑一錢半杏仁去皮一錢半孩兒茶三分萆麻子去殼二錢半麻油二兩乳汁二盞上為末合作一處同乳汁油攪勻捶搗千下成膏用絹上藥貼患處立效一婦人年逾三旬患瘰癧已潰不愈與八珍湯加柴胡地骨皮夏枯草香附貝母五十餘劑形氣漸轉更以立效散二服瘡口遂合惟血未平再用前藥三十劑而愈矣治瘰癧祕方用夏枯草水煎三次去渣熬成膏貼患處疔瘡夫疔瘡者由四時迭更陰陽交變此二氣互相擊怒必成暴氣然暴氣卒然大風大霧大寒大熱若不能避而遇襲於皮膚入於四體傳注經脈遂使腠理結滿陰陽二氣不得宣通遂成疔毒但疔毒之名十有三種必發於手足間生黃泡其中或紫色有一帶紅線直入者用針於線處刺去毒血水針時以知痛出血為妙否則紅線入腹攻心必致危困凡治疔毒先以麵漿水飲之吐則是不吐則非也大抵脈洪而數者難愈也治諸般惡毒發背疔瘡極凶惡者川大黃五錢木鱉子去殼二錢殭蠶二錢貝母二錢上銼一劑生頭酒一碗半煎至八分溫服一枝箭凡患疔瘡癰疽癤毒此藥能令內消去毒化為黑水從小便出萬無一失祕之祕之知母貝母白及半夏天花粉皂角刺一方用牙皂金銀花穿山甲乳香各一錢上銼一服無灰酒一碗煎至半碗去渣只作一服溫服不得加減再將渣搗爛加秋過芙蓉葉一兩用蜜調井花水和敷瘡口上如干再用蜜水潤濕過一宿自然消不必用第二服藥也神捷一枝箭治無名疔腫發背諸癰疽未成即消已成即潰神效一枝箭名兔兒草貴川出五味子根遼東出金銀花名左纏藤蒼耳根上四味好酒濃煎一碗飲之少臥汗出即解按上方治疔瘡俱效任用又祕方治前症每惡瘡出初覺時用面捏圈圈在瘡上取雄雞冠上血滴在患處如瘡大用二三隻雞冠血少頃患處涼入骨髓其毒自解治疔瘡毒氣攻心即死八月間野紫蕷荷連根帶葉搗為末香油調先敷心口立散後敷患處立效治疔瘡毒用蒼耳子莖葉燒灰以醋調塗瘡上毒根即出或用藍靛調塗亦可疔瘡用雄黃為末先用針刺四圍及中醋和調塗之疔瘡用荔枝肉一兩陳白梅七錢二味研成膏用針刺破毒口以藥敷之其疔毒即出一方治疔瘡用紫梗菊花根莖葉皆可研取汁飲之以渣再加酒醋敷之類聖散治疔瘡惡毒腫痛神效川烏草烏蒼朮細辛白芷薄荷防風甘草各五錢上為末雞子清調塗留頂按上方外治之劑治食時疫死牛馬肉成疔腫欲死者烏桕木葉搗絞真汁一二碗頓服之得大瀉毒氣而愈如冬月無葉取內根研水服亦效未利再服以利為度治誤食瘟牛馬肉生疔毒瘡白頸蚯蚓八九條擂酒濾服其渣貼瘡四圍患處可留頭出氣治疔腫發背甚至刺灸不覺痛服藥托裡死肉便化枯白礬炒鹽各等分研為末每服一錢新汲水調服瘡未回再服瘡回覺痛即已治疔瘡不破則毒入腸胃不治蟬退一味為末蜜水調下半碗飲之及用其末津唾調塗瘡上瘡口自潰端午日蛤蟆含墨治疔瘡法蛤蟆本是水中串五月端午拿將來口含黑墨梁上挂含的黑墨化歹瘡此咒含墨時念治疔毒如神用杏仁切去下少許令平蘸溏雞屎安坐於疔頭上即止又方治疔腫及無名腫毒掐瘡頭去白水以蔥蜜搗爛塗患處立已灸疔瘡法大蒜搗爛成膏塗疔四周留瘡頂以艾炷灸之以爆為度如不爆稍難愈宜多灸百餘壯無不已者灸痘瘡灸蛇蠍蜈蚣犬咬並瘰癧皆效按上單方治疔瘡有效者便毒附魚口瘡夫便毒者生小腹下兩腿合縫之間其毒初發寒熱交作腿間腫起疼痛是也夫腎為作強之官所藏者精與志也男女大欲不能已直遂其志故敗精搏血留聚中途而結為便毒矣夫人腳腿與小腹合縫之間精氣所出之道路也或觸景而動心或夢寐而不泄既不得偶合陰陽又不能忘情息念故精與血交滯而成腫結也初起慎不可用寒涼之藥恐氣血愈結不得宣散反成大患惟當發散寒氣清利熱毒使精血宣暢則自然愈矣治便毒極效方主方治便毒生在兩腿合縫之間腫痛之甚當歸尾赤芍白芷金銀花天花粉各一錢白殭蠶炒六枚木鱉子去殼十枚穿山甲二片大黃三錢芒硝二錢上銼好酒二鍾煎一鍾連藥罐露一宿五更熱服厚衣蓋之發汗利一二行即已硝黃待群藥煎將熟入再煎二沸用之一方加射干去硝龍膽瀉肝湯治肝經濕熱兩拗腫痛或腹中疼痛或小便澀滯兼治玉莖生瘡或便毒懸癰囊癰腫痛潰爛睪丸懸挂龍膽草酒拌炒黃澤瀉各一錢車前子炒木通當歸酒拌生地黃酒拌山梔炒黃芩炒甘草各五分上水煎空心溫服治便毒初起用大黃三錢枯礬一錢為末好酒調服日久加穿山甲炒敷藥治便毒腫痛雄黃乳香各二錢黃柏一錢上為細末新汲水調敷腫處自消蛤蔥膏治魚口瘡一名橫痃一蛤蟆一個剝去皮連腸搗碎如泥入蔥白五錢再搗成膏與敷腫處卻用原蛤蟆皮覆貼其上經宿即消治魚口瘡未破用豬膽一枚投熱酒一碗溫服即內消一方治魚口五倍子炒為末醋調貼患處干則醋潤感寒失於解表流成便毒癰疽往來寒熱甚艱危獨活生黃歸尾要真金銀花穗大黃酒煨甚奇川山甲要炒成珠利下膿血即愈下疳附懸癰下疳瘡乃男子玉莖生瘡皆因所欲不遂或交接不潔以致邪毒浸漬發成瘡毒日久不愈或成便毒或損爛陽物多致危篤又魚口瘡妬精瘡皆其類也俗云疳瘡未已便毒復來生也妬精瘡此蓋出婦人陰中先有宿精因而交接虛熱熏蒸即成此疾初發在陰頭如粟拂之則痛甚兩日出清膿作臼孔蝕之大痛婦人有生於玉門內五疳蝕瘡不痛為異耳刺曲骨一穴在中極下一寸橫骨上毛動脈應手針二寸治疳瘡方治陰頭腫痛生瘡黃柏去粗皮以豬膽汁炙透為末摻瘡上又治臁瘡治先疳瘡祕方川楝子黃連瓦松花椒蔥根艾葉各等分水煎入青布一塊浸洗疳瘡上立效又方用白礬一兩黃丹八錢熬飛紫色研為末以溝渠中惡水洗過拭乾敷上治疳瘡腫痛鳳凰衣即抱雞蛋殼內衣不拘多少輕粉片腦各少許為末敷患處治疳瘡用天靈蓋火煅為末先用黃柏煎湯淨洗後摻藥即愈又治婦人經水不止黃酒調二錢立止按上方治疳瘡外敷之劑治蠟燭發神方京師傳治下疳腫痛潰爛鐘乳石二分硃砂三分珍珠二分琥珀一分半片腦一分半上為細末每用土茯苓四兩豬蹄一隻煎水三碗早間服一碗調前藥末四釐午間服一碗調藥末四釐晚間服一碗調藥末四釐一日服三次共一分二釐十日服盡其瘡必愈其豬蹄隨用之忌動風發物牛肉燒酒最忌之神良之方祕之按上方治疳瘡梅瘡神效治疳瘡疼痛不能忍者胡藝齊片腦一分官粉煅五錢水銀三分用三分制為細末摻瘡上八寶丹李益庵傳治疳瘡乳香沒藥孩兒茶紅蠍子灰海蛤焙珍珠炒象牙燒龍骨煅各五分上為細末先用米泔水洗瘡乾摻效治陰頭上生瘡用溪港中螺螄入乾鍋內煅過先以鹽水洗五七次後以此敷之如妬精瘡田螺兩個和殼煅過入輕粉搽患處即愈治外腎生瘡用緑豆粉一分蚯蚓屎二分水研塗若干又敷治下部生濕瘡熱癢而痛寒熱大小便澀食亦減身面微腫用馬齒莧四兩研爛入青黛二兩再研勻敷上治陰囊風癢方用紫背浮萍不拘多少煎水洗之如成瘡黃連輕粉雞蛋殼燒灰將末擦之即已治陰頭上疳瘡五倍子燒存性一錢七分硃砂七分兒茶五分冰片半分輕粉二分半水銀一分從一邊爛起加狗骨灰二分從周圍爛起加鱉殼燒灰二分上共為末摻患處治陰囊生瘡用甘草煎水溫洗卻用臘茶末敷之治腎臟風發瘡疥用紅椒去目水浸半日和生杏仁研爛擦兩手掌擦外腎極效治下部生瘡熱癢而痛用川椒開口者七粒連根蔥白七根同煮水洗淨用絹帛拭乾即愈按上單方皆外治之劑凡毒生陰囊後肛門前謂之懸癰大黃紋甘草五錢銼碎酒煎空心服即散楊梅瘡清涼敗毒散許州馮太守傳治楊梅天泡百發百中連翹黃芩梔子防風荊芥獨活苦參白芷木通木瓜皂刺金銀花薏苡仁白鮮皮當歸尾威靈仙漢防己天花粉甘草各五錢土茯苓二斤上銼十劑水煎溫服忌羊肉燒酒按上方凡楊梅瘡先服防風通聖散十劑後服此十劑收功十仙丸京師傳治楊梅瘡先服防風通聖散十劑後此收功方見中風雄黃硃砂乳香沒藥孩兒茶當歸白芷丁香槐角各一錢輕粉八分用花椒蔥水調蒸上為末飯為丸每三十丸土茯苓湯下祕方治楊梅瘡立見神效白鮮皮二兩皂角子一百二十個防風二兩細辛一兩三錢川烏二兩首烏二兩罌粟殼四兩上銼十劑每用土茯苓一斤豬肉四兩同煎服祕方南塘驗漢防己七錢槐花三錢五倍子四錢三味為末土茯苓八兩豬肉半斤用好酒一大壺同煮熟一併食之祕方胡云齊當歸尾一兩三錢牛膝一兩三錢黃芩一兩三錢大黃一兩三錢木瓜一兩金銀花一兩三錢皂角刺八錢蟬退五錢土茯苓二斤上分作十帖每用白果紅棗皂角子各十個蔥白三根水煎服祕方黃左川連翹四兩金銀花四兩牙皂二兩杏仁二十一個蟬退二十一個肥皂子三十一個土茯苓一斤俱銼用酒拌炒作十劑水煎服祕方黃仰溪青藤一兩當歸尾二兩皂角刺二兩金銀花一兩半五加皮二兩白鮮皮二兩分作十二劑用土茯苓四兩水煎服按上方俱經驗治楊梅瘡百發百中者任意選用但先要服防風通聖散十數劑後服祕方拔去病根永無所患五寶神丹凡人病過楊梅天泡棉花等瘡致成一切荏苒之疾或楊梅爛見骨經年不收口者或筋骨疼痛舉發無時或遍身疙瘩不消或手足皸裂出血或遍身起皮發罨好一層起一層或生赤癜白癜鵝掌風癬或皮好骨爛口臭難當又治久年臁瘡不愈一切頑瘡瘰癧並皆治之此方第一要上等真藥不可妄傳非人鍾乳粉三分大丹砂二分琥珀半分冰片半分珍珠二釐半上為細末每服五釐另入飛白霜二分半炒過合作一服每一料分作十二帖每一日用土茯苓一斤用水煎作十二碗去渣清晨以一碗入藥一帖攪勻溫服其茯苓湯須一日服盡不可別用湯水並茶日日如是服盡一料無不愈矣百發百中忌雞鵝魚牛肉房事藥完不忌如珍珠有油者用豆腐一塊取竅入珠子內蒸之取出油即去盡方可用之龍腦復煎丸許昌宋柏河傳治遠年楊梅天泡頑瘡腫毒筋骨疼痛言藥無效者乳香滴乳者沒藥琥珀色者丁香去孩兒茶各五錢龍腦梅花片者三分珍珠生研一錢百草霜白龍骨生研萬氣燙即釜蓋上垢血餘頭首男子者燒灰各三錢重羅麵半斤大紅棗洗半斤煮爛去皮柿餅洗半斤與棗同煮去核萼燒酒一鍾米醋一鍾芝麻油一鍾煉令香熟上除面將前十味為細末通合作一處石臼內杵令勻丸如彈子大每服三丸用土茯苓二兩水二碗煎至碗半去渣入藥再煮令一碗溫服日二服服至百丸其瘡自愈其痛自除其方甚效不可盡述按上方治楊梅瘡頑毒百發百中者楊梅瘡出水不結痂石決明一個火煅孩兒茶一錢半輕粉四分三味為末摻之愈白龍散治楊梅瘡神效雄黃一錢半硃砂七分血竭二錢麝香二分白花蛇二錢皂角刺二錢青風藤五錢土茯苓半斤上為細末每上午服五分下午服三分以土茯苓二兩青藤五分皂刺五分煎酒調下換骨散治天泡瘡筋骨疼痛川歸荊芥麻黃梔子連翹天花粉各一兩皂角刺一兩半乳香沒藥各一錢半土茯苓四兩上分十劑水三碗煎一碗二次服治天泡楊梅瘡本草取油煎沸對和無灰酒溫服取微汗治癰疽發背腫毒甚效真香油一斤入水半鍾煉油耗白煙起無火以磁瓶收貯每早晚用熟油一鍾黃酒一鍾同服七日效除根治楊梅瘡雄黃二錢半真輕粉一錢杏仁去皮尖三十個上研為細末入杏仁再研如泥用雄豬膽汁調搽瘡先洗淨拭乾搽藥二三日即愈治楊梅簡易奇方一方用槐花一升為細末滴水丸每百丸不拘時酒下一方用苦參連根帶葉搗汁飲之即愈一方用硫黃為末豬膽汁為丸梧子大每二十丸白湯下半月除根一方治楊梅瘡初起穿山甲炒三片為末黃酒下三服效治楊梅瘡毒一身俱好惟大腿受刑處一大塊頑毒不消出膿水不絶骨里潰爛臭不堪聞久不收口百藥不效輕粉要真者一錢片腦要真成片者二釐乳香要化開濾去渣一錢杏仁去皮紙包槌六七次去油令淨五分上為細末濕則乾摻干則香油調搽此方治楊梅頑毒如神效先用鹽湯洗毒令淨後摻藥治楊梅瘡誤服輕粉發出餘毒潰爛防風三錢金銀花五錢川牛膝三錢毒淺去之黑鉛一兩半打薄片土茯苓四兩不沾鐵器公豬肉四兩上共作一大劑水六碗煎至四五碗一日服盡一日一劑十日全安不拘遠近傷筋見骨並效治楊梅瘡誤服輕粉作筋骨痛用真川椒去目每早空心白水送下一錢或錢半任意服白胭脂治楊梅瘡後毒癬起一層皮又一層久年不瘥烏桕油牛油香油黃蠟各一兩燎開七時溫入銀珠一錢半官粉二錢麝香五分三味為末入油內攪勻火烤癬令癢抓破將藥擦上即愈神效無比治楊梅瘡祕方土茯苓去粗皮為細末一斤白蜜一斤糯米煮二斤和勻蒸饃饃食之以蒸湯食之不可吃茶水治楊梅天泡愈後瘢痕黑紅用大黃白礬各等分同研擦患處痕即去而色即復舊臁瘡夫臁瘡者皆由腎臟虛寒風邪毒氣外攻三里之旁灌於陰交之側風熱毒氣流注兩腳生瘡腫爛疼痛臭穢步履艱難此瘡於臁骨為重以其骨上肉少皮薄故難愈至有多年無已瘡口開闊皮爛骨現臭穢可畏治法當先取蟲然後敷藥如隔紙膏諸藥之類須翹足端坐勿多行履庶可痊矣治臁瘡爛腳方先用米泔水洗淨再用川椒艾葉濃煎水洗淨用黃丹不拘多少真香油調搽碗里以艾燒煙熏至黃色上紙隔紙貼之神效治臁瘡濕毒及遍身熱瘡黃柏一兩輕粉三錢為末用豬膽汁調塗濕則乾摻治臁瘡效方密陀僧八錢石乳一錢半血竭八分銅青七分上為末桐油調成膏貼上治臁瘡頭髮燒灰香油黃蠟先將油蠟化開入發灰攤油紙上貼患處神效治臁瘡疔瘡搭手背疽等瘡蔥白一斤馬齒莧一斤石灰一斤三味濕搗為團陰乾為細末貼瘡三香膏治遠年近日一切臁瘡潰爛至骨疼痛當時止痛生肌如神乳香一錢松香三錢為細末真生香油調用包粽子筍葉薄者針密刺孔將藥攤其上用筍葉貼患處藥居中上用完筍葉蓋藥上帛扎緊疥瘡疥者有數種有大疥有馬疥有水疥有乾疥有濕疥多生於手足乃至遍體大疥者作瘡有膿汁焮赤癢痛是也馬疥者皮內隱鱗起作根撫搔之不知痛此二者則重水疥者㾦㿔如小瘭漿摘破有水出此一種少輕乾疥者但癢搔之皮起作干痂濕疥者小瘡皮薄常有汁出並皆有蟲人往往以針頭挑得狀如水內瘑蟲此悉由皮膚受風邪熱氣所致也當歸飲子治瘡疥風癬濕毒燥癢等瘡當歸川芎白芍生地黃白蒺藜防風荊芥各一兩何首烏黃耆甘草各半兩上銼水煎或為末每服一二錢亦可升麻和氣飲治瘡疥發於四肢痛癢不常甚至憎寒發熱臍下濕癢虛人宜服此升麻乾葛白芷陳皮蒼朮桔梗甘草各一兩白芍七錢當歸茯苓半夏枳殼乾薑大黃蒸各九錢上生薑燈草煎服治瘡疥一人纍年生瘡服此永不生疥瘡忌雞魚羊肉當歸酒洗二兩白芍乳汁炒二兩生地黃酒洗二兩熟地黃酒洗二兩黃柏二兩鹽水炒一半童便炒一半知母去毛酒炒二兩白朮壁土炒一兩土茯苓六兩苦參去粗皮四兩甘草一兩上為細末用豬肚一個好酒四壺文武火煮為丸如梧子大每五十丸酒下忌動風之物按上方治疥瘡湯劑一掃光治乾疥瘡香油四兩用花椒一兩熬焦黑研爛入大楓子去殼七個輕粉一錢硫黃一錢人言三五分為末入油內搽之一掃光也香疥藥治風癬瘡黃水瘡疥癩牛皮癬瘡大楓子肉四十九個杏仁泡去皮四十九個兩味同研花椒去目另研三錢白礬生用三錢另研水銀三錢茶葉另研成末一錢樟腦三錢另研以上三味同研輕粉一錢上和勻再研聽用先以桃柳槐楮桑五木枝煎湯洗疥拭乾將前藥量疥多少用柏油入鹽少許乘熱和藥擦上一日搽三次忌魚羊雞豬頭肉治疥瘡李桐峰用蘿蔔一個內取一孔納硫黃不拘多少仍塞口灰火中燒成汁取出搗研再加脂油同搗外加雄黃銀硃各少許搽疥效治乾疥瘙癢雄黃一錢硫黃一錢人言三分上為末香油調搽水油脂油菜油俱可用一掃光狼毒皂角水銀一兩溶錫三分入水銀結成砂子上三味各等分摻於床薦被褥之間則瘡疥愈而蚤蝨臭蟲俱絶亦祕方也治疥瘡取石灰淋汁洗疥愈治老人生皮風疥瘡瘙癢又治坐板瘡鹽脂油調搽藜蘆根為末脂油調搽即愈治一切乾溼疥癬並膿窠爛瘡臂上黃水瘡作癢作痛大楓子肉二兩枯礬四兩樟腦三分蛇退燒存性二分蜂窠燒存性三分水銀五錢柏油四兩上為末入柏油同研成膏擦瘡熏疥藥艾一大塊大楓子四個木鱉子四個雄黃一錢核桃殼打碎四個好香一根上共為末搓成紙捻八寸長瓦合被內熏露頭效按上方治疥外搽敷洗之劑癬瘡久癬是諸癬有蟲而經久不瘥者也癬病之狀皮肉隱疹如錢文漸漸增長或圓或斜癢痛有匡廓搔之有汁又有乾癬枯索癢搔之白屑出又有濕癬如蟲行浸淫赤濕癢搔之多汁又有風癬搔抓頑痹不知痛癢又有牛癬因飲牛余水得之其狀皮厚抓之𩊅強又有圓癬作圓文隱起四面赤又有狗癬因以狗舐余水洗手面得之其狀微白點綴相連亦微癢又有雀眼癬作細文似雀眼搔之亦癢痛又有刀癬因以磨刀水洗手面得之其狀無匡廓縱邪無定如此之癬初得或風因濕客於肌膚折於血氣所生或因用牛狗所飲余水洗手面得之至其病成皆有蟲侵食轉深連滯不瘥故成久癬治風癬疥癩膿血諸瘡惡毒歸尾一錢赤芍黃連黃芩黃柏各一錢大黃三錢七分防風八分木鱉子去殼一個金銀花苦參各一錢二分上銼用酒水各一鍾煎至一鍾後下大黃煎三四沸取其露一宿五更服腸風臟毒下血去木鱉加槐花一錢必效散治風癬及頑癬川槿皮四兩斑貓二錢半夏五錢檳榔五錢木鱉子去殼五錢雄黃三錢白砒一錢上為末用井水一碗河水一碗浸曬三日露三夜將藥水用鵝毛掃癬上治牛皮癬極癢抓爛用牛腳爪燒灰存性香油調搽立效治乾癬積年生痂搔之黃水出每逢陰雨即癢斑貓半兩微炒為末蜜調敷之即愈治諸癬神方禿菜根上等好米醋不拘多少搗爛將絹包先將癢處抓破徐擦之即愈治諸癬神方用蟾蜍燒灰未以豬油和敷之又方禿菜根好米醋食鹽不拘多少搗爛將絹包先將癢處抓破後擦藥即愈又方用南星草烏各一枚為末羊蹄根搗汁調塗神效治癬瘡方馬蜂窩一個仰放炭火上用枯礬末漸漸填滿下面火炙令焦為末蠟腳醋調塗癬上效治癬用扉針磨令極尖快待癢時於癬上刺百餘針血出盡煎鹽湯洗之未已再針再洗摩風膏治鵝掌風癬玄明粉三錢雌黃一錢半牙皂五錢膽礬三錢枯礬三錢青木香三錢川大黃三錢雄黃二錢蘆薈二錢川槿皮五錢杏仁去皮尖五錢大楓子肉五錢水銀五錢先化鉛四錢入水銀上各研為末和勻用時取雄豬白胰子一件研爛入藥一半復搗勻擦風癬上禿瘡白禿之候頭上白點斑剝初似癬而上有白皮屑久則生痂瘰成瘡遂至遍頭洗刮除其痂頭皮瘡孔如筋頭大里有膿汁出不痛而有微癢時其里有蟲甚細微難見九蟲論亦云是繞蟲動作而成此瘡乃至自小及長大小不瘥頭髮禿落故謂之白禿也治禿瘡方膽礬二錢乳香二錢沒藥二錢紫草五錢鹽三錢木柏油一兩上各為末先將鹽紫油煎後下前三味剃光方搽治白禿瘌痢神效方石灰窖內燒過四圍紅土塹四兩為末百草霜一兩膽礬六錢雄黃二兩輕粉二錢榆皮三錢末上為一處豬膽調搽頭或洗淨剃頭尤妙刮去蓋以藥敷上乾用棉子油調搽亦可四五次即愈外敷敗毒散三四服治禿頭用舊生鐵鏽鍋將坑中真大糞水入內熬三四沸將糞水頻洗禿瘡即癢令抓破再洗即愈又方魚一尾重三四兩者去腸肚以乳發填滿濕紙裹燒存性雄黃二錢同為末生麻油調搽先以虀水洗後搽藥又方用蛇退燒灰存性為末豬油調敷又方用黃春蓼化蜂蜜調搽效治白禿用蔥白搗膏敷之愈治禿瘡方張立六用雞蛋黃一個煎出油來入人言三分為末入內調搽瘡上先將瘡殼剃淨後搽二三次愈治小兒白禿榆白皮為末醋和塗瘡上蟲即死又方治禿瘡及惡瘡用苦楝根皮燒灰以豬油調敷治禿瘡活蠍子五六個香油二兩共入煎數次取出蠍擂爛再入熬膏洗瘡擦三四次愈癜風紫癜風白癜風乃因心苦汗出及醉飽及浴後毛竅開時乘風拽扇得之扇風侵逆皮膚所致宜服胡麻散外以洗擦藥治之胡麻散治紫白癜風並癬面上酒齇又名粉刺面刺俱可服之胡麻子赤色扁者佳另研五兩白芷二兩何首烏二兩防風二兩蔓荊子二兩半甘菊花一兩苦參酒炒三兩威靈仙二兩升麻二兩當歸二兩牛蒡子微炒二兩川芎二兩白蒺藜三兩荊芥穗三兩薄荷二兩黃芩酒炒二兩黃連酒炒二兩白芍酒炒二兩上為細末每服三錢食遠服秋分後至春分白酒調服春分後至秋分茶調服用米糊細細丸食遠白湯下治紫白癜風禿菜根同白礬五倍子無名異和調搗碎先以苧麻刮熱以藥擦之三四次絶根治紫癜風白癜風即如今汗斑之類用白附子雄黃密陀僧等分為細末用帶皮生薑自然汁調以其為蘸藥擦之即愈大麻風古名癘風夫大麻風異症多端所犯不一或因嗜欲無度勞傷氣血或大怒憂欲驚恐抑鬱不伸或體虛膚空或醉臥當風或熱脫衣服汗出入水或手足破傷引入風毒或寒水濕瘴侵入肌膚當時感受積久遂成大風之患流注經絡傳入臟腑發於四肢內外熏蒸而成泡癬其病之原有三症五死一者風水二者傳變三者自失調理五死者一曰皮死麻木不仁二曰肉死割切不痛三曰血死潰爛成膿四曰筋死手足脫落五曰骨死鼻梁崩塌眼昏唇翻以致聲噎不能救治又有一風者肺經受證眉毛先落二風者肝經受證面起紫泡三風者腎經受證腳底先穿四風者脾經受證遍身如癬五風者心經受證先損其目或有墳墓居址祖宗父母夫妻家人等互相傳者或在外不謹糞坑房室床鋪衣被傳染或命犯凶星遭此疾纏染其瘡形狀所以不同急當早療別居靜室斷酒戒色忌食發風動氣葷腥鹽醬生冷之物然後可服藥而愈矣大麻風症有三因四死五經受病之由三因論曰一因者或因途中忍飢受餓風雨相侵而生一因房事不節露天坐臥寒氣相侵而生一因墳龍風水卑陋有怪瘡異之症相侵而生四死論曰一脾經受病潰爛成膿流水出汁此脾血死也一肝經受病四肢麻木手足拘攣十指筋攣此肝血死也一心經受病四肢麻木針下無血不知痛癢此心血死也一肺經受病鼻紅耳大面赤生疙瘩此肺經受病是也一腎經受病眼睛流淚視物昏花此腎經受病是也大風瘡因內傷五臟外傷六腑及損遍身四肢者是也凡癩人眼紅眉脫絶毒乃至惡之症古曰癘風醫者不可輕治若皮膚不裂四肢不板者易治又曰心脾肺三經易治肝腎二經難治麻風症總用藥方品味開後神仙祕方白熟早米飯五兩二錢米飯煮熟者大楓子去殼要極白者五兩二錢上膈用川芎二錢五分淨末真麝香用當門子五分荊芥穗淨末二錢五分完全蠍洗淨去鹽泥去頭足尾曬乾為淨末二錢五分川當歸用淨末三錢七分五釐軟防風去蘆用淨末二錢五分空虛不用完蟬退水洗淨去泥土為淨末二錢五分上膈用頭去翅足為末中膈用中身下膈用尾川羌活水洗去灰去蘆中心淨末五錢嫩苦參洗淨去土淨末三錢七分五釐總括歌曰飯楓同五二川蠍退荊防通二錢加五兩羌只半當參歸三七半各制是良方凡制此藥擇天月二德淨室中勿被婦人雞犬狐臭之人見之修制要誠心齋戒不可苟簡切忌鐵器火烘火炒凡合此藥先將各味藥末另稱明方合一處調和又先將楓子仁入臼搗爛如泥無白星點方可住手次下白米熟飯入臼又搗爛如泥亦要無白星點方住手將二味取要稱過分兩同入臼又搗下各藥末搗爛成泥方可為丸如梧子大初服之時逐日如法用不可孟浪多服一丸如加一斤之擔切記切記慎之慎之服藥之法專忌鹽醋戒酒斷葷病者要堅心苦志戒之百日之外其疾俱除無迹方可開葷初用牡豬肝無油者略用候病全安任用不拘以後無忌凡初起手服藥要斷他後看或有鼻孔血或吐痰或腹中作嘈或作暈其疾即退不須驚疑過三四日自安其疾即從兩太陽消起漸退下兩腮及下頦而退服完上隔藥十二三日自然退完上部若不退再以飯楓丸再進一料即除方用中部藥依次而行中部藥方用飯楓丸內去荊芥全蠍二味妙加秦艽二錢五分續斷二錢五分下部藥方用飯楓丸內去荊芥外加秦艽三錢七分半續斷三錢七分半薄荷葉三錢大明雄黃三錢陳細茶白蒺藜各七錢威靈仙五錢若面上有浮遊作癢者加胡麻仁三錢天麻三錢白蒼朮五錢若無此症狀不必加上三味若腳爛發裂者加川烏五錢草烏五錢腳不爛不用加二烏細茶三錢巴焦根末三錢七分制川烏草烏法用黑豆二升做豆腐一大塊內剜一孔先將二烏切碎片入豆腐內竹蔑穿豆腐片砂鍋內煮久二烏無白星方佳住火取出不用豆腐用藥入前飯楓丸內同搗如泥為丸口傳轉手法總管藥用前楓藥制只去荊芥中部藥全用中部用楓子肉十兩各藥依前分兩下部大楓子肉不拘多少仍用前藥為丸服之病愈凡服丸藥每用陳細茶煎水送藥初服用三十五丸次日服加五丸三日加十丸四日加至五十丸六日加至六十丸七日加至七十丸八日加至八十丸百丸為止服至十三四日服盡上隔藥一料看他上部疾去盡方服中部藥如不盡再服上部藥一料方服中部藥看上中部疾去方治下部藥看三部疾盡除去方可開葷吃鹽病不退盡不可開葷吃鹽此症輕者五十日見效百日內全安重者六十日見效半年十月全安若疾俱除宜制總管藥一料即住藥莫吃若吃肉只宜用牡豬前蹄煨爛及肝心肺無油之肉弱者用老雞煨爛吃亦可新雞不可余者雜味發風之物永戒恐有後患大凡女人弱者宜補血脈為主凡男子不宜用補只宜清解為要凡服藥體厚者每日進丸子三次或二次體薄者一日進一次或二次為止一酒肆門壁不謹被白花蛇潛入缸內偷吃了酒至醉不能出死於缸內不知死了幾日遂將蛇丟棄其酒不忍傾有一貧子遍身惡瘡癩毒常來乞食來則將酒一碗與之其人日日來則日日與之過半月復來乞丐一身乾淨皆得此酒之功也愈風換骨丹治癘風即大麻風白花蛇一條頭尾全者酒浸二三日去骨陰乾苦參四兩皂角半斤去皮弦酒浸一宿取出以水熬膏上為末以皂角膏為丸如梧子大每七十丸以防風通聖散煎湯送下即愈苦參丸苦參一斤金銀花防風荊芥羌活獨活當歸川芎赤芍連翹黃連黃芩山梔滑石白朮甘草各一兩上為末水打稀糊為丸梧子大每百丸苦參酒送下苦參酒苦參五斤好酒三斗漬一月每服一合日三服參京丸治心肺積熱腎臟風毒攻於皮膚時生疥癩瘙癢難忍時出黃水及生大風手足爛壞眉毛脫落一切風疾並皆治之苦參四兩荊芥一兩為末水糊為丸如梧子大每二十丸茶下諸瘡神仙拔毒丸薛兵巡傳治諸瘡惡毒腫痛不可忍者黃蠟一兩枯礬一兩乳香一錢沒藥一錢雄黃二錢上為末蠟溶化為丸如緑豆大硃砂為衣每服五十丸視瘡上下蜜水送下祛風敗毒散治風瘡疥癬癮疹赤白癜風赤遊風血風惡瘡丹瘤及破傷風在上部加桔梗在下部加木瓜牛膝各一錢如溫氣成患而在下去殭蠶蟬退柴胡五分前胡五分羌活八分獨活七分連翹七分赤芍五分枳殼五分荊芥六分川芎八分牛蒡子六分蒼朮六分薄荷六分蟬退三分殭蠶七分甘草三分上銼一劑生薑三片煎服時毒去蟬蠶加防風敷腫毒未破者蛤蟆一個先炒石灰後將蛤蟆搗爛同研如泥用絹攤上貼患處自破治濕撓瘡黃蠟一錢白蠟一錢銅緑一錢黃丹一錢童女發一錢香油一兩入銅勺內熬入藥同熬將紙折作十數層入鍋口熬貼瘡治坐板瘡方以砭針刺出血又方用油核桃搗膏紙卷點著滴油於上又方花椒炒一錢胡椒七分枯礬一錢人言一分為末柏油調搽治瘡日久不合河間治諸瘡大痛不辨肉色漫腫光色名曰附骨疽其效如神亂髮露蜂房蛇蛻各燒存性每味取一錢酒調服治血風瘡生於兩足而兩腳背風濕瘡痛癢至骨馬齒莧銼碎焙乾淨五錢黃丹黃柏枯礬孩兒茶各三錢輕粉一錢上為末和勻生桐油調攤於厚桐油紙上先用蔥椒湯洗淨患處貼之即愈消毒百應丸治百毒瘡單水云傳錦紋大黃一斤蒼朮黃柏槐花當歸金銀花皂角各四兩上將六味細切以水二十碗煎耗其半去渣浸大黃令透取出曬乾又浸又曬以汁盡為度為末麵糊為丸如緑豆大每服六十四丸白湯下以大便下滯物為效治百瘡毒痛如針刺不可忍伏龍肝為末半碗真芝麻油一小盞調搽厚塗瘡上取出毒氣此藥上後或有柴或有雞鵝毛或諸骨在內自然出來更不知是何神妙也黑虎膏治癰疽瘰癧癤毒一切無名腫毒並楊梅風塊有痛處俱可貼之殊效草烏四兩南星二兩半夏二兩五倍子三兩用緑豆二升炒焦大黃一兩黃柏一兩薑黃一兩乾生薑五錢上各為細末共和勻用蔥汁米醋調成膏貼塊上時常以蔥醋潤之勿令乾燥其膏一日又取下加些新的復研再貼以消為度犀角消毒飲治丹毒丹者惡毒之瘡五色無常治之用粟殼有刺者煎湯洗之又治火丹治丹毒用苧麻根煎湯洗之內服此方犀角一錢半牛蒡子一兩半荊芥五錢防風二錢半甘草二錢半水煎服白玉散治丹毒滑石寒水石各等分為末井水調塗醋亦好一方用苧麻根煎水洗治漆瘡方用湯漬芒硝令依塗之干即易之又治代指又治丹毒鐵箍散旰都何和宇治諸般瘡毒腫痛一敷即消南星草烏白及白蘞白薇黃柏天花粉吳茱萸白芷各一兩芙蓉葉二兩上為末雞蛋清調敷即愈黃白湯胡春寰方治諸般瘡毒臭爛不堪聞者雄黃生白礬等分煎水洗患處愈消毒丸教渝薑比田治大腫毒生白礬二兩黃蠟二兩生鹿角五錢羊角燒存性五錢龜板燒存性五錢上為細末先將蠟溶開還要剩一塊未化不響然後出火次入藥末調勻傾入涼水中少時取出為丸如芡實大每服一丸溫酒送下如腫毒在上食後服如在中食遠服在下空心服治肥瘡黃水瘡京傳紅棗燒灰一錢枯礬一錢黃丹一錢松香一錢官粉五分銀珠三分上為末干則摻之濕廁香油調搽治諸瘡難斂瘡口及多年惡瘡百方不瘥或痛焮走不已者馬齒莧擂罨口並周圍立效一人患血風瘡膿水不絶痛癢難當肌肉消瘦久醫不已余診六脈虛微以十全大補湯依本方加防風服至五劑而愈方見補益治蛇頭腫痛不可忍臭不可聞蜈蚣一條焙乾為末豬膽汁調塗又方治蛇頭指用雞子開一竅將指入內待蛋化水又換一個如此三個即愈治一切無名腫毒發背癰疽疔瘡惡症用白礬不拘多少為末入新汲水內用粗紙三張浸內將一張搭患處頻頻更換貼十數次即消一方用蔥頭杵爛炒熱敷患處冷則再易一方用蔥蜜搗成餅搭之即消一方用五倍子炒未醋調敷患處一方用大黃為末醋調敷患處亦消一方治諸腫毒發背一應惡瘡以端午日取白礬研未恆遇瘡毒初起每服三錢加蔥頭切拌勻好酒調服頑瘡久不收口用女人月經布燒灰搽之立效治惡瘡黃花苗老苗蜂蜜共搗爛貼患處愈外消腫毒祕方豬苦膽二個生薑半斤取自然汁好醋一盞上三味合和一處以好京墨濃磨抹腫處即消神效治水泡瘡俗曰天泡瘡用葡萄葉焙乾為末摻干則青油調搽又方用土蜂窩火煅過為末摻之又能治白蛇蟲治軟癤流膿不已用桃樹上霜打不落干桃子名為桃奴油調敷之又方用爛船底油灰為末油調敷極效治惡瘡十年不瘥似癩者蛇退一條全者燒存性為末豬油調敷上杖瘡治杖瘡杖畢即用童便好酒各一鍾合而溫服免血攻心甚妙即用蔥切爛炒熱搭杖瘡冷則再易止痛消腫散瘀如神如無蔥用熱豆腐鋪在杖處其氣如蒸其腐即絮復易以血退淡白為度又方用豬膽一枚傾在碗內將緑豆粉黃連黃柏細末入膽內調勻搭杖處又方治杖瘡並打傷皮不破而內損者用蘿蔔搗爛罨之又方用大黃末童便調搽又方治杖瘡打疔痂者不用刀割用黃蒿子焙乾為末摻上即開如心慌者即飲童便一碗退血散治杖打重血攻心蘇木紅花歸尾各三錢大黃二錢上銼散酒煎入童便不拘時熱服藥蛆方治杖瘡潰爛生蛆用皂礬煅過為末乾摻其內蛆即死治杖瘡用麻油二分水一分黃丹一錢入碗內用銀簪攪成膏用鴨毛刷上外用紙貼一日四五次趕血下行痛止腫消杖瘡膏用密陀僧四兩為末香油八兩同入鍋內文武火熬用柳條數根一順勤攪不要住手待膏成黑色滴水成珠油紙上貼患處當時痛止消膿水自然生肉如有疔用貼藥治杖瘡及打破腳腿腫痛鳳仙花即女人常用染指甲草是也用花葉並根搗爛如泥塗腫破處如干又塗上治杖瘡血浸襠腫痛不可忍石灰不拘多少桐油調敷上立止一方用石灰三錢入水攪澄再入香油五錢用金環腳攪打成膏雞毛掃上使血水長流須臾腫消痛止奇杖神丹何和宇此藥服後任杖無傷血不侵襠乳香沒藥各五分血竭兒茶三七各一錢木耳焙乾白蠟各二錢辰砂七分青木香一錢海螵蛸五分琥珀三分天靈蓋火煅八分上為末砂糖為丸如苦味大每服三丸好酒送下即打著不甚痛如未受刑用兩手槌皆即消和血四物湯凡人責打先服此藥神妙當歸川芎白芍熟地黃乳香沒藥各一錢桃仁紅花蘇木各五分用通草研爛水煎加酒半鍾共一服退血止痛散治杖後腫痛瘀血不散氣血攻心或憎寒壯熱心神受擾當歸尾赤芍生地黃白芷防風荊芥羌活連翹黃芩黃連黃柏大黃梔子薄荷枳殼桔梗知母石膏車前甘草上銼劑水煎溫服當歸膏治杖撲湯火瘡毒不問已潰未潰肉雖傷而未壞者用之自愈肉已死而用之自潰新肉易生搽至肉色漸白其毒始盡生肌最速如棍杖者外皮不破內肉糜爛其外皮因內焮干縮堅硬不潰抓連好肉作痛故俗云疔痂皮致膿瘀無從而泄內愈脹痛腐潰益深往往不待其潰就行割去而瘡口開張難以潰斂怯弱之人多成破傷風症每致不救若杖瘡內有瘀血者即用有鋒芒磁片於患處砭去塗以此藥則疔痂死肉自潰膿穢自出所潰亦淺生肌之際亦不結痂又免皴揭之痛殊有神效蓋當歸地黃麻油二蠟主生肌止痛補血續筋與新肉相宜當歸一兩生地黃一兩黃蠟一兩麻油六分上先將當歸地黃入油煎黑去渣入蠟熔化候冷攪勻即成膏矣十全大補湯治杖瘡氣血俱虛腫痛不消腐而不潰潰而不斂或惡寒發熱自汗盜汗飲食少思肢體倦怠若怯弱之人患處青腫而肉不壞者自愈若有瘀血砭刺早者服之自消或潰而膿水清稀肌肉不生或口乾作渴而欲飲湯者尤宜服之黃耆人參白朮白茯苓當歸川芎白芍酒炒熟地黃生者自制甘草炙各一錢肉桂五分薑棗水煎服腋氣體氣人患者多倉卒無藥及欲斷根源用此藥單方用自己小便洗一次米泔水洗二次自然薑汁每日擦十餘次一月之後可以斷根治狐臭方用大蜘蛛一個赤石脂為細末水和包蜘蛛在內如法封固入炭火煅燒通紅取出不用赤石脂只將蜘蛛為末入麝香少許油調成膏攤在厚紙上貼於兩腋下效治體氣生明礬研為末入百草霜些須半月一次搽之半年除根治男婦體氣五更時用豬精肉二大片以甘遂末一兩拌之挾腋下至天明以生甘草一兩煎湯飲之良久瀉去穢物須在荒野之處則可恐穢氣傳人故也依法三五次即愈虛弱者間日為之其密陀僧胡粉之類皆塞竅以治其末耳田螺散治體氣患此疾者耳內有油濕是用大田螺一枚水中養之俟靨開以巴豆一粒去殼將針挑巴豆放在內取出拭乾仰頓盞內夏月一宿冬月五七宿自然成水取搽掖下絶根一方用熱蒸餅一個劈開作兩邊摻密陀僧細末一錢夾在腋下略睡少時候冷棄之除根香體丸治遍身熾膩惡氣及口齒氣丁香一錢半藿香葉零陵香甘松白芷當歸桂心檳榔益智仁香附各一分白豆蔻二兩麝香五分上為細末煉蜜為劑杵千下丸如梧子大每噙化五丸常覺口香五日身香十日衣香二十日他人皆聞得香折傷打僕損傷瘀血亡血分治有形之物所傷乃血肉筋骨受病非如六淫七情為病有在氣有在血之分也所以損傷一症專從血證但須分其有瘀血停積亡血過多之症蓋打僕墜跌皮不破而內損者必有瘀血若金刃傷皮破出血或致亡血多二者不可同法而一有瘀血者宜攻利之若亡血者益補而行之又察其所傷有上下輕重淺深之殊惟宜先逐瘀血通經絡和血止痛後調氣養血補益胃氣無不效也前人有言關城軍士被傷不問頭面手足背胸輕重者例以大黃等藥利之後大黃缺少甚者遂以巴豆代之以為不於初時瀉去毒氣則多致危殆至於略傷手足亦悉以藥利之殊不知大黃之藥惟與有瘀血相宜其有亡血過多元氣胃氣虛弱之人不可服也其巴豆大熱有毒只能破堅逐積用於此疾尤非初常所以有服下藥過多後其脈愈見堅大醫者不察有以為瘀血不盡而復下之因而夭折人命故可不慎歟一方治打僕瘀血攻心用熱小便一碗入酒一碗溫服立效成用苧麻燒灰調酒服尤妙治刀斧傷損血不止痛難忍者蔥白切碎鍋內炒熱搗爛乘熱縛定痛與血隨止蔥冷再換盒痛處治被人打死或踢死急灸頭頂百會穴中艾灸三壯立蘇一釐金治打跌骨折如神孫督方土鱉一個新瓦上焙乾巴豆三個不去油半夏一個生用乳香半分沒藥半分自然銅火煅七次醋淬七次用些許上為末每用一釐好黃酒送下不可多服端午日製治跌打損傷骨先用手扯伸後用小嫩雞一二隻搗爛搭上外用杉木板夾之次日再換如神接骨神方夏見溪傳用蠅虎一個將黃蠟滾水泡軟捻成餅包生蠅虎在內作一丸將酒吞下止痛消腫接骨如神主方治打撲損傷內有瘀血為痛為腫懷生地黃二錢黃芩一錢半枳殼去穰一錢半牡丹皮一錢半赤芍二錢歸尾一錢桃仁十二個紅花三分上銼一劑水煎溫服加大黃酒蒸一錢尤妙治跌僕損傷惡血入腸胃下血溺如瘀血者百草霜研細三錢好酒調服治墮落車馬筋骨疼痛不止延胡索一兩搗羅為末不拘時以豆淋酒調下一錢接骨止痛方蛤蟆一個用瓦二片仰覆合之以鐵絲縛定四面用鹽泥固濟文武火煅三時取出入乳香沒藥各五分同研細末熱酒調下接指方真蘇木為細末敷斷指處外用蠶繭包縛完固數日如故亦治皮膚刀斧傷治折傷先用止痛方白礬為末每用一匕沸湯化了以手帕蘸乘熱尉傷處少時痛止然後排整筋骨貼藥治傷肢折臂者即將折處湊上挪定用好酒一碗旋熱將雄雞一隻刺血在內攪勻乘熱飲之仍將連根蔥搗爛炒熱敷上包轉冷再換亦治刀刃傷痛與血隨止一方加砂糖一切打僕青腫疼痛用青欖核磨水頻授患處其青即退八珍湯治跌僕傷損等症失血過多或因克伐血氣耗損惡寒發熱煩躁作渴等症人參白朮白茯苓當歸川芎白芍熟地黃各一錢甘草炙五分用薑棗煎服補中益氣湯方見內傷治跌僕等症損傷元氣或過服克伐惡寒發熱肢體倦怠血氣虛弱不能生肌收斂或兼飲食勞倦頭痛身熱煩躁作渴脈洪大弦虛或微細軟弱自汗倦怠飲食少思六味地黃丸方見補益治傷損之症因腎肺二經虛弱發熱作渴頭暈眼花咽燥唇裂齒不堅固腰腿痿軟小便頻赤自汗盜汗便血諸血失瘖水泛為痰之聖藥血虛發熱之神劑若損重傷骨不能言如瘖者用此水煎服亦效破傷風破傷風者卒暴傷損因風襲之則播傳經絡致使寒熱交作身僵直口噤目斜角弓反張或因諸瘡不瘥以火灸瘡口間寒氣難通泄陽氣易為鬱結而熱甚則生風也治與傷寒同法在表宜汗在裡宜下在表裡間宜和解然汗亦不可大過其脈浮而無力太陽也宜汗脈長而有力陽明也宜下脈浮而弦小少陽也宜和解若見此四惡症即不治一頭目青黑色二額汗珠下流三眼小目瞪四身上汗出似油治初破傷風發熱紅腫風邪將欲傳播經絡而未入深此方屢驗杏仁去皮細研羅白麵各等分上以二味和勻用新汲水調和如膏敷傷處腫消熱退治破傷風治諸瘡口入風為破傷風發搐項強牙關緊急欲死者防風南星各等分上為末每三錢酒一盞童便半盞頓溫調服汗出為度奪命丹治破傷風川烏火炮去黑皮一兩雄黃一錢上為末蔥津為丸如蓮子大每服一丸用蔥葉一片將藥裹內火燒嚼爛黃酒下被蓋出汗愈治破傷風葛根一兩鴿糞五錢乾薑五錢上共為末每服三錢好酒調下汗出立效治破傷風用槐子一合炒焦黃入好酒一碗入鍋內滾三五沸去渣熱服汗出為度愈蜈蚣散治破傷風搐搦角弓反張蜈蚣一條去毒炒全蠍一對炒去毒上為細末如發時用一字或二字擦牙縫內或吹鼻中羌活防風湯治破傷風邪在表者急服此藥以解之稍遲則邪入於裡與藥不相合矣羌活防風川芎藁本當歸白芍地榆細辛甘草水煎服愈羌活湯治破傷風在半表半裡急服此方稍緩邪入於裡不宜服羌活菊花麻黃川芎石膏防風前胡黃芩細辛枳殼茯苓蔓荊子薄荷白芷甘草水煎服大芎黃湯治破傷風在裡宜疏導急服此湯川芎羌活黃芩大黃上水煎溫服臟腑通和為度治破傷風及瘋犬咬傷用胡桃殼半個填稠人糞滿仍用槐白皮襯覆傷處用艾灸之若遍身汗出其人大困則愈遠年者將傷處前灸之亦愈湯火凡遇湯火所燒先以鹽末和米醋調敷瘡上次以醋泥塗之仍用醋塗不絶暫救痛苦一面急搗生地黃醋調敷瘡上直候疼止雖厚至數寸亦不妨若一用冷物冷水冷泥熱氣得冷氣則卻深搏爛入筋骨慎之慎之獨聖散治湯燙破火燒破瘡毒疼痛生白礬為末芝麻油調掃瘡破處不拘時候治湯火傷用撏豬毛不拘多少燒灰存性研細末真香油調量患處大小周圍厚敷於上中留一口一日一次慢慢圍攏如敷急速及不留口則潰而有疤痕矣清涼膏治湯潑火燒此藥止痛解毒生肌生地黃二兩黃連山梔子白芷各一兩蔥白十莖上銼細用香油四兩煎至地黃焦黑濾去渣再煎入黃蠟五錢慢火熬蠟化傾磁盆內以雞毛刷瘡上治湯火咒云龍樹王如來吾是北方壬癸水收斬天下火星辰千里火星辰心除急急如律令咒畢即握真武即吹之即用冷水少許洗雖火燒手足瘡亦可療治湯火灼瘡石灰細篩水和塗之干即易上治湯燙火燒瘡方生地黃選取新者搗取自然汁入香油黃蠟少許砂鍋內熬成膏以雞毛掃敷瘡上治湯燙火燒爛痛不可忍者用真金箔貼傷處稠密用桐油掃金上止痛生肌恰如手取妙不可言蟲獸治毒蛇所傷周梅江傳扛板歸不拘多少其藥四五月生至九月見霜即死葉青如犁頭尖藤有小茨子圓黑味酸用藤葉研爛生酒調汁隨量飲之用渣貼患處立安渣用火燒即痛治蜈蚣咬人痛不止其嚼鹽抹上及以鹽湯浸瘡極效凡蜈蚣有赤足者螫人黃足者極痛治蜈蚣咬用絲瓜根擂酒吃痛立止治蜈蚣咬用墨筆一圍將蜒蚰打爛搽咬處痛立止又宜烏雞糞水調塗之又宜獨蒜擦患處治蠍螫用火硝一錢三分焙乾雄黃一錢麝香少許為末男左女右點大眼角立止治蠍螫人雄蠍螫人痛在一處雌蠍螫人諸處竄痛用半夏蟾酥雄黃膽礬四味等分麝香少許上為末用貓眼草搗汁和為丸用口咂痛處令淨用丸藥揩擦立止端午日製忌雞犬婦人劉前溪傳治蠍螫用蝸牛搗爛塗傷處蝸常食蠍故也治蠍螫用苦鹽研點眼螫左邊點左眼螫右邊點右眼當時止痛朗小齊傳治蜂螫挼芋梗敷之則愈又蜂螫人至死者用蜂房末豬脂敷愈治蛇傷用半邊蓮研生酒吃凡被所傷將棉帛扎住勿令氣上行服藥後即當解去不然則所傷之處必潰爛矣治蛇傷雄黃五靈脂白芷貝母各等分為末每服二錢熱酒調服又以白礬用滾水泡化洗傷處效灸蛇毒人被毒蛇所傷用艾當咬處灸引去其毒立已治蛇傷犬傷蠍傷蜈蚣傷痛不可忍只用隔蒜灸之立效定風散治癲狗咬破先口銜漿水洗淨用棉搵干貼藥更不再發無膿有效天南星防風各等分為末破傷處以藥敷貼瘡口然後以溫水調下一錢如牙關緊急角弓反張用藥二錢童便調下治常犬傷用蚯蚓泥和鹽敷之亦治狂狗傷及蛇傷又方杏仁研細先以蔥湯洗然後以此塗傷處又方韭菜和石灰搗成餅子陰乾為末和豬油敷之治蚊蟲用鰻鱺魚乾者於室燒之蚊即化為水矣治蚊蟲黃荊子為末入人言燒煙燻之加艾卷尤妙治蝨方藜蘆桔梗馬鞭草百部將來一處搗滾水濾汁漿衣裳一生不被蝨子咬治瘋犬咬傷紅斑貓六個紅娘子四個椿樹上者佳石乳一錢香白芷一兩廣木香一兩桑蛾五分上為細末黃酒為丸如梧子大每服一丸涼水下治癲狗咬神方斑貓去翅足七個香附七個共為細末作一服燒酒調下如腹痛不可忍者吃豬肉湯一兩口解之即止不一時小便出如狗形下來即已避鑼鼓風一七日凡瘋狗咬才傷人之時即便吃香油一盞能清其心急取雄黃斑貓去頭翅足炒研為細末一日服一個用雄黃以酒調服至七七四十九個以服四十九日少用冷水入香油亦可若小便利下惡毒為度如不利者多進一服利後肚腹疼痛急用冷水調青靛服之以解其痛再以黃連水煎服之亦可服藥之後不得便吃熱物即絶根愈矣瘡口莫等好如不破可以灸破等血出去毒氣再不發也如是小便出血不可治也此之必死矣療狾犬咬人仍殺所咬犬取腦敷之後不復發闢蚊蟲方鱉蓋土炒楝花芫花苦參藜蘆川烏共為末棗肉為條日曬乾夜燃之神妙治臭蟲方蓽撥草烏各二兩雄黃二兩焰硝五錢俱為末蜜拌作線香臨臥床上燒一炷此蟲死不再生治壁蝨臭蟲用蜈蚣燒煙燻之青鹽水灌洗床帳永絶其迹妙化丹治蠍螫蛇傷端午制忌婦人雞犬見之乳香沒藥輕粉海螵蛸雄黃各五錢硫黃二分上為末左邊被傷點左眼大眥右邊點右中毒人為毒藥所中傷其脈洪大者生微細者死又曰洪大而遲者生微細而數者死多灌香油能解百毒凡砒霜毒此毒於肉飯中得之者易治飲酒中得之者散歸百脈難治若在胸膈作楚可吐腹中可下急服藥得吐瀉則愈中信毒垂死者臘月豬苦膽服之立解又早稻草燒灰淋汁一碗冷服立愈中砒霜毒硫黃四錢緑豆粉五錢為末冷水調服緩緩服冬月用溫服如肚痛再加一服待不痛用雞毛探吐吐後用溫服稀粥四五日不可食飯糗試驗曾以此救數人中砒霜毒膽礬一分研爛入井水小盞和勻服之立解後用甘草研水止嘔解信毒仙方百草霜一錢硫黃五分巴豆三粒白礬煮過燒成炭三味研末雞蛋清三個黃土一兩水研化濾去渣將藥入內調下立解又方治信毒水粉山砒霜並小兒蟲積荸薺用馬慈食之即愈中硇砂毒研緑豆汁解之中附子川烏毒斑貓毒煮黑豆汁飲之中巴豆毒煮黃連汁飲又方搗巴焦根葉汁服又幹薑炮黃連炒各等分為末每三錢涼水調服飲饌中毒黑豆甘草煮汁恣食無虞中砒霜毒亦效治飲食中毒煩憊方苦參三兩銼酒一升半煮取一升頓服即吐隨愈治中野菌毒用甘草不拘多少以麻油一盞煎數沸冷服即解治牛心傷成脹滿肉乾稻草濃煎湯服之立消治信毒水粉山砒霜一切殺人之毒巴豆去殼壯者十四粒弱者七個花椒去目五分甘草五分共為末涼水化服即時嘔吐如不吐再服嘔吐或其毒盡出而嘔吐不止用舊壁土滾水泡服立止中食牛馬肉毒甘草四兩研酒服儘量食飯須臾吐或瀉如渴不可飲水飲之立死中河豚魚毒以香油多灌之吐出毒立已又方多以甘蔗水或蘆柴根搗水灌之中螃蟹毒生藕汁或煮乾蒜汁俱效中鱔魚毒可食蟹即解之解面毒性大熱啖蘿蔔即解之金瘡金瘡血盛虛細活急數大數必危身凡破傷手足血出不止一時無藥即以自己小便淋傷處雖痛甚而即已金瘡丹周梅江傳止血住痛生肌如神嫩老鼠未生毛者不拘多少韭菜根與老鼠一般多石臼搗爛入嫩石灰末於內摻幹成餅為度陰乾用時以刀刮藥末敷傷處布包裹立愈上製法於五月午日製不犯鐵器忌婦人雞犬所見醫針人而針折在肉中以鼠腦搗如膏塗之針即出鐵棘竹木諸刺在肉中不出燒死鼠敷之即出治金刀傷及一切臁瘡並良馬斷梁等瘡用冬月黑牛膽一個裝新石灰四兩白礬一兩陰二十七日待乾取出再用黃丹一兩另炒紫色研細同一處研勻敷患處治金瘡止血速瘥方炒石灰和雞子白和丸如彈子大炭火煅赤搗末以敷瘡上立瘥治誤吞針昔有一女子將針失咽下肚諸醫不能治用蠶豆煮熟同韭菜吃下針同菜大便而出又方用木炭燒紅急搗細米湯調呷之又方用雄磁石一塊呵之自出治誤吞金銀或誤吞銅錢用羊脛骨燒灰為末每服三錢米飲下從大便中出治竹木刺入肉皮中不出燒鹿角末以水和塗立出久者不過一夕又方取干羊屎燒灰和豬油調塗不覺自出骨鯁勝金方治一切骨鯁或竹木簽刺喉中不下臘月中取鱖魚膽懸於簷下令乾每有魚鯁即取一皂角子許以酒煎化溫溫呷下若得逆便吐骨即隨頑涎出或未吐更吃溫酒但以吐為妙酒即隨性量力也若鯁未出再煎一塊子無不出者此藥應是骨鯁在臟腑中日久痛黃瘦甚者服之皆出若卒求鱖魚不得蠡魚鯽魚鱅魚俱可臘月收之蠡魚即大頭魚治諸骨鯁取硼砂一小塊口噙化即下治雞魚骨鯁江月池燈草灰以米糖如指大蘸灰置喉中勿令沾齒待糖化骨即化下治魚骨鯁用白鷺毛燒灰水調服效治諸骨鯁用狗涎飲之立下咒水治鯁法以淨器盛新汲水一盞捧之面東默念云謹請太上東流順水急急如南方火帝律令敕一氣念七遍即吹一口氣入水中如此七次以水患人飲之立下用此咒水可以食針並竹刺治諸骨鯁用苧根搗爛丸如彈子大就將所鯁物煎湯化下治諸骨鯁及魚骨鯁咽喉吞吐不得急取橄欖食下即化如無橄欖用核灰水調下亦化治諸魚骨鯁雜物鯁以好蜜抄匕稍稍服之令下一兒誤吞針鯁喉不下死在須臾用黑砂糖和黃泥為丸令兒吞下泥裹針於內大便而出救荒養元辟穀丹安五臟消百病和脾胃補虛損固元氣實精髓能令瘦者肥老者健常服卻病延年黃犍牛肉不拘多少去筋膜切作棋子大片用河水洗數遍令血味盡仍用河水浸一宿次日再洗一二遍水清為度用無灰好酒入瓦壇內黃泥封固桑柴文武火煮二夜取出焙乾為末如黃砂色者佳若焦黑無用每牛末一斤加入後藥二斤為則人參四兩白朮去油蘆陳土炒白茯苓去皮為末水淨去筋膜曬乾懷山藥切片用蔥鹽炒黃去蔥鹽不用芡實粉去殼蓮肉蔥鹽炒去心蔥鹽不用薏苡仁炒白扁豆薑汁炒各半斤小茴香炒四兩川乾薑炒四兩砂仁炒二兩川椒去目炒二兩青鹽四兩甘草四兩烏梅肉二兩熬濃汁半兩粳米炒黃取淨粉五斤半上藥為末與米粉牛末和勻外用小紅棗五斤陳年醇酒五斤煮棗極爛去核加煉蜜二斤半共和為丸如彈子大每服二丸不拘冷熱湯水嚼下一日服三五次永不飢按此方實王道之妙用平時預合荒飢之時可以避難濟飢雖一兩月不食不損胃中元氣實養生之至室也如渴只飲冷水防儉餅子栗子紅棗胡桃柿餅四果去皮核於石臼內一處搗爛如泥印成餅樣曬乾收貯以防荒儉之用辟穀方黑豆五升淨洗後蒸三遍曬乾去皮火麻仁三升湯浸一宿濾出曬乾膠水拌曬去皮肉淨蒸三遍碓搗下豆黃上共為末用糯米粥合和成團如拳大入甑蒸從夜至子住火至寅取出於磁器內盛貯不令風乾每服二三塊以飽為度不得食一切物第一頓七日不食第二頓七七日不食第三頓三百日不食渴即研火麻子漿飲更滋潤臟腑容貌勝常若要重吃物用葵子三合杵碎煎湯飲開導胃脘以待沖和無損一方白茯苓五兩與糯米五升水浸同蒸救荒代糧丸黑豆一升去皮貫衆一兩甘草一兩茯苓五錢吳木五錢砂仁五錢上切碎用水五升同豆熬煮文武火直至水盡撿去各藥取豆搗爛丸如雞頭大將瓦瓶密封每嚼一丸則任食苗葉可以終日飽雖異草殊木素所不識亦無毒甘甜與進五糧亦同駐世金丹一名長生丸方外異人傳白茯苓去皮澱粉黃丹白松脂白沙蜜黃蠟各二兩硃砂三錢金箔二十個水銀三錢先將蜜蠟松脂於淨磁碗內熔為汁傾藥在內以木匙攪勻候溫就火丸如指頭大用水銀為衣有死水銀法先洗手淨用水銀三兩點在手心內以手頭研如泥見手心青色將藥三五丸搓揉後將金箔約量攤碗內以藥丸在內搖動使金箔都在藥上密器收貯服時用乳香末半錢水三小盞煎湯溫服下不嚼破服後第三日覺飢以面和白茯苓末烙成煎餅食半飽以後藥在丹田永不飢渴久則交過五臟陰滓俱盡長生不死諸人得服並無所忌使人添氣力悅容顏身輕體健百病皆除救貧拔苦實濟世之良方長生之妙法其間若欲飲食俱不妨事但七日之內吃食藥必隨下至半月藥在丹田永不出矣服時面東持藥念咒一遍吹在藥上如此七遍畢以乳香湯送下咒曰天清地寧至神至靈三皇助我六甲護形去除百病使我長生清清淨淨心為甲庚左招南鬥右招七星吾令立化與天齊生吾奉太上老君急急如律令膏藥萬應緊金膏治風寒濕氣所侵跌僕閃挫傷指一切疼痛皆貼患處心腹痛俱貼痛處哮喘咳嗽貼背心瀉痢貼臍上頭痛眼痛貼太陽穴及治一切無名腫毒疔疽發背瘡癤濕毒臁瘡始覺時便貼患處即消已成亦能猥膿長肉止痛其效不可盡述一名萬病無憂膏川烏草烏大黃各六錢當歸赤芍白芷連翹白及白蘞烏藥官桂木鱉子各八錢槐柳桃桑棗各四錢一方加苦參皂角各五錢上銼散用真麻油二斤浸藥一宿用火熬至藥焦色以生絲絹濾去渣不用將油再入鍋內以文武火熬至滴水成珠不散方下飛過黃丹十二兩炒過陸續下勻滴水成珠不散為度入乳香沒藥各四錢攪勻聽用一方加蘇合香二錢更效黃香膏謝醫風傳貼風損用生薑汁蔥白汁好醋各一碗下黃香末半斤同熬又香油四兩再入桐油四兩熬至滴水不散下黃丹一兩再熬成珠入麝香五分攪勻紙攤貼上勝金膏竹林兄傳香油二斤血餘一大握入油同煎柳條攪不住手化盡將鍋下地入黃丹一斤於油內滾起來略扇幾下緊攪不住手滴水成珠為度如不成珠再於火上略煎候成珠則止又不可制過了次再入乳香沒藥各五錢為末入內攪勻孩兒茶血竭如上數加上尤妙筋骨痛加麝香少許專治新久惡毒頑瘡杖瘡百瘡以紙攤患處殊效通治靈砂丹治上盛下虛痰涎壅塞此藥最能鎮墜升降陰陽安和五臟扶助元氣保壽之仙方也水銀一斤硫黃四兩用新鐵銚先炒成青砂頭有煙即以醋灑之候研細入水火鼎醋調赤石脂封口鐵線扎縛曬乾鹽泥固濟用炭二十斤煅如鼎裂筆蘸赤石脂頻抹火盡為度經宿取出研為末糯米糊為丸梧子大或麻子大每服二十丸空心棗湯米湯人參湯任下一虛勞喘嗽生薑烏梅紫蘇梗煎湯下一盜汗小便多煅牡蠣入鹽煎湯下一疝氣偏墜水腎腫痛炒茴香入酒煎湯下一痎瘧不止桃柳枝煎湯下一胸滿腹痛腰痛莪朮煎湯下一嘔逆翻胃丁香木香煎湯下一白濁遺精白茯苓湯下一中風痰厥面青木香湯灌下一走注風濕遍身痛嚼蔥白酒下一腳痛木瓜湯下一腸胃諸蟲烏梅湯下一氣湍陳皮生薑湯下一吐逆生薑陳皮湯下一婦人血氣痛玄胡索五靈脂酒醋各半煎湯下一小兒慢驚沉困胃虛神脫人參丁香湯下一虛人夢多驚魘怔忡健忘本方四兩加人參一錢酸棗仁二錢棗肉為丸棗湯下一元氣虛弱風痰壅塞或嘔以青州白丸子加靈砂各分薑汁打黍米糊為丸人參湯下忌諸羊血緑豆粉十仙奪命丹治梅核氣鼓脹氣塊冷心痛經脈不通食積氣積冷積諸症三稜莪朮木香沉香丁香川芎沒藥葶藶皂角巴豆槌去油上十味各等分為細末棗肉丸如櫻桃大每一丸空心涼水送下神仙太乙膏治男婦小兒諸病養元氣和脾胃清火退熱化痰理嗽定喘收汗止嘔住瀉消積化痞觸服除腫利盡清便開鬱順氣寬胸快膈寧心定智安神鎮驚小兒驚疳癖積百病如神一方加混元衣即紫河車焙乾二錢白梅花三錢天竺黃一錢名混元丹尤妙辰砂一兩甘草一兩水煮半日去甘草滑石六兩用牡丹皮五兩煎水去丹皮煮水乾為度香附一兩蜜水煮過甘松四錢粉草一兩半生半煨莪朮煨三錢縮砂去皮三錢益智去殼六錢人參一錢山藥二錢半薑汁炒黃耆一錢白茯苓去皮二錢半白茯神去皮木二分半遠志甘草水泡去心一錢半桔梗去蘆一錢木香一錢麝香三分牛黃三分金箔三帖共為細末煉蜜為丸如龍眼大量兒大小加減丸數用之中風痰厥不省人事薑湯研化下傷寒夾驚發熱薑蔥湯研下宜發汗停食嘔吐大便酸臭腹脹薑湯下霍亂吐瀉紫蘇木瓜湯下赤白痢疾裡急後重陳倉米湯下小便不通車前子湯下大便瀉泄米湯化下夜出盜汗浮小麥湯下發熱金錢草薄荷湯下痘疹不出升麻湯下中暑煩渴燈草湯下喘急咳嗽麻黃杏仁湯下積聚腹痛薑湯下蟲毒苦楝根皮湯下疝氣偏墜大茴小茴湯下大便去血槐花陳倉米湯下夜啼不止燈草灰湯下急驚搐搦薄荷湯下慢驚人參白朮湯下諸病後無精神少氣力不思飲食薑棗湯下胎寒手足冷口氣涼腹痛腸鳴薑蔥湯下面目四肢浮腫面黃茯苓皮陳皮桑白皮大腹皮生薑皮湯下即五皮散瘧疾槐柳枝各五寸薑三片煎露一宿五更溫熱送下疳熱身瘦肚大青筋手足細大便或瀉小便如泔陳倉米湯下神仙救苦丸大川烏略炮肥草烏略炮蒼朮生青皮去穰懷生地黃酒洗西川芎枳殼去穰麩炒白芍各五錢五靈脂二兩上共為細末酒打稀糊為丸如梧子大每三五十丸熱酒送下汗出即效一頭風腫痛一心腹膨痛一腳氣痛一疝氣痛一手背痛一遍身骨節痛一破傷風一棒瘡痛一癰疽發背痛一切惡瘡腫痛萬億丸端午日製敕封通微顯化真人赤腳張三峰神仙所授百病如神硃砂巴豆去殼寒石面各等分上先將硃砂研爛即將巴豆同研極細卻以寒食麵好酒打成糕入藥中仍同研百餘下揉和為丸如黍米大每所服看兒大小加減丸數感冒風寒薑蔥湯下內傷飲食清茶送下心痛艾葉煎水入醋少許送下伏暑熱冷水送下心膨氣脹淡薑湯下霍亂吐瀉生薑湯下痢疾空心清茶下肚腹疼痛熱茶下小兒急慢驚風薄荷湯下一切百病清茶下許真君如意仙丹川烏炮去皮尖大附子炮去皮尖人參當歸酒洗吳茱萸鹽湯浸炒白薑慢火炙柴胡去蘆川椒去目炒去汁茯苓去皮黃連紫菀肉桂去皮厚朴薑炒桔梗去蘆牙皂去皮不見火石菖蒲木香巴豆去殼研碎用紙四十九重槌去油上共一十八味各一兩檳榔二十個南人用巴豆一兩減去五錢上為細末煉蜜為丸如梧子大辰砂為衣或麵糊為丸亦可每服三丸或五丸小兒五歲以下服一粒三歲以下服半粒周歲以下分作四服修合此藥須用庚申甲子福生天德吉日於雞犬不聞之處仍勿令外人見之湯使於後一應鬼祟咒咀土木妖邪伏尸傳勞癲狂失心山嵐瘴氣疫毒時災用棗湯送下一宿患大風身頑麻木不知痛癢眼淚不止睡臥不安面上如蟲行摸之不見日久則鬚眉癢落唇爛齒焦鶴膝風痛偏正頭痛紫癖瘡癢一應諸風之疾用荊芥生酒下一小兒驚風薄荷湯下一諸邪氣咳嗽生薑湯下一五般淋疾燈草湯下一失心中邪柳枝乳香湯下一小腸氣痛茴香湯下一十種水氣大戟湯下一五般痔瘡白礬湯下一瘧疾桃枝湯下一腸風臟毒陳米湯下一瘟疫熱病井花水下一癭蟲病甘遂湯下一陰陽二毒傷寒咳嗽薄荷湯下一腎臟停積咬牙睡涎腰痛鹽湯下一丹瘤癰疽瘰瘡痍涎喘消渴大小便閉或瀉或痢酒毒便紅喉間腫腮誤吞藥毒不服水土酒下一婦女血海久冷不受真元斷子多年十二般帶下諸血氣艾醋湯下一膀胱疝氣腫痛研蘿蔔子煎湯下雜方三奇神麯方六月六日謂諸神集會之辰故名神麯白虎白曲一百斤青龍青蒿汁三升勾陳蒼耳自然汁三升騰蛇野蓼汁四升玄武杏仁去皮尖四升朱雀赤小豆三升煮熟去皮湯研共一處拌勻上修合用三伏內上寅日踏實三奇者庚寅戊寅丙寅也近時神麯只以曲蓼為之入藥多不效此方自蜀府傳來製半夏曲法用半夏一斤滾水泡至晚換之凡三日夜去滑洗淨杵爛入生薑四兩白礬一兩梨子三個用杵勻捏作餅子夏則紙包懸簷下冬則放炕上干則用之法制半夏方大半夏一斤用溫水洗淨用明礬六兩朴硝四兩以水六碗煮之入半夏在內浸一宿取出入清水內浸一七日取起切片加南薄荷四兩甘草三兩任用玉露霜真干緑豆粉一斤為末南薄荷葉一斤以水微濕之用甑先將薄荷鋪底上用棉布隔住用篩子篩豆粉於布上上又用薄荷鋪上蓋住紙糊固蒸一炷香為度取出去薄荷每豆粉一斤用砂糖四兩和勻用之楂藥膏用鮮大山楂去核十斤甜梨去核十斤共搗爛取自然汁入鍋內煎熬如稀糊樣如汁十斤入蜜四斤再煎成膏妙步金蓮法瘦腳急性子夏月連稞冬月用子二合半皮硝一撮地骨皮二兩萊蔔子二合鴿糞一撮鐵腳威靈仙一兩鬼見愁一兩上共為末熬水一小盆不用手洗其腳自攪洗了用腳帶緊纏如有骨節用麻掙之一日早晚二次三日六次其腳周正自小妙不可言沐浴方令人香肌去風癬防風荊芥細辛當歸羌活獨活皂角藿香白芷藁本翻白草水紅花川芎甘松水煎湯沐浴妙玉女粉瓜蔞根藁本藿香甘松山奈川芎白芷各二兩檀香一兩細辛二兩糯米二升皂角一升緑豆三升上為末和勻用羊骨髓調時洗面白如玉香肌丸藿香木香檀香零陵香甘松砂仁香附川芎各五錢甘草五分當歸白芷山奈各二錢上為末煉蜜丸噙化制鹿角霜膠法鹿角三付每一斤入楮實子一兩桑白皮黃蠟各二兩砂鍋內河水慢火煮三晝夜取出霜收用將汁慢火熬成膠傾磁器內候冷成膠桂花餅清痰降火止嗽生津孩兒茶五錢訶子七個桂花一兩甘草五分上為末桂花水為餅每嚼一餅滾水下八仙茶粳米黃粟米黃豆赤小豆緑豆各一斤俱炒熟細茶一斤芝麻淨五合花椒淨一合小茴香二合乾白薑炮一兩白鹽炒一兩麥面炒黃熟與前十一味等分拌勻磁器收藏上十一味俱為細末和為一處胡桃肉棗肉松子仁瓜仁白糖之類任意加入每用二三匙白湯點服梅酥餅衛府清上焦潤咽膈生津液化痰降火止嗽消酒止渴烏梅肉二兩半另研為末紫蘇葉五錢蘇州薄荷淨葉三兩冷水洗曬另為末白葛粉一兩真檀香二錢硼砂五錢柿霜四兩白冰糖八兩上為細末入好片腦一分半研為末旋和入煉蜜搜和稍帶硬些印成小餅如櫻桃大每一餅噙化不拘時候法制縮砂消化水穀溫暖脾胃縮砂十兩去皮以朴硝水浸一宿曬乾以麻油炒燥香熟為度粉草炙桂花各一錢半研為末上件和勻為衣遇酒食後細嚼香茶餅子甘松乳香大茴砂仁官桂白蔻去殼細茶緑豆粉炒薄荷藿香零陵香川芎各五錢兒茶四錢三奈二錢木香細辛白芷各三錢柿霜一兩朝腦一錢麝香少許大甘草一斤銼熬成膏俱為細末煉蜜和膏為丸如緑豆大每用一丸噙化山東魯府仙酒方細面四斤干後稱糯米一斗熟軟蒸胡椒良薑三兩等桂花細辛四兩停肥好杏仁五百粒更兼磨麥半余升諸藥將來一處用搗羅為末入甕中用紙密封甕口上放在背後等消停春夏七日冬半月卯時方可得開甕取出爛搗三千杵時間丸作母子形每丸煎水二大碗藥入瓶中自作聲不待一時便為酒吃了延年更長生王母仙漿一名蜜淋漓仙酒方用糯米一升煮米湯三五碗止用米湯又用好澆酒三五碗入米湯內次用木香沉香檀香藿香白芷砂仁茴香各三分入酒米內用大壺盛水煮一二時再入蜜半斤箬葉封口一時取開澄清就用美味異常能去諸疾為仙酒頃刻而成此酒至神至聖號為王母仙漿留傳世上與人嘗服了神清氣爽藥能調和五臟又且滿目睜光曾將此酒獻皇王萬兩黃金倍賞魯府祕傳三仙延壽灑好上等堆花燒酒一罈入龍眼一斤桂花四兩白糖八兩封固經年愈久愈佳其味清美香甜每隨量飲不可過醉能安神定智寧心悅顏香口卻疾
