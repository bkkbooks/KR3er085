煎令乾卻用炭火三秤就銚內煨透紅冷取研細為末用粟米飯丸如綠豆大煎醋湯下七丸不嚼只一服立效回陽散治吐瀉不止或取轉過多四肢發厥虛風不醒人事服此四肢漸暖神識便省天南星為末每服三錢入京棗三枚同煎溫服未省再服治小兒久瀉用山藥炒為末不拘多少入粥內食之立止治小兒水瀉白礬黃丹各五錢用蔥白同搗爛塗臍上即止燒針丸專主吐瀉用黃丹硃砂白礬枯各等分上藥研極細用小紅棗肉去皮核和丸如雞頭大每用一丸針挑於燈上燒存性研末涼米泔水調服瀉者食前吐者無時外用綠豆粉以雞子清和作膏如吐塗兩足心如瀉塗囟門上止則去之又方治吐瀉用四君子湯加藿香陳皮一劑而愈痢疾痢疾因受濕熱及食生冷停滯所致治先消導宿食分利濕熱然後止之不可驟用補澀之劑萬億丸見通治治小兒下痢赤白腹痛立效治小兒噤口紅痢用田螺搗爛敷臍中效一方加冰片一分同螺搗爛敷臍內帛敷定立止治小兒痢疾用雞子一個冷水下鍋煮二三沸取出去白用黃研碎以生薑汁半小鐘和勻與小兒服之不用茶神效治小兒噤口痢甜菜一個取出子入蜜填滿紙包火煨熟吃立止治噤口痢不受藥並不受飲食者用田螺數枚連殼搗爛加些麝香在內調勻填滿臍內引火下降服藥再不吐矣飲食須慢慢少少進之治小兒痢疾白蘿蔔汁蜜等分服三四匙即止一小兒水瀉痢疾蜜三匙枯礬末二錢蘿蔔汁調服出微汗忌酸冷三五日小兒瀉痢不肯服藥肉豆蔻為末三錢面四兩水和作面入蔥鹽食如常與之一小兒體怠痢日久不愈用雞子一枚打破用黃蠟一塊如指頭大銚內熔以雞子拌炒熟空心食之瘧疾小兒瘧疾用芫花根為末每用一二分三歲兒用三分以雞子一個去頂入末攪勻紙糊頂口外紙裹搪灰火煨熟嚼吃治瘧疾仙方五月五日午時用雄黑豆四十九個先一日以水泡去皮研爛入人言末一錢同搗為丸如小芡實大雄黃一錢為衣陰乾收貯臨發日早晨面東無根水下一丸忌熱酒熱物一時仍忌魚腥生冷之物三日黑豆圓者是雄的秘方治瘧疾五月五日取桃仁百個去皮尖研成膏不得犯生水候成膏入黃丹三錢丸如梧子大每服三丸發日面北溫酒下不飲酒井花水下忌雞犬見法治瘧疾令病人開襟仰臥醫以左手執硃筆直書肚上曰子璋髑髏血模糊手提擲還崔大夫復書二紙一焚之灶前一焚之天地下即愈天靈散秘方治小兒諸瘧如神天靈蓋年久白者燒存性為細末每服五釐黃酒調下立止鬼哭丹治諸瘧如神人言一錢雄黃一錢綠豆粉一錢上為末以端午日粽子搗為丸如綠豆大每服一丸或三丸臨發日面東冷水下忌熱物傷食附腹痛脹滿小兒宿食不消者脾胃冷故也小兒乳哺飲食取冷過度冷氣積於脾胃脾胃則冷胃為水穀之海脾氣磨而消之胃氣和調則乳哺消化若傷於冷則宿食不消或作腹痛脹滿口中氣溫面色黃目無精彩或白晴多及多睡畏食或大便酸臭者當消積宜萬億丸主之消食散白朮散皆可用之萬億丸方見通治白朮散見吐瀉消食散主方治小兒傷食腹痛山楂去核神麯炒砂仁炒麥芽炒白朮去蘆炒陳皮青皮去瓤炒甘草炙上銼生薑煎服受寒作痛者加藿香吳茱萸有熱加黃芩尋常些小飲食停不必服藥只用麥芽五錢炒入生薑三片煎湯飲之愈香橘餅子治小兒食積傷滯面黃肌瘦肚腹膨脹飲食少思心腹疼痛時常嘔吐泄瀉肢體倦怠又治久瀉久痢脾虛脫肛不收冷熱不調赤白膿血痢疾小腹疼痛或噤口不食日夜無度裡急後重悉皆治之及小兒疳積瀉痢服之速效常服養脾助胃消化飲食大有功效青皮去瓤麩炒二兩陳皮二兩三稜煨半兩莪朮煨半兩香附炒一兩砂仁炒一兩神麯炒二兩麥芽炒二兩山楂去子一兩厚朴姜炒一兩人參一兩白朮去油蘆土炒一兩白茯苓二兩廣木香五錢青木香五錢甘草炙一兩上為細末煉蜜為丸如芡實大每服一粒米湯化下中華餅治小兒面黃肌瘦肚大青筋飲食少思泄瀉諸積白茯苓去皮一兩山藥二兩神麯炒一兩半麥芽炒一兩半白朮炒一兩薏苡仁炒二兩蓮肉一兩半桔梗五錢半使君子炒二兩扁豆一兩半芡實仁一兩三稜煨五錢白芍酒炒一兩山楂五錢甘草五錢上為末白麵四兩入藥末一兩半白蜜一兩香油少許水和捏作餅烙熟為焦餅食之最益小兒治小兒肚大腹脹江南做酒小曲一個為末入雞子內鹽少許蒸熟食之立消治小兒肚腹脹大瘦弱用荸薺食之立時打下蟲即消治小兒尿濁如米泔東南做酒小曲炒為末每服一匕酒調服三服愈黃金棗治小兒乳食傷脾胃面黃肌瘦肚大青筋腹脹或瀉或不思飲食人參一兩白朮二兩去蘆微炒粉草炙一兩上銼散用小紅棗五升入水同煮乾去渣食棗逐日吃之感冒人參敗毒散治小兒感冒風寒瘟病時疫瘡疹頭痛體痛肢熱多睡及治潮熱煩渴痰嗽喘熱驚風等症羌活獨活柴胡前胡桔梗枳殼川芎茯苓人參甘草天麻地骨皮驚風加全蠍去毒炒殭蠶炒白附子煨防風痰嗽喘加半夏五味子桑白皮發汗加麻黃荊芥上銼作劑薄荷生薑煎服參蘇飲治小兒感冒風寒發熱頭痛痰涎咳嗽上壅喘促胸腹痞悶嘔逆紫蘇陳皮半夏茯苓前胡枳殼桔梗乾葛人參甘草上銼生薑三片水煎服香葛散治小兒傷寒夾食夾驚四時瘟疫瘧疾香附紫蘇陳皮青皮去瓤葛根甘草上銼作劑生薑三片蔥白一莖水煎熱服治小兒咳嗽吐痰用甜梨一個入硼砂一分紙包水濕火煨熟與服或搗汁亦可治小兒咳嗽痰喘天南星大者炮令裂為末每服一錢生薑三片水煎服空心日午臨臥各一服治小兒咳嗽用生薑四兩煎湯浴之治咳嗽方款冬花三錢石膏三錢甘草三錢硼砂七釐上為末吹入喉內用細茶漱下即好一捻金治小兒肺脹喘滿胸高氣急兩肋扇動陷下作坑兩鼻竅張悶亂嗽渴聲嘎不鳴痰涎潮塞俗云馬脾風諺云龜胸症若不急治死在朝夕白醜半生半熟黑醜半生半熟川大黃檳榔各一兩木香三錢輕粉少許上為細末每服二錢漿水調下無時蜜水調下亦可一方有人參一兩去木香輕粉小兒初生嬰兒初生車籃襁褓各隨風俗大概厥初下地之時勿待其出聲以帛裹指搌去舌上青泥惡血用手一遲啼聲一出即入腹中斯為患矣如下地少頃不能出聲者急以溫水一口許灌之即能啼也久不出聲者以其臍帶倒捋元氣入腹仍以口頻頻進氣於兒口中則自能啼也先洗後斷臍則不傷水生病臍帶留長一寸長則傷肌短則傷臟捋汁不盡則寒濕入腹仍作臍風衣勿新綿暖則生風其斂臍之法寬急則中常於無風處解開觀看未愈燒綿帛灰敷之一月外臍上有汁並腫者輕則當歸末同韶粉和敷灸絮熨之重則灸數壯初斷臍了繃畢用甘草一小寸煮汁一合許用帛蘸與兒吮約服一蜆殼許得吐出去胸中惡物妙未則再與吮之半日內三五次服盡藥汁一合得吐出惡水則兒補氣爽無病一合服盡不吐則胸中無惡物也當先以菜葉包明淨生朱於飯內蒸熟為度研極細末當以一豆許蜜和令抹入口服之日一次三日止服多則傷也凡冬夏浴兒久易傷寒熱癇病等症不浴亦不可但初浴時以豬膽汁一個入湯溫浴之則不生瘡疥次用桃李梅根或枝各二兩許㕮咀煎湯浴之則去不祥富室能以金一斤虎頭骨一個煎湯浴之則壓驚辟惡妙兒初落地浴罷臍帶了畢即看口中舌下並齶上兩頰但有白泡相連去處即便用指摘去惡汁無令嚥下為病則無重舌語病此其大略耳兔紅丸好辰砂去鐵渣為細末臘月八日取兔血調為丸如梧子大新生小兒乳調末服每月一丸去胎毒痘疹一小兒初生用青欖數個燒水洗兒身上下後不出痘疹治永不出痘方用雞蛋七枚內取一枚開一孔去清黃淨裝入鮮明硃砂四錢九分其孔以紙糊用雞抱出雞雛將硃砂採日精月華各七八收貯聽用再用起頭結絲瓜一個候老成種乾燥燒灰存性為末每服硃砂五分絲瓜灰五分再研勻蜜水調服服過三次永不出痘鄰家出痘就宜服之治永不出痘方王天中傳得異人方治小兒不拘大小洗後永不出痘真神仙秘法也用苦楝樹子十月收到正月初一日子時父母只令一人知將楝子一二升許鍋內水煮滾待溫將兒遍身上下洗淨妙不可言初生雜病治小兒生下遍休發黃狀如金色身上壯熱大小便不通乳食不進啼叫不止此胎黃之候皆因母受熱而傳於胎也凡有此症乳母宜服四物湯內用生地黃赤芍加天花粉釀乳法初生小兒胎中受熱生下面赤眼閉大小便不通不能吮乳豬苓澤瀉倍赤茯苓生地黃天花粉茵陳甘草上銼每服三錢水煎食後令乳母捏去宿乳卻服此藥治小兒初生大小便不通腹脹欲死者急令婦人以溫水漱口吸咂兒前後心並臍下手足共七處每一處凡三五次口吸咂取紅赤為度須臾自通不爾則無生意有此症遇此法可謂再生小兒初生七日急患臍風撮口百無一活父母坐視其死良可憐哉秘法極效世罕知之患此者齒齦之上有小泡子如粟米狀急以溫水蘸青熟綿裹手指輕輕擦破即開口便安又灸臍風以艾灸臍下即活治小兒臍風撮口方用田螺搗爛入麝香一分再搗塗臍上治小兒撮口臍風用完全蔥二根搗汁用殭蠶二個研末調塗其母乳頭上令兒吮之或用乳調灌之初生小兒五七日有熱症只用益元散時時灌之小兒臍風濕重久不瘥峰房燒末敷之治小兒患臍風及臍瘡久不瘥用燒蝦蟆杵末敷之日三四度瘥治小兒臍風鹽二兩豉二合爛搗捏作餅如錢大安新瓦上炙令熱以熨臍上差亦用黃柏末敷之臍風論夫小兒臍風因母好食辛酸厚味或七情偏勝起居不時故有胎毒胎毒所發多在二三日之間則有萌芽病生或打嚏或呵欠或冷笑或惡叫或皺眉或夜啼人多怠意不覺至五六日病深方請醫治其病已傳經絡萬無一愈予傳此方深知病原救治有理故此告聞諸君子生下孩兒於二三日之間時時省察若有前症即是臍風急看口中上齶有白點如粟米者用銀針挑破以雞糞糖塗之然後服藥十病十愈倘牙緊舌厚唇撮肚發青筋腹硬臍出則決不可治矣解毒湯如熱多用此二匙解表二仙丹一匙陳細茶蘇州薄荷各等分為細末用燈心淡豆豉生薑少許蒸水為引牛黃餅子大黃一錢細末硃砂三分水飛過青礞石焰硝火煅五分各為末同和以水為丸如芡實大以前蒸水磨化服之百發百中治小兒臍中出汁不止並赤腫白礬枯過為末敷之治小兒龜胸緣肺熱脹滿攻胸膈所生又緣乳母食麵熱物五辛轉更胸起高也灸兩乳前各一寸半上兩行三骨罅間六處各三壯春夏從下灸上秋冬從上灸下若不依此灸之十無一愈百合丹治龜胸川大黃天門冬杏仁去皮尖另研桑白皮蜜炒百合甜葶藶炒石膏煅木通各等分上為末煉蜜為丸如綠豆大臨臥熱湯下治龜背兒生下客風入脊遂於骨髓即成龜背或坐太早亦致傴僂背高如龜多成痼疾龜尿點骨節即平取龜尿法用青蓮葉置龜於上用鏡照之其尿自出治龜背松花枳殼防風川獨活麻黃大黃前胡桂心少許為末米飲調服小兒語遲人參石菖蒲麥門冬去心遠志去心川芎當歸乳香硃砂各五錢上為末煉蜜為丸如黍米大每三四十丸食遠米飲下夜啼小兒夜啼狀若鬼祟蟬退七個下半截為末初生抄一字薄荷湯入酒少許調下或者不信將上半截為末依前湯調下復啼如初古人立法莫知其妙治小兒腹痛夜啼用牛黃如豆大乳汁化服又臍下書日字瘥又方牽牛細末封臍上愈花火膏治夜啼燈花三顆以乳汁調抹兒口或抹乳上令兒吮之或用燈花三四顆研碎燈心湯調塗乳上令兒吮乳嚥下一方大黑棗三枚去核各入黃連兩分用線紮緊入罐中水鍾半煎一小杯徐徐喂之安神散治小兒驚啼作心經有熱有虛治人參黃連薑汁炒各一錢半甘草五分上銼一劑竹葉二十個生薑一片水煎服一方治驚啼用亂髮燒灰酒調服一小兒夜啼用筆寫在小兒臍上子酉卯午一小兒夜啼用糞勺水洗淨莫令人知覆在本兒床下口舌治小兒鵝口不能食乳用地雞擂水塗瘡即愈即䗪蟲也小兒口瘡黃連末每服一字蜜水調下小兒口舌生瘡乃心脾受熱口瘡赤心臟熱口瘡白脾臟冷口瘡黃脾臟熱吳茱萸末醋調敷腳心移夜即已藥性雖熱能引熱下行其功至良小兒舌上生瘡吮乳不得白礬和雞子清置醋中塗兒足底一匕即已治小兒重舌木舌乃舌下生小舌也凡針重舌以針直刺不可橫挑恐傷舌絡則言語不清用三稜針舌下紫脈刺之即已又宜竹瀝調蒲黃末敷之又宜膽礬研細敷之治小兒絆舌用布針針數下以溏雞糞一搽即已治絆舌不乳啼哭用布針蘸桐油燒紅針下頦挨骨邊一針即已治重舌喉閉白礬朴硝為末摻入口中即愈牙病甘露飲子治牙疳去血口臭齒齦腫痛腐爛枇杷葉石斛黃芩枳殼天門冬麥門冬生地熟地茵陳甘草上銼水煎服牙根腐爛用後擦牙散治走馬牙疳牙根腐爛白梅煅碗蓋存性枯礬各一錢人中白取童尿桶中白垢瓦焙乾五錢為細末先另用韭菜根老茶濃煎用雞翎蘸洗刷去腐膿惡肉洗見鮮血以前藥敷之日三次爛至喉中者用小竹筒吹入雖遍口牙齒落口唇穿破者敷藥皆愈但山根發紅點者難治忌油膩雞魚發氣熱物土蟾散治症同前蛔皮即蛤蟆不鳴不跳者是用泥裹火煅焦二錢半黃連二錢青黛一錢麝香少許上為細末先用甘草湯洗令血出卻用藥濕則乾摻干則香油調抹之治走馬牙疳一時瘑爛即死用婦人溺桶中白垢火煅一錢許入銅綠三分麝香一分半敷之立效治小兒走馬牙疳白礬枯黃丹飛京棗連核燒存性為末敷之又方用白礬置五倍子內煅過為末敷之立效散治走馬牙疳青黛黃柏枯礬五倍子各一錢上為細末用米泔水攪口內貼藥喉痹喉痹會厭兩旁腫者為雙乳蛾易治一旁腫者為單乳蛾難治治乳蛾差小者為喉痹熱結於咽喉且麻且癢腫繞於外名纏喉痹暴發暴死者名走馬喉風蘇危湯治喉閉腫痛危急之甚桔梗二錢山豆根一錢牛蒡子一錢荊芥穗一錢玄參八分升麻三分防風八分生甘草一錢竹葉五個水煎頻服外用硼砂一味噙化嚥下降痰消腫治喉痹乳蛾氣絕者即時返活單乳蛾用巴豆一個去殼打碎入綿繭殼內塞鼻在左塞左在右塞右若雙乳蛾用二粒塞兩鼻治小兒耳後月蝕瘡燒蚯蚓糞合豬脂敷之小兒患漬耳出膿水成瘡以蚯蚓糞末吹耳中一小兒自脫胎時兩目赤腫或作癢或生翳此稟賦之肝火也用九味蘆薈丸六味地黃丸二藥而愈治小兒未周歲患赤眼用黃連為細末以茶調塗手心足心即愈如腫痛難開加薑黃皂角朴硝為末同敷太陽穴手心足心加蔥搗爛敷之尤妙拔毒膏治月內嬰兒患眼腫痛熟地黃一兩以新汲水浸透搗爛貼兩腳心布裹住立效治頭瘡胎毒等瘡五倍子白芷各一兩花椒黃丹各五錢枯白礬一錢上為末瘡濕乾摻瘡干香油調搽治小兒疝氣小腹痛引腰脊攣曲身不能直京師授青皮陳皮三稜莪朮炮木香檳榔川楝肉芫花醋炒各五錢辣桂牽牛生取末各三錢巴豆肉不去油一錢上為細末麵糊為丸麻子大每三丸空心一服午前一服薑湯下一小兒脫肛不收浮萍草為末摻患處小兒自汗不止益元散加舊蒲扇燒灰陳麥芽湯調服治小兒吐蛔蟲用苦楝根銼佐二陳湯煎服治小兒蛔蟲食蟲宜春月初服之即出川楝子使君子木鱉子桑白皮木通黃柏青皮枳殼沒藥各等分水一鍾煎至七分空心溫服治小兒蟲積腹痛用巴豆一枚去殼捶去油以硃砂一粒同研勻用雞子一個開頂微去白入藥在內攪勻仍將紙餬口用草圈燉在鍋內水煮熟令兒食之或以茶清送下即打下所積蟲而愈痘瘡瘡疹證候面色燥臉唇赤眼睛黃目胞赤四肢亦赤手足冷耳尖冷骫冷鼻冷身熱或乍冷乍熱頭痛腰脊痛咳嗽噴嚏呵欠煩悶搐跳驚悸昏昏多睡小便赤少大便不通不惡寒惟惡熱方其身熱未即發瘡迨其身涼然後發出三部脈洪數往來大小不應指而疾三曰發熱三曰出痘三曰起脹三曰貫膿三曰收靨大凡七日以前為裡實不可投溫燥之劑能攻毒也八日以後為裡虛不可投寒涼之藥能伐生氣也痘不治法初出勇壯者不治出如蠶種者不治隨出隨沒者不治如蚊蟲咬者不治氣血相失者不治倒出者不治飲水如促鼻者不治與肺氣不能疏理也氣尊血分者生毒參陽位者死經驗死症日數不治症初出頂陷連內紅過至九日一場空又如血點帶紅紫斑症死在六日中發斑黑者左朝夕斑青項額去匆匆無膿癢塌期二日不治腰疼及挺胸報痕似沸如雞粟舌卷囊縮命不留紫泡刺出黑血者飲食嗾喉症俱凶難療面腫痘不腫暗色黑陷及無膿二便流利下腸垢更有吐瀉出蛔蟲頭溫足冷好飲水痘先驚後藥難攻氣促泄瀉渴不止目無魂者命不供聲啞失音叫與哭痘色縱好也難終有種氣急亦難治如灌膿好是傷風見此宜服參蘇飲餘症參詳須用功痘瘡治法夫痘初出大抵熱者多寒者少用藥之法六日以前不宜溫補亦不宜過用寒涼故師云解毒之內略加溫補溫補之中略加解毒此不傳不刊之秘訣也若六日以後毒已盡出於表當溫補而不溫補者膿不得壯而癢塌寒戰之病所不能免矣或曰如是之論必以藥石而後喜然而世之勿藥有喜者及其藥石不能治者何也痘有順逆險也順者不必治逆者不能治險者不治多不能保其生矣發熱三日決生死例一發熱時用紅紙條蘸麻油點照心頭皮肉裡若有一塊紅者或通身有成塊紅者八九日決死一發熱時身無大熱腰痛腹不痛過三日後才生紅點堅硬礙手者勿藥而安一發熱時渾身溫暖不時發驚者痘在心而出也吉一發熱時一日遍身即生紅點稠密如蠶種樣摸過不礙手者決死一發熱時腹中大痛腰如披杖及至出痘乾燥而前痛猶不止者決死一發熱之時頭面上有一片紅色如胭脂者八九日後死出痘三日決生死例一出痘之時頭面稀少胸前背上皆無根窠紅潤頂突礙手者如水珠光澤者吉不須服藥一出痘之時腰腹疼痛不止口氣大臭其自出紫黑色點者決死一出痘之時白色皮薄而光根全無紅色或根帶一點紅三五日如綠豆樣此痘決不能貫膿久後成一胞清水擦破即死不可因其好者而妄與下藥一出痘之時全不起頂如湯泡及燈心火燒者十日後決生癢塌而死一出痘之時口鼻及耳烊紅血不止者決死一出痘之時起紅斑而紋者六日後決死一出痘之時起黑斑如痣狀肌肉有成塊黑者即時死起脹三日決生死例一痘三日之後痘當逐漸起脹若紅綻頂肥滿光澤者不必用藥此乃吉症也一痘當起脹之時根窠全然不起頭面皮肉紅腫如瓠瓜之狀者決死一痘當起脹之時遍身痘頂皆黑其中有眼如針孔紫黑者決死一痘當起脹之時遍身痘陷伏不起者腹中膨脹不能飲食氣促神昏者決死如六日內痘尚紅紫滿頂者即死一痘當起脹之時腰腹或痛遍身尚是紫點如蚊蟲咬全不起脹者決死一痘當起脹之時黑陷悶亂神氣昏暗者決死灌膿三日決生死例一痘當起脹三日之後根窠紅潤灌膿充滿如黃蠟色二便如常飲食不減吉候也不必下藥如紅紫黑色外剝聲啞者死一痘當灌膿之時純是清水皮白而薄與水泡相似三四日遍身抓破而死一痘當灌膿之時痘中乾枯全無血水此名空痘決死一痘當灌膿之時吐利不止或二便下血乳食不化痘爛無膿者決死一痘當灌膿之時二便不通目閉聲啞腹中脹滿肌肉黑者即死結靨三日決生死例一痘當結靨之時色轉蒼蠟成紫葡萄色者一二日決從口唇四邊靨由腹中收至兩腿然額上和腳一齊結靨落皮而愈一痘當靨之時遍身臭爛如餅不可近者死預防治法凡值天時不正鄉鄰痘疹正發宜預服此能活血解毒則不染三豆湯赤小豆黑豆綠豆各一兩甘草節五錢水煮熟任意吃豆飲汁七日自不發油飲子用真香油一斤逐日飲盡永不出擦法用麻油每夜臨臥時以手中三指蘸油擦兒頭額項背腰兩手腕兩足腕然後睡可使輕此亦暢達流通開脫凝滯之意也惡實膏用惡實子一名鼠黏子為末蜜調貼囟門上免有患眼之疾發熱時即用痘瘡初出或未出以絲瓜近蒂者三寸連皮燒存性為末砂糖調服或以真硃砂研水飛量兒大小或五分或一錢蜜水調服或以絲瓜末硃砂合而服之多者可少少者可無三日發熱治法升麻葛根湯治時行瘟疫頭痛發熱肢體煩疼瘡疹未發疑似之間宜服一見苗不可服慎之升麻白芍甘草各一錢葛根一錢半上銼一劑生薑三片水煎熱服加山楂大力子尤可冬月加蘇葉八分四肢厥冷加桂枝一錢半腰痛當知是痘加桂枝一錢半時氣酷烈發熱太甚乃是毒氣盛加牛蒡子一錢半一痘隨出隨沒者此毒氣太盛不治之症急用麻黃五錢酒煎頓服或可救十中之二三也胡荽酒胡荽一束銅錢大細切用好酒熱和與服須臾即渾身通暢過二三時以紙捻點照於無痘處又出珍珠光亮好痘數十顆矣如無胡荽即用胡荽子初出時宜以胡荽酒遍噴床壁及與患者服役人皆飲能碎穢惡又以胭脂點眼角防痘入眼一痘始發時先用鮮芫荽在於房中慢火上燒令微煙燻闢穢氣日逐燒之一月方止一發熱痘未出肚痛不可忍而無休息者白芍蟬退各一錢半上為細末沸湯調服服後痛止痘出庶幾可治痛若不止必出斑瘡不可療也三日出痘治法九味神功散治痘出毒氣太盛血紅一片不分地界如蚊蠶種或諸失血或吐瀉七日以前諸症可服嫩黃耆人參白芍紫草紅花生地黃牛蒡子前胡甘草上銼水煎溫服熱甚加黃芩黃連各一錢未退加大黃有驚加蟬退去翅足一個痘出三日內頂陷者非虛也用神功散活血退火若四日以前有虛症其色黑慘保元湯加桂如色白光者寒乘之神功散加桂腹痛者毒盛也神功散主之面紅不退地界不分者神功散加前胡吐者毒盛乘火炎而宣也神功散主之泄瀉者火盛而奔越也神功散加升麻以提之有痰者用白附子磨服切不可用二陳湯使燥陽明經使孤陽無陰不能施化也嗽宜杏仁煎湯磨白附子服遍身疼痛以木香一味磨服即止一痘發渴服神功散當不渴或猶渴者用紅花子一味煎湯飲無子即用紅花亦可加牛蒡子尤妙蓋能散胃口之瘀血故也切不可用荔枝棗能助陽經之火大發渴者一汗出不止者而身已涼乃血隨氣溢也用當歸五錢黃耆三錢酸棗仁炒一錢共作一服水煎溫服立止一或有失治不知解毒五六日間以燈照之生氣未戕其毒太盛作熱地界紅燥宜神功散治之隨觀其變而施治猶或可救一二過此則不能施其神功矣一痘色白屬氣虛補氣為主初出色白者大虛宜大補氣血人參白朮黃耆當歸川芎升麻葛根木香甘草之類大便滑泄加訶子肉豆蔻一痘色黑屬血熱涼血為主初出色黑者大熱便宜解毒黃芩黃連黃柏俱酒炒牛蒡子紫草升麻葛根防風荊芥甘草節參耆之類黑為北方之色屬水熱甚反兼水化制之故色黑一痘瘡紫黑乾枯變黑歸腎身如火炙之熱用犀角羚羊角二味磨涼水服之有回生之妙一小兒痘瘡初出光壯忽然黑陷心煩躁急氣喘妄語如見鬼神人牙齒燒存性為末每個作一服酒調下初出多生驚搐急將導赤疏通木通甘草與防風生地黃連同用再加辰砂調服須臾救活疲癃此方端的有神功果然百發百中三日起脹治法保元湯人參二錢嫩黃耆一錢甘草一錢銼作一劑生薑一片水煎服若額不起脹加川芎六分為引面部加升麻四分為引胸膈加桔梗四分為引腰膝加牛膝四分為引兩手加桂枝二分為引二日痘乾紅少潤保元湯加桂兼活血加當歸白芍若毒加玄參牛蒡子勻氣加陳皮二三日根窠雖圓而頂陷者保元湯加川芎官桂四五日根窠雖起色不光澤為氣虛血盛保元湯加芍藥糯米官桂五六日氣盈血弱色昏紅紫保元湯加木香當歸川芎五六七日氣交不旺血雖歸附不能成漿急投保元湯加官桂糯米助其成漿七八日毒雖化漿而不滿為氣血有凝不能大振加桂糯米八九日漿不沖滿血附線紅氣弱而險加糯米以助氣而駕其血十一二日氣血沖滿盡漿濕潤不斂內虛也加白朮茯苓十三四日毒雖盡解漿老結痂之際或有雜症保元湯隨症加減勿用涼熱峻利十四五六日痂落潮熱唇紅口渴不食四君子湯加陳皮山渣黃連如渴甚加參苓白朮散如熱不解以大連翹飲去黃芩主之凡痘瘡發渴者為氣弱而津液枯竭保元湯加麥門五味子即止如不止參苓白朮散一二劑即止一治小兒痘六七日陷而不發黑色氣欲絕及不貫膿者有瀉不宜服穿山甲湯洗淨炒令黃色為末每服五分或七分木香湯或紫草湯下入酒更妙糯米清湯亦可三日貫膿治法內托散治氣血虛損或風邪穢毒沖筋使瘡毒內陷伏而不出或出而不勻快用此活血勻氣調胃補虛內托瘡毒使之盡出易收易靨嫩黃耆人參當歸身各二錢川芎防風去蘆桔梗去蘆川厚朴去皮姜炒白芷甘草生各一錢木香肉桂各三分上方於紅紫黑陷屬熱毒者去桂加紫草紅花黃芩若淡白灰黑陷伏屬虛者加丁香救里官桂攻表當貫膿而不貫膿者倍參耆歸煎熟入人乳好酒溫服此貫膿巧法也凡貫膿肥滿庶易結靨若痘雖脹滿光澤可觀然摸過軟而皮皺者中雖有膿不甚滿足後必不能收靨或痘皆貫膿中間幾顆不貫者終變虛寒癢塌之症宜內托散倍加補氣血排膿之藥凡痘陷無膿雖因服內托藥而暫起不久又陷者貫膿不滿故也宜內托散倍參耆歸人乳好酒之類蓋貫膿既滿必無再陷之患矣凡因虛發癢遍身抓破膿血淋漓不能坐臥者宜內托散去桂倍加白芷止癢當歸和血木香調氣氣行血運其癢自止外用敗草散敷之免致盛風變症以致上痰咳嗽聲啞若遍身抓破並無膿血清水皮白干如豆殼者死復生散衛知州治痘黑陷不起發珍珠琥珀雄黃硃砂穿山甲兩頭尖香附子各一錢蟾酥五分上先將蟾酥切片以乳汁浸少時入眾藥搓勻一歲兒服八釐三二歲服一分二釐用熟蜜水調下治痘疹抓破稀爛用繭孔內入土蜜新瓦上焙乾燒灰存性為末如濕乾摻如干香油調搽甚效三日收靨治法木香散灰陷黑陷嘔吐白陷為表虛嘔甚加白豆蔻嫩黃耆一錢人參五分白朮去蘆一錢白茯苓去皮一錢陳皮八分半夏湯泡薑汁炒一錢川厚朴去皮姜炒一錢木香一錢丁香五粒訶子煨取肉一錢前胡一錢上銼一劑生薑二片水煎溫服若腹脹渴者或瀉渴者或足指冷渴者或驚悸渴者或身溫渴者或身熱面㿠白渴者或寒戰渴不止者或氣急咬牙渴者或飲水轉渴不止者以上九症即非熱也乃脾胃肌肉虛津液衰少故也木香散主之如不愈更加丁香官桂多煎服丁香攻裡官桂發表其表裡俱實而瘡不致於癢塌喘渴死矣回陽酒治痘屬虛寒八九日色光白如水泡頂陷根白癢塌咬牙寒戰之症鹿茸酥炙倍大附子麵裹煨去臍嫩黃耆炒當歸酒洗上銼劑酒煎服兼有痰嗽加牛膽南星異功散寒戰咬牙癢塌泄瀉為裡虛瀉甚加肉豆蔻大附子炮去皮臍人參五分白朮去蘆白茯苓去皮陳皮半夏薑製官桂厚朴姜炒當歸木香一錢丁香五粒肉豆蔻麵裹煨上銼一劑生薑二片棗二枚水煎溫服一痘瘡欲靨未靨之際頭溫足指冷或腹脹泄瀉口渴氣促或身不熱寒戰悶亂不寧臥則哽氣煩渴咬牙癢塌急服異功散切不可與蜜水紅柿西瓜梨果柱冷食之一漿行而作癢此內熱而外為寒所束用荊芥穗紙裹緊搓糊黏紙頭令不散燈上燒了卻於桌子上舂去灰快放手指定癢痘頭用荊芥穗火點癢處一下即放退每癢痘悉點之即止一行漿將足而發疔認定黑疔痘或黑而硬或有紅絲或為大紫泡未曾解毒者仍以神功散加雄黃黃連黃芩大黃煎服卻用點法雄黃一錢研胭脂重浸水令濃調雄黃末點疔痘頭上立時即紅活亦神法也蓋雄黃能拔毒胭脂能活血也一九日十日回水之時元氣重蒸真陽運化其水自然消爍此循環之妙理也其有未曾解毒至此時水不能化及歸於胃與所伏之毒相遇氾濫腸胃胃氣既虛水大則土崩故此泄瀉人多以異功散加豆蔻治之愈服愈瀉不知火動於心胞則小腸從令毒伏於陽明則脾胃受戕宜以定中湯治之立止定中湯真黃土能鎮安胃氣收斂中氣取真正黃色不雜者用一大塊在碗內百沸湯泡即以碗蓋少頃出用如冷頃於盞內外以熟水燙之用酒兩盞和藥硃砂細研五分能鎮心包絡使小腸不奔包雄黃研細一錢能解使胃氣寧也上兩味和勻以黃土湯少加砂糖溫服二服立止一煩躁悶亂發渴定中湯加片腦半分牛蒡子湯和服一有寒戰咬牙等症宜附子理中湯附子理中湯大附子炮去皮臍三錢人參二錢白朮去蘆炒二錢乾薑炒黑色二錢一十一二日血盡毒解氣調漿足此生生自然之理也若濕潤不斂者內虛也異功散加丁香但當收斂結痂而已一若解毒不盡或未經解毒到當靨發熱蒸蒸者宜用迴天甘露飲砂糖半酒盞百沸湯調一大碗溫服立時熱退痘靨萬發萬中真有回天之力也一臨回水時誤服生血藥過多或因渴過飲水漿以致不靨看其身無熱覺諸痘潤澤者宜以附子理中湯服此燥之令水盡也一當靨時生氣痘未黃須紫潤即真靨矣宜定中湯預防內也當靨時腹痛不靨其痛著在中脘乃熱毒凝滯瘀血作痛也當用手拈散牛蒡子二錢白芍一錢紅花八分桂五分山梔仁一錢大黃一錢水煎服將靨時其痘一時盡黑非靨也乃火極攻裡即凶矣治痘餘症一小兒欲出痘作腰痛柴胡一錢半乾葛一錢川芎麻黃去節升麻白茯苓防風各八分甘草五分上銼一劑水一鍾半先將麻黃滾去白沫後煎至八分熱服覆被出汗腰疼止為度不止再進一服免出腎經之痘甚奇一出痘之時口渴譫語精神狂亂煩躁者此由心火爍於內以致神不守舍狂惑譫語如見鬼狀外症必紅紫焦燥不能壯實所謂純陽無陰之症候急服退火回生丹滑石二錢硃砂一錢冰片三釐為末冷水調服睡少時神安痘轉紅活一痘瘡貫膿三日之內身冷豆灰白急或不進飲食寒氣逆上或嘔吐或腹脹痛或流清水手足厥冷者所謂純陰無陽之症急服回生起死丹丁香九粒乾薑一錢銼水煎服絮被蓋片時令脾胃溫暖陰退陽回則痘變紅活也一痘瘡當靨不靨發熱詣語目閉大喘手足大亂小便不利者此熱毒乘於肺金無陰氣以之然也急服清金導赤散人參白茯苓當歸白芍麥門木通滑石車前子玄參貝母陳皮枳殼黃芩酒炒黃連酒炒石膏杏仁去皮桑白皮甘草銼劑水煎服一痘瘡自出痘至貫膿收靨之時倒塌伏陷心慌悶亂死在須臾人參一兩水煎濃汁灌下立省痘後餘毒治痘後不問蘊毒發於何經初起紅腫用黑豆綠豆赤豆三豆以酸醋浸研漿時時以鵝翎刷之隨手退去痘後發癰者痘瘡之毒藏留經絡壅於支節之間而發者也亦有既平之後失於解利而生者惟小柴胡湯加生地黃最妙或大連翹飲消毒飲五福化毒丹皆可用也大連翹飲五福化毒丹俱見諸熱小柴胡湯見傷寒消毒飲治內蘊邪熱咽膈不利痰嗽壅喘眼赤腮腫頸項結核癰毒遍身風疹丹毒赤痛及痘瘡已出來出不能快透痘疹後餘毒諸症牛蒡子微炒四錢荊芥甘草各一錢防風去蘆半錢一方加黃芩一錢犀角鎊五分上銼水煎服治痘後作喘桑近川珍珠煅血竭雄黃各等分為末每服一字酒下治痘後咳嗽不拘遠近白砒雄黃枯礬鵝管石石黃寒水石火煅各一錢上研細末用綠豆粉打糊丸綠豆大每服三丸臨睡井水送下忌熱物一夜神效治痘後餘毒發於四肢腫痛芙蓉葉一兩白及三錢為細末加蜜一匙水調如稠糊厚敷腫處一日一換輕則即消吹雲散治痘後餘毒入眼生翳或紅或白腫痛黃丹水飛一錢輕粉三分片腦一釐為末鵝管石吹耳內如左眼患吹右耳右眼患吹入左耳一旦夕三次兼服後藥須得早治遲必難為矣一方用黃丹輕粉各一錢為末吹照前法效一方加雄黃麝香少許尤妙化毒散治痘後餘毒生翳當歸川芎赤芍生地黃防風乾葛菊花天花粉蟬退等分穀精草倍用上銼劑水煎服赤腫痛加黃連梔子翳後加木賊治痘後翳眼用兔糞收來四五丸水煎服治痘傷眼白翳用青果核磨水點之治痘後眼生翳障用綿胭脂以口嚼取水入蒸過熟蜜和勻燈心蘸點翳上效一用石燕子一對檳榔一對二味磨水常服亦效治痘後失音天花粉桔梗白茯苓訶子肉石菖蒲甘草上為末水調半匙在碗內外以小竹七莖黃荊七條縛作一束點火在碗內煎臨臥時服痘瘡已靨未愈之間五臟未實肌肉尚虛血氣未平復忽被風寒外邪搏於膚腠之間則津液澀滯故成疳蝕瘡宜用雄黃散綿繭散治之如不愈者潰骨傷筋以傷人也雄黃散治小兒牙齦生疳蝕瘡雄黃一錢銅綠二錢為末以少許貼患處綿繭散治小兒遍身上下等處疳蝕瘡膿水不絕空蠶繭須是出蠶繭了者一味不拘多少入白礬末令滿炭火上燒令白凡汁盡取出研細每用干貼瘡上女人出痘一女人出痘其輕重固已一概而論然十四歲之後天癸通者則又不同蓋天癸既至陰常不足痘瘡以氣為主血為附氣以充之血以濡之一有不足則變惡易生此又不可不審察之也且如發熱之初正遇經隨如期而來此熱隨血解瘡自發出不必施治若遇四日而不止者則熱入血室血必妄行為內動中虛之症矣宜涼血地黃湯當歸川芎白芍懷生地白朮升麻黃連人參梔子玄參甘草上銼劑水煎服一非經行之時於發熱而經忽至此毒火內熾逼血妄行之故瘡必多毒必盛急用涼血解毒湯當歸白芷升麻紫草赤芍桔梗連翹燈草上銼作劑水煎服一正當起發貫漿之時適遇經行三日不止者瘡必應起發而不起發應貫漿而不貫漿頂平形塌或灰白色或黑陷此為經血過多陰氣虧耗為陷伏壞症宜八物湯去地黃加黃耆木香熟附子以調元氣或胡荽酒噴之或出增痘者為吉寒戰咬牙喘急腫滿手足厥冷為內脫不治之症矣一起發貫漿經水適來忽口瘖而不能言者乃血入少陰不能上榮於口也宜以當歸養心湯人參當歸生地黃麥門冬升麻甘草上銼劑燈心水煎服一經水不斷之時適逢出痘身發壯熱神思昏沉言語狂妄如見鬼神尋衣撮空此行經之後血室空虛天行邪熱乘虛而入犯入衝脈蓋肝藏血沖為血海肝藏魂竅於目神思昏者魂亂也目妄見者視亂也妄言者肝移熱於心也宜瀉肝散羌活當歸山梔龍膽草川芎防風大黃上銼劑水煎服一正值崩漏不止氣血俱虛之候適逢出痘此必能勝任宜大補其氣血以十全大補湯或八物湯加木香黃耆官桂主之如倒塌則不可治矣一向來經閉不通血海乾涸適逢出痘毒氣怫鬱於衝任之間二陽之症併發其熱必甚若攻擊之則血妄行不止毒亦不出為喘急為脹滿為陷伏矣須調其心脾使毒發泄庶可以保以歸脾湯或逍遙散主之一痘瘡起發至泡漿數日最宜表裡無病飲食如常若此時忽然行經者人但知厭穢以觸正痘殊不知此乃已之血安得為靨但恐血出裡虛而生陷伏之變急宜救里解毒十全大補湯主之孕婦出痘一妊娠最忌出痘蓋熱能動胎胎落則血氣衰敗必痘不能起發灌漿而命則危矣故孕婦出痘深為可慮蓋痘之用藥多主溫補如半夏肉桂之類皆妊娠所忌而黃芩烏附又非痘家所宜故遇此症者不問輕重悉以清熱安胎為主不可觸動其胎宜安胎散加黃芩芍藥主之血動者四物湯加芩連及罩胎散當歸川芎白芍人參白朮茯苓柴胡條芩荊芥防風白芷粉葛砂仁紫草阿膠蛤粉炒成珠桔梗甘草一方有陳皮枳殼火熱加鬱金糯米水煎服一身熱足冷者腹脹人物湯加木香脾氣虛不進飲食毒發不出四君子湯加木香糯米紫草胎動不安者安胎散加砂仁痘出稠密參耆內托散加紫草芍藥當歸單身熱有外邪無內症者參蘇飲加木香以如聖散當歸白朮黃芩枳殼黑豆大腹皮砂仁甘草上各等分水煎服如初發熱加升麻葛根連翹痘出太盛加酒炒黃連大力子連翹山楂不起發加大力子白芍口乾加麥門冬知母天花粉痰多加半夏所謂可擾而擾似乎無擾故須有胎不忌半夏也惟在用之者審之耳如胎五月則半夏桂心之屬俱不必禁也一痘瘡正在起發貫漿之時忽遇坐草分娩之期此氣血俱虛之候宜大補加熟附子主之以補氣血固表裡若產後小腹急痛此血未盡也以黑神散當歸川芎熟地黃乾薑炒桂心蒲黃炒香附童便炒木香青皮去瓤黑豆上銼劑酒水各半煎服若腹脹咬牙寒戰作渴足冷身熱者此脾胃兩虛外作假熱大補湯加熟附子一二劑更用四君子湯加黃耆當歸陳皮木香多服止者吉不止者凶一方產之後或半月十日之間適逢出痘此無胎孕繫累止以大補氣血為主以前大補湯或八物湯去芍藥與服之痘出多者加連翹大力子大便自利者加肉豆蔻只照常一體用藥不必妄為一痘疹要訣曰妊娠出痘收靨之時胎落才是多無事發熱初出之時胎落者猶或可救一二若時當起脹貫膿而有犯者多難救矣蓋血氣衰敗不逐毒然也一胎動不安宜獨聖散用連殼縮砂慢火炒去殼每服半匙熱酒調下胎動立止一妊娠傷寒護胎法用井底泥青黛伏龍肝各為末調勻塗於孕婦臍中二寸許如干再塗上以保胎孕也麻疹凡疹發熱之初多似傷寒惟疹子則嗽咳噴嚏鼻流清涕眼胞腫其淚汪汪面浮腫雙腮赤噁心嘔吐為異耳但見此候即是疹子便宜謹避風寒或葷腥厚味用藥以表散也使皮膚通暢腠理開豁而疹毒易出也證候未明是否便服蘇葛湯去砂仁陳皮腹痛亦用厚蓋表之得汗自頭至足方散漸減衣被則皮膚通暢腠理開豁而麻易出矣縱不出亦不可再汗恐致亡陽之變只宜常與蔥白湯飲之其麻自出矣服此自無發搐之症一麻疹既出見一日而又沒者乃為風寒所沖麻毒內攻若不治胃爛而死可服消毒飲一劑熱退遂安如麻見三日退後若有被風寒之症亦宜消毒飲神妙方見餘毒予經驗一方治出麻疹已出而覆沒或出不盡必慌啼哭不止十分危急死在須臾或下利腹痛用黃芩白芍等分水煎服之立效如神一麻疹既出已過三日不能沒者乃內有實熱宜四物湯進之如失血之證加犀角汁解之一麻疹前後有潮熱不退飲食不進等症並屬血虛血熱只宜四物湯按症照常法加減渴加麥門冬犀角汁嗽加瓜蔞霜有痰加貝母去白陳皮切忌人參白朮半夏之類如倘誤用為害不小戒之戒之蓋麻疹屬陽血多虛耗今滋補陰血其熱自除所謂養陰退陽之義一發熱之時既表之後切戒風寒冷水瓜桃生果之類如一犯之則皮毛閉塞毒氣難泄遂變紫黑而死矣如極渴飲水只宜少與蔥白湯以滋其渴耳必須使毛竅中常微汗潤澤可也又忌梅李魚酒蜂蜜香鮮之類恐惹疳蟲上行蘇葛湯初熱未見點發表之藥暫用分兩量兒大小服之紫蘇二錢葛根二錢甘草二錢白芍一錢五分陳皮五分砂仁五分上銼連須蔥白三根生薑三片水煎熱服四物湯當歸一錢川芎一錢地黃一錢半芍藥一錢半上銼一劑水煎服一麻疹既出之時如色紅紫乾燥暗晦乃火盛毒熾急用六一散解之即滑石研末六錢粉草末一錢共一處每一錢薄荷湯和服或四物湯去地黃加紅花炒黃芩進之一麻疹退後若有牙根腐爛鼻血橫行併為失血之症急宜四物湯加山茵陳木通生犀角以利小便一麻疹泄瀉須分新久寒熱新瀉熱瀉者宜四苓散即豬苓澤瀉白朮茯苓加木通服寒瀉者十中無一如有傷食傷冷不得化以理中湯即人參白朮乾薑甘草一服而止一麻疹正出之時雖不進飲食者但得麻色淡紅潤澤真正不為害也蓋熱毒未解內蘊實熱自不必食也退後若不食當則用四物湯加神麯砂仁一二帖決能食矣如胃氣弱者忌少下地黃一麻退之後須避風寒戒水濕如或不謹遂終身咳嗽患瘡無有愈日一麻疹前後大忌豬肉魚肉雞子之類恐惹終身之咳只宜用老雞精肉火煮食少助滋味可也清金降火湯治麻疹後熱乘肺金聲啞不出或咳或喘蘇梗陳皮黃連枯芩酒炒山梔子炒石膏玄參貝母瓜蔞天門冬麥門冬當歸生地黃茯苓桑皮杏仁白芍甘草生薑一片煎服一婦人有孕出麻疹當以四物湯倍加白朮條芩艾葉安胎清熱為主則胎決無慮而麻疹易沒矣如胎氣上衝急有苧根艾葉煎湯磨生檳榔服之更以四物湯大進之
