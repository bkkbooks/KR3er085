body:
  text: 坤集卷七小兒科小兒諸病但見兩眼無精光黑睛無運轉目睫無蜂芒如魚眼貓眼之狀個個不治或神藏於內但外若昏困者無妨其有病篤而眼神氣不脫者猶可以活眼者五臟六腑神氣之所發神氣已脫脈雖僅存亦未能保小兒之脈洪則為實濡則為虛緊則為風緩則為積數則為熱遲則為涼更看虎口三關紋理兩手食指本節為風關中節為氣關第一節為命關其紋曲直不同如紋只在本節病易治透過中節則病重過第三節則難治驚則紋青淡紅則寒熱在表深紅必主傷寒痘疹故亂則病久紋細則腹痛多啼乳食不消紋粗直射指甲必主驚風惡候紋黑如墨必困難醫此乃神聖工巧之一端也觀面部察色左腮屬肝其色青者為順白者為逆若色赤主肝經風熱發熱拘急青黑主驚風腹痛淡赤主潮熱痰嗽右腮屬肺其色白者為順赤者為逆若赤色甚者主咳嗽喘急悶亂飲水傳於腎則小便赤澀或淋閉不通額上屬心其色赤者為順黑者為逆若青黑主驚風腹痛瘛瘲啼哭微黃主盜汗頭髮乾燥驚疳骨熱鼻屬脾其色黃者為順青者為逆若色赤主脾經虛熱飲食少思深黃主小便閉而鼻燥衄血頦屬腎其色黑者為順黃者為逆若色赤主腎與膀胱有熱而小便不通下額屬腎水北一云耳輪左頰屬肝木東一云眉稜上下又云太陽鼻準屬脾土中一云人中是右頰屬肺金西又太陰觀面部五色面赤為風熱面青驚可詳心肝形此見脈證辨溫涼脾怯黃疳積虛寒㿠白光若逢生黑色腎敗命須亡觀形察色辨因由陰弱陽強發硬柔若是傷寒雙足冷要知有熱肚皮求鼻冷更知是瘡疹耳冷應知風熱症渾身皆熱是傷寒上熱下冷傷食病辨證歌紫熱紅傷寒青驚白色疳黑紋因中惡黃色自脾端虎口叉手處是也三關第二指反三節風關第一節寅位紋現於風關為輕氣關第二節卯位紋現於氣關為重命關第三節辰位紋過於命關則難治矣歌訣五指梢頭冷驚來不可當若逢中指熱必定是傷寒中指獨自冷麻痘症相傳女右男分左分明仔細看小兒外症十五候歌眼上赤脈下貫瞳人囟門腫起兼及作坑鼻乾黑燥肚大青筋目多直視睹不轉睛指甲黑色忽作鴉聲虛舌出口齧齒咬人魚口氣急啼不作聲蛔蟲既出必是死形用藥速救十無一生急驚夫急驚之候因聞不常之聲或遇驢馬禽獸之唬以致面青口噤或聲嘶而厥發過則容色如故良久復作其身熱面赤引飲口鼻中氣熱大小便黃赤色惺惺不睡蓋熱甚則生痰痰盛則生風偶因驚而發耳蓋急驚屬肝木風邪有餘之症治宜清涼苦寒瀉氣之藥宜鎮驚散抑肝散抱龍丸之類鎮驚散主方治驚風搐搦痰嗽喘熱膽南星防風蟬退薄荷甘草上銼散生薑一片水煎服抑肝散治肝經虛熱發搐或發熱咬牙或驚悸寒熱或木乘土而嘔吐痰涎腹脹少食睡臥不安者當歸一錢川芎八分白朮炒一錢茯苓一錢柴胡五分鉤藤鉤一錢甘草五分水煎子母服治小兒角弓反張目直視因驚而致用南星半夏姜三片煎熟入竹瀝薑汁灌服防風蟬退白芍木通車前赤茯苓麥門冬甘草用燈草水煎服治小兒發搐眼翻口噤抽掣痰喘氣促蟬退去翅足七個水煎白附子磨濃溫服立已神效抱龍丸抱龍之義抱者保也龍者肝也肝應東方青龍木木生火謂生我者父母也肝為母心為子母安則子安況心藏神肝藏魂神魂既安不從何生故曰抱龍丸理嬰兒諸驚四時感冒瘟疫邪熱致煩躁不寧痰嗽氣急並瘡疹欲出發搐並宜服之其藥性溫平不僭不燥常服驅風化痰鎮心解熱和脾胃益精神大有神效牛膽南星一兩天竺黃五錢雄黃二錢半硃砂二錢半真麝香一錢上為極細末濃煎甘草水煮麵糊丸如芡實大雪水煮糊丸更佳用薄荷湯研化服或蔥白湯痰塞咳嗽薑湯痘疹見形有驚白湯下心悸不安燈草煎湯入珍珠末和勻不拘時服錢仲陽加天麻一方加牛黃五分珍珠一錢琥珀一錢水煮甘草膏為丸金箔十片為衣治驚風百病大有神效治急驚風見生人如見虎面赤口紅舌生芒刺喉中痰響眼目直視手足牽連並治慢驚風不可服用蘆薈為末稀麵糊為丸如綠豆大每服五七丸燈心竹瀝湯下慢驚夫慢驚之症多因乳食不節損傷脾胃以致吐瀉日久中氣大虛而致發搐發則無休止時其身冷麵黃不渴口鼻中氣寒大小便青白昏睡露睛目上視手足瘛瘲筋脈拘攣蓋脾虛則生風風盛則筋急俗名天吊風者即此候也蓋慢驚屬脾土中氣不足之症治宜中和甘溫補中之劑宜七味白朮散醒脾散之類一小兒吐瀉日久成慢驚風默默不語昏睡露睛遍身手足厥冷十分危篤死在須臾百藥罔效一家哭泣予製附子理中湯一劑服之頃蘇後以醒脾散調理而愈醒脾散主方治小兒吐瀉不止作慢驚風脾困昏沉默默不食人參白朮去蘆炒白茯苓去皮木香全蠍天麻殭蠶白附子甘草炙薑棗煎服加味大醒脾散治小兒慢脾風內虛昏迷不醒人參白朮炒茯苓陳皮丁香木香南星泡全蠍去毒炒天麻煨白附子煨山藥炒石蓮子去心石菖蒲肉蔻砂仁甘草生薑三片棗一枚回陽加大附子治慢驚慢脾危惡症候藥力不到者但看兩腳面中間陷處有太衝脈即灸百會穴三五壯炷如小麥大灸後仍以醒脾之劑調之釀乳法治慢驚睡多驚啼凡面黃脈細者難治木香沉香藿香丁香陳皮人參神麯麥芽上銼每服四錢紫蘇十葉生薑十片棗兩枚水煎先令乳母食後捏去宿乳汁服之即便臥霎時令藥入乳之脈次令兒吮不可過飽亦良法也生珠丹治急慢驚至危者體如反張四肢冷天麻二錢半全蠍二十一個白附子煨二錢殭蠶一錢南星煨一錢半大附子炮一錢硃砂二錢麝香半字白花蛇酒浸炙乾二錢蜈蚣一錢酒浸上為細末和勻煉蜜為丸如雞頭大每服一丸薄荷湯化下治小兒驚風並退只是聲啞不能言並治諸病後不能語用天南星個炮去皮臍為末每服半字或一字三五歲兒服半錢用豶豬膽汁調食前服便能言疳疾夫小兒疳積皆因恣食甘肥與服瓜果生冷及一切烹飪調和之味朝餐暮食漸成積滯膠固以致身熱體瘦面色萎黃或肚大青筋蟲痛瀉利而諸疳之症作矣大抵疳病當辨冷熱肥瘦而治其初病者為肥熱疳久病者為瘦冷疳冷熱並宜後諸方選而用之消疳飲主方治小兒疳疾身熱面黃肚大青筋瘦弱通治諸疳人參白朮去油炒白茯苓去皮胡黃連宣黃連神麯炒青皮去瓤炒陳皮砂仁甘草炙上銼水煎服傷食加山楂肉有蟲加使君子九味蘆薈丸治疳積瘰癧結核耳內生瘡或疝氣囊癰下疳潰爛或莖出白津股腹有瘡或體瘦熱渴大便不調牙齦蝕落頰腮腐爛等症胡黃連黃連蘆薈木香白蕪荑炒青皮白雷丸鶴蝨草各一兩麝香三錢上為末蒸餅糊為丸如麻子大每服一錢空心米湯下一小兒下疳潰爛發熱作痛一小兒莖中作癢不時搔捻一小兒腎莖中潰痛小便閉澀日晡尤甚一小兒目癢出水或項間結核或兩眼連劄或陰囊瘙癢年餘矣俱屬肝火用九味蘆薈丸並加味肥兒丸治諸疳積肚腹脹大發熱青皮去瓤麩炒陳皮三稜煨醋炒莪朮煨醋炒香附神麯炒麥芽炒白朮去蘆炒白茯苓黃連薑汁炒胡黃連使君子去殼蘆薈檳榔各五錢木香三錢上為末麵糊丸如蘿蔔子大每三四十丸燈心湯下虛加人參不發熱去胡黃連治小兒疳積腹脹如鼓用蝦蟆不拘多少每日用三四隻去頭足皮腸只用本身四腿以白水入鹽酒蔥椒煮熟與吃以愈為度治小兒疳瀉赤石脂炒為末粥飲調服小兒不肯服藥者服此甚妙凡小兒諸疳腹脹肌瘦立眉豎眼頭毛生瘡結如麥穗用立秋以後大蝦蟆一隻去首刮去腸肚以清油調之上加以覆瓦下加以仰瓦各用火以炙之令熟與患者食腹中之積穢盡下再如前連服四五隻一月之後形容改變非常效不可言補中益氣湯治中氣虛弱體疲食少或發熱煩渴或因藥克伐元氣虛損惡寒發熱肢體倦怠飲食少思或兼飲食勞倦頭痛身熱煩躁作渴脈洪大弦虛或細微軟弱右關寸獨甚亦宜用之大凡久病或過服克伐之劑虧損元氣而諸症悉俱者最宜此湯調補若母有前症致兒為患者尤以用之諸疳癖塊久治不愈多服尤效黃耆人參各八分白朮去蘆炒陳皮甘草炙各五分升麻柴胡各二分當歸一錢上銼作劑薑棗水煎空心午前服六味地黃丸治小兒諸疾照後加減懷生地黃酒椒砂鍋內蒸黑四兩乾山藥二兩石棗酒蒸去核二兩白茯苓二兩半牡丹皮一兩半澤瀉一兩半上為末煉蜜為丸如梧子大每服三五十丸白滾水下或銼散作湯服亦可小兒遺尿失禁加破故紙益智仁人參肉桂小兒節加鹿茸牛膝人參小兒解顱顱頭縫開解不合也加人參小兒稟賦腎經虛熱耳內生瘡或肌肉消瘦骨節皆露名節疳加鹿茸牛膝各一兩五味子四兩若顱解不合牙齒不生眼睛不黑腿軟難行宜服此丸愚按上方治肝經血虛燥熱或腎經虛熱作渴小便淋秘痰氣上壅或風客淫氣患瘰癧結核或四肢發搐眼目瞤動或咳嗽吐血頭目眩暈或咽喉燥痛口舌瘡裂或自汗盜汗便血諸血或稟腎不足肢體瘦弱解顱失音或畏明下竄五遲五軟腎疳肝疳或早近女色精血虧耗五臟齊損凡屬腎肝諸虛不足之症皆宜用此以滋化源功不盡述加味香蟾丸治小兒疳癖積塊其效如神賈蘭峰傳胡黃連五錢蘆薈二錢使君子煨去殼三錢阿魏醋煨三錢乾蟾五個炒龍膽草三錢酒洗川黃連豬膽炒五錢青皮香油炒三錢陳皮去白三錢木香一錢神麯炒五錢山楂去子六錢人參三錢白朮去蘆五錢白茯苓去皮五錢甘草五分上為末豬膽汁丸如綠豆大每服二三十丸米湯送下養真益元膏治小兒魃病虛羸面黃肌瘦體熱人參五錢白朮炒一兩茯苓一兩陳皮一兩山藥一兩山楂肉二兩麥門冬去心一兩甘草炙五錢上為細末煉蜜為丸芡實大每三丸棗湯化下癖疾癖者血膜包水僻側於脅旁時時而作痛也惟癖為能發潮熱惟癖為能生寒熱故瘧家中脘多蓄黃水日久而後結癖寒熱之不已者以此小兒臟腑和平榮衛調暢則津液自然流通縱使多飲水漿不能為病惟夫乳哺失調三焦關格以致水漿停滯腸胃不能宣行冷氣搏之於是結聚而成癖矣消癖湯主方治小兒癖疾發熱口乾尿赤人參白朮去油蘆白茯苓半夏姜炒柴胡黃芩豬苓澤瀉胡黃連麥門冬去心三稜醋炒莪朮醋炒甘草山楂去子薑棗煎服此方服之立效如癖病日久元氣虧損此方不能奏效宜多服補中益氣湯養正積自除方見疳疾參朮肥兒丸治癖塊發熱王道之劑久服除根人參三錢半白朮去油蘆炒三錢白茯苓去皮三錢胡黃連五錢使君子去殼四錢半神麯炒三錢半山楂去子三錢半麥芽炒三錢半甘草炙三錢黃連薑汁炒三錢半真蘆薈二錢半碗盛泥封置土坑穀糠火煨透用上為末陳小黃米粉糊為丸綠豆大每服二三十丸米湯下按上方治癖疾攻掠兼補多服收功黃龍丸治小兒癬塊雄黃一錢半蜈蚣三條砂鍋內炒去頭足蘆薈三分阿魏三分牛黃一分天竺黃三分上為末化黃蠟一兩為丸綠豆大先服七丸則熱退次服九丸則塊消三服十一丸則病根除每用黃蠟煎雞子清入藥於內黃酒下勝金丹阿魏一錢蘆薈一分天竺黃一分沒藥一分雄黃一分川山甲黃土炒黃色一分胡黃連一分血竭一分硇砂水少許煎過沉香各一分蟾酥分白草烏三個童便浸一宿焙乾上共為細末用好黃酒入銅器內熬膏打麵糊為丸如綠豆大每次服三丸晚上黃酒送下汗出即效連進三服癖即消矣忌一切生冷發物此方乃許昌僧傳效牛黃化癖散太府劉如川傳牛黃蘆薈殭蠶各二錢孩兒茶阿魏甘草各三錢大黃一兩一錢穿山甲十片黃土炒焦黃色上為細末每服五分蜜水或黃酒