body:
  text: 乾集卷一宋許學士傷寒脈法總論歌大浮數動滑陽脈陰病見陽生可得大脈者指下尋之極大舉之有餘內經曰大則病進丹溪曰大者洪之別名火之象也屬陽其病得之於內傷者陰虛為陽所乘故脈大當作虛治之其得之於外傷者邪客於經脈亦大當作邪勝治之合二者而觀之皆病症方長之勢也謂之病進不亦宜乎浮脈者陽也指下按而尋之不足舉之有餘狀如太過曰浮主傷寒病在表若雜病主臟中冷榮中有熱治宜生精補虛數脈者陽也難經曰一呼三至一吸三至名曰數是一息之間脈動六至陽多陰少而有熱也脈訣云六數七極熱生多動脈許學士言仲景論動脈則曰陽動寸為陽則汗出陰動尺為陰則發熱數脈見於關上上下無頭尾如豆大厥厥動搖名曰動是動也仲景為陽脈脈訣動為陰脈二者不同何也此是開卷第一行疑處而世人不知講豫謂脈訣所言分七表八里而單言之也仲景所論兼衆脈而合言之也大抵雜病各見一脈惟傷寒必兼衆脈而見何以言之仲景之意若曰浮大者陽也兼之一動數滑之類安得不為陽故仲景以動為陽者此也云指下尋之似有舉之還無再再尋之不離其處不往不來動而不移曰動主虛勞崩中血痢此舉一脈單言主病故為陰也是以傷寒雜病不可同日而論學者知之仲景論滑脈之翕奄沉名曰滑沉為純陰翕為正陽陰陽一合故名滑脈古人論滑脈雖云往來前卻流利展轉替替然與數相似曾謂仲景三語而足也翕張也言脈升而張也忽焉而沉言脈降而復也奄言奄忽之間脈來大而盛聚而沉謂之翕奄沉正如轉珠之狀也沉為臟氣故曰純陰翕為腑氣故曰正陽滑者陰陽氣不為偏勝也叔和脈訣三關如珠動按之即伏不進不退曰滑若陰病見此五陽脈則生沉澀弦微弱屬陰陽病見陰終死脈沉脈者陰也脈訣云指下尋之似有舉之全無緩度三關狀如爛綿曰沉一曰重按之乃得主病在裡澀脈者脈訣云指下尋之似有舉之全無又云如刀刮竹行又云細而遲往來難且散或一止復來曰澀微脈者脈訣云陰也指下尋之往來極微再再尋之若有若無曰微脈經云極細而數或欲絶一曰小也一曰手下快一曰浮而薄弱脈者脈訣云陰也指下尋之如爛綿相似輕手乃得重手稍無快快不前曰弱脈經云極軟而沉細按之欲絶一曰指下按之乃得舉之無有弦脈者脈訣云陽仲景為陰二者不同詳仲景論弦脈狀如弓弦按之不移弦為陰又云支飲急弦又云少陰症手足寒脈弦遲者大抵沉細者陰也若兼之以澀弦微則為陰脈陰病宜矣脈訣言弦脈為陽者云指下尋之不足舉之有餘狀若箏弦時時帶數曰弦為陽脈者此單言雜病自內而之外者仲景言弦脈為陰者兼沉澀弱微則為陰脈陰病宜矣脈訣言弦脈為陽者云指下尋之不足舉之有餘狀若箏弦時時帶數此弦脈為陽者乃單言雜病自內而外之者仲景言弦脈為陰者兼沉細弱微自外而之內傷寒脈也故傷寒雜病不可同日而論仲景言若傷寒陽病如譫語妄言見此五陰脈多死陰陽交互最難明輕重斟量當辨白脈雖有陰陽須看輕重以公表裡在下文輕手脈浮為在表表實浮而兼有力但浮無力表中虛自汗惡風常淅淅傷寒先要辨表里虛實此四者為急仲景云浮為在表沉為在裡然表症有虛有實浮而有力者表實也宜用麻黃葛根紫蘇陳皮之屬以汗之以其症必無汗惡寒若浮而無力者表虛也必自汗惡風宜用桂枝芍藥或白朮防風甘草川芎之屬以和解之重手脈沉為在裡裡實脈沉表亦實重手無力大而虛此是裡虛宜審的里症亦有虛實脈沉而有力者裡實也故腹滿大便不通沉而無力裡虛也或泄瀉或陰症之類風則虛浮寒牢堅水停水滀必沉潛動則為痛數為熱支飲應須脈急弦太過之脈為可怪不及之脈亦如然仲景云風則虛浮寒則牢堅沉潛水滀支飲急弦痛則為痛數則煩熱太過可怪不及亦然邪空見中必有汗榮衛大盛名高章高章相搏名曰綱榮衛微時名炸卑煠卑相搏名曰彰榮衛既和名緩遲緩遲名沉此最良九種之脈辨虛實長沙之訣妙難忘仲景云寸口衛氣盛名曰高榮氣盛名曰章高章相搏名曰綱衛氣弱名曰炸榮氣弱名曰卑炸卑相搏名曰損衛氣和名曰緩榮氣和名曰遲緩遲相搏名曰沉大抵仲景脈法論傷寒與雜病脈法異瞥瞥有如羹上肥此脈定知陽氣衰縈縈來如蛛絲細卻是體中陰氣衰脈如瀉漆之絶者病人亡血更何疑仲景云脈瞥瞥如羹上肥者陽氣微也縈縈如蛛絲細者陰氣衰也脈綿綿如瀉漆之絶者亡血也陽氣衰也陽結藹藹如車蓋陰結尋竿亦象之仲景云藹藹如車蓋者陽結也纍纍如循竿者陰結也陽盛則促來一指陰盛則結緩而遲此謂促結二脈也仲景云脈來緩時一止名曰結脈來數時一止名曰促脈陰盛則結陽盛則促縱橫逆順宜審察殘賊災怪要須知仲景云脈有相乘有縱有橫有逆有順何謂也曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水水行乘木名曰順又曰脈有殘賊何謂也曰脈有弦緊浮滑沉澀此六者名殘賊為諸賊作病也又問曰脈有災怪何謂也答曰舊時服藥今乃發作如先服大黃腹未瀉後服白朮卻見瀉故為災怪脈靜人病內虛故人安脈病曰行尸仲景云脈病人不病曰行尸以無主氣故眩僕不知人人病脈不病名曰內虛以無谷神雖困無苦右手氣口當主氣主血人迎左其位氣口緊盛食必傷人迎緊盛風邪屬左為人迎右為氣口人迎緊風傷榮氣口緊盛傷於食數為在腑遲為臟浮為在表沉在裡浮緊兼澀寒傷榮脈浮而緩風傷衛脈微大忌令人吐欲下猶防虛則細沉微氣弱汗為難三者要須當審記孫用和云陰虛脈沉微而氣弱者不可發汗這汗吐下三法脈其有不可行者切當審之陽加於陰有汗症左手脈沉卻應未云陽加於陰而謂之汗趺陽胃脈定死生太溪腎脈為根蒂傷寒必診太溪趺陽者謂以腎脈胃脈為主脈來六至或七至邪氣漸深須用意浮大晝加病屬陽沉細夜加分陰位九至以上來短促狀若湧泉無入氣更加懸絶漸無根命絶天真當死矣孫尚云脈及七至六至以上浮大晝加病沉細夜加病更加八至精氣弱神氣亂必有散脫精神之候須急為治療又加之九至十至以上須和扁亦難救如八至九至加以懸絶者無根也病人三部脈調勻大小沉浮遲速類此是陰陽氣已和勿藥自然應可喜診脈口訣察脈之法先須六部齊診看何部異於衆者便是此部有病然後每部另診方可得其精微無病之人左手弱右手強是血虛右手弱左手強是氣虛有病之人左手大右手小是外感右手大左手小是內傷如邪氣盛脈大醫而使之小正氣虛脈小醫而使之大者乃為效也論絶脈彈石之脈狀如硬蛇觸石辟辟而急腎氣絶也解索之脈狀如繩索解股散於兩旁多見於尺精血竭也雀啄狀如雞雀頻啄止而復來多見於脾穀氣絶也屋漏狀如水滴地上久復濺起胃氣絶也蝦遊狀如蝦浮不動瞥去復來神魂絶也尺脈澀如大蝦鬚者死脈連連如蜘蛛絲者亦死魚翔狀如遊魚高頭泛定尾搖命絶死也釜沸一脈如羹上肥滿湧湧而浮此陰陽之氣絶也所謂偃刀者如猶刀刃其與彈石類焉若代若牢亦為危脈代者動中一止如更代之代牢似乎革經曰渾渾革至如湧泉謂出而不返也又曰牢而搏如薏苡纍纍然者死牢之與革無以異也前所論覆溢二脈自關前進上出於魚際者謂之溢自關後退入於尺澤者謂之覆是皆陰陽不守離經無根必死之脈也凡篤病六脈澀刮按之無力若能用藥挽得胃氣脈回三部和緩藹藹而來必有生意或一併澀刮而胃氣之脈不回是雖息數猶存終不能保其諸篤症但見右尺脈和軟而大厥疾其有瘳乎太過不及脈心脈洪大心家熱頭腦昏疼血氣結腳板心內似火燒口燥心煩渴不歇心脈微小主心虛心中驚悸流汗隨頭腦昏沉多困倦夢魂常在水邊歸肝脈洪大不調血背痛項強疼左脅手痠腳冷目赤紅行路昏暈常怕跌肝脈微小四肢酸膽冷肝枯血氣寒頭眩眼花雙足軟背間常有汗漫漫腎脈洪大主腰疼背痛項強小腹膨膀胱暑熱不便赤咽乾舌苦口無涎腎脈微小下部虛耳內嘈嘈風雨聲腦痛腰疼雙足腫背間盜汗出無停肺脈洪大心頭緊咳有風痰常壅盛腰疼背痛腳又酸口渴氣急時時並肺脈微小肺家氣悶悶憂愁口又幹手寒腹內多虛弱咳嗽時時背上寒脾脈洪大心膨脹飲食不思常欲困頭疼腦痛嘔頻頻食後傷風精氣損脾脈微小兩眉愁悶悶憂憂唇口焦手足軟酸多氣急無情無意過良宵命脈洪大心胸熱潮渴三焦血氣結四肢倦怠少精神食後傷風精氣別命脈微小號平和腎氣應教嘔逆多手足冷寒脾胃冷口淡無味不調和察視黑氣起於耳目鼻上漸入於口者死白色亦然赤色見於耳目額上五日死張口如魚出氣不反者死循摸衣縫者死無熱妄語者死爪甲青者死爪甲青肉黑者死遺尿不知者死舌卷卯縮者死眉傾須豎目直視者死唇反人中滿者死陰陽俱閉失音者死神氣不守聲嘶者死汗出不流者死尸臭不可近者死回目直觀者死肩息死齒忽黑者死面赤目黃死面赤目白死面青目黑面青目黃面青目白面青唇黑皆死面白目黑面白目白皆死面黑目青死面黑目白死面黑脅滿不能反側死面黑唇青死面黃目白面黃目青面黃目黑死已上九黑如煤白如枯骨赤如衃血青如草茲方為死候心絶肩息回聘目直視者一日死肺絶氣去不反口如魚三日死骨絶腰脊痛不可反側五日死脾絶口冷足腫脹泄十二日死腎絶大便赤澀下血耳干腳浮舌腫者六日死筋絶魂驚虛恐手足爪甲青呼罵不休九日死腸絶髮直汗出不止不得屈伸者六日死肝絶恐懼伏臥目直面青八日死又即時死胃絶齒落目黃者七日死凡病色見於面者黃赤為熱白為寒為脫血為積青黑者痛內經云肝青肺白心赤腎黑脾黃若青如翠羽赤如雞冠黃如蟹腹白如豕脂黑如烏羽此五色之見生也青如初生草茲黃如枳實黑如炱煤赤如衃血白如枯骨其色常變不同雜論濕熱相火病多土火病多氣常有餘血常不足肥人血多濕多瘦人氣實熱多白者肺氣弱血不足黑者腎氣余忌黃耆熱傷血不能養筋故為拘攣寒傷筋不能束骨故為痿弱氣屬陽無寒之理勞症忌涼藥此東垣之旨也寒不得熱是無火也熱不得寒是無水也肺癰非吐不可療辛苦飢飽勞役疼痛皆傷血服藥藥力峻須酸收指甲卷是血少不養傷筋身如被打濕傷血也亦有血虛而痛腑病責臟用臟病責腑用氣血弱遠枳殼以其損氣氣血盛忌丁香以其益氣治病先調氣病分氣血陰陽晝增夜靜是陽氣病而血不病夜增晝靜是陰血病而氣不病夜靜日惡寒是陰上溢於陽日夜並惡寒是陰部大盛兼有其陽當瀉其寒峻補其陽夜靜日熱是陽盛於本部日靜夜惡寒是陰自生於本部日安夜躁煩是陽氣下溜於陰中當瀉其陽峻補其陰日惡寒夜煩躁為陰陽交飲食不及必死傷寒中暑與傷酒食一般人火正治龍火反治諸病有郁治之可開噁心有熱有痰有虛陽絶則陰虧陰氣若盛陽無暴絶之理虛勞不受補者死諸病能發熱風寒暑濕燥火七情皆能發熱寒濕同性火燥同途非也寒宜溫之濕宜燥之火宜降之涼之燥宜潤之諸病尋痰火痰火生異症診脈觀形察症三者殊途不可執一諸病先觀胃氣汗脈沉微細弱不可汗沉細為在裡濡弱血氣虛脈浮而緊法當身痛當以汗解假令尺脈遲者不可汗此血微少故也陰病脈細沉數不可汗病在裡故也傷寒風溫素傷於風復傷於熱四肢不收頭痛身熱常汗不解治在少陰厥陰不可汗汗出譫語內煩不得臥善驚目亂無精光傷寒濕溫素傷於寒因而中暍若兩脛冷腹滿頭目痛妄言治在足太陰不可汗汗出必不能言耳聾不知痛所在身青面變死傷寒頭形象中風常微汗出又自嘔者心懊憹發汗則痙傷寒脈弦細頭痛如反熱此屬少陽不可汗太陽與少陽並病頭項強痛或眩冒心下痞堅不可汗少陰病咳而下利譫語者此強汗之故也胸中閉塞不可汗汗之則吐血厥不可汗汗之聲亂咽嘶亡血家不可汗汗之則寒栗衄不可汗汗之必額陷直視淋家不可汗汗之必便血瘡家不可汗汗之則痙汗家不可汗汗之必恍惚脈短者死冬時發其汗必吐痢口瘡下痢清穀不可汗汗之必脹滿咳而小便利汗之則厥逆諸逆發汗微者難愈劇者言亂睛眩者死動氣在不同左右上下一切不可汗脈浮大可汗問病者設為虛不可汗也浮而緊可汗太陽病脈浮弱可汗浮而數者亦可汗陽明脈遲汗出多微惡寒表未解可汗日晡發熱如瘧此屬陽明脈浮虛可汗下利後身痛清便自調可汗中風脈宜浮遲不宜弦大急數夫中風百病古今諸醫所見不同古人論中風風也河間論中風火也東垣論中風氣也丹溪論中風濕也風火氣濕四者立説以賢論之總之一虛而已何也良由素失調護或五味之有傷或七情之忒甚或嗜欲之無節或勞役之過極以致臟腑虧損風邪乘虛卒中者風也陰精枯竭水衰火盛而昏冒者火也元陽耗散不任風寒故昏冒者氣也氣血衰憊中氣不運而生濕濕生痰濕痰壅盛而昏冒者濕也以上四者而歸之一虛可謂明矣賢嘗考諸明醫論曰所謂外中風邪者亦未必不由元精虛弱榮衛失調而後感之也所謂因火因氣因濕亦未必絶無外邪侵侮而作也誠確論焉其為病也或為中風舌強不語語言謇澀或口眼喎斜半身不遂或手足拘攣筋骨麻痛或頭目眩暈痰火熾盛或呵欠噴嚏面木頭痛或僵仆不省人事等症宜先用通關之藥俟有嚏隨進解毒丸或導痰湯或攝生飲對症選用或有未至昏冒而不必用此三方者均宜服加味順氣散二三劑故曰治風先理氣氣順則痰消徐理其風如聖散急則以治其標也使外邪少疏人事稍醒其餘諸症然後從容調理宜王道之劑以補虛為主兼去外邪每日早午晚服六味丸五論湯還真丹三藥兼而進之勿論病之輕重年之淺深輕則旬日奏效重則久服收功治以滋腎水降心火扶真元補氣血以培其本祛風邪平肝木清痰火除濕熱以治其標對症加減慎毋執焉久而腎水上升心火下降真元漸復氣血漸充邪氣漸退肝木漸平痰火漸消濕熱漸除則中風諸病自潛瘳矣收功保後宜用延齡固本丹不惟以杜後患而且卻病延年之聖藥也茲賢之管見乃素所經驗若此為愈愧不能罄醫中之萬一耳後之學者須探本窮源當考諸內經之旨洞析劉張朱李諸家之祕自可收萬全之功矣中風惡候口開者心氣絶遺尿者腎氣絶手撒者脾氣絶眼合者肝氣絶鼻鼾者肺氣絶髮直吐沫睛如直視聲如鼾睡皆不治之症也及筋枯不治舉動則筋痛者是無血以滋養其筋故也面赤如妝頭面青黑汗綴如珠不治之症也凡初中時昏沉口噤不可進藥急以生半夏末吹入鼻中或用通關散搐鼻內即提起頭髮立蘇有嚏可治無嚏不可治或急以手指掐刻人中即醒其或不醒者急以三稜針刺手十指甲角十井穴捋去黑血就以氣針刺合谷二穴人中一穴覺稍醒即多灌香油或加麝香一二分或薑汁亦可凡中氣亦似中風但風中多痰涎氣中口中無涎又風中身溫氣中身冷此七情內傷氣逆為病治當順氣散主之有熱者導痰湯主之或藿香正氣散皆可通關散治中風痰厥昏迷卒倒不省人事欲絶者先用皂角細辛等分為末每少許吹入鼻中有嚏可治隨用吐法皂角末五分半夏白礬各三分為細末作一服薑汁調服探吐後服解毒丸或導痰湯攝生飲之類擦牙開關散治中風不省人事牙關緊閉不能下藥用烏梅肉和南星細辛末以中指蘸頻擦牙上自開治中風痰厥不省人事用巴豆去殼捶油在紙上入麝香少許將紙卷作條入桐油內蘸過點著吹滅取煙燻鼻而省一方治中風不語牙皂七個蜜水同煎用鵝管吹入些許按上方治中風不省人事外治之法雄黃解毒丸治中風卒然倒僕牙關緊急不省人事並解上膈壅熱痰涎不利咽喉腫閉一應熱毒又能消食化氣兼治食瘧取積下熱鬱金二錢半研末雄黃二錢半研末巴豆去油二十四個先將上二味末和一處同研極細再入巴豆同研用好米醋煮麵糊為丸如緑豆大每服五七丸熱茶送下吐出痰涎立蘇未吐再服如牙關緊以刀尺斡開口灌下一纏喉風急喉閉七丸研化以熱水研白梅肉調下或熱茶下熱則流通之意纏喉風卒死而心頭猶熱者灌下即蘇一久瘧腹中有癖用沉香磨水送下一諸積下痢煎五苓散送下一瘰癧加斑貓十四個去翅足糯米炒冷茶下家祕牛黃丸治驚風痰熱等症即雄黃解毒丸加牛黃一錢硼砂一錢水糊為丸薄荷湯下一方治小兒急驚風痰熱上壅加膩粉一錢一方治疔瘡加全蠍二錢皂角二錢麝香少許滴水為丸緑豆大每二十丸茶下按上方治中風不醒人事風痰壅熱者宜之祛風導痰湯治中風中氣痰火頭目昏沉痰氣迷悶上氣喘急口吐涎沫症類傷寒憎寒壯熱此因內傷七情以致痰迷心竅神不守舍空空則痰自生也南星一錢半夏一錢陳皮七分白茯苓去皮一錢黃連薑汁炒一錢黃芩酒炒一錢白朮去蘆一錢枳實麩炒一錢瓜蔞仁一錢桔梗去蘆七分白附子七分防風七分人參五分甘草二分上銼一劑生薑三片棗一枚水煎加竹瀝薑汁同服按上方治中風中氣痰火昏迷不醒人事者宜之攝生飲治一切卒中不論中風中寒中暑中濕及痰厥氣厥之類不醒人事者初作只用此方蒼朮生一錢南木香一錢半南星濕紙煨二錢半半夏泡一錢半細辛一錢石菖蒲一錢甘草生一錢生薑七片水煎服痰盛加全蠍炙二枚按上方治一切卒中不醒人事者宜之服後人事稍醒氣未盡順痰未盡消惟當以藿香正氣散加南星木香以蘇痰氣調理最穩或服加味順氣散亦可藿香正氣散方見霍亂加味順氣散治風先理氣氣順則痰消徐理其風庶可收效理氣者氣滯氣鬱肩膊麻痛之類此七情也人參白朮去油蘆白茯苓去皮半夏薑汁炒青皮去穰陳皮川芎白芷枳殼麩炒桔梗烏藥細辛防風殭蠶炒乾薑麻黃甘草上銼生薑三片棗一枚水煎服按上方治中風諸病並遍身手足疼痛麻木者宜之五論湯主方治中風諸病之總司也人參五分白朮去蘆炒一錢白茯苓去皮一錢當歸酒洗一錢二分川芎一錢白芍酒炒一錢生地黃薑汁焙一錢熟地黃薑汁焙一錢半夏薑炒一錢南星薑炒一錢半防風去蘆六分羌活六分獨活六分天麻一錢黃連薑炒八分黃芩酒炒八分黃柏酒炒四分甘草炙三分陳皮溫水洗去白七分銼作一劑水煎臨服入竹瀝薑汁一二茶匙清旦時溫服宜隨時對症加減於後風火氣濕虛五論探玄微一方皆可療增損始為奇中風左癱者坦也筋脈弛縱坦然而不舉也屬血虛與死血加秦艽桃仁紅花中風右瘓者渙也血氣散漫渙然而不用也屬氣虛與濕痰加黃耆木香烏藥中風痰迷心竅舌強不能言加遠志石菖蒲枳實瓜蔞麥冬中風口眼喎斜加白芷殭蠶中風痰涎熾盛加枳實瓜蔞仁中風肢體頑麻加烏藥殭蠶薄桂中風筋骨疼癇加官桂乳香沒藥中風頭目眩暈並頭痛加白芷蔓荊子藁本中風手足拘攣加牙皂木香中風或左足癱或右足瘓加牛膝木瓜薏苡仁按上方治中風諸病多服以愈為度奪命還真丹治中風半身不遂手足癱瘓口眼喎斜語言謇澀一切諸風痰火氣鬱濕熱疼痛驚癇之疾當歸酒洗一兩川芎五錢白芍酒炒一兩熟地黃五錢生地黃酒洗五錢人參七錢白朮去蘆七錢半陳皮去白五錢白茯苓去皮一兩半夏薑製一兩枳殼麩炒一兩桔梗去蘆一兩木香七錢半官桂五錢全蠍去毒五錢天麻七錢防風去蘆一兩殭蠶炒五錢羌活一兩半獨活七錢半藁本七錢半細辛三錢薄荷一兩菊花五錢知母一兩石膏一兩柴胡一兩黃芩五錢黃連五錢地骨皮五錢蔓荊子五錢菟絲子酒製一兩半小茴酒炒一兩杜仲酒炒一兩麻黃一兩蛤蚧酥炙一兩甘草一兩上三十七味為末煉蜜為丸如彈子大每服一丸細嚼茶酒任下如中風癱瘓癩疾茶酒下如遍身骨節疼痛及心氣痛並不醒人事熱醋下如洗頭風及暗風茶清下如驚痛口吐涎沫酒下如婦人胎前産後經脈不調酒煎香附湯下按上方以羌活愈風湯為本最能行道諸經滋養氣血使陰陽無偏勝久服大風悉去始終調理之良劑也八味丸方見補益治中風等症因房勞者名曰內風房勞過度則元精暴亡舌本欠柔言語不利也精血一虧即水竭而心火暴甚腎水虛衰不能制之則陰虛陽實而熱氣怫鬱心神昏冒筋骨不用而卒倒無所知也或一肢之偏枯或半身而不遂或口眼之喎斜或語言之謇澀悉宜此方或湯或丸皆可按上方治中風諸病宜空心服六味丸巳未時服五論湯夜臨臥服奪命還真丹每日早午晚三服無間任諸風百病可起沉而拔痼也凡中風百病照前諸方服之萬有不效者乃風之為病百端非數方所能盡也宜依後方對症選用化風如聖散一名刀圭散治男婦小兒諸般風症左癱右瘓半身不遂口眼喎斜腰腿疼痛手足頑麻語言謇澀行步艱難遍身瘡癬上攻頭目耳內蟬鳴痰涎不利皮膚瘙癢偏正頭風無問新久及破傷風角弓反張並蛇傷犬咬金刀所傷出血不止敷貼立效久患痔漏膿血痛楚服之良驗蒼朮米泔浸二兩草烏炮去皮二兩川烏炮去皮尖二兩何首烏米泔浸忌鐵器二兩全蠍瓦焙二錢半天麻二錢半殭蠶隔紙炒三錢半兩頭尖一錢防風去蘆一錢半荊芥二錢半白芷二錢半細辛二錢半藁本二錢半麻黃二錢半當歸酒洗二錢半川芎二錢半人參一錢半白茯苓一錢半石斛酒洗五錢白花蛇五錢酒浸三日去皮骨羌活二錢半甘草炙一兩半共二十二味上為細末每服三分或五分漸加至六七分臨臥酒調下茶亦可服後忌多飲酒並一切熱物飲食一時恐動風氣服後覺麻是藥之效也按上方治中風諸病暫服之劑立可奏效分金酒治中風左癱右瘓口眼喎斜及諸風疼痛麻木及手足出膿水先服前加味順氣散二三劑後進此分金酒當歸川芎白芷半夏茯苓蒼朮細辛防風荊芥殭蠶天麻川烏草烏麻黃落陽花白花蛇各一兩上為粗末每藥三錢用燒酒一斤棗三枚蜜五錢同入瓶內封固重湯煮半炷香冷定取出每服一小鐘病在上食後服病在下空心服按上方治中風諸病通行經絡以利關節祛風除濕養血化痰止痛除麻舒筋活骨之劑防風通聖散治中風一切風熱大便閉結小便赤澀頭面生瘡眼目赤痛或熱極生風舌強口禁或鼻生紫赤風刺癮疹而為肺風或成風厲而世呼為大風或腸風而為痔漏或腸鬱而為諸熱譫妄驚狂並皆治之防風當歸川芎芍藥大黃芒硝連翹薄荷麻黃石膏桔梗黃芩白朮梔子荊芥滑石甘草生薑煎服按上方治中風百病大小便閉澀屬實熱有餘者宜之搜風順氣丸治腸胃積熱以致膈間痞悶大便結燥小便赤澀腸風痔漏腰膝痠痛肢節頑麻手足癱瘓行步艱辛語言謇澀三十六種風七十二般氣無不治之大黃五兩酒浸九蒸九曬火麻仁微炒去殼二兩郁李仁去殼泡去皮二兩菟絲子酒炒二兩山藥酒蒸二兩牛膝去蘆酒浸二兩獨活一兩枳殼麩炒一兩山茱萸酒蒸去核二兩檳榔二兩車前子三兩半炒上為末煉蜜為丸梧子大每三五十丸茶酒任下百無忌早晚各一服覺臟腑微動以羊肚肺羹補之久患腸風便血服之除根癱瘓語澀服之平復酒後能進一服宿酒盡消中年以後之人若用厚味酒內多有痰火且不能戒房往往致虛火動動則生風所謂一水不能勝五火是也故以此方降火疏風為主不問年高氣弱稚壯婦女並皆服之大效孕婦勿服按上方治中風百病不問虛實大小便閉澀者宜之如程飲治中風口眼喎斜神方當歸川芎白朮白芍茯苓陳皮半夏枳殼白芷桔梗殭蠶天麻防風荊芥細辛黃芩烏藥甘草生薑煎服參蘇飲方見咳嗽治痰積中脘眩暈嘈雜怔忡噦逆或痰停關節手足嚲曳口眼喎斜半身不遂嘔吐噁心頭疼發熱狀似傷寒治口眼喎斜先用鱔魚血塗不斜處須臾口眼俱正即用熱水洗淨卻服五論湯一二十劑即愈治中風牽口面喎斜取新硬石灰一合以酸醋炒調如泥喎斜向右即於左邊塗之向左即於右邊塗之候方正如舊即須以水洗去大效按上方治中風口眼喎斜之劑治中風瘖啞不能言大黃一兩芒硝一兩當歸一兩甘草五錢上銼一劑水煎服瀉下後用四物湯四兩加殭蠶一兩作二服一婦人忽然不語半年矣諸藥不應兩尺浮數先用六味丸料加肉桂數劑稍愈再以地黃飲子三十餘劑而痊男子多有此症亦用此藥治之地黃飲子治腎虛弱舌瘖不能言足廢不能行熟地黃自制巴戟去心山茱萸去核肉蓯蓉酒浸焙石斛大附子泡去皮五味子白茯苓去皮石菖蒲遠志桂心麥門冬去心各等分上銼每一兩入薄荷少許薑棗水煎服清心散治舌強不能言青黛二錢冰片二分硼砂二錢牛黃三分薄荷三分上為末先以蜜水洗舌上後以薑汁擦之將藥蜜水調塗於舌面上頻與之數日效治中風不語痰迷心竅不能言南星一兩防風五錢為末麵糊為丸每五十丸薑湯送下立效治中風不語舌不能言遠志甘草水泡不去骨不拘多少為末雞清調敷天突咽喉前心三處效按上方治中風不語瘖啞之劑神仙健步丸治癱瘓黃耆鹽水炒一兩半人參一兩白朮去蘆二兩茯神一兩當歸一兩半白芍鹽酒炒二兩生地黃二兩熟地黃二兩枸杞子一兩半五味子五錢虎骨酥炙二兩龜板酥炙一兩半牛膝二兩杜仲二兩黃柏乳炒二兩知母乳炒二兩麥門冬二兩遠志甘草制二兩石菖蒲二兩酸棗仁炒一兩沉香五錢木瓜一兩薏苡仁一兩羌活一兩獨活一兩防風一兩大附子童便制五錢上為細末煉蜜為丸如梧子大每服百丸空心鹽湯溫酒任下治癱瘓祕方用牛骨髓一碗熟的蜜一斤煉熟二味濾過入炒麵一斤乾薑炒為末三兩四味攪勻丸如彈子大一日服三四丸嚼酒下洗癱瘓祕方蛤蚧一個麻黃四兩川烏二兩草烏二兩透骨草四兩川椒四兩白花蛇二錢防風四兩紫花地丁一升大鹽四兩艾一把槐枝一條用水二桶煎中大缸半埋在地入水溫時坐上洗再用水二桶煎渣候冷時再入熱水或一日或一夜臨出時用水澆頂心數次再用芥茉稀貼患處紙絹裹熱炕上捶汗出為度忌早起飲食就臥內為妙榮花散治左癱右瘓鱉甲醋炙九次鹿茸酥炙乳香沒藥榮花樹根皮即夜合花根上各為淨末三錢合一處再重羅過分為二服五更黃酒下一服五錢男子至重者二服出汗女人至重止用一服獨神丹治癱瘓用淮安陳曲一塊將四面削去各一指厚止用中心打碎入砂鍋焙去濕氣為末用福建黑砂糖等分入石臼搗再用生薑汁熬熟添入內搗如泥丸如彈子大收磁器內細嚼病在上者晚上黃酒送下一丸病在下者牛膝煎酒送下一丸如全身有病早晚如引下治癱瘓手足攣蜷或疼痛外應膏治癱瘓川烏一斤為細末用隔年陳醋入砂鍋內慢火熬如醬色敷患處如病一年一日即癢如病二年二日作癢令人將手拍癢處以不癢為度先用升麻皮硝生薑煎水洗患處令淨然後敷藥不可見風治手足拘攣不伸用牙皂一個木香等分水煎一服立效按上方治中風左癱右瘓之劑治中風一身俱麻宜用烏藥陳皮乾薑枳殼殭蠶川芎白芷麻黃桔梗人參白朮當歸麥門冬甘草上銼水煎服仙靈酒治偏風手足不遂皮膚不仁淫羊藿一斤以生絹袋盛於不津器中用好酒浸之厚紙重重封固春夏三日秋冬五日後開壇隨量飲之常令醺醺不得大醉合時勿令雞犬見之治一切冷風勞氣補腰膝強心力丈夫絶陽不起女人絶陰無子老人昏耄健忘服之最良治中風面目十指俱麻木乃氣虛也宜用補中益氣湯加木香大附子羌活防風烏藥方見內傷神仙粥治風寒濕痹麻木不仁大川烏頭生研為末每用白晚米半碗入藥末四錢慢火炊作稀粥不可稠下生薑自然汁二匙白蜜三匙攪勻空心溫啜之如是中濕更入薏苡仁末二錢煮服此粥大治手足四肢不隨及重病不能舉有此症預服防之左氏云風淫末疾謂四肢為四末也脾主四肢風邪客於肝則淫於脾脾為肝克故疾在末穀氣風溫之藥徑入脾經故四肢得安按上方治中風麻木不仁之劑治皮膚瘙癢烏藥順氣散加蟬退薄荷治皮膚燥癢經曰諸癢為虛血不榮肌腠所以癢也當以滋補藥以養陰血血和肌潤癢自不作治身虛癢四物湯加黃芩調浮萍末一錢服治皮膚風熱遍身生癮疹牛蒡子浮萍等分以薄荷湯調下二錢日二服治風氣客於皮膚瘙癢不已苦參丸治肺風皮膚瘙癢或生癮疹疥癬有人病遍身風熱細疹癢痛不可任者連胸頸臍腹及近隱處皆然涎痰亦多夜不得睡苦參一斤為末用皂莢去皮蔓荊子二斤以水一斗浸揉去濃汁濾去渣熬成膏和丸如梧子大每服三十丸荊芥薄荷湯下惟酒下亦可按上方治諸風皮膚瘙癢之劑治中風滿身刺痛當歸川芎白芍懷生地防風荊芥蔓荊子蟬退麥門冬治中風左癱右瘓遍身筋骨疼痛者陳皮去白一錢半夏薑炒一錢白茯苓一錢當歸酒洗一錢川芎八分赤芍一錢蒼朮泔浸炒一錢白朮一錢二分烏藥一錢枳殼一錢桔梗八分手有病方用黃連酒炒一錢半黃芩酒炒一錢白芷九分防風八分羌活一錢甘草五分身痛加薑黃一錢上銼生薑五片水煎服腳癱加防己牛膝威靈仙按上方治中風癱瘓疼痛者宜之延齡固本丹滋補之聖藥也治五勞七傷諸虛百損顏色衰朽形體羸瘦中年陽事不舉精神短少未至五旬鬚髮先白並左癱右瘓步履艱辛腳膝痠痛小腹疝氣婦人下元虛冷久無孕育菟絲子酒洗慢爛搗餅曬乾四兩肉蓯蓉酒洗四兩甘枸杞子二兩人參二兩川巴戟酒浸去心二兩懷山藥二兩白茯苓去皮二兩木香二錢懷牛膝去蘆酒洗二兩柏子仁二兩遼五味子二兩覆盆子一兩半川杜仲去皮酒炒二兩地骨皮一兩半老川椒一兩懷生地黃酒洗二兩山茱萸酒蒸去核二兩車前子一兩半麥門冬水泡去心二兩天門冬水泡去心二兩澤瀉去毛一兩遠志甘草水泡去心一兩懷熟地黃酒蒸黑二兩石菖蒲去毛一兩虎脛骨酥炙二兩上共為細末酒糊為丸如梧子大每百丸空心溫酒送下婦人加當歸赤石脂各一兩去麥門冬木香按上方治中風諸病收功保後之良劑也傷寒挾內傷論夫傷寒者仲景而下著述紛然未有定論大率自霜降後至春分前感寒而即發從足太陽膀胱經鬱熱以次而傳陰經或太陽不傳陽明胃少陽膽而即傳少陰腎或不由陽經而直入陰經或二陽三陽同受而為合病或太陽膀胱陽明胃先後受而為並病或太陽膀胱與少陰腎陽明胃與太陰脾少陽膽與厥陰肝陰陽俱受而為兩感之類此皆感而即病仲景立法所治之傷寒也其不即病而寒毒藏於肌膚之間至春變而為溫夏變而為暑或將發而復感暴寒此是不即發之溫病也暑熱病也若本無冬月所受之邪而春夏自感暴寒之類此皆後人通謂之四時傷寒也若只外感而無內傷者用仲景法其本因飲食勞倦所傷然氣虛邪襲每感寒而顯表症此乃所謂挾內傷之傷寒也但傷寒挾內傷者十居八九經曰邪之所湊其氣必虛補中益氣湯從六經所見之症加減用之補中益氣湯治內傷挾外感者用此湯為主從六經所見之症加減用之黃耆蜜水炒人參白朮去蘆炒當歸陳皮柴胡升麻甘草炙上銼一劑生薑三片棗一枚水煎溫服如見太陽症頭項痛腰脊強加羌活藁本桂枝如陽明症身熱目痛鼻乾不得眠加葛根倍升麻如少陽症胸脅痛耳聾加黃芩半夏川芎倍柴胡如太陰症腹滿嗌乾加枳實厚朴如少陰症口燥舌乾而渴加生甘草桔梗如厥陰則煩滿囊縮加川芎如變症發斑加葛根玄參倍升麻內傷挾痰加半夏竹瀝仍入薑汁傳送傷寒要方脈傷寒熱病宜洪大忌沉細神授太乙散治四時感冒時令不正之氣頭痛發熱惡寒咳嗽喘急口乾作渴並傷寒夾食夾氣胸膈滿悶肚腹脹痛不問陰陽兩感時常發散皆可服之紫蘇陳皮香附川芎白芷乾葛羌活升麻赤芍枳殼甘草上銼作劑生薑三片蔥白三根水煎熱服冬月加麻黃無汗亦加之頭痛加細辛石膏蔥白胸膈膨悶加桔梗心腹脹滿加枳實半夏潮熱加柴胡黃芩咳嗽加桔梗桑白皮痰盛加半夏瓜蔞仁嘔逆加藿香砂仁泄瀉加白朮茯苓腹痛加白芍煨冷氣痛加玄胡索吳茱萸大便祕澀加大黃芒硝咽喉痛加桔梗牛蒡子羌活沖和湯治春夏秋非時感冒暴寒頭痛發熱惡寒無汗脊強脈浮緊此足太陽膀胱受邪是表症宜發散不與冬時正傷寒同治法此湯非獨治三時暴寒春可治瘟夏可治熱秋可治濕治雜病亦有神也可代麻黃桂枝湯大青龍湯各半湯乃太陽經神藥也又名神解散蒼朮米泔浸一錢羌活二錢防風一錢半川芎一錢白芷一錢黃芩一錢生地黃一錢細辛三分甘草三分上銼生薑三片棗一枚蔥白一根水煎發汗用熱服止汗用溫服胸中飽悶加枳殼桔梗去生地黃夏月加石膏知母作渴亦加之如服此湯不出汗加蘇葉喘而惡寒身熱加杏仁生地黃汗後不解宜要服汗下兼行加大黃其三時感冒非時暴寒亦有頭痛惡寒身熱脈浮緩自汗宜實表去蒼朮加白朮汗不止加黃耆即加減沖和湯再不止以小柴胡湯加桂枝芍藥立止人參敗毒散治傷寒頭痛壯熱惡寒及風痰咳嗽鼻塞聲重心經蘊熱口舌乾燥加黃芩如諸般瘡毒腫痛去人參加荊芥防風連翹金銀花名荊防敗毒散柴胡桔梗羌活川芎茯苓枳殼前胡獨活人參甘草生薑薄荷煎服按上方治傷寒初起頭痛發熱身痛或服前發表藥或有汗或無汗未解宜服此解表裡之熱即愈小柴胡湯治肝膽症寒熱往來或日晡發熱或濕熱身熱默默不欲食或怒火口苦耳聾咳嗽發熱脅下作痛甚者轉側不便兩脅痞滿或咳嗽痰喘或泄瀉或吐酸食苦水或因怒而患瘧痢等症柴胡黃芩半夏人參甘草薑棗煎服煩躁加麥門冬淡竹葉嘔吐加陳皮竹茹薑汁左脅痛加青皮右脅痛加薑黃痰多加貝母瓜蔞寒熱如瘧加官桂口渴飲水加知母石膏天花粉口乾不飲水加人參麥門冬五味子結胸痞滿加枳殼桔梗發熱煩渴小便不利大便泄加四苓散或因熱多者加炒黃連白芍腹痛倍之若腹痛惡寒去黃芩加炒白芍官桂若血虛發熱至夜尤甚加當歸川芎白芍生地若口燥舌乾津液不足去半夏加天花粉麥門五味若內熱甚錯語心煩不得眠合黃連解毒湯內熱甚惡熱煩渴飲水者去半夏合白虎湯按上方治傷寒用前發表之藥或有汗無汗未解宜服此治足少陽膽經受症耳聾脅痛寒熱嘔而口苦脈來弦數屬半表半裡宜和解此經膽無出入有三禁不可汗下利小便也白虎湯治傷寒大汗出後表證已解必煩渴欲飲及吐或下後七八日邪毒不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩渴飲水數升者三陽合病腹滿身重口燥面垢譫語發黃厥逆自汗和解兩感解頭痛止自汗或傷風自汗桂枝湯症表未解半入於裡中暑自汗脈虛弱雜病時疫煩渴發斑兼小兒痘疱瘡疹伏熱石膏四兩知母一兩半甘草一兩炙粳米一合上每銼五錢水一鍾煎六分去渣溫服無時候日進二四服或咳或嘔加半夏橘紅半兩生薑煎服傷寒發汗未解脈浮者加蒼朮名蒼朮白虎湯傷寒或汗或吐下後煩渴口乾舌燥脈洪大加人參半兩名人參白虎湯傷寒下後自汗虛熱不已加蒼朮人參一服通神汗止身涼此通仙之妙也傷寒汗下之後自汗虛熱不退不問有汗無汗加蒼朮解之又加人參亦妙正傷寒或濕熱病若胸脅之間見紅點者發斑加人參名化斑湯或再加玄參此藥立夏後立秋前可服春時秋後並亡血虛家並不可服不惡寒反惡熱大便閉者亦可服按上方治傷寒發汗後大渴飲水者宜之六一順氣湯治傷寒熱邪傳裡大便堅實口燥咽乾怕熱譫語揭衣狂妄揚手擲足斑黃陽厥潮熱自汗胸腹滿硬繞臍疼痛等症並皆治之可代大小承氣調胃承氣三乙承氣大柴胡大陷胸等湯之神藥也黃芩柴胡芍藥枳實厚朴大黃芒硝甘草上先將水二鍾滾三沸後入藥煎至八分臨服入鐵鏽水三匙溫服如潮熱自汗譫語發渴揚手擲足揭衣狂妄斑黃便實俱屬正陽明腑病依本方口燥咽乾大便實者屬少陽依本方如下利純清心下硬痛而渴者屬少陰依本方如怕熱發渴譫妄手足乍冷乍溫大便實者陽厥症屬厥陰依本方舌卷囊縮者難治須急下之若譫語發渴大便實繞臍疼痛者有燥糞依本方熱病目不明謂神水已竭不能照物病已篤矣須急下依本方如結胸症心下硬痛手不可近燥渴譫語大便實者依本方去甘草加桔梗甘遂凡傷寒過經及老弱並血氣兩虛之人或婦人産後有下症或有下後不解或有表症尚未除而里症又急不得不下者以此湯去芒硝下之按上方治傷寒熱傳於裡譫言妄語大便閉結者宜之桃仁承氣湯治熱邪傳裡熱蓄膀胱其人如狂小水自利大便黑小腹滿痛身目黃譫語燥渴為蓄血症脈沉有力宜此下盡黑物則愈未服前而血自下者為欲愈不必服桃仁桂枝大黃芒硝甘草柴胡青皮枳實芍藥當歸生薑煎服按上方治熱邪傳裡其人如狂小便利大便黑小腹痛此蓄血症宜之黃連解毒湯治傷寒大熱不止煩躁口乾口渴喘滿陽厥極深蓄熱內甚及汗吐下後寒涼諸藥不能退其熱者如腹滿嘔吐欲作痢者加半夏厚朴茯苓各二錢生薑煎服黃連黃芩黃柏梔子炒各二錢加柴胡連翹各一錢銼劑水煎按上方治傷寒大熱不止反汗吐下後諸藥不能退其熱者宜之凡治傷寒前方治之略而詳矣今又有簡易諸方不忍棄之姑備以便採用行軍散治傷寒緑豆麻黃各一升雄黃三錢共為末每服一錢重者二錢無根水下走出汗愈燒褌散治女子病新瘥與男子交者名曰陰易其症則裡急胯痛頭重不舉目中生花或頭面烘熱耳中蟬鳴胸中煩悶甚者百節解散用男子舊褌襠著在左腹者剪取一塊燒灰每日三服白湯下男子病則用女人褌襠如不應用參附湯治傷寒溫疫頭痛發熱身痛無汗周少源驗生薑細茶核桃仁去殼帶皮研爛白砂糖各三錢上四味同入砂罐內水煎溫服被蓋出汗一方無白砂糖用蔥白等分水煎服治傷寒無汗或日久汗不出者甜梨一個生薑一塊同搗取汁再入童便一碗重湯煮熱服之即汗但有頭痛發熱或憎寒身痛即表汗出而已治傷寒不得汗出用樟樹白皮搗爛炒熱絹中包烙渾身上下一時汗即出而愈治傷寒多日不出汗白蜜一小盞好黃酒一鍾同煎極熱服當時汗出治傷寒結胸聲啞白果去殼搗爛入蜜調和重湯煮成塊頻頻服之茶下治傷寒時氣熱極狂亂者及發熱不退雞子清一個白蜜一大匙芒硝三錢涼水調服如心下不寧者北人謂之心慌是也加珍珠末五分同服治傷寒熱極發狂不認親疏燥熱之極長垣成都憲方熊膽一分研末淨水調服立已治傷寒痰厥昏迷不省人事先以皂莢燃煙入鼻有嚏可治無則不治肺氣上絶也可治者隨用皂莢半夏白礬生上為末共一錢半入薑汁調服探吐痰去即蘇薑尉法治傷寒胸膈不寬一切寒結熱結水結食結痞結痰結支結大小結胸痞氣結者俱用生薑搗爛如泥去汁取渣炒熱絹包漸漸揉尉心胸脅下其滿痛豁然自愈如薑渣冷再入薑汁再炒再尉熱結不用炒治傷寒因食熱物補住結胸有痰有熱並咳嗽失音黃連解毒湯加蘇子白芥子枳實桔梗杏仁烏梅瓜蔞仁石膏共十二味治傷寒五四日頭痛壯熱胸中煩痛口渴苦參一兩黃芩五錢乾生地黃二兩水煎服治傷寒伏熱譫語溫病大熱狂言白頸蚯蚓味鹹氣寒無毒取須鹽水洗淨搗爛絞汁井水調下立差小水不通亦搗汁飲蠱毒卒中須浸酒吞治傷寒濕𧈟方黃連生薑各一兩艾葉八兩苦參四兩水煎服治熱病有𧈟上下食人豬膽一枚苦酒一合同煎二兩滿日飲之蟲立死即愈甘露散治傷寒時氣作熱發狂及解五毒治煩熱寒水石石膏甘草炙為末新汲水入薑汁調服獨參湯治傷寒汗下後不解或投藥錯誤致患人困重垂死昏沉或陰陽二症不明七日以後皆可服好人參一兩銼片水二鍾煎至一鍾半溫服病人喜冷以新水沉冷服之渣再煎服連進數服至鼻尖上潤汗出是其應也此藥不拘男婦傷寒時氣疫症二七三七不解不知人事者並治治傷寒頭痛發熱口乾屢服發表解肌之藥罔效而日晡發熱尤甚或時日輕重此陰虛而火動也宜六味地黃丸方見補益依本方作湯加酒炒黃柏知母服之立效傷風夫傷風乃四時之失序也或表風中在經絡中隨往流注以日傳變或咳嗽黏痰鼻塞聲重憎寒發熱頭痛面赤四肢逆冷怕寒或無汗惡寒宜散有汗惡風解表而治受病亦有不同者且風為天地浩蕩之氣四時八風之變未嘗無也外感傷風鼻塞聲重左脈浮緩者是芎芷香蘇散川芎一錢白芷一錢薄荷八分蘇葉八分香附一錢陳皮一錢羌活一錢甘草五分加荊芥防風各七分名荊防芎蘇散上銼一劑生薑三片蔥白三根水前熱服有痰加半夏茯苓咳加杏仁桑白皮消風百解散治四時感冒頭痛發熱咳嗽鼻塞聲重喘急等症蒼朮荊芥麻黃白芷防風甘草生薑蔥白煎熱服如咳嗽加烏梅同升麻葛根湯同服三拗湯治感冒風邪寒冷鼻塞聲重語音不出咳嗽痰涎胸膈短氣喘急甘草生麻黃不去節杏仁不去皮尖各二錢生薑三片水煎熱服加荊芥桔梗名五拗湯發汗散治傷風寒生緑豆一兩去皮麻黃八錢去節二味為末每服壯者一錢半次者一錢無根水調服出汗追風散治傷風感冒頭痛發熱古石灰緑豆粉鬧陽花各等分鬧陽花一名落羊花即黃春蓼花即羊躑躅花根名搜山虎治大風疾上為末每少許吹兩鼻一二次愈一治傷風寒後餘毒未散上攻頭頸鼻塞聲重怒氣上攻時常有血從腦上落至口中或出紅痰此陽道未利作梗非血症病也防風五分川芎七分辛荑五分薄荷五分羌活三分獨活七分升麻六分葛根七分白芷四分藁本四分黃芩酒炒八分甘草生用四兩上銼一劑生薑一片水煎食遠溫服清陽道以通利關竅然後可以養正也次服人參養榮湯人參四兩白朮六分白茯苓四分當歸酒洗四分川芎四分白芍七分熟地黃六分麥門冬去心二分五味子六粒黃柏酒炒三分遠志四分陳皮三分甘草上銼一劑生薑棗子水煎溫服中寒附陰症寒者嚴凝殺厲之氣也人以腎為根本惟腎則受寒惟寒則傷腎腎氣一虛寒邪交作急痛拘攣戰掉強直昏迷厥冷口噤失音此中寒也無汗惡寒頭疼面慘發熱拘急手足微冷此感寒也霍亂轉筋洞泄下利乾嘔吐逆積飲停痰此寒邪入腸胃也或為疝瘕或為腳氣痿痹或為腰膝冷痛或為虛勞陰痿或小腹急痛皆寒邪所為也惟腎氣不充疏於謹護非特霜凝冰泫之謂寒或者炎天暑月當風取涼臥地受冷使寒邪之氣自皮膚而達經絡自經絡而入腑臟然後諸病作烏治法中寒者宜溫中禦寒如五積散附子理中湯之類甚則宜蔥尉法更灸氣海一穴在臍下一寸五分關元在臍下三寸各灸五十壯若其他所感變症甚多又當從各症門類而治之如寒中太陰者則中脘疼痛也宜理中湯或藿香正氣散合理中湯同服寒甚脈微手足冷附子理中湯如寒中少陰者則臍腹疼痛以五積散加吳茱萸寒甚脈沉手足冷四逆湯加吳茱萸如寒中厥陰者則少腹小腹至陰疼痛宜當歸四逆湯加吳茱萸甚者必倍用附子五積散治感冒寒邪頭痛身痛項強拘急惡寒嘔吐或腹痛又治傷寒發熱頭痛惡風無問內傷生冷胸膈脹滿外感風寒濕氣客於經絡腰膝痠痛及婦人難産經候不調或血滯不通並治當歸川芎白芍蒼朮厚朴白茯苓半夏白芷枳殼桔梗乾薑官桂麻黃陳皮甘草上銼生薑二片棗一枚水煎溫服足浮腫加五加皮大腹皮已成風痹加羌活獨活防風腰痛加牛膝杜仲小茴手足攣拳加檳榔木瓜牛膝咳嗽加桑白皮杏仁遍身疼痛加乳香沒藥細辛難産加麝香官桂四肢濕痹加烏藥順氣散四逆湯治寒中三陰手足厥冷小腹疼痛脈微欲絶四逆名者四肢逆冷也大附子生去皮臍乾薑甘草當歸四逆湯此厥陰經湯也治感寒手足厥冷少腹至陰疼痛脈細欲絶者當歸桂枝白芍酒炒細辛甘草炙通草各二錢大棗三枚上銼水煎服理中湯治五臟中寒口禁失音四肢強直兼治胃脘停痰冷氣刺痛及治臟毒下寒泄利腹脹大便或黃或白或毒黑或有清穀人參白朮去蘆炒乾薑炒甘草炙各等分薑棗煎服若為寒氣濕氣所幹者加附子一兩名附子理中湯若霍亂吐瀉加青皮陳皮名治中湯若干霍亂必腹作痛先以鹽湯頻服候吐出即進此藥若嘔吐者於治中湯中加丁香半夏生薑十片若泄瀉加橘皮茯苓名補中湯若溏泄不已於補中湯內加附子若不喜飲食米穀不化加砂仁附子陳皮茯苓若霍亂吐下心腹作痛手足厥冷去白朮加附子名四順湯若傷寒結胸先以枳桔湯再不愈及諸吐利後胸痞欲絶心膈高起若急痛手不可近者加枳實茯苓名枳實理中湯若渴者再加枳實理中湯加天花粉渴欲飲水加白朮若霍亂轉筋理中湯加火煅石膏若臍上築者腎氣動也去白朮加桂腎惡燥去白朮恐作奔豚故加官桂若悸多者加茯苓若苦寒加乾薑腹痛去白朮加附子飲酒過多及啖炙煿熱食發為鼻衄加川芎傷胃吐血以此藥能理中脘分利陰陽安定血脈只用本方中附子毒者亦用本方或止甘草乾薑等分煎服仍以黑豆煎湯解之陰毒傷寒脈必沉伏宜以桂枝甘草乾薑附子辛甘之劑仍灸關元氣海令陽氣復回若服前藥加之灼艾脈轉沉伏者死正陽散治陰毒傷寒面青心硬四肢冷薑附甘草麝香皂莢引入厥陰經也水煎熱服祕方治男子陰症傷寒因女色者唇黑甲青四肢冷陰縮入腹腹痛不可忍者大附子一枚要一兩重者麵包火煨去皮臍二錢人參二錢乾薑炮一錢半水煎熱服藿香正氣散方見霍亂治陰症硫黃化開傾入井水內取出為末飯為丸如梧子大每服一錢溫酒送下治陰症腹痛陰縮用朝腦二錢滾酒和服傅明岐傳黑豆酒治陰症黑豆不拘多少鍋內炒熟乘熱以好酒淬之就令碗蓋勿令泄氣候溫飲酒大效治陰毒傷手足逆冷脈息沉細頭痛腰重兼治陰毒咳逆等症川烏頭乾薑各等分為粗散炒令轉色放冷再搗為細末每一錢水一盞鹽一撮煎取半盞溫服回陽散治陰症腹痛身冷硫黃四分胡椒六分為末每三分燒酒調服治陰症用魚鰾一根燒存性胡椒四十九個為末黃酒調下按上方皆治中寒陰症宜對症選用固陽膏治因女色成陰症白礬生三錢黃丹二錢乾薑五錢母丁香十個胡椒十五個上為末用醋和得所以男左女右手握藥搽臍上被蓋出汗即愈尉法治三陰中寒一切虛冷厥逆嘔噦陰盛陽虛及陰毒傷寒四肢厥冷臍腹痛咽喉痛嘔吐下利身背強自汗脈沉細唇青面黑諸虛寒等症蔥細切麥麩各三升鹽二升同水和勻分作二次炒令極熱用重絹包之乘熱尉臍上冷更易一包其蔥包既冷再用水拌濕炒焦依前用之至糜爛不用別取蔥麩日夜不住尉之如大小便不通用此亦可以行其勢治陰症將磚燒紅噴醋在上衣包入被中熏之或燒熱瓦噴醋紙包尉胸背四肢已上皆取汗之法也治陰症小便縮入腹內用極肥母雞一隻用利刀將脊上急急劈破用手扯開連毛帶屎合於病人腹臍上令女人腳踹雞上須臾熱透小便自出治冷陰如神一錢白礬八分丹二分胡椒細細研焰硝一分共四味釅醋調和手內攤男左女右合陰處渾身是汗濕衣衫此方用者如神效不義之人不可傳治急冷陰外治法乾薑一兩牡蠣一兩為細末以熱酒調稠搽手上男子用雙手揉外腎擦熱仍按外腎汗出即已女人以男子手擦藥急按兩乳仍揉擦熱汗出則愈治陰症極效方芥菜子七錢乾薑三錢為末水調作一餅貼臍上手帕縛住上放鹽以尉斗尉之數次汗出為度又將病人小便扳陰莖往上盡灸陰頭處用艾灸七壯神效灸陰毒腹痛脈欲絶者先以男左女右手足中指頭盡處各灸三壯又灸臍上一寸五分名氣海穴三寸名關元穴各灸七壯極效治緊陰症胡椒乾薑各二錢為細末唾津調塗自己手心綿紙蓋按陰戶上側臥效緊陰及大小便不通小芥子半碗為末黃丹一撮臘醋燒滾調糊攤臍上紙蓋住如火熱不妨以一炷香為度將藥去了青布沾水淳之如忍的不用水按上方治陰症外治之法宜對症選用瘟疫瘟病發熱忌脈反小夫瘟病者衆人病一般乃天行時疫也治有三法宜補宜散宜降然瘟疫者有三因治法當推歲運惟冬陰之病非其時而有其氣者冬氣當閉藏而返泄於外非其時矣其脈左寸浮大於右寸浮緩而按之無力宜補帶表可也凡入病家須避其邪氣不使染著為上之亦醫人之惠不可不知以雄黃末塗鼻內或以麻油塗鼻孔中後入病家則不相傳染既出以紙捻探鼻深入令嚏之為佳常以雞鳴時心中念四海神名三七遍鬼祟皆除東海神阿明南海神祝融西海神巨乘北海神禹強每入病人室存心念三遍口勿誦治四時瘟疫頭疼發熱衆人病一般者黑沙糖一盞入真生薑汁二盞化開服之當時憎寒壯熱汗出立已治感瘟疫發腫黑豆二合炒令香熟甘草上水煎時時呷之治瘟疫百病皆是大熱之症不可妄用熱藥天靈蓋數年白者用雄黃為末醋調搽上內外抹之涼干每用童便或解毒湯大涼藥將天靈蓋磨濃服之立效按上單方治瘟疫皆效加減敗毒散主方治天行瘟疫頭面腫盛咽喉不利舌乾口燥憎寒壯熱時氣流傳防風荊芥羌活獨活柴胡前胡升麻乾葛赤芍川芎白芷薄荷牛蒡子甘草薑蔥煎出汗按上方治瘟疫發表敗毒之劑牛蒡芩連湯治瘟疫腫項面土名大頭瘟又名豬頭風病從耳根下起兼治啞瘴黃連薑汁炒二錢半黃芩酒洗二錢半桔梗一錢半甘草一錢連翹一錢牛蒡子炒一錢玄參一錢大黃酒蒸一錢羌活五分荊芥五分防風五分石膏一錢半銼一劑薑煎食後頻頻溫服時時呷之每一劑作二十餘次服常令在上毋令飲食在後也二聖救苦丸治天行瘟疫傷寒頭面頸項腫大一切大熱之症大黃酒蒸四分牙皂二兩共為末稀糊為丸緑豆大每五七十丸冷緑豆湯下大汗為效治時行腫項大頭病蛤蟆瘟內府仙方大黃四兩殭蠶二兩加蟬退六錢半薑黃二錢半上為細末薑汁打糊為丸每重一錢大人服一丸小兒服半丸蜜水調下五仙丹司寇黃蒼嶽傳治時行瘟疫頭項腫痛一切等症大黃五兩銼碎用巴豆二十四粒槌去油用童便一鍾酒醋各一鍾鹽五錢入巴豆霜在內攪勻入大黃內拌勻久蒸如墨曬乾苦參五兩另為末和勻童便酒醋鹽水為丸如梧子大每服五六十丸白湯下按上方治瘟疫發表攻裡敗毒之劑發汗散治四時寒疫蒼朮四兩麻黃去節二兩甘草炙二兩牙皂四兩上為末每服三錢水一盞煎一二沸不拘時和渣溫服按上方治四時寒疫流行可合以救濟貧民治時疫熱病狂言心躁結胸垂死徐達齊苦參五錢銼散水煎溫服連進二三服有汗無汗皆瘥一以酒煎服亦可闢穢丹乳香蒼朮細辛甘松川芎降真香上為末烈火焚之辟邪瘴氣天下以東南地暖而西北地寒咸謂東南有瘴氣愚謂士大夫遊宦四方謂水土不服則可若兩廣山峻樹茂水惡地濕漚熱甲於天下所以有瘴病時作仕宦初到及商賈住此方多為濕熱所苦宜常預服理脾卻瘴湯遊宦四方水土不服常用此方任兩廣尤宜多服蒼朮米泔浸鹽水炒八分白朮去油蘆炒一錢白茯神去皮炒一錢陳皮一錢半夏薑汁炒一錢黃連薑汁炒一錢山梔仁炒一錢前胡七分神麯炒八分山楂肉去核一錢甘草五分上銼一劑生薑三片水煎溫服不拘時一日一服或間日一服可免瘴病何也蒼白朮去濕二陳化痰芩連清熱化毒楂曲消食理脾百病自去矣更戒酒色慎起居為宜養正祛邪丸預製此丸途中可服白朮去油蘆炒二兩蒼朮米泔水浸炒一兩枳實麩炒一兩橘紅一兩山楂去核一兩神麯炒一兩黃連薑汁炒七錢黃芩酒炒七錢山梔仁炒五錢上為細末淡薑湯煮米糊為丸每百丸白湯下以上二方乃闢瘴之劑可服於未病之先若既病之後宜以後方並前瘟疫方對症選用不換金正氣散治四時傷寒瘟疫時氣及山嵐瘴氣寒熱往來霍亂吐瀉下痢赤白瘧疾寒熱或出遠方不伏水土並治之蒼朮米泔浸炒陳皮厚朴去皮薑炒藿香半夏薑炒甘草上銼薑棗煎服頭痛加川芎白芷感寒腹痛加乾薑官桂潮熱加柴胡黃芩嘔逆加丁香砂仁口燥心煩加柴胡乾葛氣塊加三稜枳實檳榔小茴冷瀉不止加木香訶子肉豆蔻熱極大便不通加大黃芒硝瘧疾加常山檳榔草果腹脹加香附枳殼白豆蔻痢疾加黃連枳殼去甘草胸脅脹滿加枳實砂仁莪朮咳嗽加桔梗杏仁五味子兩足浮腫加木瓜大腹皮五加皮喘急加麻黃蘇子桑白皮濕加白朮茯苓名除濕湯身體疼痛加麻黃桂枝赤芍濕症聲啞加石菖蒲寒症聲啞加桂加味柴胡湯治挾嵐瘴溪源蒸毒之氣其狀血乘上焦病欲來時令人迷茫甚則發躁狂妄亦有啞不能言者皆由敗血瘀心涎毒聚於脾經所致柴胡黃芩半夏人參枳殼大黃甘草上銼薑棗煎空心服啞瘴食後服蠱毒丹溪曰蠱之為毒中土少見之有百餘相傳多是閩廣深山之人端午之日以蜈蚣蛇蟆三物同器貯之聽其相互食啖候一物獨存者則為之蠱欲害其人密取其毒於酒食中啖之若中其毒者令人心腹絞痛如蟲咬吐下血皆是爛肉若不即治食人五臟即死然以毒中人有緩有急急者數日便死緩者待以歲月氣力羸則食盡五臟而後死死則其毒流注旁人亦成蠱症大抵試蠱之法令人咳嗽水中沉者是浮者非也又令嚼生黃豆不覺腥者蠱豆皮脫爛者蠱噙白礬味甘不澀者蠱凡中蠱毒不論年月遠近煮雞卵去殼以小銀叉一隻插其中並含入口飲傾取視叉卵俱黑者是凡閩廣深山之人以蠱行毒於人者以敗鼓皮燒灰米飲服方寸匕須臾自呼蠱家姓名令呼喚將去其病自愈千金錠子解蠱毒兼治瘴氣百病百般瘡毒皆能奏效文蛤去內蟲三兩山慈姑二兩紅芽大戟一兩五錢硃砂二錢雄黃二錢麝香二錢另研續隨子即千金子壓去油一兩另研上為末用糯米粥為丸搗千下印成錠子四十個端午日含為妙每服半錠涼水磨服及搽患瘡上治一切藥毒蠱毒瘴氣瘧疾及自縊溺死驚死未經宿心頭溫者磨水灌入即蘇中風百病熱酒服小兒蜜水磨服闢蠱用荸薺果俗名地栗須用江南所産大者切曬為末常隨身每以白湯調二錢匕傳聞下蠱之家知有此物便不敢使其術矣治瘴毒用犀角尖羚羊角水磨濃服之解蠱毒咒凡入蠱毒人家才入先默念咒三遍或七遍父為䮝麚蟲母為羅蛇女眷屬七千人吾盡識得汝上入門默通蠱毒萬福之一服從左手宜上數屋椽一遍卻低頭如有茶酒食物來即左手潛入衣服曳取陰毛堇於盤內私歸就主如前默念咒三遍如有藥盤上自有蟲物出來卻得黏毛以擊之方知本主自中凡入有毒之鄉飲食內先以犀角攪試有毒即白沫起無沫即無毒也傷暑潔古曰靜而得之為中暑動而得之為中熱中暑者陰症中熱者陽症傷暑與傷寒俱有熱若誤作傷寒治之則不可蓋寒傷形熱傷氣傷寒則外惡寒而脈浮緊傷暑則不惡寒而脈虛此為異耳經云脈盛身寒得之傷寒脈虛身熱得之傷暑治宜小柴胡湯渴加知母石膏或人參白虎湯天久淫雨濕令大行蒼朮白虎湯若元氣素弱而傷之重者清暑益氣湯治之脈虛身熱得之傷暑清暑益氣湯主方治長夏濕熱蒸人人感之四肢困倦精神短少懶於動作胸滿氣促肢節疼痛或氣高而喘身熱而煩心下膨悶小便赤而數大便溏而頻或痢或渴不思飲食自汗身重黃耆蜜炒蒼朮泔浸升麻各一錢人參白朮去油蘆炒神麯炒陳皮葛根澤瀉各五分當歸麥門冬去心黃柏酒炒青皮炙甘草各三分五味子九個作一劑水煎服按上方治暑傷元氣以致諸病四肢困倦者宜之香茹散治伏暑引飲口燥咽乾或吐或瀉加黃連名黃連香茹散川厚朴去皮薑炒白扁豆微炒香茹銼一劑水煎服若卒中昏冒倒僕角弓反張不省人事手足或發抽搐此為暑風不可作風治之當以黃連香茹散加羌活服之自然愈矣春澤湯治伏暑發熱煩渴引飲小便不利兼治傷寒陰陽不分疑似之間最宜服之豬苓二兩澤瀉三錢白朮二錢茯苓二錢肉桂一錢人參一錢柴胡一錢麥門冬一錢半上銼每服七錢燈心二十根煎服渴甚去桂加五味子黃連各二錢此方去人參柴胡麥門冬即五苓散小柴胡湯方見傷寒治伏暑發熱汗渴暑入心包不語加茯苓益元散治中暑身熱小便不利此藥性涼除胃脘積熱解一切熱病白滑石水飛六兩大粉草微炒一兩共為末每服二三錢加蜜少許熱湯冷水任下如欲發汗以蔥白豆豉湯調下上為末用生蜜搗為丸彈子大每服一丸涼水研化服尤妙按上方治中暑諸病宜對症選用發熱惡寒身重疼痛小便澀灑然毛聳手足逆冷小有勞身即熱口開前板齒燥脈弦細虛遲表裡中暍也用補中益氣湯加香茹扁豆有熱加黃芩方見內傷注夏屬陰虛元氣不足夏末秋初頭痛腳軟食少作倦作熱脈弦而大宜補中益氣湯去柴升加炒柏如挾痰加南星半夏以陳皮佐之或生脈散蓋補天真氣氣之不足爾生脈散生津止渴養元氣壯氣力人參麥門冬去心遼五味子各等分上銼水煎夏月時時代熟水飲之孫真人曰夏月必服五味子以補五臟氣東垣曰夏月服生脈散加黃耆甘草令人氣力湧出泄瀉加白朮微炒千里水葫蘆暑天長途含化一丸津液頃生寒香滿腹枇杷葉臘梅花百藥煎烏梅肉乾葛甘草俱一兩各為末黃蠟五兩上先溶蠟開投蜜一兩和藥末搗千下丸如雞頭實大每一丸含化征途望梅丸祛暑熱解煩渴川百藥煎三兩人參二錢麥門冬去心烏梅肉白梅肉乾葛甘草各五錢上為細末麵糊丸如雞頭實大每服一丸含化夏月出行一丸可度一日凡人夏月沖斥道途或於田野中務農作勞或肥白氣虛之人不能抵當暑熱忽然昏悶暈僕其氣將絶如在日中即當移病者於陰處徐徐以溫湯水灌之如未醒急灸氣海穴以復其元氣醒後以大劑滋補之藥補之切不可灌涼水即死小柴胡湯人參白虎湯蒼朮白虎湯俱見傷寒濕症濕有自外入者有自內得者陰雨濕地皆從外入治宜汗散久則疏通滲泄之食生冷濕面潼酪或飲酒其症腫滿皆自內而出也宜實中淡味滲泄利小便其脈沉而細其自下起以重腿腳氣者亦當汗散滲濕湯治坐臥濕地或為雨露所襲身重腳弱關節疼痛發熱惡寒或多汗惡風或小便不利大便溏瀉人參一錢白朮去油蘆炒三錢白茯苓五分白芍酒炒一錢乾薑炮一錢桂枝五分大附子炮去皮三分炙甘草五分薑棗煎服除濕羌活湯治風濕相搏一身盡痛蒼朮米泔水浸炒藁本各一錢羌活七分防風升麻柴胡各五分上銼一劑水煎溫服五積散方見中寒治寒濕客於經絡腰腳痠痛渾身麻木四制柏術丸滋陰降火開胃進食盡除周身之濕川黃柏去皮四斤銼成片酥炙十三次一斤乳汁浸十三次一斤童便浸十三次一斤用米泔浸十三次一斤無油蒼朮成片米泔浸切一斤用川芎椒炒四兩破故紙炒四兩五味子炒四兩川芎炒四兩上去四味同炒之藥只用蒼朮黃柏為末煉蜜為丸如梧子大每服三十丸早酒下午茶下晚白湯下薏苡仁粥薏苡仁和米煮粥常食之去濕極效功勝諸藥經驗白朮酒治中濕遍身疼痛不能轉側及皮肉痛難堪者白朮去蘆一兩細切一服無灰老酒一盞半煎至一盞溫服積熱積熱者熱毒蘊積於內也人有體氣素實一時感觸熱毒之氣或鬱積於臟腑之間令人口苦咽乾涎唾稠黏眼澀多淚口舌生瘡大小便祕結又有陰盛血衰三焦已燥服餌酒炙之物並丹石之藥愈助其熱結滯於內亦服令人變生諸熱須詳脈症若結於心隔者清之散之結於臟腑者蕩之滌之量體氣虛實輕重用藥治之黃連解毒湯治諸般積熱實火大效見傷寒錢半散治一切諸熱紅痢裡急後重臟毒下血糞前糞後酒毒膈熱肚痛赤眼四肢煩熱及諸熱結核瘡毒黃芩二兩連翹一兩梔子二兩芒硝一兩薄荷葉三兩黃連二兩一半生一半酒炒大黃三兩半生半酒炒粉草上為細末每服一錢半食後茶調下三黃丸治男女三焦積熱上焦有熱攻衝眼目赤腫頭項腫痛口舌生瘡中焦有熱心膈煩躁不煩美飲食下焦有熱小便赤澀大便閉結五臟俱熱即生癰癤瘡痍及治五般痔疾糞門腫痛或下鮮血黃連黃芩大黃各二兩上為細末煉蜜為丸如梧子大每三十丸熟水下如臟腑壅實倍加丸數小兒積熱亦宜服之黃金丸治積熱積痰並三焦五臟有餘之熱挾熱下痢食痞膈悶咽痛眼目赤腫中暑中熱煩躁等症及發腫毒皆治大黃火煨鬱金牙皂去筋膜各等分上為細末煉蜜為丸梧子大每服三五十丸量病輕重加減白湯下大便少去一二次即止不傷元氣碧雪膏一切積熱口舌生瘡心煩喉閉並治芒硝朴硝硝石馬牙硝石膏寒水石青黛各等分甘草煎湯二升上將甘草湯入諸藥再煎用大柳棍不住手攪令硝溶入青黛等項沙盆內候冷結凝成霜研為末每用少許含化咽津下一方加硼砂祕傳玄明粉方治上焦邪熱咽喉腫痛牙痛傷寒誤補大潮大熱聲啞不出胸膈作痛鼻衄吐血痰火壅盛癲狂譫語實熱之症黃連解毒湯加連翹石膏澤瀉大黃枳殼薄荷赤苓玄參赤芍牡丹皮桔梗防風荊芥各等分上大合六劑水八碗煎七碗去渣入皮硝一斤先澄過入藥鍋內煎至干將干時須慢火划起入新砂鍋內用新燈盞一個蓋住入水在盞內頂火煅乾水三盞為度取出放地上出火毒研末入甘草五分每二錢茶清下人中黃散治瘢瘡痘疹疔腫癰疽諸般惡毒及中砒毒菌毒傷寒發狂言並治五月初四日預選甘草不拘多少為細末卻用大竹一段兩頭留節鑽一頭作小孔入甘草末在內其孔用木塞勿令泄氣至端午日置糞缸中以磚墜竹至底四十九日取出長流水洗淨候乾燥再研細收貯磁器內如遇痘疹見苗每服一錢淡砂糖調服及諸般惡毒並用砂糖調服大能解毒效不可言牛黃丸治風熱積熱風壅疏積消食化氣導血大解壅滯大黃四兩黑牽牛四兩半生薑炒為末煉蜜為丸如梧子大每十丸茶下如要微動加十五丸痼冷痼冷者腎痼久而冷者也痼久也冷者寒之甚也人之臟腑稟受不同亦或將理失宜遂致偏勝故方中痼冷積熱之説痼冷者中寒也其病多由真陽虛弱胃氣不實復啖生冷冰雪水酪諸寒之物或坐臥陰寒久濕之處日漸侵脫陽氣以致臟腑久痼而冷其為病也或手足厥冷或腹中久痛溏泄無度或腰腿重痛如坐水中或陰痿不舉寒精自出或久嘔吐不進飲食或自汗戰栗或大臍洞泄或小便頻數此皆痼冷之為病也治之當宜溫補腎元健養脾胃祛寒邪固真氣使陽氣得復陰陽和平則無偏勝之患而痰斯愈矣十補湯治諸虛百損一身痼冷人參白朮去蘆炒白茯苓去皮黃耆蜜炙肉桂當歸酒洗川芎熟地黃甘草炙白芍酒炒大附子麵裹火煨生薑棗煎服三建湯治真氣不足元陽久虛寒邪攻衝肢節煩疼腰背痠困自汗厥冷大便滑泄小便白濁及中風痰潮不省人事傷寒陰症厥逆脈微皆可服之烏頭大附子天雄已上俱炮去皮臍各三錢上作一服生薑十片水煎熱服附子理中丸治脾胃冷弱心腹疼痛嘔吐泄利霍亂轉筋體冷微汗手足厥寒心下逆滿腹中雷鳴嘔噦不止飲食不進一切沉寒痼冷並皆治之大附子炮去皮臍人參乾薑炮白朮甘草炙各等分上銼劑水煎溫服或為末煉蜜為丸如梧子大每服四五十丸空心薑湯送下八味丸方見補益治下元冷憊腰膝痠痛體重虛勞內傷消渴痼冷等症
