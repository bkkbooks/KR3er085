屬脾隱隱然在皮膚之間故言癮疹也發則多癢或不仁者是兼風兼濕之殊色紅者兼火化也熱微者赤斑出熱甚者黑斑出赤斑五死一生黑斑十死一生防風通聖散斑疹通治消息隨宜防風當歸川芎麻黃薄荷連翹大黃芒硝各五錢黃芩桔梗石膏各一兩滑石三兩荊芥梔子白朮各三錢甘草二兩白芍五錢上銼水煎服身疼加蒼朮羌活痰嗽加半夏化斑湯治傷寒汗吐下後斑發脈虛人參石膏知母甘草守真加白朮一方加玄參上銼作劑水煎時時服一方用黃瓜水調伏龍肝末服之去紅點斑消毒犀角飲治斑及癮疹牛蒡子四錢荊芥一錢防風一錢甘草一錢犀角一錢黃芩一錢上銼水煎服消斑救苦散治斑症悉具消化便令不出如已出者稀少再不生斑當歸身一錢川芎五錢生地黃三錢乾葛五錢防風五錢羌活五錢細辛一錢藁本五錢連翹五錢柴胡二錢黃芩生一錢酒炒一錢黃連一錢酒黃柏三錢蒼朮五錢白朮一錢陳皮一錢紅花一錢蘇木一錢吳茱萸五分甘草一錢升麻三錢麻黃五錢上銼如麻豆大每服五錢水煎去渣溫服瘧疾瘧脈自弦弦數多熱弦遲多寒弦短者傷食弦滑者多痰弦而緊者宜下浮大者宜吐弦遲者宜溫夫瘧者風暑不正之邪也有一日一發有二日一發有三日一發有間一日連二日發者氣血俱受病有日與夜各發有有汗有無汗有上半日發有下半日發有發於夜者其初發時缺伸畏寒戰栗頭痛或先寒後熱或先熱後寒或單寒單熱或寒少熱多或寒多熱少治法邪從外入當以汗解又以扶持胃氣為本須分別陽分陰分而用藥邪瘧及新發者可散可截虛瘧及久者宜補氣血若過服截藥致傷脾胃則必綿延不休瘧初起頭疼發熱憎寒無汗要有汗散邪為主用散邪湯瘧初起頭疼發熱憎寒有汗要無汗正氣為主用正氣湯瘧已用發表之藥不解此病在半表半裡宜分利陰陽用柴苓湯瘧已發表分利仍不愈可用截藥止之不二飲瘧用前諸藥治之不愈者此病屬內傷元氣脾胃虛弱用補中益氣湯則愈瘧經年諸藥罔效此氣血之大虛也用十全大補湯多服收效凡患瘧熱盛纏久不愈必結癖塊俗云瘧母宜加減柴苓湯多服內有青皮疏利肝邪則癖自不結矣治久瘧腹中有癖用水磨沉香下雄黃解毒丸打下黑血如泥極臭散邪湯治諸瘧初起頭疼無汗或先寒後熱或先熱後寒或寒熱獨作或連日併發或間一日一發並宜服之川芎白芷麻黃白芍防風荊芥紫蘇羌活各一錢甘草三分上銼一劑生薑三片蔥白三根水煎露一宿次早溫服有濕加蒼朮夾食加香附有痰加半夏按上方治瘧初起無汗要有汗散邪為主正氣湯治症同前柴胡前胡白芷半夏麥門冬檳榔草果青皮茯苓川芎各一錢桂枝甘草各三錢上銼一劑生薑三片棗一枚水煎預先熱服按上方治瘧疾有汗要無汗正氣為主治瘧初起五七日以內發者此寒甚也久瘧勿用麻黃桂枝蒼朮陳皮乾葛黃芩甘草生薑三片水煎熱服立已按上方治瘧初起寒氣甚用此發之加減柴苓湯治諸瘧疾不拘寒熱新久皆效柴胡黃芩半夏豬苓澤瀉蒼朮厚朴青皮檳榔草果烏梅甘草上銼薑棗煎服一方去豬苓加茯苓藿香陳皮常山按上方因前發表瘧疾未已用此分利陰陽可愈不二飲治諸瘧常山檳榔要一雄一雌知母去毛貝母各等分上銼每八錢銼一劑酒一鍾煎至八分不可過熟熟則不效露一宿臨發日五更溫服勿令婦人煎藥截瘧如神散周心源驗此方治瘧壯盛者宜之柴胡半夏檳榔黑牽牛各一錢常山一錢二分甘草二分上銼水煎臨服入頭生酒半鍾同服未發前一時服按上方治瘧疾久不愈壯盛人用此一截即愈保元截瘧飲治虛人久瘧黃耆蜜炙一錢人參五分白朮去蘆炒一錢當歸一錢陳皮七分柴胡一錢升麻五分檳榔一錢常山酒蒸一錢知母去毛一錢貝母一錢半夏姜炒一錢甘草炙三分上銼一劑生薑三片棗一枚水煎溫服按上方治瘧久不已用此攻補一截而愈加味益氣湯治人平素不足兼以勞役內傷挾感寒暑以致瘧疾寒熱交作肢體倦怠乏力少氣黃耆蜜炒一錢人參八分陳皮六分白朮去蘆八分當歸八分柴胡一錢升麻三分白芍八分黃芩一錢半夏八分甘草炙五分上銼一劑生薑煎空心服有汗及寒重加桂枝五分倍黃耆熱盛倍柴胡黃芩渴加麥門冬天花粉按上方治瘧久虛用此補中益氣而愈加減十全大補湯治人虛弱久瘧寒熱不多而但微熱者邪氣已無只宜服此黃氏人參白朮白茯苓當歸川芎白芍熟地黃柴胡黃芩陳皮甘草上銼劑生薑三片棗一枚水煎溫服按上方治瘧久用攻克之劑過多以致氣血大虛宜此多服以收全功按瘧疾多因內傷飲食外感風寒所致夫人以脾胃為主未有脾胃實而患瘧痢者若專主發表攻裡降火導痰攻擊截瘧之劑是治其未而忘其本凡此不問陰陽日夜所發皆宜補中益氣湯此不截之截也經年久瘧此血氣太虛十全大補湯久服收功龍虎湯治熱瘧火盛舌卷焦黑鼻如煙色六脈洪弦而緊此乃陽毒而深先以青布摺疊數重新汲水漬之搭於胸上須臾再易如此三次熱勢少退即服此藥柴胡一錢半黃芩一錢半夏七分石膏二錢半知母一錢黃連一錢半黃柏去皮一錢梔子八分粳米五十粒上銼一劑生薑三片棗一枚水煎服按上方治瘧屬實熱者宜之分利順元散治體虛之人患瘧寒多不可用涼藥川烏一兩去皮一半生大附子一兩去皮一半生南星二兩一半生一半炮木香五錢不見火上銼每服四錢生薑十片棗七枚水一盞煎七分當發日早晨連進二三服半生半炮能分解陰陽也按上方治瘧屬虛寒者宜之地龍飲治瘴瘧諸瘧大熱煩躁生地龍三條研入生薑汁薄荷汁生蜜各少許新汲水調服如熱熾加片腦少許治瘧母停水結癖腹脅堅痛芫花炒硃砂上等分為末煉蜜為丸如小豆大每服十丸棗湯送下又方用雄豬前蹄下截入常山三錢煮熟吃湯食蹄立已又方用常山入棗同煮熟只食棗肉效鱉甲飲子治瘧久不愈腹中結塊名曰瘧母鱉甲醋炙黃耆白朮川芎白芍草果檳榔厚朴橘紅甘草上銼一劑生薑七片烏梅少許煎服瘧之為痰有水有血水即水飲也血即瘀血也惟水飲所以作寒熱惟瘀血所以憎寒熱常山逐水利飲固也苟無行血藥品佐助其間何以收十全之功耶繼自今瘧家或衄血或唾血或大便血絲或月候適來適去皆是血症此藥主之常山檳榔草果青皮烏梅桃仁五靈脂甘草生薑蜜同煎服祕方治久瘧不愈一服便止永不發其效如神常山一錢半檳榔一錢丁香五分烏梅一個上銼一劑用好酒一盞浸一宿臨發日清晨飲之海外高僧傳治諸瘧如神番木鱉去殼麩炒一兩雄黃一錢硃砂一錢甘草一錢共為末每服四分臨發預吃飯一碗將水酒調下被蓋睡立愈亦治瘟瘧沿門患瘧相似者殊效治瘧如神牛膝根切一劑水煎未發時先服一半將發時又服一半立止治諸瘧新久不已此方如神蒼朮米泔炒陳皮厚朴姜炒藿香半夏倍麩炒柴胡黃芩青皮茯苓澤瀉檳榔草果烏梅甘草生薑煎未發前一服而瘥效不可言久瘧加常山憎寒加桂枝人體弱加人參如瘧後飲食少進四肢無力面色萎黃用四君子湯合二陳湯加黃連枳實生薑煎服按上諸方皆治瘧經驗者宜對症選用以後外治之法有苦於不肯服藥者用之亦可塞鼻藥治瘧草烏巴豆三個去殼胡椒七個棗子二個上三味為末棗肉為丸如梧子大每用一丸棉花裹男左女右塞鼻孔中於未發之先龍虎丹治瘧端午午時制龍骨虎骨等分水丸彈子大硃砂為衣臨發日預握男左女右手心內蛇退丸治瘧蛇退焙焦研末搗飲作丸將發時塞鼻中男左女右治瘧疾一歲之中長幼相似者名曰疫瘧此法主之神良五神塞鼻丸南方官桂五錢硃砂一錢東方青黛五錢麝香二分北方巴豆四十丸個去殼黑豆三十六粒西方白礬五錢白芷二錢中央硫黃五錢雄黃一錢上件各依方位以磁盤盛之於五月初一日虔誠安於本家侍奉神前至初五日午時共研為末用五家粽角為丸如梧子大陰乾收貯聽用凡遇患瘧之人於瘧發日清晨用綿布包塞鼻中痢疾痢是濕熱及食積三者別赤白青黃黑五色以屬五臟白者濕熱傷氣分赤者濕熱傷血分赤白相雜氣血俱傷黃者食積青黑者濕勝也治法瀉腸胃之濕熱開鬱結之氣消化積滯通因通用其初只是下之下後未愈隨症調之痢稍久不可下胃虛故也痢多屬熱亦有虛與寒者虛者宜補寒者宜溫久年及虛弱之人不可下大便了而不了者血虛數而至圊而不便者氣虛噤口痢胃氣熱胃口熱甚太虛一痢魚腦半生半死下若屋漏水者必亡下若塵腐色者必死下純血者必死下若筆筒直者不治唇如硃紅者必亡身熱脈大者死微小者生浮洪者死利氣丸方見諸氣凡痢赤白初起一服立愈加味芍藥湯主方治下痢赤白初起積滯不行裡急後重頻上圊而去少腹痛當歸尾一錢白芍二錢黃芩一錢半黃連一錢半枳殼去穰一錢檳榔一錢木香五分大黃一錢滑石一錢甘草三分上銼一劑水煎空心溫服壯盛人大黃加一錢按上方行血調氣經曰溲而便膿血者氣行而血止也行血則便膿自愈和氣則後重自除調和飲治紅白痢疾白芍三錢當歸一錢半川芎一錢黃連一錢黃芩一錢桃仁炒研一錢升麻五分上銼一劑水煎空心服白痢加吳茱萸炒一錢赤白痢加白朮茯苓陳皮香附各一錢按上方治諸痢用通利之藥後未已直服此調理而愈立效無雙方效不可言治痢不拘赤白一服立止並泄瀉亦效淨黃連四兩酒洗吳茱萸二兩同連炒去吳茱萸不用枳殼去穰二兩麩炒去麩不用上共為末稀粥和為丸梧子大每服七八十丸空心溫酒送下泄瀉米湯送下香連丸治冷熱不調下痢赤白膿血相雜裡急後重川黃連去毛淨四兩以水潤薄切用吳茱萸二兩水泡乘濕就以黃連合和碗盛另器盛之蒸時許取出同炒撿去吳茱萸不用南木香一兩上為細末醋煮麵糊為丸如梧子大每服二十丸空心米湯下噤口痢加石蓮肉二兩獨將軍丸治痢如神大黃一斤分四份四兩用黃連一兩先泡水浸同炒四兩用吳茱萸一兩先泡水浸同炒四丙用童便浸炒四兩用乳汁浸炒上為細末米糊為丸梧子大將一半蒸過各收貯每服將蒸過者一半未蒸過者一半赤痢黃連湯下白痢吳茱萸湯下赤白痢連茱湯下按上方治痢專攻之劑駐車丸治下痢赤白腹痛甚者及休息痢駐者止也言藥止痢如車之駐也黃連三兩炒當歸一兩半乾薑一兩炮阿膠一兩半蛤粉炒上為末醋糊為丸如梧子大每三十丸米飲下一方治休息痢用四物湯吞下駐車丸一百粒醫說經驗方神應丸治水瀉食瀉積瀉赤白痢休息痢不拘新久黃連二兩半生半炒吳茱萸湯泡一兩木香一兩粟殼蜜炒二兩上為末烏梅肉二兩搗為丸梧子大每五十丸空心米湯下按上方治休息痢宜之倉廩散治時行瘟疫下痢赤白發熱口乾身痛方見傷寒即人參敗毒散加黃連陳倉米三百粒薑棗煎服如噤口痢加陳倉米一撮石蓮子七枚痢後手足痛加木瓜檳榔若不早治有成鶴膝風者加減柴胡湯治下痢身熱挾外感者必惡寒發熱身首俱病此為在表宜用小柴胡湯去人參加蒼朮川芎陳皮赤芍生薑煎服得微汗以散之即愈按上方治外感瘟疫下痢發熱之劑加減八珍湯治食積痢或時赤痢或時水瀉或完穀俱出乃脾胃受熱之郁遏不能消磨致水穀不化人參八分白朮去蘆一錢半茯苓一錢甘草炙五分當歸一錢川芎六分白芍一錢半神麯炒一錢黃連酒炒二錢砂仁七分澤瀉一錢陳皮八分半夏一錢防風七分阿膠炒一錢生薑三片水煎溫服加減補中益氣湯治痢疾日久不愈不能起床不食疲弱之甚者黃耆蜜米五分人參五分白朮去蘆炒一錢陳皮七分當歸一錢白芍酒炒一錢升麻三分澤瀉五分木香三分砂仁五分白蔻三分地榆五分御米殼醋炒三分甘草炙三分上銼水煎溫服按上方治下痢日久疲弱之甚者宜之凡噤口痢多是胃口熱甚用黃耆一兩人參五錢煎湯終日呷之如吐則再強飲但得一呷下咽便好一方加石蓮肉三錢水煎服立效治噤口痢其症有冷有熱有冷熱不調皆須先發散表里如手心熱目赤是熱宜敗毒散加陳米煎服如手心冷及純下白痢者是寒宜用蓮肉不去心為末米飲調服每服三錢一方治噤口痢酒酻半盞薑汁半盞倉米湯半盞三味合一處入陳鹽菜一攝揉爛一併食之胃口立開口不開用針柱撥開牙齒灌下立效倉連散治噤口痢赤用陳倉米三錢黃連七錢白用米七錢連三錢赤白痢相兼各五錢水煎露一宿空心溫服治噤口痢用黃連半斤㕮咀生薑四兩切片同炒待姜焦黃去姜將連為末陳米飯搗為丸如梧子大每七八十丸赤痢陳米湯下白痢陳皮湯下赤白痢陳米陳皮湯下治噤口痢不思飲食湯飲米穀不下不拘男婦小兒皆效石蓮肉去殼並內紅皮及心為細末用井花涼水調下每二錢或三錢日進二服見效即止一方用陳倉米湯下如嘔加生薑汁三匙治噤口痢用王瓜藤燒灰存性每服二三匙白痢砂糖水調下赤痢蜜水調送下按上方治噤口痢疾宜對症選用一方治下痢裡急後重腹中痛楚難禁者用槐枝艾稞煎水一盆先熏後洗坐蕩其小腹下即時通快也一方治噤口痢飲食不入用雞一隻去毛屎切片入罐內用胡椒末五錢入水用皮紙重重密封待熟用簪子刺孔令患人鼻聞孔之氣即效一方治噤口用王瓜藤經霜者曬乾燒灰存性為末香油調納臍中登時愈一方治紅白痢噤口不受藥不受飲食用田螺搗爛加麝香少許調勻納臍中頃刻效鯽魚膾治赤白痢噤口痢白礬枯過四錢赤石脂一錢上為細末每大人用二匙小者一匙隨意加減用活鯽魚一尾去鱗腸將前藥擦入肚內用真香油蔥花醋醬煎煉如常碗盛碟蓋噤口者放在鼻邊熏之二三次即時胃開食之無妨赤白痢者亦食有效初痢不用按上方治赤白痢噤口痢外治之法治痢不問赤白神方劉孟門傳益元散方見中暑三錢黃連末一錢水一鍾煎八分空心一服立止效一方治久痢休息痢百方不效黃連末木香末十分之一入豬臟頭去油入藥煮爛搗為丸每五十丸空心米湯下一方治老年久痢不止肌瘦如柴晝夜無度命已將危人參一兩水煎服之鼻有微汗而蘇一方用陳莧菜煎湯一服立止或為末每三錢水調下立止祕方治久痢不止用陳蘿蔔煎湯一服立止益元散河間方治痢之聖藥也白滑石六兩粉草炙一兩共為細末每服三錢白水調無時服一方治血痢用生馬齒莧絞汁二合和蜜一匙空心服一方苦參炒為末每五分米湯調下一方治熱痢不止用車前草並子搗汁一盞入蜜一合煎溫分二服一方治白痢肉豆蔻麵包煨乳香一粒為末每二三分米湯調服一方治痢不拘赤白用王瓜削去皮蘸蜜吃一二個當時腹大痛一陳利下積滯而已一方緑豆炒為末入白糖和涼水服立止一方白砂糖一兩雞子清一個燒酒一鍾半煎八分溫服立止一方治痢用蟬退炒黃色為末每服一錢白痢燒酒調下紅痢黃酒調下一方椿根皮炒為末白痢白糖加涼水服赤痢用蜜水和涼水服按上單方治痢有效者宜擇便用之夏月下痢或赤或白煩渴嘔逆腹中攪痛小便不利者此因暑致之可以五苓散香茹散小柴胡湯之屬若以此嘔症為脾胃虛寒則誤矣一壯盛之人一團積熱下痢赤白裡急後重痛甚宜服清涼四黃湯黃連五錢黃芩五錢黃柏五錢梔子五錢大黃三錢連翹五錢木通五錢滑石一兩羌活二錢半海金砂三錢烏梅五錢瞿麥五錢酒麴五錢水煎空心溫服一下痢大便裡急後重數至廁而不能便不拘赤白膿血慎勿利之升其陽則陰火自退矣宜服升陽除濕湯防風白芍酒炒各一分半白茯苓白朮去蘆各一分蒼朮炒一分甘草炙五分乾葛一錢冬加桂枝一分炮乾薑五分紫蘇五分柴胡七分羌活一錢山楂二錢木香三分食傷加麥芽炒一錢上銼生薑三片水煎服次服六君子湯方見補益一下痢發厄用益元散以人參白朮煎湯調下立止按下痢裡急後重者窘迫急痛是也後重者大腸墜重而下也夫裡急後重其症不一有因火熱者所謂火性急速而能燥物是也有因氣滯此大腸經氣壅而不宜通也有因積滯壅盛者是有物結墜也有氣虛者此大腸氣降而不能升也有血虛者所謂虛坐努責是也治法火熱者寒之清之氣滯者調之積滯者去之氣虛而降者升而舉之血虛者補之各其聽用也泄瀉泄本屬濕然多因飲食之不節致傷脾胃而作須看時令寒熱新久而施治法補脾消食燥濕利小便亦有升提下陷之氣用風藥以勝濕亦有久瀉腸胃虛滑不禁宜收澀之大抵脈沉細者易治洪大者難療也胃苓湯主方治脾胃不和暑濕停飲泄瀉腹痛水穀不化陰陽不分不伏水土一切泄瀉並皆治之蒼朮米泔浸陳皮厚朴姜炒豬苓白朮去蘆炒茯苓澤瀉白芍酒炒黃連姜炒甘草薑棗煎溫服氣虛加人參虛寒泄加乾薑炒黑水瀉加滑石食積加神麯炒山楂痰多加半夏勝濕加防風升麻暴痢赤白相繼肚痛裡急後重加木香檳榔按上方治泄瀉之總司也三白散脾胃虧損久瀉不止症屬虛寒者白朮去蘆炒白茯苓各二錢白芍酒炒陳皮人參肉豆蔻麵裹煨去油各一錢蒼朮米泔炒升麻訶子各八分乾薑炮五分甘草炙五分腹痛加中桂上銼薑棗煎服二苓丸治泄瀉如神白朮去蘆東壁土炒一兩人參五錢陳皮茯苓豬苓各七錢官桂一錢甘草炙二錢上為細末棗肉丸如彈子大每一丸溫水研化下參苓白朮散治脾胃元氣虛弱久泄少食即四君子湯加山藥蓮肉薏苡仁扁豆桔梗各等分為細末每服二三錢棗湯調服理氣健脾丸方見內傷治男婦久瀉不止依本方去桔梗加白芍酒炒二兩其效如神參朮健脾丸治老人小兒脾虛久作溏泄一云治脾泄瀉五更時候瀉者是也人參一兩飯上蒸白朮去蘆土炒一兩白茯苓一兩蓮肉去心留皮一兩山藥一兩陳皮山楂肉去子澤瀉甘草炙各五錢兼治小兒食積又止瀉止吐消疳消黃消脹定肚痛常服益胃生肌健脾進食即啓脾丸上為末煉蜜為丸如彈子大每一丸空心清米湯化下日三服按上方補元氣健脾胃止泄瀉之良方也宜對症選用治泄瀉祕方用雞子一個將小頭破頂入胡椒七個紙糊頂煨熟好酒送下燒酒更佳將胡椒完吞下治久瀉久痢不止或脫肛下墜等症臭椿根皮酒炒七次為末阿膠化開為丸梧子大每三五十丸空心米飲送下一方治泄瀉糯米為末不拘多少入百草霜十分之二水和為餅烙熟食之一法單用糯米半生半炒煮粥食之久瀉不止陳蘿蔔煎湯一服立止久瀉不止及脫肛一名黑白丸枯白礬三錢五倍子炒為末一兩水糊丸梧子大每三十五丸空心米湯下治泄瀉二三日或腹冷痛生薑豆豉胡椒煎湯熱服立已治泄瀉不拘新久用白朮去蘆黃土炒一兩入米一撮水煎空心一服立止治久病大腸滑泄五倍子為末麵糊為丸如梧子大米飲下日三服又方用車前子炒為末每一錢米飲下治泄瀉用公豬肚一枚洗淨去脂膜入大蒜在內以水煮爛搗膏入平胃散末用杵為丸梧子大每三十丸鹽湯下空心米湯更妙治泄瀉歐陽文忠公嘗患暴下國醫不得愈夫人曰市人有此藥三文錢一帖甚效公曰吾輩臟腑與市人不同夫人請試之一服愈乃用車前子一味為末米飲下三錢匕此藥利水而不動氣水道利則清濁分而瀉自止矣神聖香黃散治久患脾泄宣黃連一兩生薑四兩切作一處慢火炒令姜干去姜取連上為末每服二錢匕空心臘茶清下甚者不過二服嘗治許州黃太守患泄瀉二三年不愈每飲燒酒一二鍾則止二三日日以為常畏藥不服召豫診之六脈弦數先服此藥以解酒毒後服理氣健脾丸加澤瀉尋愈按上單方治泄瀉有效可選用漿水散治暴泄如水周身汗出一身盡冷脈微不弱或至無脈氣少而不能語其甚者加吐此為急病半夏泡洗二兩附子炮半兩乾薑五錢良薑五錢半桂枝五錢甘草炙五錢上為末每銼三五錢漿水二盞煎一盞和渣熱服甚者三四服微者三服按上方治虛寒冷瀉者宜之夫五更而泄者名曰腎泄蓋陰感而然故脾惡濕濕則濡而困困則不能治水水性下流則腎水不足而以五味子散主之一云此治人到五更初臍下絞痛而溏泄一次乃名腎泄感陰氣而然也五味子散主之五味子二兩吳茱萸去梗五錢同炒為末每服二錢陳米飲下四神丸治脾腎虛弱清晨五更作瀉或全不思食或食而不化大便不實破故紙四兩酒炒肉豆蔻二兩麵裹煨吳茱萸炮過炒二兩五味子二兩上為末用紅棗四十九個生薑四兩切碎同棗用水煮熟去姜取棗肉和為丸每服五十丸空心鹽湯下一人病瀉每至五更輟即利此腎泄也用五味子散數服而愈固起居不慎泄復作年餘不瘥此命門火虛不能生脾土法當補其母火者土之母也遂用八味丸補母瀉即止食漸進東垣云脾胃之氣盛則能食而肥虛則不能食而瘦全賴命門火為生化之源滋養之根也故用八味丸奏效方見補益按上方治五更腎泄者宜之戊己丸治脾經受濕泄痢不止米穀不化臍腹刺痛黃連酒炒白芍煨吳茱萸炒各等分上為末用小米飲為丸梧子大每服五六十丸空心米湯送下白龍丸又名玉華丹治久瀉痢疾霍亂瘧疾血崩枯礬不拘多少為末好醋煮麵糊為丸如雞頭子大每一丸紅痢甘草湯下白痢薑湯下如不止再服一二丸霍亂薑湯下瘧疾東南桃心七個煎湯下血崩酒下忌葷腥油膩煎炒之物霍亂脈來浮洪者可治微而遲氣少不語者為難治舌卷囊縮者皆不治也霍亂者上吐下利揮霍擾亂也及邪氣飲食所傷邪在中焦既吐且利邪在上焦吐而不利邪在下焦利而不吐俱用藿香正氣散加半夏生薑汁治之如吐利不止者理中湯如上不得吐下不得利出冷汗氣欲絶名為乾霍亂用鹽一大匕炒令黃入童便一碗溫和服之少頃吐下即愈此病切忌米湯服之立死反助邪氣切不可用寒涼之藥宜先服陰陽湯方見後藿香正氣散主方治四時不正之氣寒疾時氣山嵐瘴氣雨濕蒸氣或中寒腹痛吐利中暑冒風吐瀉中濕身重泄瀉或不伏水土脾胃不和或飲食停滯復感外寒頭痛憎寒或嘔逆噁心胸膈痞悶或發寒熱無汗者藿香二錢紫蘇陳皮厚朴姜炒半夏姜炒白茯苓桔梗大腹皮白芷白朮去蘆各一錢甘草五分上銼一劑薑棗煎服霍亂轉筋加木瓜腹痛加炒芍藥寒痛加官桂冷甚加乾薑飲食不化心下痞悶加香附砂仁米穀不化加神麯麥芽肉食不化加山楂心下痞加枳實青皮中暑冒風加香茹扁豆時氣怕寒發熱加柴胡葛根發熱加麥門冬淡竹葉口渴泄瀉小便不利合五苓散寒濕相搏霍亂轉筋煩渴悶亂合黃連香茹散感風寒內傷飲食霍亂轉筋吐瀉合五苓散心腹絞痛加木香若頻欲登圊不通利者加枳殼轉筋不止男子以手挽其陰女子以手牽其乳近兩邊此千金妙法按上方治霍亂吐瀉之總司也諸病皆治加減理中湯治霍亂轉筋上吐下瀉腹內疼痛及乾霍亂俗名攪腸痧真陰等疾手足厥冷嘉靖甲子年間梁宋之地人多患此自腳心麻至足膝死者不勝其數時大方伯趙公出示此方患者咸蒙其惠多矣因述以廣其傳云人參乾薑炮茯苓去皮甘草炙各等分上為末煉蜜為丸每重一錢嚼爛淡薑湯送下忌食米湯此即理中湯改為丸土能塞水之義若仍作湯則不效矣既濟湯治霍亂後虛煩不得眠人參一錢麥門冬去心一錢半夏泡一錢淡竹葉二錢大附子制過去皮臍五個甘草炙二錢生薑五片粳米百粒水煎空心溫服治霍亂吐瀉或因飲冷或胃寒或失飢或大怒或乘車舟傷動胃氣令人上吐下瀉不止頭旋眼花手足轉筋四肢厥冷吳茱萸木瓜食鹽同炒焦先用瓦罐水三升煮令百沸卻入前三味同煮二升以下服之立效按上方治虛寒之劑祛暑茹苓湯治霍亂身熱口渴此熱暑中也豬苓七分澤瀉七分白朮五分赤茯苓一錢黃連五分香茹七分乾葛七分天花粉二錢甘草五分上銼一劑生薑煎服如熱極加知母石膏泄加升麻滑石黃芩腹痛加炒芍藥一錢桂三分寒痛亦加此按上方治中暑身熱霍亂之劑鹽尉法治霍亂吐瀉心腹作痛炒鹽二碗紙包紗護頓其胸前並腹肚上截以尉斗火尉氣透則蘇續又以炒鹽尉其背則十分無事治霍亂轉筋大蓼一握煎湯蕩洗北人以麥糠代之使腠理開泄而氣散則已也河間云熱氣燥灼於筋則攣瘛而痛也霍亂吐瀉方樟樹皮一把水煎溫服立止霍亂吐瀉轉筋粗大如桃李攣縮痛不可忍秫薥葉煎湯飲之即效乾霍亂欲吐不吐欲瀉不瀉痰壅腹脹汗出冷氣欲絶鹽一兩生薑半兩切上二味同炒令色變以童尿兩盞煎一盞分為二溫服治乾霍亂不得吐者用滾湯一碗入皂角末三分鹽一撮調服探吐之霍亂吐瀉但一點胃氣存者服之回生陳皮去白藿香等分為末每二錢薑湯下每銼一兩水煎服亦可治攪腸沙即乾霍亂胡椒四個緑豆二十四個共為細末熱黃酒調服治霍亂吐瀉單用藿香梗一味煎水服立止霍亂吐瀉用生薑細切漬以新汲水調益元散頓服之即止又方即太白散用枯白礬為末每服一錢百沸湯點服按上簡易單方宜選用之灸法治霍亂已死腹中尚有暖氣者以鹽填滿臍孔灸之不計壯數補遺方參苓白朮散治脾虛氣陷吐瀉煩渴人參白朮炒茯苓山藥藿香葛根升麻上為末米湯調下發痧夫發痧者江南所在皆有之古方不載所感如傷寒頭痛嘔吐惡熱手足指末厥逆或腹痛悶亂須臾能殺人也先煎濃艾湯試之如吐則是近時多看頭額及胸前兩邊有小紅豆點在皮膚者以大燈草香油蘸於紅點處爆者是名曰水傷寒也或服蔥頭湯汗出而愈如腹痛不止用針於兩手大指甲邊出血即瘥或二腳墜腫亦多水痧於委中穴刺血即愈鹽湯吐法治心腹絞痛冷汗出脹悶欲死名攪腸痧又名乾霍亂由山嵐瘴氣或因飢飽失宜而得者用鹽半盞以熱湯泡一碗令病人盡服又法用雞翎探咽喉令吐所食鹽湯盡出即愈效攪腸痧症發即腹痛難盡但陰痧腹痛而手足冷看其身上紅點以燈草蘸油點火燒之陽痧則腹痛而手足暖以針刺其十指皆近爪中處一分半許即動爪甲而指背皮肉動處血出即安仍見自兩臂將下其惡血令聚指頭出血為好又痛不可忍須臾能令人死古方名乾霍亂急用鹽一兩熱湯調灌入病人口中鹽氣到腹即定又將石砂炒令赤色冷水淬之良久澄清水一二合服即安又方陳樟木陳皮陳壁土各等分水濃煎去渣連進三四服即安治攪腸痧方煨鹽一錢半吳茱萸每歲一粒炒黃為末熱酒調服一人患心腹刺痛手足拘攣搐搦眼翻上視將病人兩手從上往下捋到手指將布針刺十指甲角出黑血立止此是痧閉下血次作痛青筋白虎丸治北人慣打青筋其症初覺頭痛惡心或心腹痛或腰脅痛或遍身刺痛或憎寒壯熱心慌喘急惡血攻心須臾不救即進一服當時血散若過三五日青筋已老多服亦效古礦灰要古城古牆或古家久住者佳刮去雜色泥土為末水飛曬乾上為末水糊為丸如梧子大每服四五十丸看輕重加減燒酒送下立時奏效又治心腹疼及婦人崩漏帶下或因氣惱致疾或久患赤白痢疾或打僕內損血不能散立效治人慣打青筋用五靈脂蒲黃等分為末酒下三錢吃了永不再犯嘔吐嘔吐謂有痰隔中焦食不得下者有氣逆者有寒氣鬱於胃中者有暑氣所侵者有飲食所傷者有瘀血停滯者但因火與痰者為多有物有聲謂之嘔吐有聲無物謂之噦劉河間謂火氣炎上切不可下逆之故也脈虛細者吉實大者難一切外感內傷寒痰氣食而嘔吐者藿香正氣散主之方見霍亂一胃虛有痰而嘔吐者二陳湯加藿香砂仁白朮方見痰飲一胃虛有熱而嘔吐者清胃保中湯一冬月胃虛中寒不食而嘔吐者理中湯加丁香方見中寒一夏月飲冷或當風取涼而嘔吐者二陳湯方見痰飲加香茹散方見中暑烏梅煎服一發熱而嘔吐者小柴胡湯加竹茹陳皮生薑煎服方見傷寒一久病吐者胃氣虛不納穀也比和飲嘔家聖藥是生薑千金之說信矣然氣逆作嘔生薑散之痰與水作嘔半夏逐之嘔有熱有寒生薑於寒症最佳若遇熱嘔不可無烏梅治嘔吐聞藥即嘔百方不效伏龍肝為末水丸塞兩鼻孔卻服對症藥遂不再吐治嘔吐不已又治噁心生薑一大塊直切薄片勿令折斷層層摻鹽於內以水濕苧麻密纏外又用紙包水濕火煨令熟取出麻紙用姜搗爛和稀湯服之清胃保中湯主方治嘔吐飲食不下陳皮八分半夏姜炒八分白茯苓去皮八分白朮去油蘆土炒一錢藿香一錢黃連土炒二錢黃芩土炒一錢山梔仁姜炒二錢砂仁三分甘草二分加枇杷葉擦去毛一錢上銼一劑生薑三片長流水和膠泥澄清二鍾煎一鍾稍冷頻服吐逆甚加伏龍肝一塊因氣加香附童便炒一錢枳實麩炒八分去白朮心煩不寐加竹茹八分神麯炒八分酒傷脾胃加乾葛天花粉白豆蔻按上方治嘔吐虛熱者宜之比和飲治嘔吐月餘不納水穀聞食即嘔聞藥亦嘔者人參一錢白朮去油蘆土炒一錢白茯苓去皮一錢藿香五分陳皮五分砂仁五分神麯炒一錢甘草炙三分上銼一劑用十年以上陳倉米一合順流水二鍾煎沸伏龍肝研細攪渾澄清取一鍾生薑三片棗二枚同煎七分稍冷服別以陳倉米煎湯時時啜之日進此藥二三服而愈參萸湯治冷涎嘔吐陰症乾嘔吳茱萸沸湯泡洗三次一兩五錢生薑一兩半人參三分大棗五個水煎食前服按上方治虛寒嘔吐宜之治虛弱及老人嘔吐噁心心煩不寧人參口嚼些須立已治卒暴嘔逆虛弱困乏無力及久病人嘔吐飲食不入口即吐者人參一兩水煎服之立已治胃氣冷吃食即欲吐白豆蔻五錢為末以好酒一盞微溫調服日三盞治氣虛有痰嘔吐亦治反胃殊效人參二錢半夏一兩制生薑七片蜜少許煎服治乾噦若手足厥冷宜食生薑此是嘔家聖藥又治心下痞堅不能食胸中嘔噦生薑一兩切片半夏五錢湯泡切片水煎稍稍服之有病久血虛血不歸元而嘔者用十全大補湯誠發前人之未發愚常用屢效依本方加陳皮半夏藿香噁心噁心者無聲無物但心中欲吐不吐欲嘔不嘔雖曰噁心非心經之病其病皆在胃口上有虛有熱有痰皆用生薑隨症佐藥蓋姜能開胃豁痰也芩連二陳湯治胃口有熱時作惡心半夏湯泡切片姜炒陳皮白茯苓去皮黃連薑汁炒黃芩薑汁炒各一錢半甘草炙三分上銼作一劑生薑五片水煎服加味理中湯治胃氣虛寒而作惡心亦治船暈人參白朮去蘆炒乾薑半夏薑製陳皮各等分上銼生薑煎服如胃中素熱噁心嘔噦不止陳皮二錢梔子炒三錢竹茹一錢半水煎入薑汁服翻胃大抵翻胃之症未有不由膈噎而起也其病皆因憂愁憤怒思慮鬱結痰飲滯於胸膈之間使氣道噎塞大便自結則氣上不下食不得入入則反出使腸涸胃空上吐下結遂成此疾也治之當以透膈疏氣化痰和胃為主氣虛者補其氣血弱者養其血調順陰陽氣順痰下陰陽和勻其症自平不可峻用香燥之劑治之恐胃中停結痰火津液衰涸如抱薪救火寧不誤耶其脈浮緩者生沉澀者死若大便如羊糞者不治口中多出沫但見沫大出者必死年過五十者多不治脈澀而小血不足脈大而弱氣不足調元湯主方治翻胃之總司也人參五分白朮去油蘆土炒七分白茯苓去皮七分陳皮六分半夏姜炒八分川芎五分白豆蔻去殼五分黃連同吳茱萸炒去吳茱萸當歸酒洗一錢白芍酒炒七分桃仁七分去皮尖紅花三分甘草炙三分上銼一劑生薑三片水煎溫服服至以愈為度開結潤燥湯黃賓江治翻胃養血健脾理氣清火之劑當歸川芎白芍酒炒懷生地黃天門冬去心麥門冬去心陳皮白朮土炒半夏姜炒白茯苓去皮藿香砂仁枳實香附烏藥檳榔木通豬苓黃芩土炒黃柏乳炒知母乳炒甘草銼劑生薑煎服一方加赤芍赤茯苓活血潤膈湯治膈氣翻胃大便結燥當歸一錢半桃仁一錢陳皮八分甘草炙五分黃連姜炒一錢厚朴姜炒一錢大腹皮一錢紅花七分白朮炒七分上銼一劑水煎溫服善酒加乾葛人參利膈丸治膈噎胸中不利大便結燥痰嗽喘滿脾胃壅滯此能推陳致新治膈氣之聖藥也人參當歸藿香厚朴姜炒枳實麩炒大黃酒蒸各一兩木香檳榔各七錢半甘草一兩上為末滴水丸如梧子大每五十丸溫水送下嘉禾散治脾胃不和胸膈痞悶氣逆生痰不進飲食如膈噎反胃並治神效人參一錢白朮一錢茯苓七分半夏八分陳皮七分薏苡仁一錢白豆蔻六個枇杷葉七分桑白皮蜜炒八分大腹皮七分沉香四分木香三分檳榔六分藿香七分砂仁四分青皮五分杜仲一錢石斛八分神麯炒一錢麥芽炒八分山楂肉一錢炙甘草四分生薑三片煎服五膈加乾柿膈氣吐逆加薤白紅棗五枚古方有丁香五味子訶子無山楂白豆蔻易草豆蔻羊面羹治翻胃吐食膈氣噎塞滑石六錢石膏一兩白茯苓一兩半夏三錢甘草一錢上為細末和勻每服五錢以白麵二兩和劑搜作小棋子塊用好羊肉二兩加蔥花鹽椒醬醋一處熬汁擂生薑自然汁五錢將面藥棋子先於原汁內煮熟食之隔一日再依前法食之其效如神按上方治翻胃攻補兼施之劑經驗方韭汁味辛能消瘀行血牛乳甘溫能養血潤燥韭汁二兩牛乳一盞生薑五錢取汁竹瀝半盞童便一盞上和一處重湯煮熟溫服蓋韭菜汁能下膈上瘀血又令多服驢尿以防生蟲按上方治翻胃大效治翻胃噎食探病可治否彭蒼崖傳用甜梨一個去皮用箸刺梨七孔每孔入巴豆去殼半邊入梨內紙裹水濕灰火煨熟取出巴豆令病人吃梨汁如咽得下吐出痰來可治如吃不下不吐痰不可治治翻胃噎食用蔥搗爛塞入大便內俟咽喉中有蔥氣可治二豆回生丹治翻胃噎食硇砂二錢雄黃二錢乳香一錢硃砂一錢黑豆四十九粒緑豆四十九粒百草霜五錢微火炒過用上共為細末用烏梅三十個取肉和丸如指頂大硃砂為衣每噙化一丸良久將麵餅一個茶泡爛食之不吐乃藥之效若吐再噙化一丸忌油膩鹽醋怒氣按上方探病可治否何如治翻胃噎食馬蛇兒即野地蠍虎用公雞一隻籠住餓一日只與水吃換淨腸肚卻用馬蛇兒切爛與雞食之取屎焙乾為末每服一錢燒酒送下效治隔食祕方用乾柿餅三個連蒂搗為末酒調服甚勿以藥易而忽之也又方白雄烏骨雞先籠二日撒去舊屎將屋龍斬爛與雞吃撒屎以豆豉為丸令滴燒酒吞下二三十丸即愈治轉食祕方反翅雞一隻煮熟去骨入人參當歸鹽各五錢為末再將原煮雞湯再煮取與食之勿令人共食人參粥治翻胃吐酸水人參末五錢生薑汁五錢粟米一合水煮粥食之療翻胃嘔吐無常粥飲入口即吐困弱無力垂死者人參二兩拍破水煎汁一碗熱服再兼以人參汁煮粥與服祕方辜宗岐治翻胃萊蔔子白芥子胡荽子上各等分為細末每服五分好燒酒調服祕方治翻胃脾胃虛寒嘔吐或翻胃膈噎神效用大附子一個最大者坐於磚上四面著火漸逼淬入生薑自然汁中又依前火逼干復淬之約生薑汁可盡半碗許搗羅為末每服一錢用粟米飲下不過三服效一方用大附子重一兩四五錢端正底平尖圓一枚灰火炮之裂入生薑自然汁內浸潤曬乾再炮再入汁浸潤仍曬再炮用盡薑汁半碗去皮臍為末人參膏為丸黍米大每數丸津液咽下胃氣稍復投以溫補之劑治胃翻食即吐方用粟米搗作面水和為丸楮子大爛煮納醋中細細吞之得下便已面亦得用之治吐食翻胃諸藥不效者胡椒四十九粒杏仁四十九粒二味為末用細花燒酒調服治翻胃吐食上氣者白芥子曬乾為末酒調服治翻胃並乾嘔不止用甘蔗汁十升薑汁一升和勻分五服治翻胃用棗子一個去核裹全斑貓一個用文武火煨畢去貓用棗空心服白湯下按上單方治翻胃噎膈有殊效者治翻胃驗方用六君子湯加炮乾薑白豆蔻黃連用吳茱萸煎湯浸炒去萸咳逆夫咳者氣逆也氣自臍下直衝上出於口而作聲之名也古謂之噦今謂之厄乃胃寒所生寒氣自逆而厄上也有痰有氣虛有火有因飲食太過填塞胸中而氣不得升降者或有痰向於上火起於下而氣不得伸越者又有傷寒熱病陽明內實過期失下清氣不得伸濁氣不得降以致氣不宣通而發厄者此皆實證也治咳逆服藥無效者硫黃乳香各等分為末以酒煎急令患人嗅之又方用雄黃二錢酒一盞煎七分急令患人嗅其熱氣立已治咳逆連聲不絶吳竺賜柿蒂燒存性為末酒調服一方每七個焙為末黃酒調下驗方治厄逆半夏六錢湯泡生薑五錢水煎服治傷寒發熱而厄逆者黃荊子不拘多少炒水煎服傷寒陽症咳逆潮熱小柴胡湯加生薑竹茹橘皮治患咳逆連咳四五十聲者取生薑汁半合蜜一匙與煎令熟溫服如此三服瘥治諸吃意橘皮二兩湯浸去穰銼水一升煎至五合通熱頓服更加枳殼一兩去穰炒同煎服噯氣夫噯氣者胃虛火鬱之所成也因胃中有火治療之法虛則補之熱則清之氣則順之氣順則痰消也星半湯治胃中鬱火有痰噯氣南星一兩半薑製半夏一兩半薑製軟石膏煅一兩香附米童便炒一兩山梔子炒黑七錢上銼生薑煎服或作丸亦可吞酸吐酸吞酸與吐酸不同吐酸是平日津液隨上升之氣鬱積而成郁之久濕中生熱故從火化遂作酸水而出吞酸者濕熱鬱積於肝而出伏於脾胃之間必用糯米蔬菜以自養清郁豁痰湯主方治噯氣吞酸乃胃中有熱膈上有痰令人嘔吐清水等症陳皮半夏白茯苓黃連姜炒梔子炒蒼朮米泔水浸炒川芎香附炒砂仁神麯炒山楂木香甘草上銼生薑三片水煎溫服治食後吐酸水方乾薑吳茱萸各二兩用下篩酒服方寸匕日二次胃冷服之立驗橘連丸治鬱積吐酸水黃連一兩半炒蒼朮米泔制一兩吳茱萸炒一兩陳皮一兩半夏姜炒一兩白茯苓一兩上為末炊飯為丸如緑豆大每二三十丸食遠服冬月倍茱萸夏月倍黃連治婦人心酸乃痰飲積在脾胃間時時酸心或吐水吳茱萸一兩鹽湯洗蒼朮一兩泔浸陳皮去白神麯炒麥芽炒肉桂各五錢上為細末煮麵糊丸米飲下治醋心每醋氣上攻如釅醋吳茱萸一合水二盞煎七分頓服縱濃亦須強飲近有人心如蟄破服此方後二十年不發茱連丸治鬱積吞酸黃連一兩黃芩一兩二味用陳壁土炒蒼朮七錢半米泔水浸炒吳茱萸五錢泡炒陳皮五錢上為末神麯糊為丸如緑豆大每五六十丸津咽下治吐清水蒼朮米泔浸陳壁土炒茯苓滑石白朮上銼水煎服一人口中常流冷涎如泉湧豫以吳茱萸煎湯待冷涎流出後即服此茱萸湯不二三次而愈二術丸治吞酸心痛蒼朮米泔浸炒二兩白朮去蘆炒二兩陳皮一兩半夏姜炒一兩半白茯苓一兩白芍酒炒一兩半神麯炒三兩黃連姜炒八錢甘草炙七錢上為細末蒸餅為丸梧子大每服百丸淡薑湯下嘈雜夫嘈雜之為症也似飢不飢似痛不痛而有懊憹不自寧之況者是也其症或兼噯氣或兼痞滿或兼噁心漸至胃腹作痛實痰之為患也治法以南星半夏橘紅以消其痰芩連梔子石膏知母之類以降其火蒼朮白朮芍藥之類以健脾行濕壯其本元又當忌口節欲無有不安者也人多思慮以致血虛五更時嘈雜是也四物湯加香附梔子黃連貝母肥人嘈雜二陳湯少加川芎蒼朮白朮梔子炒水煎服眩暈嘈雜火動其痰二陳湯加梔子黃芩黃連一婦人飲食少思胸中嘈雜頭暈吐痰此中氣虛而有熱用六君子湯加炒黑山梔桔梗而愈後因勞碌頭暈發熱吐痰不食用補中益氣加半夏茯苓天麻而痊一婦人心胸嘈雜用茯苓補心湯治之愈方見虛勞平肝順氣保中丸治鬱火傷脾中氣不運胃中伏火鬱積生痰致令嘔吐吞酸嘈雜心腹脹悶常服順氣和中開胃健脾倍進飲食化痰消滯清火抑肝香附米三兩童便浸二日炒小川芎二兩陳皮去白三兩白朮去蘆土炒四兩枳實麩炒二兩黃連薑汁炒二兩吳茱萸湯泡二兩神麯炒一兩麥芽炒七錢木香三錢梔子薑汁炒一兩萊蔔子炒一兩半夏薑汁炒一兩半白茯苓去皮一兩竹茹一兩砂仁炒四錢乾生薑一兩甘草炙四錢一方加山楂二兩青皮香油炒六錢去吳茱萸竹茹一方加山楂二兩青皮香油炒六錢去吳茱萸竹茹上為末竹瀝打神麯糊為丸如梧子大每八十丸白湯送下日進二服四物湯方見補益二陳湯方見痰飲六君子湯方見補益補中益氣湯方見內傷
