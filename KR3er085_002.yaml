body:
  text: 坎集卷二內傷內傷辨內傷病必氣高而喘身熱而煩短氣上逆鼻息不調怠惰嗜臥四肢困倦不收無氣言動捫摸肌膚必大熱躁熱悶亂心煩不寧或表虛惡風是也東垣內外傷辨人迎脈大於氣口為外傷氣口脈大於人迎為內傷外傷則寒熱齊作而無間內傷則寒熱間作而不齊外傷惡寒雖近烈火不除內傷惡寒得就溫暖即解外傷惡風乃不禁一切風寒內傷惡風惟惡些小賊風外傷症顯在鼻故鼻氣不利而擁盛有力內傷者症顯在口故口不知味而腹中不和外傷者無此外傷則邪氣有餘發言壯厲宜先輕而後重內傷則元氣不足出言懶怯且先重而後輕外傷手背熱而手心不熱內傷則手心熱而手背不熱若顯內證多者則是內傷重而外感輕宜以補養為先若顯外證多者則是外感重而內傷輕宜以發散為急大抵內傷之理傷之微者但減食一二口所傷之物自得消化此良法也若傷之重者以藥內消之傷之太重者以藥除下之飲食所傷重則拊去食積以和脾胃輕則消導以溫養之若勞倦傷誠不足也欲退二家熱必以參朮耆草為君以柴升地骨麥門枳梗白芍芩連柏輩為治驗人強弱隨時寒暑對症加入以求必愈內傷論夫脾胃虛者因飲食勞倦心火亢甚而乘其土位其次肺氣受邪須用黃耆最多人參甘草次之脾胃一虛肺氣先絶故用黃耆益皮毛而閉腠理不令自汗上喘氣短損真元氣人參以補之心火乘脾炙甘草用甘溫以瀉火熱而補脾胃中元氣若脾胃急痛並大虛腹中急縮者宜多用之經云急者緩之白朮苦甘溫除胃中熱利腰臍血胃中清氣在下必加升麻柴胡以引之引黃耆甘草甘溫之氣味上升能補胃氣之散解而實其表也又緩帶脈之縮急二味苦平之薄者陰中之陽引清氣上升也氣亂於胸中為清濁相干用去白陳皮以理之又能助陽氣上升以散滯氣助諸甘辛為用也嗌乾者加乾葛脾胃氣虛不能升浮為陰火傷其生髮之氣榮血大虧榮氣不營陰火熾盛是血中伏火日漸煎熬血氣日減心包與心主血血減則心少養致使心亂而煩病名曰悅悅者心惑而煩悶不安也故加辛甘微溫之劑生陽氣陽生則陰長或曰甘溫何能生血曰仲景之法血虛以人參補之陽旺則能生陰血更以當歸和之少加黃柏以救腎水能瀉陰中之伏火如熱猶不止少加生地黃補腎水水旺而心火自降如氣浮心亂以硃砂安神丸鎮固之則愈方見驚悸補中益氣湯主方治中氣不足飲食勞倦清氣下陷以致脾胃虛弱發熱頭痛四肢倦怠心煩肌瘦日漸羸弱此藥能升元氣退虛熱補脾胃生氣血嫩黃耆蜜水炒人參白朮去油蘆微炒當歸身酒洗陳皮柴胡升麻甘草炙上銼生薑棗子水煎溫服內經曰胃為水穀之海又云腸胃為之無物不包無物不入寒熱溫涼皆有之其為病也不一故隨時症補中益氣湯中權立四時加減法於後以手捫之而肌表熱者表熱也只服主方一二服得微汗則已非正發汗乃陰陽氣和自然汗出也若更煩亂如腹中或周身有刺痛皆血澀不足加當歸一錢如精神短少加人參五分五味子二十個頭痛加蔓荊子三分痛甚加川芎五分頂痛腦痛加藁本五分細辛三分諸頭痛並用此四味足矣頭痛有痰沉重懶倦者乃太陰痰厥頭痛加半夏五分生薑三分耳鳴目黃頰頦腫頸肩臑肘臂外後廉痛面赤脈洪大者以羌活一錢防風藁本各七分甘草五分通其經血加黃芩黃連各三分消其腫人參五分黃耆七分益元氣而瀉火邪另作一服與之嗌痛頦腫脈洪大面赤者加黃芩甘草各三分桔梗七分口乾嗌乾者加葛根五分升引胃氣上行以潤之如夏月咳嗽者加五味子二十五個麥門冬去心五分如冬月咳嗽加不去根節麻黃五分如秋涼亦如如春月天溫只加佛耳草款冬花各五分若久病痰嗽肺中伏火去人參以防痰嗽增益耳食不下乃胸中胃上有寒或氣澀滯加青皮木香各三分陳皮五分此三味為定法如冬月加益智仁草豆蔻仁各五分如夏月加少黃芩黃連更加檳榔草豆蔻砂仁白豆蔻各五分春初猶寒少加辛熱之劑以春氣之不足為風之始益智仁草豆蔻可也如心下痞奢悶者加芍藥黃連各一錢如痞腹脹加枳實木香砂仁各三分厚朴七分如寒少加乾薑或中桂心下痞覺中寒加附子黃連各一錢不能食而心下痞加生薑陳皮各一錢能食而心下痞加黃連五分枳實三分脈緩有痰而痞加半夏黃連各一錢脈弦四肢滿便難而心下痞加黃連五分柴胡七分甘草三分腹中痛者加白芍五分甘草三分如惡寒覺冷痛加中桂五分如夏月腹中痛不惡寒不惡熱者加黃芩甘草各五分芍藥一錢以治時熱也如腹痛在寒涼時加半夏益智仁草豆蔻之類如腹中痛惡寒而脈弦者是木來剋土也小建中湯主之蓋芍藥味酸於土中瀉火為君如脈沉細腹中痛是水來侮土以理中湯主之乾薑辛熱於土中瀉水以為主也如脈緩體重節痛腹脹自利水穀不化是濕勝以平胃散主之蒼朮苦辛溫瀉濕為主也脅下痛或脅下滿急俱加柴胡五分甘草三分臍下痛加熟地黃五分如不已者乃大寒也加桂治虛勞發熱去升麻加半夏茯苓黃芩地骨皮五味子嗽不止加百合款冬花陰虛火動加黃柏知母治飲酒人元氣虛弱無力飲食減少面紅如妝加半夏乾葛白芍神麯麥芽枳殼小便閉加麥門冬大便閉加桃仁紅花火麻仁治元氣虛弱腰痛加黃柏知母牛膝白芍夫人勞倦則損氣氣衰則火旺火旺則乘其脾土故倦怠而熱此元氣傷也益氣湯主之升陽順氣湯治因飲食不節勞役所傷腹脅滿悶短氣遇春則口淡無味遇夏雖熱猶有惡寒飢則常如飽不喜食冷物黃耆蜜水炒二兩半夏湯泡三分草豆蔻二錢甘草炙五分神麯炒一分半升麻柴胡當歸身陳皮各一錢黃柏酒炒五分人參三分生薑三片水煎服按上方脾胃不足之證須用柴胡升麻苦平味之薄者陰中之陽引脾胃中清氣行於陽道及諸經生髮於陰陽之氣以滋春氣之和也又引黃耆人參甘草甘溫之氣味上行充實腠理使陽氣得衛外而為用也凡治脾胃之藥多以升陽補氣名之者此也補中益氣丸功同補中益氣湯治飲食勞倦所傷元氣虛弱脾胃虧損諸虛百病嫩黃耆蜜水炒二兩楝參二兩白朮去蘆陳土炒二兩白茯苓去皮一兩懷山藥一兩蓮肉去心皮一兩當歸身酒洗二兩白芍酒炒一兩白豆蔻去殼五錢砂仁五錢陳皮一兩甘草炙五錢有痰加半夏姜炒一兩有熱加黃連姜炒一兩有氣加木香五錢傷食加山楂肉一兩神麯炒一兩胸痞腹脹加枳實麩炒五錢氣下陷加升麻酒炒五分上為細末用荷葉如掌大煎湯下陳倉米煮稀粥和為丸如梧子大每服百丸不拘時米湯送下參苓白朮散理心脾氣弱神昏體倦飲食不進多困少力中滿痞噎心忪上喘嘔吐瀉痢此藥中和不熱久服養氣育神醒脾悅色順正辟邪人參一錢白朮去油蘆土炒一分白茯苓七分炙甘草四分白扁豆炒一分山藥一錢蓮肉去心皮七枚桔梗七分薏苡仁炒一分砂仁五個上銼生薑三片紅棗三枚水煎溫服或為細末每服二錢食遠薑棗湯下八仙糕白粳米一斗春令極熱清水淘過磨極細重羅篩過入甑蒸人參白茯苓山藥芡實仁蓮肉去心不油白朮去蘆米泔水浸隔紙炒香各五兩淨白糖霜四斤上各為細末同米粉拌勻粗羅羅過再入甑又蒸取出乘熱入白糖攙和極勻入模子內築成餅子於鐵線焙籠上焙片時取起收用白玉糕此為京師諸老多服之薏苡仁蓮肉雞頭實白蒺藜百合乾山藥以上俱擇新鮮潔淨淘洗各另搗為細末每味各淨粉一升用白砂糖二升粳米粉一十一升糯米粉三升拌極勻蒸成糕切成小片曬乾用小竹簍裝盛每日不拘時或用炒米湯浸服或干嚼服極能養脾胃扶元氣陽春白雪糕養元氣健脾胃其功難以盡述白茯苓去皮山藥芡實仁家蓮肉去心皮各三兩共為細末粳米一升糯米半升俱為末白砂糖一斤半先將藥米二末麻布盛甑內蒸熟乘熱和糖搓令極勻用印成餅鋪開烘乾或曬乾任食傷食東垣云胃中元氣盛則能食而不傷過時而不飢脾胃俱壯則能食而肥也脾胃俱虛則不能食而瘦或少食而肥而四肢不舉蓋脾實而邪氣盛也又有善食而瘦者胃伏火邪於氣分也則能食脾虛則肌肉削即食㑊也大抵飲食不進以脾胃之藥治之多不效者亦有謂焉人之有生不善攝養房勞過度真陽衰憊坎水不溫不能上蒸脾土沖和失布中州不運是致飲食不進胸膈痞塞或不食而脹滿或已食而不消大腑瀉溏此皆真火衰弱不能蒸蘊脾土而然古人云補腎不如補脾余謂補脾不若補腎腎氣若壯丹田之火上蒸脾土脾土溫服中焦自治則能進食矣行氣香蘇散主方治內傷飲食外感風寒夾食夾氣胸膈脹滿肚腹疼痛頭痛身痛發熱等症紫蘇陳皮香附烏藥川芎麻黃枳殼羌活甘草薑蔥煎服理氣健脾丸主方治脾胃虛弱不思飲食嘔吐泄瀉胸膈痞悶肚腹脹滿虛勞發熱痰嗽便溏腹痛白朮去蘆炒六兩白芍酒炒二兩白茯苓去皮三兩陳皮三兩黃連薑汁炒二兩半夏湯泡姜炒各一兩半神麯炒二兩半山楂去子一兩八錢枳實麩炒一兩香附童便炒二兩當歸身酒洗六兩木香五錢甘草炒一兩元氣虛弱加人參一兩上為末荷葉湯煮粥為丸每服七八十丸清米湯下人常服之可保無虞百消丸消酒消食消痰消氣消積消痞消脹消痛消腫消水消瘀消滯消而不見響而不泄真簡易之良方也黑牽牛炒取頭末二兩香附米炒一兩五靈脂炒一兩上為細末醋糊為丸梧子大每服三五十丸薑湯送下消食散治食不化腹脹發熱山楂蒸去子曬乾為末每服五錢一日進三次或米糊為丸服亦可草豆蔻丸治飲酒無度恣食寒冷之物有痃癖積飲在胸腹間作痛或胃脘當心而痛上支兩脅咽膈不通食飲不下草豆蔻麩裹煨一兩白朮去蘆炒一兩枳實麩炒二兩青皮去穰二錢陳皮二錢半夏姜炒五錢黃芩炒五錢神麯炒五錢麥芽炒五錢乾生薑炒二錢炒鹽五分上為細末湯浸蒸餅為丸如緑豆大每服一百丸熟水下如冬月不可用黃芩歲火不及又傷冷物加以溫劑是其治也然也有熱物傷者從權以寒藥治之隨時之宜不可不知也葛花解酲湯治飲酒太過嘔吐痰逆心神煩亂胸膈痞塞手足戰搖小便不利飲食減少葛花五錢砂仁五錢白豆蔻五錢人參二錢半白朮二錢白茯苓一錢半青皮一錢半陳皮一錢半木香五分豬苓一錢半澤瀉二錢神麯炒一錢乾生薑二錢上為末每服三錢白湯調下得微汗酒病去矣八仙銼散壯脾進食令人飲酒不醉丁香砂仁白豆蔻去殼粉葛各五錢百藥煎二錢半木瓜鹽窨倍用一兩燒鹽一錢甘草二錢半上細銼人不能飲酒者只抄一錢細嚼溫酒下即能飲不醉石膏湯治飲酒過多大醉難醒石膏五兩葛根銼生薑銼各五錢上每銼五錢水二盞煎一盞不拘時溫服治飲食不住口仍易飢餓緑豆糯米小麥各一升炒熟磨成粉每服一小鐘以滾湯調服日三五服效吃酒不醉方薄荷五錢乾葛一兩桂花三錢白梅肉五錢上為末蜜丸先放入口內舌下自然化酒凡覺胸中酒食停積或被人勸飲過多一時心下脹滿只用鹽花擦牙齒溫水漱下不過三次如湯潑雪即時寬暢通快也治酒積面黃黑色腹脹不消甘遂末一錢用糟頭豬肉一兩細切如泥入遂末和勻通作一丸紙裹燒令香熟取出細嚼酒下臨臥服取下酒布袋為炒燒酒醉傷不醒者急用緑豆粉燙皮切片將箸開口用涼水送下斷酒法用驢駒衣燒灰酒服之治飲酒過多蘊熱胸膈以致吐血衄血葛花二兩黃連四兩為末以大黃末熬膏和丸梧子大每服百丸溫湯下治連月飲酒咽喉爛舌上生瘡水中螺蚌肉蔥豉椒姜煮飲汁三兩盞瘥治中氣虛損脾胃怯弱飲食不下或瀉或痢有調胃實腸之功大鯽魚去腸屎淨入蒜五六瓣於內紙包水濕火煨熟去蒜食魚日服二三次自然進食又治噎膈食不下醒醉湯用青橄欖黃損者不用瓦土磨去粗皮核細切如縷一斤以粉草末二兩炒鹽二兩拌勻入磁罐內密封以沸湯點服自然生津液醒酒極妙治酒後傷風身熱頭痛以防風通聖散加黃連須二錢蔥白十根煎服凡遇天寒冒露或入病家則飲酒三兩盞壯精神闢疫癘閒暇則陶性情養血脈飲者不過量力而已過則耗傷血氣也古云飲酒無量不及亂此言信矣飲者未嘗得和於氣血抑且有傷脾胃傷於形亂於性顛倒是非皆此物也早酒傷胃宿酒傷脾為嘔吐痰沫醉以入房以竭其精令人死尚不知雖知者亦迷而不戒養浩高人當節色而養精神戒飲食以益眉壽此先聖之格言實後人之龜鑑一人飲酒大醉後口中氣仰頭往外出不盡有出氣無收氣此乃氣不歸元死在須臾請醫罔效用韭菜根捶損入舊釅醋炒熱絹包尉臍下此一包冷了又易一包尉至臍下溫暖氣漸降而歸元矣五味淡薄令人神爽氣清酸多傷脾咸多傷心苦多傷肺甘多傷腎辛多傷肝郁證內經曰木鬱達之謂吐之令其條達也火鬱發之謂汗之令其疏散也土鬱奪之謂下之令無壅凝金鬱泄之謂滲泄解表利小便也水鬱折之制其沖逆也散郁湯蒼朮八分香附七分川芎八分梔子仁炒八分陳皮一錢枳殼麩炒七分白茯苓一錢白芍八分甘草二分生薑三片水煎溫服加味越鞠丸常服開鬱思食蒼朮米泔浸薑汁炒四兩撫芎四兩香附童便浸炒四兩神麯炒四兩山梔仁炒四兩陳皮去白一兩半白朮去蘆炒一兩半黃芩炒一兩半山楂蒸去子二兩上為末稀糊為丸梧子大每五六十丸食後白下越鞠丸治鬱結氣滯以致胸膈痞悶或肚腹膨脹或咽喉不清或痰氣不爽或飲食少思或吞酸不腐宜用此藥清之若人脾胃虛弱用六君子湯為主大凡中氣虛弱變症百出難以名狀但用四君補其脾胃元氣漸復諸症自退若用治病之藥則誤矣痰飲丹溪云久得澀脈痰飲膠固脈道阻滯也卒難得開必費調理沉弦細滑大小不勻皆是痰氣為病夫痰屬濕乃津液所化痰之為患為喘為咳為嘔為利為眩為暈心嘈雜怔忡驚怖為寒熱痛腫為痞隔為壅塞或胸脅間轆轆有聲或背心一片常如冰冷或四肢麻痹不仁皆痰飲所致或因脾胃虛弱不能攝肺或為四氣七情所幹氣壅痰聚而然也善治痰者不治痰而治氣氣順則一身之津液亦隨氣而順矣治痰法宜實脾土燥脾濕是治其本也凡奇怪之症人所不識者皆當作痰症而治之也病人口藥不效關上脈伏而大者痰也眼皮及眼下如灰煙黑者痰也二陳湯主方火痰黑色老痰膠濕痰白色寒痰清陳皮半夏白茯苓甘草銼劑生薑煎服濕痰加蒼朮白朮寒痰加乾薑大附子熱痰加黃連黃芩瓜蔞仁風痰加南星白附子牙皂氣虛有痰加人參白朮血虛有痰加天門冬當歸食積痰加山楂枳實黃連炒痰在脅下非白芥子不能達痰在皮膚膜外非竹瀝薑汁不可及痰在四肢非竹瀝不行在經絡中亦可用必以薑汁佐之按上方亦治諸痰飲之總司也清熱導痰湯治憎寒壯熱頭目昏沉迷悶上氣喘急口出涎沫證類傷寒此因七情內傷以致痰迷心竅神不守舍神出則舍空空則痰自生也挾痰如鬼祟黃連枳實瓜蔞仁南星半夏陳皮茯苓去皮桔梗黃芩白朮人參甘草薑棗煎加竹瀝薑汁同服按上方清熱導痰痰迷心竅不省人事一服立醒真神方也開結化痰湯治熱痰在胸膈間不化咯吐不出寒熱氣急滿悶作痛者名曰痰結陳皮半夏茯苓枳殼桔梗貝母瓜蔞仁黃連黃芩梔子蘇子杏仁桑白皮朴硝甘草上銼水煎入薑汁磨木香服按上方清火化痰順氣開膈之劑清濕化痰湯治遍身四肢骨節走注疼痛牽引胸背亦作寒熱喘咳煩悶或作腫塊痛難轉側或四肢麻痹不仁或背心一點如冰冷脈來沉滑乃是濕痰流注經絡關節不利故也南星半夏陳皮茯苓蒼朮羌活酒芩白芷白芥子甘草上銼水煎入竹瀝薑汁磨木香溫服骨體痛甚及有腫塊作痛者名曰痰塊加乳香沒藥滑石朴硝頭項痛加川芎威靈仙手臂腰痛加薄桂引南星控涎丸凡人忽患胸背手足頸項腰胯隱痛不可忍連筋骨牽引釣痛坐臥不寧時時走易不定俗醫不識謂之走注便用風藥及針灸皆無益又疑是風毒結聚欲為癰疽亂以藥貼亦非也此乃痰涎在心膈上下隨氣升降於經絡中作楚而然或令人頭痛不可舉或神志昏倦多睡或飲食無味痰稠黏夜間喉內如鋸聲多流唾涎手腳重墜冷痹氣脈不通誤認為癱瘓亦非也凡有此疾但以此藥不過數服乃愈甘遂去心大戟去皮要紫的白芥子炒各等分上為細末麵糊為丸梧子大每服五十丸如疾猛加至二十丸臨臥淡薑湯送下以下飲為愈如驚氣痰成塊者加穿山甲鱉甲玄胡索莪朮如驚痰加硃砂為衣甚者加全蠍如臂痛加木鱉子霜桂心如酒痰加雄黃全蠍熱痰加盆硝寒痰加丁香胡椒肉桂按上方治諸痰腫痛風毒又治痰迷心竅狂言如有所見殊效滾痰丸洞虛子曰痰證古今未詳方書須有懸飲流飲支飲痰飲溢飲之異而莫知其為病之源或頭風目昏眩暈耳鳴或口眼蠕動眉稜耳輪瘙癢或四肢遊風腫硬似痛非痛或為齒頰癢痛牙床浮腫而癢不一或噯氣吞酸嘈雜嘔噦或咽嗌不利咯之不出咽之不下色似煙煤形如破絮或如桃膠蜆肉之狀或心下如停冰鐵心頭冷痛時作或夢寐奇怪鬼魅之類或足腕痠軟腰背卒痛或四肢骨節煩疼並無常處乃至手麻臂痛狀若銼閃或脊中每有一掌如冰凍之寒痛者或渾身習習而蟲行者或眼沿澀癢口糜舌爛甚為喉閉等症又或繞項結核似癧非癧或胸腹間如有二氣交紐噎塞煩悶有如煙氣上衝頭面烘熱或為失志癲狂或為中風癱瘓或為勞瘵荏苒之疾或為風痹及腳氣之候或心下怔忡驚悸如畏人將捕或喘嗽嘔吐或嘔冷涎緑水墨汁甚為肺壅腸毒便膿攣跛其為內外痛疾非止百端此皆痰之所致也蓋津液既凝為痰為飲而洶湧上焦故口燥咽乾流而之下則大便閉塞面如枯骨毛髮焦乾婦人則經閉不通小兒則驚癇搐搦治法以此先逐去敗痰然後調理括曰甑里翻身甲掛金於今頭戴草堂深相逢二八求斤稱硝煅青蒙倍若沉十七兩中令半兩水丸梧子意常斟千般怪證如神效水瀉雙身卻不任綿紋大黃酒拌蒸八兩黃芩去朽八兩沉香五錢青礞石十兩捶碎焰硝一兩入小砂鍋內瓦片蓋之針線縛定鹽泥封固曬乾火煅冷取出一方加硃砂二兩研細末為衣上為細末水丸梧子大每三五十丸量虛實加減服之一切中風癱瘓痰涎壅塞大便或通或閉者一切走注氣痛或腫或攣或無常痛無定所不腫在一處痠軟沉滯者一切陽證風毒腳氣遍身遊走疼痛一切無病之人遍身筋骨平白疼痛不能名狀者一切頭痛非頭風症牙痛或浮或癢一切因風因寒鼻塞聲重身體不痛非傷寒症者一切噎氣吞酸至於噯逆隔氣及胸悶或從胸中氣塊衝上嘔吐涎飲狀如翻胃者一切心下怔忡如畏人捕怵惕不安陰陽關格變生乖症一切忍飢傷飽憂思過慮至於心下嘈雜或噦晝夜飲食無度或只虛飽腹中稍飢並不喜食一切新久痰氣喘嗽或嘔吐涎沫或痰結實熱或頭目眩暈一切急慢喉閉赤眼一切腮頷腫硬繞項結核若瘰癧者一切口糜舌爛咽喉生瘡每用同蜜少許一處嚼破噙睡徐徐咽之此小口瘡如此噙三二夜瘥也一切心氣冷痛如停水塊或動身散入腹中絞痛上攻頭面腫硬遍身四肢去處腫起軟浮或痛或癢或穿或不穿或穿而復閉或此消彼長漸成篤疾此係痰毒內攻或使爛痰臭或作腸癰內疽服之以下惡物立效一切男婦久患心疼下連小腹面黃肌瘦痛陳日發必嘔緑水黑汁冷涎乃至氣絶心下溫暖者每服八九十丸立見生意然後陸續服之以差為度一切痢疾不間雜色或帶血塊惡物者不問曾經推挨但是新久不已者一切荏苒之疾日久男婦之疾非傷寒內外之症或酒色吐血或月水愆期心煩志亂或腹脹脅痛耳聵鼻塞骨節痠痛乾嘔噁心諸般內外疼痛百藥無效病者不能喻其狀方書未嘗載其疾醫者不能辨其症加減服之無不效也按上方治諸般痰飲為病屬有餘者宜之自傳治痰火第一方先用生石灰一斤選擇好半夏一般大者一斤滾水八九碗傾在瓦盆內待溫澄清去渣將半夏投入日曬夜露七日取出用井水投洗三遍水泡三日一日一換水三次足取出在篩子內又用明淨白礬八兩皮硝一斤滾水八九碗將礬硝投入內晾溫將半夏投入泡七日日曬夜露日足取出投洗三次泡三日一日一換水三次取出入藥聽用於後粉草四兩南薄荷四兩陳皮五錢肉桂三錢丁香一錢白豆蔻去殼五錢枳實五錢沉香一錢木香三錢五味子五錢青皮五錢生薑半斤砂仁五錢川芎二錢上十四味為咀片用滾水十碗晾溫將半夏投入藥浸泡二七日日曬夜露勤攪之日取出將藥渣曬乾合半夏包在白新布內放在熱炕上著瓦盆扣住發三炷香取出取了藥只用半夏放在篩子內曬乾裝在磁器瓶內聽用其藥不用引當可食有痰人服大便如魚凍相似小便似漂水痰出絶不生病疾如有痰迷心竅若將半夏研爛為極細末灌在口內響音一聲化痰順氣而醒用二人扶之勿放倒吃清米飲半鍾後吃稀米飲則可忌飲酒大醉腥物厚味一切油膩其痰永不犯也若不信將此半夏二三枚放在碗內研極細末放在痰盆內即時化為清水矣按上方治痰火之聖藥也逐痰丸紫口海蛤如雞子大者一斤火煅紅淬入童便內如此三次為末卻用鮮瓜蔞拌蛤粉搗千百杵乃勻稀稠得宜作成餅子將麻線穿懸當風處吹乾為末四兩牛膽南星二兩半夏四兩用薑礬煮香油數點煮令透炒黃色青黛二兩黃連二兩陳皮去白二兩青皮去穰炒二兩大黃五兩酒拌九蒸九曬木香五錢上為末薑汁竹瀝丸如緑豆大每三四十丸薑湯下清火豁痰丸治上焦鬱火痰涎壅盛胸膈不利咽喉煩躁噎塞如有所礙吐之不出咽之不下大黃酒拌九蒸九曬二兩青礞石干硝一兩火煅如金色五錢沉香二錢黃芩酒炒一兩半白朮去蘆炒二兩南星半夏各一兩半礬皂姜各一兩水煎湯浸七日枳實麩炒二兩黃連姜炒一兩半梔子炒一兩半貝母去心一兩三錢天花粉一兩連翹一兩陳皮鹽水浸二兩茯苓一兩神麯炒一兩青黛一兩玄明粉七錢白芥子炒一兩甘草五錢上為細末竹瀝和為丸梧子大每服六七十丸食後茶下按上方治諸般氣鬱痰火之症祕傳清氣化痰丸大南星四兩大半夏四兩二味先用米泔水各浸三五日以透為度洗淨切片以碗盛貯曬乾先用薑汁次皂角汁又次礬汁又次硝水曬乾一用生薑汁浸一旦夕曬乾一用皂角一兩煎水去渣浸一旦夕曬乾一用白礬一兩煮水浸一旦夕洗曬乾一用朴硝水煮浸一旦夕洗曬乾青皮去穰陳皮去白枳殼去穰麩炒枳實麩炒白朮去蘆油白茯苓去皮紫蘇子炒白芥子炒萊蔔子炒香附子鹽水炒瓜蔞仁乾葛桔梗去蘆杏仁水泡去皮黃芩酒炒神麯炒麥芽炒山楂肉蒸去子白豆蔻去殼前胡去蘆甘草各一兩上為細末用前浸四味藥水加竹瀝一碗泡蒸餅為丸如梧子大每服五七十丸或茶或薑湯任下按上方清氣化痰消食理氣健脾士夫日用之藥按痰病之原有因熱而生痰者也有因痰而生熱者有因風寒暑濕而得者有因驚因氣而得者有因酒飲而得者有因食積而得者有脾虛不能運化而生者若熱痰則多煩熱風痰多成癱瘓奇證冷痰多成骨痹濕痰多倦怠軟弱驚痰多成心痛癲疾飲痰多脅痛臂痛食積痰多成癖塊痞滿其為病狀種種難明王隱君論中頗為詳盡學者但察其病形脈症則知所挾之邪隨其表裡上下虛實以治也羌活勝濕湯治背惡寒雖盛暑亦著棉衣人之背屬陽濕中太陽久而熱乃火也火起而痰隨之滲入於背兼以飲酒酒乃濕熱之物與病湊合濕痰結聚其勢則冷而性則熱所以外雖惡寒其中實熱也宜先燥其濕次降其火則病除矣先明此藥滲濕方見肩背門依本方各一錢加蒼朮米泔浸炒黃芩酒炒各一錢咳嗽脈宜浮濡忌伏沉丹溪曰肺為五臟之華蓋聲音之所從出入皮毛蝢之而潤澤腎水內滋而生養腠理不密外為風寒暑濕之氣所幹而疾作傷風則脈浮傷寒則脈緊傷熱則脈數傷濕則脈細上半日嗽者為胃中有火午後嗽者屬陰虛五更嗽多者此胃中有食即至此時滯肺氣不利諸邪或痰皆然春是春升之氣或外感夏是火炎上最重秋是濕熱傷肺冬是風寒外束也夏月嗽而發熱者謂之熱嗽小柴胡湯方見傷寒加石膏知母共七味冬月嗽而發寒熱謂之寒嗽小青龍湯麻黃桂枝乾薑細辛半夏芍藥五味子甘草加杏仁共九味風寒鬱熱於肺夜嗽者三拗湯加知母共四味脈大而浮有熱加黃芩陰虛火動而嗽四物合二陳加黃柏知母順而下之共十味陰虛咳嗽或吐紅者四物加知母黃柏人參麥門冬五味子桑白皮地骨皮共十一味嗽而失聲潤肺散即訶子五倍子五味子黃芩甘草共五味等分水煎服或為末蜜丸噙化亦可嗽而無聲有痰半夏白朮五味子防風枳殼甘草共六味嗽而有聲無痰生薑杏仁五味升麻防風桔梗甘草共七味嗽而有聲有痰白朮半夏五味防風久不愈加枳殼阿膠共六味凡嗽久亦有痰中兼血者或帶血絲者燥熱血少者皆當取其化源故曰滋陰降火燥熱勞嗽是宜合而論治參蘇飲主方治四時感冒發熱頭痛咳嗽停飲中脘痞滿嘔吐痰水寬中快膈不致傷脾一切發熱及內傷外感諸般咳嗽痰喘或欲成勞瘵者並治紫蘇一錢陳皮一錢枳殼去穰一錢桔梗去蘆一錢前胡二錢半夏姜炒一錢乾葛二錢茯苓一錢甘草五分人參木香二味減半若新病或不用亦可銼作劑薑棗煎服初咳嗽加桑白皮杏仁久咳嗽加五味子烏梅口乾加麥門冬天花粉陰虛痰嗽或吐血衄血加四物湯名茯苓補心湯嘔逆加藿香砂仁脾泄加蓮肉扁豆白朮頭痛加川芎細辛按上方治諸般咳嗽吐痰之總司也清火寧嗽湯治咳嗽吐痰有熱胸中痞悶枳實桔梗前胡貝母黃芩麥門冬桑白皮赤茯苓甘草生薑三片水煎溫服二母寧嗽湯治因傷酒食胃火上炎沖逼肺氣咳嗽痰喘胸膈痞滿經旬不已知母一錢半貝母一錢半陳皮去白一錢枳實七分瓜蔞仁一錢桑白皮一錢黃芩一錢半石膏二錢梔子一錢二分五味子十粒生甘草三分茯苓去皮一錢生薑三片水煎溫服寧嗽化痰丸橘紅七錢青黛三錢貝母七錢膽星一兩天花粉七錢桑白皮七錢杏仁去皮尖七錢桔梗七錢黃芩五錢前胡七錢甘草三錢加枳實麩炒五錢上為細末煉蜜為丸如龍眼大每一丸淡薑湯化下按上方治痰嗽有熱清涼之劑加味八物湯治四肢倦怠氣血虧損咳嗽吐痰喘急發熱自汗人參一錢半白朮去蘆一錢半白茯苓去皮八分當歸酒洗一錢半川芎七分白芍酒炒一錢熟地黃一錢半麥門冬去心一錢五味子十五個陳皮一錢貝母八分瓜蔞仁八分黃柏酒炒七分知母酒炒七分紫蘇七分甘草四分生薑三片水煎服按上方治咳嗽吐痰屬虛弱者宜之款冬花丸治年老氣虛痰盛涎湧喘嗽不已遇寒尤甚並勞瘵久嗽痰氣等症款冬花淨二兩桑白皮一兩半人參紫蔻桔仁去皮尖知母去毛貝母各一兩桔梗五味子各五錢紫蘇三錢檳榔一錢半木香一錢可加馬兜鈴五錢上為細末煉蜜為丸如彈子大每臨臥嚼一丸滾水下按上方治痰嗽喘促氣急者宜之杏仁煎治咳嗽失音不出並治傷寒聲重暴嗽語音不出杏仁三兩去皮尖紫菀五味子貝母桑白皮木通各一兩白沙蜜砂糖連皮生薑汁各一兩半上銼散水一升煎至半升入杏仁糖蜜薑汁再熬成稀膏每一七噙化虛勞加知母款冬花各一兩丹溪治咳嗽聲嘶者此血虛太多青黛蛤粉為末蜜調噙化按上方治失音聲嘶咳嗽不出者宜之薑糖煎治老人咳嗽喘急煩熱不下食食即吐逆腹脹滿生薑汁五合砂糖四兩上二味相和微火溫之一二十沸即止每度含半匙漸漸下汁白花膏治喘嗽不已或痰有血款冬花百合蒸焙二味等分為末煉蜜為丸龍眼大每服一丸食後臨臥細嚼薑湯咽下噙化尤佳虛弱人最宜服之如聖丹治新久痰喘咳嗽用黃熟瓜蔞三五個連皮子三分入明礬一分搗和成團用篾穿掛經風處陰乾研末薑汁打糊為丸梧子大每五十丸淡淡薑湯送下按上方治咳嗽痰喘對症選用清金化痰丸治上焦酒毒痰火鬱結咯痰湧出胸膈不利之症連翹黃芩香附童便浸瓜蔞仁去殼貝母青黛海粉各一兩風化硝五錢上為細末煉蜜為丸如芡實大每一丸含化清茶咽之按上方治有餘痰火內傷久嗽不可服潤肺神膏治年久咳嗽痰涎喘急百藥無功者天門冬去心八兩麥門冬去心四兩貝母四兩杏仁去皮四兩半夏薑製四兩上五味切片水煎熬去渣取汁五碗入白粉葛末四兩蜜一斤共煎汁入壇內重湯煮一日成膏取出每日無時頻服神效神祕蘆吸散治年久咳嗽哮吼喘急等症鵝管石火煅好醋淬七次一錢餘糧石火煅醋淬七次一錢官桂三分粉草三分枯礬五分款冬花五分石膏煅五分上為細末每服三釐准稱至夜食後靜坐片時將藥放紙上以竹管五寸長直插喉內用力吸藥速亦不怕吸藥令盡為度以細茶一口漱而咽之忌雞魚羊鵝一切動風發物並生冷諸物惟食白煮豬肉雞子戒三七日日宜用公豬肺一副加肉半斤梔子一歲一個炒成炭桑白皮不拘多少用水同煨至熟爛去藥至五更病人不要開口言語令人將湯肺喂之病人嚼吃任用余