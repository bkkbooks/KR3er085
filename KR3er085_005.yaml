之如患者能自嚼咽下亦可多食為良大解熱毒惟金瘡産後及諸脫血症不可食以其破血故也其餘一應癰疽發背等症多食極妙驅風解毒散治痄腮腫痛防風荊芥羌活連翹牛蒡子甘草各等分上銼水煎服外用赤小豆末醋調敷患處恐毒氣入喉難治又方用石灰不拘多少炒七次地下窨七次醋調塗患處立愈聲啞夫心者乃聲音之主肺為聲音之門腎為聲音之根風寒暑濕氣血痰熱邪氣有干於心肺者病在上脘隨症解之散邪氣則無籟鳴矣夫腎虛為病不能納氣歸元故氣上咳嗽痰壅或喘或脹或髓虛多唾足冷骨痿胸腹經絡俱為之牽制其嗽愈重其氣愈乏其聲愈焦須當審於受病之處圖之可也滋腎湯主方當歸川芎白芍熟地黃人參各五錢白朮二錢五分白茯苓陳皮半夏各五錢牛膝去蘆二錢五分杜仲薑炒菟絲子酒炒五味子各五錢益智仁二錢五分破故紙炒二錢五分巴戟去心五錢胡蘆巴炒二錢五分石菖蒲一錢五分甘草炙二錢五分上銼每一兩生薑三片棗二枚水煎於五更頭腎氣開不得咳嗽言語服之立有功效嘹亮丸治聲啞失音當歸一兩生地黃一兩熟地黃一兩天門冬鹽炒五錢麥門冬鹽炒五錢黃柏蜜炒一兩知母五錢人參二錢白茯苓去皮一兩訶子五錢阿膠蛤粉炒五錢烏梅肉個人乳一碗牛乳一碗梨汁一碗上為末煉蜜為丸如黃豆大每服八九十丸訶子湯下蘿蔔湯亦可響聲鐵笛丸治歌謳失音連翹二兩五錢桔梗二兩五錢川芎一兩五錢砂仁一兩訶子肉炒一兩百藥煎二兩薄荷四兩大黃一兩甘草二兩五錢上為細末雞子清和為丸如彈子大每服一丸臨臥噙化服訶子散治久嗽聲語不出訶子去核一兩杏仁泡去皮尖一兩通草二錢上銼每服四錢煨生薑五片水煎食後溫服治痰火聲嘶胡前溪傳五倍子完全未破者一個槐花一撮細茶一撮上銼水煎服人欲好聲音用杏仁一升熬去皮尖酥一兩蜜少許為丸如梧子大每服十五丸空心米湯下治失音不語新槐花不拘多少瓦上慢火炒焦置懷中袖中時時將一二粒口中咀嚼咽之使喉中常有味久聲自出治語音不出皂角一提去皮子蘿蔔三個切片上銼水煎服之不過三服能語聲出又方真蘇子二兩訶子三個杏仁三十個百藥煎二兩上為末每服二錢熱酒調服治聲音不清訶子三錢半生半熟炮木通三錢半生半熟炮桔梗三錢半生半熟炮甘草三錢半生半炙上銼水煎用生地黃搗爛入藥服結核夫結核在項在臂在身如腫毒不紅不痛不作膿者多是痰注不散名曰痰核用二陳湯加酒炒大黃黃連連翹桔梗柴胡各七分胸以上食後服胸以下空心服內消散朱賓湖傳治痰核氣核痄腮疙瘩及吹乳南薄荷葉三錢斑貓去翅足炒三分上為末每服一分燒酒調下立消服藥後小便頻數服王府妙靈散即益元散一方加烏雞子清丸如緑豆大茶下一丸加至卻每日減一丸減至一丸後每日服五丸治瘰癧名內消丸治痰核胡竹軒傳治結核成塊屬風痰者川芎六錢白芷梢一兩細辛八錢藁本七錢五分羌活一兩獨活一兩防風一兩五錢荊芥八錢薄荷一兩連翹一兩當歸尾一兩赤芍梢一兩五錢桂枝一兩甘草節六錢南星薑炒一兩半夏薑炒一兩上為末每服三錢酒調服加減四七湯治梅核屬痰氣鬱結者蘇梗陳皮厚朴南星半夏茯苓枳實青皮砂仁益智仁白豆蔻檳榔神麯炒上銼生薑煎服治痰核心泉侄傳用黃泥作窩入生白礬四兩鹿角蛇一條在窩內陰乾火煅為末每服一分溫酒調服治痰核遍身皆有白頭翁一斤去葉用根分作四服每一服四兩用酒煎一日三次服之二日服盡四劑立效治痰久成塊遍身上下無處不生萆麻子一斤去殼用肉又用公豬肚一個藏藥在內酒煮豬肚爛為度取出麻子曬乾為末用前爛豬肚捶一千下為丸一日三次服之酒下消痰消塊項後側小腸經中疙瘩不變肉色不問大小及月日深遠或有赤硬腫痛生山藥一排去皮萆麻子一個去殼上二味研均攤帛上貼之如神化鳳膏治咽喉頸項結核成形及瘰癧用萆麻子七枚去殼捻爛用薄紙卷於中插入雞子內紙封固水浸濕火煨熟去殼內紙條只食雞子酒一杯送下每早晨服一枚十日效癭瘤夫癭瘤者皆因血氣凝滯結而成之癭則憂恚所生多著於肩項寬不急槌槌而垂是也瘤則隨氣留住初作梅李之狀皮嫩而光漸如林卯是也癭有五種其肉色不變者謂之肉癭其筋脈現露者謂之筋癭若赤脈交絡者名血癭若隨憂惱而消長者名氣癭若堅硬而不移者名曰石癭瘤亦有六種一曰骨瘤二曰脂瘤三曰肉瘤四曰膿瘤五曰血瘤六曰石瘤癭瘤二者雖無痛癢最不可決破恣膿血潰滲漏無已必致殺人其間肉瘤不可攻療若夫脂瘤氣癭之類則當用海藻昆布軟堅之藥治如東垣散腫潰堅湯亦可多服庶得消散矣神效開結散消癭塊沉香木香各二錢橘紅四兩珍珠四十九粒入砂罐內以鹽泥封固煅赤取出去火毒用豬厭子肉四十九枚用豚豬者生項間如棗子大上為末每服一錢臨臥酒調徐徐咽下患小三五服大者一劑愈治瘤生額顱大如碗生南星醋摩加麝少許塗瘤上日敷二次任如碗大半月全消先用小針十數枚作一把瘤上微刺通竅治頸下卒結囊欲成癭海藻一斤洗去咸酒浸飲之加昆布等分為末蜜丸如杏核大含口中稍稍咽下緊瘤法兼去鼠奶痔真奇藥也芫花根淨洗帶滋不得犯鐵器干木器中搗取汁用線一條浸半日或一宿以線系瘤經宿即落如未落再換線不過兩次自落後以龍骨訶子末敷瘡即合系鼠奶痔依上法纍用之效如無根只用花泡水浸線亦妙治小瘤方先用甘草煎膏筆蘸妝瘤旁四圍干而復妝凡三次後以大戟芫花甘遂上各等分為細末米醋調別筆妝敷其中不得近著甘草處次日縮小又以甘草膏妝小量三次中間仍用大戟芫花甘遂如前籹敷自然焦縮肺痿肺癰熱在上焦者因咳為肺痿得之或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之寸口脈數其人咳口中反有濁唾涎沫者為肺痿若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿脈數實者為肺癰咳傷肺葉成也丹溪云宜補血養肺養氣清金如肺癰吐膿腥臭用黃豆以病人口嚼不覺豆之氣味是肺癰也凡男子婦人咳而胸膈隱痛兩腳腫滿咽乾口燥煩悶多渴時出濁唾腥臭名曰肺癰小便赤黃大便多澀桔梗貝母當歸酒浸瓜蔞仁枳殼麩炒薏苡仁微炒桑白皮甘草節防己去粗皮各一兩百合蒸黃耆各一兩五錢五味子甜葶藶地骨皮知母杏仁各五錢上銼每服五錢水鍾半生薑三片煎七分溫服咳加百藥煎熱加黃芩大便不利加煨大黃小便澀甚加木通車前如治肺癰用薏苡仁略炒為末糯米飲調服或煮粥吃或水煎服當下膿血而安焊肺丹凡肺癰必以此藥間而服之以護膈膜不致潰透心肺最為切當即礬蠟丸白礬生三兩黃蠟一兩上為末溶蠟為丸如梧子大每服二十丸蜜湯下薏苡散治肺痿咳嗽其症辟辟燥咳胸中隱隱而痛脈弱無力當歸白芍黃耆人參五味子麥門冬黃芩桑白皮百部薏苡仁上銼生薑煎服治咳嗽吐膿乃肺傷也知母貝母白及枯礬上各等分研為細末每服三錢生薑三片嚼服三五服後即已寸數而實肺癰已成寸數虛澀肺痿之形肺癰色白脈宜短澀死者浮大不白而赤天門冬膏專治血虛肺燥皮膚折裂及肺痿咳咯膿血等症又滋陰降火充旺元氣潤燥之劑天門冬每料十斤或五斤先用溫水洗淨揀過再用半溫水浸一時即去水只待軟透至骨去心皮搗碎每斤先入水五碗同煮一半乾卻傾出濾去渣再搗每斤水四碗約水多少同煮乾一大半再將渣以夏布濾過碾出渣內汁後此渣不用卻將前汁同和一處文武火熬至滴水不散如膏如糊樣去火以磁罐收固每日用白滾湯調服二三次冬月用酒調亦可如咳嗽加蜜一斤生薑自然汁一碗同熬成膏心漏治心漏方胸前有孔常出血水謂之心漏又治腰痛鹿茸去毛酥炙微黃大附子炮去皮臍鹽花各等分上為細末煮棗肉為丸每服三十丸空心酒送下有患腰痛服之立愈而心漏亦止心痛即胃脘痛胃脘痛雖不食不妨治而痛止不宜即食食即腹痛若痛甚手足青過節名真心痛旦發夕死夕發旦死非藥可療也經曰痛則不通通則不痛夫胃脘心脾虛者或因身受寒邪口食冷物內有鬱熱素有頑痰死血或因惱怒氣滯蟲動作痛種種不同若不分而治之何能愈乎豫曰是寒則溫之是熱則清之是痰則化之是血則散之是氣則順之是蟲則殺之庶乎臨症不眩惑也矣一心腹痛痛不得息脈細小遲者生堅大疾者死止痛捷法主方治心痛即胃脘痛多因氣鬱日久蘊積成熱而作痛也山梔仁炒黑二錢五分川芎一錢蒼朮米泔浸炒七分陳皮五分枳殼去穰麩炒一錢黃連炒七分乾薑炒黑五分甘草三分上銼一劑生薑三片水煎熱服服後戒飲食大半日或加香附一錢亦可清郁散治胃中有伏火膈上有稠痰胃口作痛及噁心嘔吐清水吐酸煩悶蒼朮米泔浸炒陳皮半夏香油炒茯苓白朮去蘆土炒黃連薑炒香附炒梔子薑炒各一錢川芎六分乾薑炒黑五分甘草四分上銼一劑生薑三片水煎溫服一方加神麯炒八分藿香八分砂仁四分按上方治胃脘鬱熱刺痛殊效加減小柴胡湯治實熱湊上心腹刺痛或發熱不止柴胡二錢黃芩一錢五分半夏一錢五分枳殼麩炒二錢赤芍二錢山梔子去殼半生半炒四錢上銼生薑煎服有塊加莪朮有熱加黃連黃連六一湯治胃脘當心而痛或嘔吐不已漸成反胃皆因多食煎炒或燒餅炒米蒸麵之類以致熱鬱故作痛也黃連六錢甘草炙一錢上銼作一服水一鍾煎七分去渣溫服連附六一湯治胃脘痛甚諸藥不效者黃連六錢大附子炮去皮臍一錢上銼作一服生薑三片棗一枚水煎稍熱服治心氣痛及胃脘諸痛服梔子去殼二十枚薑汁炒撫芎二錢香附子童便炒二錢上銼水煎三滾入薑汁五匙於內再煎一滾去渣入百草霜四匙調和服之一胃氣痛心神慌亂黃連薑炒倍梔子炒黑倍茯苓茯神二味減半上銼水煎溫服立止一人胃脘心氣作痛內有積熱手不敢揉者酒餅炒梔子炒黑石膏煅上各三錢水煎一服立止一胃脘痛內有積熱脈洪大急數梔子略炒大黃略煨滑石生各二錢木香五分上共為末合一處攪勻每服三錢薑湯調服或吐或瀉立止絳雪散治諸心氣痛不可忍者枯白礬一兩硃砂一錢金箔三片上為末每服一錢五分輕者一錢空心白湯調下祕方治心胃痛如神枯礬一半生礬一半上為末稀粥丸如櫻桃大每服三丸燒酒送下立止按上諸方治胃脘痛對症選用桃靈丹治諸般心腹氣痛有死血者桃仁五錢五靈脂五錢火煨裂上為末醋糊為丸如緑豆大每服二十丸酒下或醋湯下玄靈散治急心疼內有瘀血積塊者並肚腹刺痛五靈脂去砂石玄胡索炒莪朮火煨良薑炒當歸各等分上為末每服二錢熱醋湯調下治心氣痛用五靈脂一錢枯礬二分為末溫酒調下按上方治血積氣滯作痛者宜之治心疼方黃荊子炒焦為末每服三錢米飲調下治心疼方蜂蜜一小盞酒一碗同蜜煎滾調枯礬末一錢溫服出汗治心疼方五月五日午時取獨蒜五個搗如泥入黃丹二兩為丸如雞頭子大曬乾醋湯磨一丸服之愈治心疼方用黑砂糖半鍾熱燒酒調服立止按上單方亦可選用桂附丸治風邪冷氣入乘心絡或臟腑暴感風寒上乘於心令人卒然心痛或引脊膂甚則經久不瘥以手緊按而痛略止可服此藥神效症屬虛寒者宜之川烏頭泡去皮臍三兩大附子泡去皮臍三兩乾薑炮二兩官桂二兩川椒去目微炒二兩赤石脂二兩上為末煉蜜為丸如梧子大每服三十丸溫水下覺至痛處即止若不止加至五十丸以止為度若早朝服無所覺至午後再進二十丸若久心痛每服三十丸至五十丸只一料終身不發按上方治虛寒冷痛宜之無價金丹治清痰食積酒積茶積內積在胃脘當心而痛及痞滿噁心嘈雜噯氣吞酸嘔吐脾疼專治凡人患胃脘痛經年舉發或一月發二三次或半年發十餘次百藥罔效此藥一料除根永不再發神效白朮去油蘆炒三兩片枳實麩炒黃色蒼朮米泔浸炒豬苓麥芽炒神麯炒半夏湯泡透切開薑炒各一兩澤瀉去毛赤茯苓去皮川芎黃連陳壁土炒白螺螄殼煅各七錢砂仁草豆蔻黃芩壁土炒青皮去穰萊蔔子炒乾生薑各五錢陳皮去白香附童便炒瓜蔞仁厚朴薑汁炒檳榔各三錢木香甘草各二錢上為細末用青荷葉泡湯浸晚粳米研粉作糊為丸如梧子大每服七十丸多至一百丸清米飲送下吞酸加吳茱萸湯泡寒月五錢熱月二錢五分久病夾虛加人參白扁豆石蓮肉各五錢時常口吐清水加炒滑石一兩牡蠣五錢按上方治諸積作痛殊效神仙救苦丸方見通治治心痛殊效有蟲痛者必面上白斑唇紅又痛後便能食時作時止者是也上半月蟲頭向上易治下半月蟲頭向下難治先以豬汁及糖蜜食下則蟲頭向上然後用藥打出楝樹根皮檳榔鶴蝨取汁飲各濃煎湯下化蟲丸最效治心胃作痛得食則暫止飢則甚者此胃中有蛔也或時常噁心嘔吐清水等症陳皮半夏白茯苓苦楝根皮倍用使君子去殼甘草上銼生薑煎服治蟲咬心腹刺痛用苦楝根一劑水煎服打下蟲立愈化蟲丸治蟲咬心痛並腹中有塊按之不見往來痛無休止鶴蝨三錢胡粉炒白礬枯苦楝根皮檳榔各五錢上為細末麵糊為丸如梧子大每服十五丸米飲入真芝麻油點打勻服之其蟲小者化為水大者自下按上方治諸蟲痛殊效一儒者心胃刺痛不可忍者此胃口有冷痰痛至於死乾薑肉桂蒼朮半夏生薑煎熱服立止一婦人每怒心腹作痛久而不愈此肝火傷脾氣也用炒山梔一兩生薑五片煎服而痛止更以二陳加炒山梔桔梗乃不發方見痰飲腹痛凡腹痛有寒有積熱有死血有食積有濕痰經云腹滿按之不痛為虛按之痛者為實若綿綿痛而無增減者寒也五積散主之方見中寒時痛時止者積熱也六一順氣湯主之方見傷寒每痛有處不行移者死血也桃仁承氣湯主之痛甚欲大便利後痛減者食積也消食散主之痛如小便不利者濕痰也脈滑多是痰或曰痰豈能痛曰痰因氣滯而聚阻凝道路氣不得宣通故痛宜開鬱導氣湯加半夏如飲食過傷復感冒又兼氣惱行氣香蘇散主之方見傷食如傷飲食諸氣痞悶肚腹脹痛利氣丸主之方見諸氣凡腹中痛甚飲涼水一盞其痛稍可者屬熱痛當用涼藥清之清之不已而或繞臍硬痛大便結實煩渴用涼藥下之若飲水愈如作痛屬寒痛用溫藥和之和之不已而或四肢厥冷腹痛嘔吐瀉痢急服熱藥救之須詳脈來有力無力腹痛脈反浮大而長者死尺脈弦則腹痛腹痛宜微細小遲忌堅大疾臍下忽大痛人中黑者多死開鬱導氣湯主方治肚腹疼痛之總司也蒼朮制一錢陳皮五分香附炒一錢川芎一錢白芷一錢茯苓一錢乾薑炒五分滑石一錢山梔炒一錢神麯炒一錢甘草少許上銼水煎溫服有濕痰加半夏一錢按上方治肚腹熱鬱疼痛神品芍藥湯白芍藥三錢肉桂一錢甘草一錢上銼一劑水煎服有寒加香蘇散有熱加芩連大便閉加枳殼大黃倉卒如神散治氣自腰腹間攻心攣急痛不可忍腹中冰冷自汗如洗手足厥冷又治寒疝入腹心腹卒痛及小腸膀胱氣痛刺脾腎氣攻攣急痛不可忍屈伸不能腹中冷重如石自汗出山梔子四十九個連皮搗碎炒大附子炮去皮臍一個上為末每服二錢酒一盞入鹽少許煎溫服一諸腹痛連於脅隔手足冷脈來伏匿者燒鹽溫湯和服探吐立已按上方治肚腹冷痛者神保丸治諸積氣為痛心膈痛腹痛血痛腎氣痛脅下痛大便不通氣噎宿食不消木香二錢五分胡椒二錢五分全蠍全者七枚巴豆十枚去皮心研去油上為末入巴豆霜再研湯浸蒸餅為丸如麻子大硃砂三錢為衣每服三七粒心膈痛柿蒂燈心湯下腹痛柿蒂煨薑煎湯下血積痛炒薑醋湯下肺氣盛者白礬蛤粉各一錢黃丹一錢同研為散煎桑白皮糯米飲調三錢下氣喘桑白皮糯米飲下腎氣痛脅下痛炒茴香酒下大便不通蜜調檳榔末一錢下氣噎木香湯下宿食不消茶酒漿飲任下酒麴熱毒過度痰飲致臂痛柿蒂湯下諸氣惟膀胱氣脅下痛最難治獨此藥能去之有人病項筋痛諸醫皆以為風治之數月不瘦乃流入背膂久之又注右脅攣痛甚苦乃制服之一投而痙再發除根按上方治諸積氣痛者桃仁承氣湯治瘀血小腹急痛大便不利或譫語口乾漱水不咽遍身黃色小便自利或血結胸中手不敢近腹或寒熱昏迷其人如狂桃仁五錢大黃炒一兩甘草二錢肉桂一錢上銼生薑煎五更服按上方治瘀血作痛者祕方治腹中乾痛有時者蟲痛也雄黃白礬檳榔各等分上為末飯丸黍米大每服五分食遠下干痛者不吐不泄而但痛也有時者淡食而飢則病厚味而飽則否也浮票經曰腹疾干痛有時當為蟲此之謂也按上方治蟲痛者消食散治食積腹痛其脈弦其痛在上以手重按愈痛甚欲大便利後其痛減者是也蒼朮米泔炒一錢陳皮一錢厚朴薑炒八分半夏八分川芎五分香附一錢枳實麩炒一錢木香三分神麯炒一錢山楂一錢乾薑炒七分甘草五分上銼作一劑生薑三片水煎通口溫服按上方治食積腹痛者神仙救苦丸方見通治利氣丸治氣鬱食積腹痛方見諸氣治肚腹痛如錐剜胡云閣傳白芍黃連甘草各三錢上銼一劑金華酒一鍾水一鍾煎服立瘥按上方治肚痛如神四聖丹段千戶傳治心疼肚腹疼陰症攪腸痧神效五靈脂炒出煙桃仁麩炒黃色去皮尖草烏水泡一日一換浸七日去皮尖切作片用新瓦曬乾各一兩青黛二錢入藥八錢為衣上為細末酒糊為丸如梧子大每服十五丸或十七丸十九丸艾葉七片炒出煙黃酒一鍾入鍋內去艾溫艾湯送下按上方治瘀血積氣肚腹痛者利氣保安湯治氣痛已服利氣丸下後餘熱作痛或痛在小腹者柴胡青皮枳殼香附鬱金木通赤芍山梔炒黑上銼生薑煎服神效定痛散治腹中惡氣積冷氣攻痛胸膈嘔吐心腹大痛氣塊攻作疼痛一切虛冷之症玄胡索肉桂砂仁檳榔三稜廣朮茯苓香附蒲黃五靈脂茴香良薑油炒各三錢乾薑丁香青皮香油炒檀香木香藿香豆仁各二錢沉香一錢八分乳香沒藥各三錢五分上為末每服二錢溫酒調服腰痛丹溪曰腎受病則腰滯而痛經曰腰乃腎之府轉搖不能腎將憊矣此痛所感不一有因風寒暑濕傷於腎經又有墜墮險地閃動腰脅氣血凝滯即感皆令疼痛也大法感邪者驅散之凝滯者順氣調血此疾平復矣又曰腰痛者此腎之府腎虛宜補腎順氣濕熱宜燥濕行氣瘀血宜活血行氣痰宜快其氣使痰隨氣佐之以痰藥腰疼其脈必弦而沉弦為虛沉為滯澀是瘀血緩者濕滑是痰經云能屈而不能伸者病在筋能伸而不能屈病在骨故知屈伸不便為筋骨之病也冷痹者陰邪實也無力者氣血虛也凡腰背痛者皆是腎氣虛弱為風濕所乘流注腰膝或攣拳掣痛不得屈伸或緩弱冷痹行步無力八味丸加續斷萆薢獨活寄生湯主方夫腰背痛者皆由腎氣虛弱臥冷濕地當風得之不時速治喜流腳膝為偏枯冷痹緩弱疼痛或腰痛攣腳重痹宜急服此方川獨活桑寄生一方用川斷杜仲酒炒牛膝去蘆酒洗秦艽白茯苓桂心防風去蘆川芎熟地黃人參當歸白芍細辛甘草上銼生薑煎空心溫服加味如神散治男婦一切腰痛破故紙酒炒小茴香鹽炒玄胡索當歸酒洗牛膝去蘆酒洗杜仲去皮酒洗黃柏酒炒知母酒炒肉桂少許上銼生薑煎服氣惱加木香瘀血作痛加桃仁紅花五積散方見中寒治因勞役銼閃而痛加黑醜一錢桃仁炒九枚酒煎服神效按上方治腎虛腰痛者治腰痛神方黑醜半生半炒為頭末水丸如梧子大硫黃末為衣每服五十丸空心鹽湯下治腰痛魚鰾炒成珠好酒一碗淬入內溫熱通口連渣服治腰痛祕方李湛源傳羌活獨活小茴大茴當歸杜仲去皮上銼片用好生酒浸露一宿去渣溫服其渣用酒煎服治腰痛神方屠尚書傳破故紙五錢杜仲酒炒一兩巴戟泡去心五錢葫蘆巴五錢當歸五錢桃仁四十九個上銼酒煎入乳香沒藥末各三錢調熱服煨腎散川杜仲酒炒去絲小茴香酒炒破故紙酒炒各等分上為細末每用豬腰子一個劈開摻藥末一錢在內用紙包水濕慢火煨熟空心食之酒下最妙八味丸治虛勞腰痛小腹拘急者婦人腰痛瘀血四物湯加獨活續斷桑寄生小茴香桃仁紅花入酒煎空心服效治虛損腰腿遍身疼痛徐懷江傳仙靈脾酒浸五兩遠志去心二兩巴戟去心六兩杜仲酒炒五兩破故紙酒炒五兩肉蓯蓉酒洗六兩青鹽半斤大茴香五兩小茴香炒五兩上為末每服二錢用豬腰劈開摻藥末在內紙包火煨熟細嚼酒下按上諸方治腰痛宜對症選用治腰痛百藥不效多是腰間停積惡血作痛大黃五錢更入生薑五錢同切如小豆大於鍋內炒黃色投水一碗煎至五更頓服天明取下腰間惡血物用盤盛如雞肝樣痛即止按上方治瘀血作腰痛者青娥丸專滋腎水壯陽益筋骨治腰膝足痛久服無不驗烏鬚髮萆薢切片四兩一兩鹽水一兩童便一兩米泔一兩酒各浸一宿曬乾川黃柏去皮蜜炒四兩知母蜜炒三兩破故紙酒炒四兩杜仲去皮薑汁炒四兩核桃去殼取肉淨八兩懷牛膝去蘆酒洗四兩上為末春夏用粥秋冬用蜜其粥用糯米一碗煮之將核桃肉搗爛為膏和勻石臼舂千餘下為丸如梧子大每服五十丸至八十丸空心鹽湯或鹽酒送下以乾物壓之按上方治腎虛腰痛者點眼治腰痛不能轉側點藥後少傾復舊神妙雄黃黃丹各二錢焰硝三錢上研為末令患人仰睡次用銀簪點眼大角頭少許緩緩二三次立效又治攪腸心腹痛治男婦一切腰痛並銼閃腰痛腎虛腰痛玄胡索炒官桂當歸小茴香鹽酒炒杜仲酒炒各等分上為末每服三錢空心酒調下或銼酒煎服亦可按上方治銼閃作腰痛者治腎臟虛冷腰脊痛如錐刺不能動搖鹿角屑二兩熬令微黃搗末空服暖酒一杯投鹿角末方寸匕服之日三兩服脅痛夫脅者肝之候也肝病則兩脅下痛其痛有四一曰肝火盛二曰有死血三曰有痰流注四曰肝氣盛急一曰肝火盛當伐肝以龍薈丸主之乃瀉肝火之要藥脅痛甚用薑汁川芎蒼朮青皮當歸二曰有死血宜破血以桃仁紅花川芎香附三曰痰流注二陳湯加南星川芎香附四曰肝氣急當以辛散之用撫芎蒼朮或用小柴胡湯加減亦可左脅痛柴胡為君青皮川芎佐使疏肝散最效右脅痛芍藥為君枳殼升麻佐使或推氣散亦可疏肝散主方治左脅下痛者肝積屬血或因怒氣所傷或跌閃所致或為痛當歸一錢五分川芎七分白芍酒炒七分柴胡一錢五分青皮一錢黃連吳茱萸煎汁拌炒二錢桃仁研如泥一錢紅花五分枳殼麩炒一錢上銼一劑水煎食遠溫服按上方治肝氣盛作脅痛在左者推氣散治肝邪入肺右脅痛甚脹滿不食片薑黃枳殼麩炒桂心各五錢甘草炙三錢上共為末每服二錢薑湯調下水煎亦可按上方治肝邪入肺脅痛在右者當歸龍薈丸瀉肝火盛之要藥因內有濕熱兩脅痛甚伐肝木之氣當歸龍膽草山梔仁黃連大黃酒浸火煨蘆薈青黛各五錢木香二錢五分麝香五分另研柴胡五錢青皮去穰一兩上為細末神麯打糊為丸如梧子大每服二十丸薑湯下按上方治肝火太盛兩脅作痛者大黃附子湯治脅下偏痛發熱其脈緊弦此寒也當以溫藥下之大黃一兩大附子一兩重一枚細辛一兩上銼水煎溫服抑青丸黃連用吳茱萸湯潤一宿暴乾為末作丸一婦人口苦脅脹此肝火之症也用小柴胡湯加黃連梔子少愈更以四君子加當歸白芍柴胡調脾胃而瘥治脅膈時常疼痛得熱則減得寒則增者死血也用韭菜汁清酒等分和服效加味小柴胡湯治傷寒脅痛柴胡黃芩各二錢人參半夏各一錢五分牡蠣粉枳殼麩炒甘草炙各一錢上銼一劑薑棗煎服治婦人胸背脅走痛蒼朮米泔浸川芎白芷赤芍香附黃柏威靈仙桂枝甘草上銼作劑生薑煎服治諸痛尉法用韭菜連根搗爛醋拌炒絹布尉痛處臂痛治臂痛冷起手甚艱或一手臂痛或兩臂痛用交加散即五積散合人參敗毒散加木瓜牛膝薑棗煎服即效未效服烏藥順氣散加羌活木瓜若臂痛而不能舉或痛無定處此脾虛邪氣相搏中脘伏痰故其脈沉細如此宜用茯苓丸控涎丹主之臂痛湯治痰攻雙臂痛又治手臂痛是上焦濕痰橫行經絡中作痛也蒼朮米泔浸一錢五分南星半夏白朮去蘆黃芩酒炒香附各一錢白茯苓去皮陳皮各五分威靈仙三錢甘草一分加羌活一錢上銼生薑三片水煎溫服舒筋湯治風寒所傷肩背作痛及腰下作痛又名五痹湯片薑黃一錢甘草炒羌活白朮海桐皮當歸赤芍各五分上銼水煎服茯苓丸治脾氣虛弱痰邪相搏停伏中脘以致臂內筋脈攣急而痛茯苓二兩半夏用白礬生薑皂角煎湯浸五日曬乾二兩枳殼去穰麩炒五錢風化朴硝一兩上為末薑汁糊丸如梧子大每服二十丸食後薑湯下又治手臂抽牽或戰掉不能舉物服此立效控涎丹方見痰飲凡人忽胸背手足頭項腰胯牽痛不定或頭痛昏倦痰唾稠黏喉中鋸聲手腳重痹此痰涎伏於胸膈也宜服之治臂痛祕方當歸川芎白芷南星半夏防風羌活黃芩黃連桔梗蒼朮桂枝甘草上銼生薑三片水煎食後臨臥溫服肩背痛夫肩背痛者因風盛肺手太陽經傷之氣鬱甚不行也病則頭項腫頸臑肘臂外後疼痛汗出小便數者皆風熱乘肺也小便遺失者皆肺金虛也其脈洪大促上掣者肩背痛也脈沉而滑者膂病也治背心一點痛用烏藥順氣散合二陳湯香蘇散加蒼朮羌活肩背痛汗出小便數而少風熱乘肺肺氣鬱甚也宜瀉風熱則愈通氣防風湯主之防風羌活陳皮人參甘草各五分藁本青皮各二分白豆蔻黃柏各二分升麻柴胡黃耆各一分上銼一劑水煎食遠溫服如面白氣脫氣短者不可服肩背痛不可回顧者此手太陽經氣鬱而不行以風藥散之脊痛項強腰似折項似拔此足太陽經不通行羌活勝濕湯主之羌活獨活各一錢藁本防風甘草炙川芎各五分蔓荊子三分上銼水煎溫服如身重腰沉沉然經中有寒濕也加酒洗漢防己五分輕則附子五分重者川烏五分提肩散治風熱乘肺肩背強直作痛防風羌活藁本川芎白芍炒各七分黃連酒炒黃芩酒炒各五分甘草四分上銼生薑三片煎服氣虛加人參汗多加黃耆蜜炒各一錢血虛加芎歸地黃濕加蒼朮防己薏苡仁各五分
