膿皆屬於熱宜對症選用祕方治耳聾蚯蚓去土陰乾為末七分麝香三分用蔥白寸許塞藥於內左耳聾塞右右聾塞左兩聾兩塞又方細辛為末熔黃蠟和為丸如鼠糞大綿裹塞耳中治耳中常鳴生地黃截塞耳數易之即愈一法以紙裹微灰火中煨塞之治百蟲入耳不出用雞冠血滴入耳內蟲即出治蟻入耳用穿山甲燒存性為末以水調灌之即出治諸蟲入耳用貓尿滴耳內即出取貓尿法以生薑擦鼻其尿自出或用麻油滴之則蟲死難出或用炒芝麻枕之則蟲亦出更不如貓尿之速也治百蟲入耳搗韭汁灌耳中即出又宜川椒末一撮以醋半斤調灌耳中行二十步即出又方火尉桃葉卷之取塞耳立出又方蔥涕灌耳中蟲即出治蜒蚰入耳地龍一條納蔥葉中化水滴耳中其蜒蚰亦化為水治耳鳴如流水聲耳癢及風聲不治久耳聾生烏頭一味掘得來承濕削如棗大塞耳旦易夜易不三日愈治耳痛用鱔魚血數點入耳內便愈又方用白鹽炒熱重綿包尉治耳聾取熊液鼠液滴耳中神效治耳內忽大痛如有蟲在內奔走或有血水流出或干痛不忍者用蛇退皮燒存性細研以鵝翎管吹入耳中立愈塞耳丹治耳聾石菖蒲一寸巴豆一粒全蠍一個去足尾上為末蔥涎為丸如棗核大綿裹塞耳即通治耳內腫痛膿血出白礬枯礬為末入麝香少許吹耳日三四度或綿裹塞耳中立瘥又方用甘遂如棗核大綿裹塞耳中即以甘草於口隨嚼紅綿散治耵耳出膿並黃水枯礬五分干胭脂粉二分半片腦一分熟爐甘石五分麝香少許一方去甘石片腦加龍骨黃丹海螵蛸上為末先以棉杖子搌干膿水另將鵝翎管送藥入耳底一方用蛀竹粉易礬甘亦效按上方治諸般耳病外治之方鼻病夫鼻者肺之所主職司清化調適得宜則肺臟宜暢清導自利攝養乖方則清導壅塞故鼻為之病也蓋肺主氣肝藏於血邪熱傷之則血熱血熱氣亦熱血氣俱熱隨氣上逆故為鼻衄備載鼻衄類甚則生瘡風寒乘之陽經不利為壅塞或為清涕蘊積不散散則不聞香臭或為鼻衄或生息肉又有熱留邪移於腦遂至鼻淵淵濁涕下而不止傳於蔑瞑目故得之氣厥也主方治鼻中流出臭膿水名曰腦漏辛荑花一錢黃耆一錢人參一錢五分當歸一分川芎一錢白芍一錢白芷一錢細辛八分黃芩酒炒一錢甘草六分上銼一劑燈心三十根水煎食遠服神愈散治肺熱鼻流濁涕窒塞不通細辛白芷與防風羌活當歸半夏芎桔梗茯苓陳皮輩十般等分銼和同三錢薄荷薑煎服氣息調勻鼻貫通治鼻淵鼻涕長流當歸川芎白芷人參茯苓麥門冬防風荊芥薄荷蒼耳子香附子蔓荊子秦艽甘草各一兩天竺黃三錢上為末煉蜜為丸如梧子大每服三四十丸米湯下祕方治鼻出黃水臭不可聞絲瓜從根下量上四尺五寸燒灰存性為末酒調服立效一男子面白鼻流清涕不聞馨穢三年不愈用補中益氣湯加麥門山梔而愈治老人鼻中流涕不幹名鼻淵獨蒜四五個搗如泥貼腳底心下用紙貼之其涕再不出按上方治鼻中流涕名曰鼻淵宜對症選用治男子酒齇鼻雄豬膽每早以好熱酒調服一個不過半月如舊治鼻疳爛通鼻孔用鹿角一兩白礬生一兩俱放在瓦上隔火煅過人頭髮五錢在燈上燒過共為末先用花椒湯洗淨摻藥於疳上三四次即愈如瘡不收口用瓦松燒灰存性研末乾摻即收治急疳蝕鼻口數日欲死取藍薜敷之令遍日十度夜四度瘥治肺風鼻赤用硫黃白礬各等分為末以茄子汁調塗治久患鼻瘡膿血臭者用百草霜研末每三錢水調服治鼻赤方用生銀杏嚼爛敷鼻上參歸丸治血熱入肺名曰酒齇鼻苦參淨末四兩當歸淨末二兩上兩味和勻酒糊為丸如梧子大每服七八十丸食後熱茶下金花丸治酒齇鼻黃連二兩黃芩二兩黃柏一兩梔子一兩大黃火煨一兩桔梗二兩上為末水丸如梧子大每服七八十丸白水下清氣飲子治鼻紅肺風山茶花二兩黃芩二兩胡麻仁二兩山梔二兩連翹一兩薄荷二兩荊芥一兩赤芍一兩防風一兩葛花二兩苦參二兩甘草二兩上為細末每服三錢茶清調服用後藥搽效搽藥方白礬一錢杏仁四十九個水銀一錢輕粉七分白梅七個大楓子四十九個京墨一錢五味子四十九粒核桃七個上共為細末雞子清調搽患處治糟鼻臉方用硫黃為細末甚者加草烏尾以酥油調稀塗患處如覺痛苦用梔子煎湯服之或洗患處即愈按上方治酒齇鼻鼻疳鼻赤鼻瘡糟鼻對症選用口病夫口者足太陰脾經之所主五味之所入也蓋五味入口藏於脾胃為之運化津液以養五氣五氣者五臟之氣也節宣微爽五臟之氣偏勝由是諸病生焉且咸則停滯澀則因燥淡則由虛熱則從苦從甘也口臭者乃臟腑臊腐之不同蘊積於胸膈之間而生熱沖發於口也口瘡者脾氣凝滯風熱加之而然治之當隨其所因以治無太過不及耳肝熱則口酸心熱則口苦脾熱則口甘肺熱則口辛腎熱則口咸有口淡者知胃熱也清金導赤散主方治心肺蘊熱口瘡咽痛膈悶小便淋濁不利黃芩黃連梔子木通澤瀉生地黃麥門冬甘草上銼生薑三片水煎服犀角飲治口舌生瘡咽喉腫痛熱毒時氣升麻桔梗甘草各一兩牛蒡子二兩犀角五錢上銼竹葉七片煎去渣細細熱漱溫即咽之其渣掃腫處陰陽散治口瘡用黃連乾薑各等分為末摻患處立已一方如青黛孩兒茶尤妙緑袍散治口瘡用黃柏一兩青黛三錢為末摻患處立已一方加密陀僧一錢加味四物湯治血虛發熱口舌生瘡或牙齦腫潰或日晡發熱煩躁不安或因怒而致當歸熟地黃各三錢白芍川芎牡丹皮柴胡梔子各一錢上銼水煎服治口瘡服涼藥不愈者因中焦虛且不能食因相火衝上無制用人參白朮乾薑甘草甚者加附子或加官桂此從治法也八珍湯治氣血俱虛口舌生瘡或齒齦腫潰惡寒發熱或煩躁作渴胸脅作脹或便血吐血盜汗自汗等症人參白朮白茯苓當歸川芎白芍熟地黃各一錢甘草炙五分上銼薑棗煎服上清丸主口舌生瘡咽喉腫痛止嗽清聲潤肺寬膈除熱百藥煎四兩薄荷淨末四兩砂仁三兩訶子五錢桔梗五錢甘松五錢寒水石二兩玄明粉五錢硼砂五錢片腦一錢上為末甘草熬膏丸如梧子大或嚼三五丸茶清下玄門丹治口瘡連年不愈者天門冬去心麥門冬去心玄參各等分上為細末煉蜜為丸每服一丸噙化小柴胡湯治口苦乃謀慮不決人參柴胡半夏麥門冬酸棗仁地骨皮遠志甘草水泡去心甘草上銼薑棗煎服一治口臭牙齦赤爛腿膝痿軟或用黃柏等藥益甚時或口咸此腎經虛熱六味丸奏效舌病丹溪曰四氣通乎口舌舌和則五味知夫舌者脾胃之所通心氣之所主和則知五味資於脾而宗於身也二臟不和風寒中之則舌強而不能言更有重舌木舌胎舌衄等症皆由心脾虛熱所乘而然也玄參升麻湯治心脾壅熱舌上生瘡重舌木舌舌腫連頰兩邊虛浮腫痛玄參赤芍升麻桔梗枳實黃芩犀角甘草各等分上銼一兩生薑煎服治舌腫硬閉塞悶亂百草霜食鹽各等分井花水調塗舌上治舌無故出血名舌衄用槐花為末摻之而已治傷寒舌出寸余連日不收用梅花片腦摻舌上應手而收治舌喉閉用朴硝白礬摻舌中立效一男子口舌常破如無皮或咽喉作痛服清咽利膈散愈甚豫以湯治之乃愈治舌腫硬硼砂末薄劈生薑蘸藥揩舌上腫處一方用蒲黃摻舌上尤良治舌頃忽伸出不入以萆麻子末捲紙條燒煙熏沖鼻中有涎即收治重舌白礬生谷丹飛五倍子上為末用蜜調塗舌上少頃用水漱之再塗以安為度胡麻散治舌青黑有刺乃熱劇也患者將舌陳土壁上吮之方好赤茯苓酸棗仁麥門冬各一錢遠志甘草水泡五分黃連胡麻仁各一錢枳殼小木通各八分小甘草三分上銼水煎服治口舌生瘡牙宣出血黃賓江傳大皂角燒灰有性牙皂燒灰存性銅緑膽礬雄黃孩兒茶百草霜枯礬上各等分為細末將米泔水洗口瘡後搽藥牙齒夫牙齒乃骨之餘氣呼吸之門戶也精氣強則齒自堅衰則齒自落而手陽明之脈入於齒灌注於牙倘寒熱之氣鬱滯於心則齒為之病也牙痛有四熱冷風蟲也熱者怕冷水冷者怕熱湯不怕冷熱即是風牙有蟲竅者即是蟲牙用藥之法熱用牙硝鬱金雄黃荊芥冷用乾薑蓽撥細辛風用皂角殭蠶蜂房川烏草烏蟲用雄黃石灰砂糖牙齦生蟲乃陽明胃上濕熱甚而生也加味清胃散主方治牙齒腫痛之總司也專治胃火血燥唇裂或為繭唇或牙齦潰爛作痛軟石膏生地黃牡丹皮當歸尾黃連升麻防風荊芥各等分上銼水煎頻頻噙咽齒齦浮腫痛不可忍胃中有濕熱故爾加梔子玄參祕方治牙齒痛百藥不效家園生地黃二錢鮮赤芍八分牡丹皮八分白桔梗八分黑玄參八分連翹八分川黃連一錢石膏一錢川升麻一錢甘草一分半白竹茹五分上銼水煎食遠服清火祛風散治牙痛並牙齦腫緊難以開口立效黃連黃芩黃柏梔子連翹金銀花羌活獨活白蒺藜甘草上銼水煎頻頻溫服按上方治牙痛屬胃火風熱有餘者宜服保牙散黃左泉傳治熱冷風蟲牙痛腫不可忍進皆治如神石膏一兩川烏三錢草烏三錢花椒三錢上為末擦牙漱口吐之清胃補中湯治虛弱之人牙齒痛不可忍者黃耆蜜水炒一錢人參五分白朮去蘆七分當歸酒洗一錢升麻二錢柴胡七分黃連一錢牡丹皮一錢生地黃二錢陳皮七分甘草三分上銼水煎溫服按上方治內傷元氣牙痛之劑八味丸方見補益治腎氣虛寒牙齒作痛面色黧黑精神憔悴瘦怯腳膝無力飲食少思或痰氣上升小便頻數齒不堅固或口舌糜爛畏飲冷水經云腎衰則齒豁精固則齒堅按上方治下元虛寒牙痛之劑甘露飲子治男婦胃中客熱口氣齒齦腫悶宣露心中多煩飢不欲食喜眠睡及喉中有瘡口瘡腫痛赤爛天門冬麥門冬生地黃熟地黃黃芩枳殼茵陳石斛枇杷葉甘草各等分上銼水煎食遠服血齒痛加升麻一方加烏犀角其效如神按上方治齒齦宣露出血腫悶煎藥漱之冷熱皆可治齒齦宣露每旦捻鹽納口中以熱水含漱齒百遍不過五日齒即牢密牙宣膏治牙齒動搖不牢疼痛不止齦肉出血麝香一字白龍骨二錢半官粉二錢半另研上二味為末後入麝香攪勻用黃蠟一兩磁碗內化開入藥於內又攪勻用無灰咨呈紙裁作方片於藥內度過煎作條臨臥於齒患處齦肉開封貼一宿七寶散治一切牙疳白硼砂一錢枯礬一錢蘆薈五分青黛三分輕粉二分雄黃二分冰片一分上為細末摻牙疳上或以雞羽掃敷之按上方治牙宣牙疳任用治牙疼青鹽二兩白鹽四兩川椒四兩上煎湯拌二鹽炒乾為末擦之永無齒疾以漱出水洗目永無目疾治牙疼用小麥黑豆各一把花椒艾葉少許同煎水漱冷即吐去愈治牙疼用蒼耳子濃煎汁含漱立效治蟲牙痛天仙子不拘多少燒煙用竹筒抵牙引煙燻之其蟲即死治牙痛祕方銅青硼砂花椒上為末擦之立已天笑散西園公制治風冷齒痛白芷細辛良薑蓽撥川椒香附蜂房炒各等分上為細末擦牙搐鼻按上方外治之劑擦牙烏須固齒補腎神祕方何首烏四兩黑豆蒸一次牛膝蒸一次旱蓮草四兩槐角黑豆汁拌蒸四兩懷生地黃酒拌砂鍋蒸黑二兩骨碎補一兩五錢炒七次青鹽一兩沒石子公母成對一兩上為末擦牙咽下祕方擦牙固齒骨碎補四兩火煅存性青鹽六兩蒲公英二兩旱蓮草二兩上為末每擦牙良久漱去治牙齒動搖黑錫半斤大鍋內化成汁入桑條灰柳木捶研合砂以熟絹羅為細末每日早晨擦牙溫水漱在盆內以水洗眼能明目黑鬚鬢牢牙固齒擦牙固齒生牙祕方陳懷泉傳用雄鼠不拘多少每個剝去皮毛並腸屎令淨每將肚破開以好鹽實其內仍以線縫住用鹽水和黃泥固濟令乾灰火煅令通赤候冷取出去泥土淨為末每