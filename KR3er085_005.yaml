body:
  text: 巽集卷五眼目夫世之最貴者莫貴於人人之最貴者莫過於眼眼者五臟六腑之精華一身之貴寶故患眼者或風熱所感或憂怒過傷或痰火上升或陰虛上攻或生內外障翳其狀多端難以概論眼有七十二種八般風眼四十八樣外障十六般內障今人偏作風熱一途而治若遇眼疾遂以寒涼之藥利其內點洗寒涼治其外皆所不效且如北人患眼最多因日冒風沙夜臥熱炕二氣交蒸邪熱不分人之虛實而中之也若果系實熱赤腫而痛者脈浮而數當行寒涼利劑倘若陰虛火動概投寒涼之藥損其陰血遂至失明遇此者不可不辨也凡欲治眼先須補腎後乃治肝肝是腎之苗腎是脾之主收肝則神魂安定養腎則精魄流通魂魄既已安和眼目自然明朗譬如樹果惟在於根根壯則枝葉茂盛根損則花果無實故黑睛屬腎腎枯則腦虛淚竅通肝肝虛則冷淚淚出於白仁仁屬肺肺熱則赤眼通晴上臉下胞屬脾脾有風則胬肉赤腫眼有五輪外應五行心肝脾肺腎屬五行金木水火土五輪者風血水肉氣夫人好食丹藥或夜思量苦事費用精神腹中受熱或好食五辛貪淫愛欲或精枯不睡視物黑花如此並是損眼之根源日深月久便成大患少年不可恣意隨心酒後放情貪淫縱欲惟快一日之樂不顧有將來之患遂致氣血虛損眼不奈視治療之法益肝補脾滋其腎水水濟則神光有餘病可脫矣大明散治一切暴發赤眼怕日羞明隱澀難開熱淚長流腫痛不可忍者或生翳障攀精胬肉肉障昏蒙不問新久並治當歸川芎赤芍生地黃黃連黃芩黃柏梔子連翹薄荷防風荊芥菊花蔓荊子牛蒡子柴胡羌活甘草上銼一劑燈心十根水煎食遠溫服眼赤腫痛加大黃芒硝翳障加木賊白蒺藜祕方治火眼赤眼暴發腫痛沙澀難開黃連黃柏各一錢白礬生二分膠棗一枚上銼煎水半鍾洗之腫毒立消一方用水浸蒸取汁去渣鴨毛頻點睛上立效光明丸李中山傳凡眼疾皆緣心家火起生翳障紅腫澀痛怕日羞明治症如前當歸尾川芎生地黃防風荊芥羌活獨活菊花草決明木賊連翹薄荷白芷黃連黃芩黃柏大黃桔梗甘草上各等分為細末煉蜜為丸如緑豆大每服三十丸熟水下早晚各一服祕方治火眼腫痛用生薑一塊切開剮一孔入黃連銼碎二錢在內薑仍蓋住紙包水濕煨熟去薑將連用人乳半盞入內攪百下用乳點眼立效按上方治一切眼疾屬風熱有餘者宜之養心明目湯治兩眼昏花流淚翳膜遮睛當歸酒洗一錢川芎五分赤芍五分熟地黃酒蒸一錢防風七分荊芥五分羌活七分黃芩四分連翹四分黃柏酒炒六分知母五分菊花五分上銼劑水煎食遠服酒毒加黃連三分翳膜加木賊四分溺赤加山梔子滋腎明目丸治症同前熟地黃酒蒸一兩二錢山茱萸酒蒸去核一兩二錢山藥一兩二錢白茯苓去皮一錢當歸酒洗一兩川芎三錢懷生地黃酒洗五錢蔓荊子二兩甘菊花五錢黃連五錢柴胡三錢遼五味子五錢牡丹皮八錢上為細末煉蜜為丸如梧子大每服五七十丸空心酒下按上方治一切眼疾屬心腎虛弱不足者宜之瀉火升陽湯治虛弱人暴發火眼黃耆八分人參七分甘草五分柴胡一錢五分升麻一錢八分當歸三錢川芎三錢生地黃三錢黃芩二錢梔子二錢薄荷二錢菊花二錢藁本三錢枳實一錢六分枸杞子二錢龍膽草二錢上銼作一服水一鍾酒一鍾煎至一鍾臨臥服渣再用水三鍾煎至一鍾溫服即愈如未痊愈將第三次渣用水二鍾煎至一鍾溫服忌魚腥沖和養胃湯治內障眼得之脾胃元氣虛弱心火與三焦俱盛飲食失節形體勞役心不得休息故發為此疾黃耆蜜炒一錢五分人參一錢炙甘草一錢五分當歸酒洗一錢白朮去蘆一錢白芍酒炒六分白茯苓去皮三分柴胡七分升麻一錢葛根一錢羌活一錢五分防風五分黃連七分黃芩七分乾薑一分五味子二分上銼一劑水煎食遠頻頻稍熱服按上方治一切眼疾屬元氣虛損者宜之十全大補湯治久病虛損或因克伐脾胃傷損眼目昏暗或飲食失節勞役形體脾胃不足得內障耳鳴之患或多年眼目昏暗視物不明此藥能令廣大聰明久服無內障外障之患耳鳴耳聾等症此壯腎水以制陽光治久服眼藥寒涼過度黑暗全不通路服之立見光明黃耆蜜炒人參白朮去蘆白茯苓去皮當歸身酒洗川芎白芍酒炒懷熟地黃酒蒸肉桂白豆蔻去殼沉香大附子麵裹火煨去皮臍甘草炙上銼薑棗煎服大補回光丸治肝腎俱虛精血不足眼昏黑花迎風有淚頭眩耳鳴眼多瞤動或腎臟風毒下注腰沉重筋骨痠痛步履無力陰虛盜汗濕癢生瘡常服延年益壽耐寒暑進飲食黑鬚發潤肌膚壯筋骨滋榮衛大臻奇效當歸二兩川芎二兩熟地二兩白茯苓一兩五錢牛膝去蘆酒浸二兩巴戟去心一兩肉蓯蓉二兩石棗酒蒸去核二兩甘枸杞一兩五錢菟絲子酒煮一兩五錢覆盆子二兩五味子二兩杜仲蜜炒一兩五錢石斛去根一兩五錢續斷一兩五錢防風去蘆一兩五錢肉桂一兩上為細末煉蜜為丸如梧子大每服五十丸鹽湯溫酒任下又加山藥二兩尤妙按上方治一切眼疾大補諸虛百損之聖藥也加味紫金丸西園公驗治男婦一切眼目昏暗諸般翳障當歸酒洗川芎各一兩五錢天花粉六錢菊花一兩蔓荊子炒一兩楮實子炒五錢薄荷五錢川椒七錢一方用一兩半密蒙花一兩地骨皮一兩荊芥穗一兩蛇退三錢甘草水浸焙乾白蒺藜炒一兩五錢木賊童便浸一兩黃連一兩羌活一兩甘草三錢上為細末煉蜜為丸每一兩作十丸隨引下日服二次翳障米泔水下睛暗青盲當歸酒下氣障木香湯下婦人血暈薄荷當歸湯下忌葷腥酒面之物有人因熱飲酒患眼三年不分道路哭泣失明服此得效一方去木賊黃連羌活甘草只十三味名明目紫金丸一方加茯神山藥枸杞子人參西蜀周夢鶴傳一方於十七味中再加蟬退三錢名撥雲退翳丸目能遠視不能近視火盛而水虧也法當補腎六味地黃丸主之方見補益目能近視而不能遠視有水而無火也法當補心定志丸加茯苓主之方見怔忡六味地黃丸治腎虛眼不奈視神光不足加當歸蔓荊子各一兩益陰腎氣丸治腎虛目暗不明壯水之主以制陽光熟地二兩生地黃山藥當歸尾山茱萸酒蒸去核五味子牡丹皮去骨柴胡各五錢澤瀉白茯神各二錢五分上為細末煉蜜為丸如梧子大每服七十丸空心鹽湯下育神夜光丸此藥養育精神聰明益智主健忘補血潤燥久服眼目光明神宇通泰語音清亮燈下眼力愈壯並不昏澀不睡達旦亦不倦服三月後愈覺神清目明志強力盛步履輕快體氣舒暢是藥之效當歸全身酒浸懷生地酒洗懷牛膝去蘆酒洗菟絲子酒蒸遠志甘草水泡去心枳殼麩炒真地骨皮甘枸杞子甘菊花上各等分為細末煉蜜為丸如梧子大每服五六十丸空心鹽湯下食後溫酒臨睡茶下亦可按上方治諸眼病攻補兼施之劑四明飲治翳障遮睛腫痛不可忍者石決明葛花澤瀉木賊大黃上銼水煎三服效治風毒眼目昏暗翳膜疼痛荊芥穗烏蛇退炙黃蟬退去翅足羌活木賊白蒺藜炒去刺上六味各等分每服二錢食後溫茶清或溫米泔調下日三服按上方治眼生臀障專攻之劑冰壺散洗一切眼疾不問腫痛癢爛昏花翳障當歸川芎赤芍生地黃羌活防風菊花梔子蒺藜黃連倍用上銼散用新砂鍋入水煎去渣溫洗眼目立見光明治紅眼白礬二錢飛一半銅緑一錢膠棗五枚上共為末水一茶鍾煎砂鍋內五六滾清晨洗眼小兒雀日夜不見物灸手大指甲後一寸內臁橫紋頭白肉際各一炷如小麥大治爛弦風濕眼田螺五個以水養數日去盡沙泥候靨開以銅青如豆大一粒入在內即化成水傾出以鵝毛蘸水刷眼弦上數次愈治拳毛倒睫石燕子一對大者一雌一雄圓大者為雌長小者為雄磨水點搽眼內先以鑷子摘去拳毛次用藥點常用黃連水洗首生男乳療目赤痛多淚又取和雀糞點赤目胬肉治眼青盲豬膽五枚取汁於銅器中慢火煎令可丸即丸如黍米大納眼中驗治眼中生雲翳冬青葉七個五倍子三錢煎水一碗乘熱將舌尖蘸入水中良久雲翳自落治眼生翳膜檳榔石燕子上二味濃磨水以銅錢蘸藥水點眼目中治眼生胬肉臘月雄豬膽用牙硝入內將風吹乾為末入腦麝點之治眼癢多因布中拭破眼眶致成爛弦風白礬一兩銅青一兩上兩味同研細每用半錢熱湯半盞泡澄清以手蘸開眼如法洗必澀不可拭乾但閉目坐得澀止自開眼如藥冷將紙蓋盞面於湯瓶上頓溫又洗一日洗四五次神效驅風散治風毒上攻眼腫癢澀痛不可忍者或上下瞼皆赤爛浮翳瘀肉侵睛五倍子一兩蔓荊子一兩五錢上每用三錢水二盞磁罐內煎一盞澄去渣熱淋洗大能明目去澀止癢治翳膜赤眼腫痛芒硝置銅器中急火上煉放冷數日研細點眼角治赤眼障翳熊膽一粒以少許淨水調開去盡筋膜塵土入片腦一二片或淚癢加生薑粉些少時以銅箸點之絶奇熏目清涼散山梔仁黃連錦紋大黃山菊花當歸生地黃芒硝青銅錢明白礬上各等分每用二錢碗內水八分又用一碗底取一孔將藥扣住周圍封固以紙覆孔入滾湯鍋內三五沸取下少時去覆紙待大氣稍出氣溫之際就患目於孔上熏之氣涼再燉再熏即愈按上方皆外治之劑祕傳混元球方外異人傳治眼目百病可通神明爐甘石一兩珍珠一錢琥珀五分熊膽一錢硼砂五分上共五味用好細嫩潮泥水調成一餅另將泥圓一大彈居中將潮泥包丸彈在內破開二塊取去中一丸彈子不用卻將外包皮二塊將前五藥放於內密封團得極圓外又將白礬末食鹽和泥再包一重使火燒不破此名混元球聽用硬炭四五十斤砌一爐地上用三個鐵釘打在地上如香爐腳一般將球放在釘上將火四圍燒紅三炷香二文一武頭一次用好醋將球淬入醋內取出第二次如前又燒紅淬入童便內一鉢將球淬入第三次以眼科諸藥煎濃水以球燒紅淬入又將球燒透明方退火次日取開內藥碾爛再入熊膽一錢將箬葉盛貯火上烘其膽至干只有二三分鐘方好入前藥再將前藥看有許多重每一兩入牙硝即焰硝一錢在內共研細入磁罐內每用簪點眼角閉目良久一開如雲開見日不問新久諸般眼疾內外翳障攀睛胬肉青盲腫痛爛弦諸症悉效益府祕傳撥雲龍光散治一切翳障攀睛胬肉內障青盲等症白硃砂即上好細白磁器五錢重用頭釅醋一碗將磁器以砂鉢盛放炭火內燒紅先投入醋內以七七次為度又用童便一碗燒紅投便內以七七次為度先將磁研爛以水澄淨用中間的五分蕤仁五兩去粗殼取仁用溫水浸去嫩皮膜尖心用上好白竹紙包裹捶去油以白為度用五錢好珍珠八九分將雄雞一隻以珠入雞肚內過一宿殺雞取出珠用豆腐蒸過用五分真熊膽三分以磁瓦盛放炭火上烘去水用二分五釐硇砂三四分將冷水一碗以火煮乾為度用一分硼砂二錢五分牛黃二分五釐琥珀五分冰片一分當門子一分白丁香一分海螵蛸水煮過六七分用二分人龍用男人孩子口吐出食出即用銀爭剖開河水洗刮令淨陰乾一分上精製一處細研磁器收藏任意點眼盲者復明古今天下第一明目神方千金不授祕之祕之一人兩眼出煙霧此肝火也以柴胡黃連等分作大劑服之愈一婦人因怒氣傷肝眼目昏暗如煙霧當歸川芎白芍生地黃白朮茯苓陳皮半夏龍膽草柴胡黃連梔子牡丹皮白豆蔻甘草上銼生薑煎服此病因氣作嘔吐後患目不見頭痛脈訣曰頭痛短澀應須死浮滑風痰皆易除又云寸脈急而頭痛厥頭痛者因氣血俱虛風寒暑濕之氣所侵傳於陽經伏留不去名曰厥頭痛蓋厥者逆也逆壅而衝於頭也頭引腦顛陷至泥丸宮