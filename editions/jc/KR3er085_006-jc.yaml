草云肉治瘵病胞衣主勞損面黔皮黑諸疾憔悴白茯苓去皮五錢人參一兩乾山藥二兩上為細末麵糊和人河車加二末丸梧子大每服三五十丸空心米飲下咳甚五味子湯下六味丸補中益氣湯歸脾湯四君子湯四物湯以上俱見補益崩漏崩漏皆由傷損衝任二脈血氣俱虛不能約制其經血故忽然暴下然崩漏之症亦有陰陽若婦人年五十之後經止數年矣忽經又行兼腹痛或身熱口渴者曰崩陰症也若婦人年三十四十後經行三十日湧暴不止者曰漏屬陽症也若崩漏初不問虛實先用四物湯加荊芥穗燈上燒防風升麻煎服如不止加炒蒲黃白朮升麻並諸止血藥止之治血崩驗方懷生地黃用砂仁陳皮煎水拌蒸六分牡丹皮六分石棗五分山藥五分條芩酒炒八分蒲黃炒六分阿膠炒八分香附醋炒六分白芍酒炒八分白朮六分黃連姜炒八分陳皮五分甘草一分上銼一劑薑棗煎服陳白野經驗血崩方益母草一錢沙參八分川芎一錢白芍一錢熟地黃八分香附醋炒一錢阿膠蛤粉炒一錢蒲黃炒八分陳皮二錢二分白朮一錢半甘草五分上銼一劑水煎空心服奇效血崩方當歸川芎白芍懷熟地阿膠炒艾葉醋炒蒲黃炒懷生地山梔炒地榆白朮黃連黃芩甘草各等分銼劑水煎空心服和經湯凡婦人四十五六經水斷絕五十二三複來或淋瀝或成片條漏下不止此乃陰陽相返氣血妄行調理最難先服此藥三劑繼進調經大補湯方見調經當歸川芎白芍熟地黃白朮白茯神白芷香附條芩酸棗仁炒阿膠炒蒲黃炒上銼生薑煎服按上方治血崩漏下任意選用固經丸治婦人經水行過多不止樗根皮七錢半白芍炒一兩黃芩炒一兩龜板炙一兩黃柏炒三錢香附童便浸二錢半上為末酒糊為丸每五十丸空心溫服白湯下白鳳膏治血崩神方白毛烏肉雄雞一隻吊死水泡去毛腸雜將金櫻子之根洗淨切片裝入肚內用酒煮令熟去渣將雞酒食之立效神龍丸賈蘭降方治血崩如神及經水過多不止尤妙黑驢糞燒灰存性為末麵糊為丸每服五七十丸空心黃酒送下劉嵩皇屢試治血崩神方何首烏切一兩甘草些須黃酒一碗煎八分入刺刺芽汁一盞同服立止天靈散治血崩不止如神天靈蓋燒存性為末每服二錢空心溫酒調服立止治血崩豬精肉煮熟四兩百草霜二兩篩過蘸肉吃治血崩陳槐花一兩百草霜五錢上為末每服三四錢溫酒調若昏憒不省人事燒紅秤錘淬酒下治血崩棕燒灰一撮好酒調服又方韭菜根搗汁一小鐘黃酒一大鐘和服凡血崩乃經脈錯亂不循故道潮溢妄行一二日不止便有積瘀之血凝成窠臼更以藥澀住轉見增劇宜先以五積散加防風荊芥再少加醋煎投一二服次進獨行散以霹靂酒下二三服即止如不止再以諸止血藥治之獨行散治血崩五靈脂炒盡煙為末每服一錢溫酒調下又一方半生半炒按上諸方宜對症選用治婦人五十以上經脈暴行內經曰火主速不可以冷病治之如下峻藥即死只可用黃連解毒湯以清其上加棕灰蓮殼灰以滲其下然後用四物湯涼血和經可也一婦人血崩而心痛甚名曰殺血心痛由心脾血虛也若小產去血過多而心痛甚者亦然用烏賊魚骨炒為末醋湯調下收斂之若瘀血不散用失笑散行散之若心血虛弱用芎歸湯補養之若鬱結傷血用歸脾湯調補之一婦人血崩兼心痛三年矣諸藥不應每痛甚虛症悉俱面色萎黃余曰心主血蓋由去血過多心無所養以致作痛宜用十全大補湯參術倍之三十餘劑稍愈百餘劑全安益胃升陽湯治婦人經候凝結黑血成塊左廂有血瘕水泄不止食有時不化後血塊暴下並水泄俱作是前後二陰有形血脫竭於下既久經候猶不調水泄日三四行食罷煩心飲食減少人形瘦弱血脫益氣古聖人之法也先補胃氣以助生髮之氣故曰陽生陰長諸藥為之先務也甘能生血陽生陰長之理人身以穀氣為寶故先以理胃氣為要黃耆蜜炙一錢半人參一錢二分甘草炙一錢陳皮一錢白朮去蘆炒二錢當歸一錢柴胡五分升麻五分神麯炒一錢生黃芩二分上切作一服水煎服腹中痛加白芍三分中桂少許如渴或口乾加葛根按上方治血崩日久真氣下陷宜升提之劑止之失笑散方見產後四物湯歸脾湯十全大補湯俱見補益黃連解毒湯見傷寒五積散見中寒帶下帶下脈宜遲滑忌浮虛婦人帶下赤屬血白屬氣濕熱為病燥濕為先漏與帶俱是胃中痰積流下滲入膀膦法當升之甚者用吐以提其氣須斷厚味亦有屬虛寒者臨症審察之升陽除濕湯治婦人諸虛百損經水不調赤白帶下當歸酒洗川芎白芍酒炒懷生地黃酒蒸黑薑汁炒白朮去油蘆炒白茯苓去皮蒼朮泔浸炒陳皮半夏薑汁炒香附米酒炒砂仁乾薑炒黃柏酒炒知母酒炒柴胡酒炒升麻酒炒甘草炙上生薑棗水煎空心服按上方治赤白帶下屬血虛脾弱濕痰滲下升提之劑治婦人赤白帶下以五積散加乳香沒藥各二錢半入米糖一斤酒煎五積散治赤白帶下加香附吳萸小茴香一方加米糖一塊煎服減麻黃按上方治白帶屬虛寒者宜之治婦人赤白帶下屬壯盛而有寒熱者黃連解毒湯倍黃連降心火益腎水加四物湯在內尤效按上方治赤白帶下屬熱者宜之治婦人久患白帶瘦削無力倦怠欲睡腰痠腿痛飲食無味面黃日晡煩熱小水淋瀝十全大補湯去桂加車前子地骨皮鹿角膠大獲全效按上方治下元虧損赤白帶下久不止宜之加味益氣湯治婦人赤白帶下依本方加黃柏酒炒知母香附半夏川萆薢川楝子肉姜煎服後服歸附地黃丸收功方見後治婦人白帶如神方異人傳豆腐一塊如碗大剮空中一窩入硫黃一兩半在中仍將豆腐蓋合入瓦罐內下用稈盛豆腐藥在罐中上加稈蓋上入水熬一日干則頻頻添水煮至豆腐黑為度取出為末又白芍煨為末二末等分用水糊為丸如梧子大每服五分燒酒送下秘方治婦人白帶用白雞冠花為末每三錢空心酒調下立已如赤帶用赤雞冠花二白丸治白帶如神石灰一兩白茯苓去皮二兩為末水丸每三十丸空心白水下治婦人白帶方金櫻子三兩糯米半合炒白扁豆花二兩炒黃荊子二兩連子去心二兩白麵二兩炒上為末每服五七錢入蜜三匙沸湯調下半月即愈治赤白帶下槐皮一大塊中穿七眼先用面圈圍肚臍閣上槐皮艾灸肚內熱響去文即效治婦人赤白帶下黃荊子炒為末每服二錢空心溫酒調下治赤白帶下經年不好者用蛇床子末一兩枯礬二錢煉蜜為丸如彈子大用絲綿包裹放入陰戶內不過二三丸神效兼安胎暖子宮按上單方宜對症選用治婦人赤白帶下甘松川椒潮腦上等分為末煉蜜為丸櫻桃大送入陰戶內立效治婦人帶下腸有敗膿淋露不已腥穢殊甚遂至臍腹更增冷痛此蓋為敗膿所致卒無已期須以敗膿乃愈白芷一兩單葉紅蜀葵根二兩白芍藥枯白礬各半兩另研上為末同以蠟丸梧子大空心及飯前米飲下十丸或十五丸候膿盡仍服十全大補湯補之玉仙散治赤白帶下簡而易效而捷乾薑炒一兩白芍酒炒一兩香附炒一兩甘草五錢生用上為末每服三錢空心溫酒送下歸附地黃丸治白帶先服前加味益氣湯數劑後服此丸當歸三兩川芎一兩白芍酒炒二兩熟地黃酒蒸一兩香附子童便浸炒一兩知母酒炒一兩黃柏童便浸三日曬乾一兩半陳皮一兩半蒼朮米泔炒一兩半五味子一兩半牡蠣煅五錢椿根白皮炒一兩半無花不實者為椿有花而莢為樗上為末酒糊丸如梧子大每五十丸空心淡鹽湯下後乾物壓之忌蔥白蘿蔔胡椒煎煿發熱之物一方有白葵花一方無五味有山茱萸人虛加人參白朮香砂益氣丸治白帶如神香附米八兩酒醋鹽湯童便各浸二兩浸三日炒蒼朮米泔水浸炒二兩椿根白皮蜜水炒二兩砂仁炒二兩牡蠣煅二兩上為末小黃米煮飯為丸梧子大每服五七十丸空心酒下四仙散治婦人白帶下蒼朮一兩酒浸去皮炒乾白芷五錢川芎五錢大附子麵裹煨五錢上為末每服五分空心好酒調下按上方治赤白帶下屬寒濕者宜之補中益氣湯十全大補湯四物湯俱見補益黃連解毒湯見傷寒五積散見中寒求嗣人之夫婦猶天地也天地之道陰陽和而萬物育夫婦之道陰陽和而後男女生是以有夫婦而後有父子而後有兄弟也然不有夫婦同無以為嗣續之本有夫婦而不先和其陰陽亦何以收其嗣續之功哉是故欲求嗣者先須調其婦之經經調則氣和氣和則百病不生而始可成經既調須按其候訣云三十時中兩日半云云蓋女人月經方絕金水才生此時子宮正開乃受精結胎之候妙合而疑之時過此佳期則子宮閉而不受胎矣然男女之分亦皆有說月候方住一日三日五日交會者成男雙日者成女若陰血先至陽精後沖縱氣來乘血開裹精陰外陽內則成坎卦而為男若陽精先入陰血後來兩旁橫氣來助精開裹血陰內陽外則象離卦而為女故脈訣云夫乘妻兮縱氣露妻乘夫兮橫氣助子乘母兮逆氣參母乘子兮順氣護胎婦遣面南而行忽從後呼之左回首者為男右回首者為女或於廁所呼之亦同又胎婦其夫左乳有核者生男右乳有核者生女啟扁湯治婦人百病調經種子之仙方也八錢白朮去蘆麩炒一兩白茯苓去皮一兩國老四錢川歸酒洗一兩二錢腦芎一兩懷生地酒洗一兩白芍酒炒八錢砂仁微炒七錢莎草根七錢橘紅六錢川牛膝去蘆酒洗八錢牡丹皮七錢半夏湯泡七錢上十四味均作十劑水二鍾姜三片煎八分空心服渣水一鍾半煎七分臨臥時服經未行前服五劑行後服五劑服此藥盡即服後丸藥如無他病只照本方如有他病宜照後加減服之經調脈和即當妊孕加減之法於後婦人子宮久冷不孕加乾薑肉桂各五錢何以知其冷丈夫會合之際當自覺之也如冷甚灸丹田七壯極效在臍下三寸婦人子宮太熱則傷胎加黃柏知母柴胡六錢何以知其熱亦丈夫自當覺之也白帶白淫白濁時下俗云下寒非寒也乃是婦人素虛濁氣下陷故也有痰者亦然當加白芷一兩升麻五錢或倍半夏如不能服藥灸中極七壯極效在臍下四寸氣不流通者加木香三錢平素虛勞自汗或惡寒加黃耆肉桂咳嗽加阿膠貝母各四錢勞熱血枯加柴胡鱉甲勞甚腰背痛者灸膏肓二穴各七壯在背脊四柱下近五柱兩旁各開三寸明堂云主無所不療今反有子甚效飲食減少倍白朮陳皮加厚朴薑汁炒神麯炒各五錢肥白人痰盛迷塞子宮加南星三稜各六錢經水將行小腹作痛有瘀血也加桃仁紅花各四錢蓬朮五錢玄胡索四錢如應效去人參加五靈脂六錢半生半炒用乳香三錢腰腿痠疼者加杜仲酒炒一兩一錢羌活三錢桃仁四錢經行後作痛者虛也加熟地六錢當歸八錢五味子三錢腹脅有痞塊者去牛膝加三稜莪朮各六錢桃仁枳實各五錢前五劑加檳榔五錢後五劑不加檳榔腹有鬼胎者狀如懷胎非真胎因氣裹精而結無血者也用桃仁乾漆肉桂麝香水銀之類凡服以去之然後再服啟扁湯以俟經調仍然有子經水前期而至者加黃芩五錢炒真蒲黃五錢經水過期而至者加乾薑五錢牡丹皮五錢經血崩漏不止者加蓮蓬殼灰五錢白芷八錢豬頭骨灰六錢熟艾三錢黃芩五錢平日有風氣寒濕疼痛者加秦艽三錢羌活七錢乳香沒藥各五錢或加蒼朮有熱疼痛加酒炒黃柏心腹膨脹者加大腹皮三錢木香三錢檳榔五錢小便澀少不通加豬苓澤瀉亦不宜多服恐泄腎氣室女經脈澀滯不通者謂之衝任不調也前方內加劉寄奴六錢不應加衛矛三錢神效即鬼箭羽按上方先聖按卦推移製造不可妄意加減只可隨症依此加減之法用之其效如鼓應桴如貓捕鼠魯國王遇仙傳種子藥酒方白茯苓去皮淨一斤大紅棗煮去皮核取肉半斤胡桃肉去殼泡去粗皮六兩黃耆蜜炙白蜂蜜六斤入鍋熬滾入前三味攪勻再用微火熬滾傾入磁壇內又加南燒酒二十斤糯米白酒十斤共入蜜壇內人參白朮去蘆當歸川芎白芍炒生地各三錢熟地小茴枸杞子覆盆子陳皮沉香木香官桂砂仁甘草各五錢乳香沒藥五味子各三錢上為細末共入密壇內和勻筍葉封口面外固入鍋內大柴火煮二炷香取出埋入土中三日去火氣每日早午晚三時男女各飲數杯勿令大醉安魂定魄改易容顏添髓駐精補虛益氣滋陰降火保元調經壯筋骨潤肌膚發白再黑齒落更生目視有光心力無倦行步如飛寒暑不侵能除百病交媾而後生子也神秘不可輕傳與非人寶之寶之定胎丸黃景仙傳種子如神詩曰抽將坎內中心火逆與離宮去補陰十月圓蒲生貴子此方端的若黃金魚鰾八兩切一指長塊用面麩炒炮再炒再搗為末篩鰾盡為度白茯苓去皮四兩為去水浮去筋膜何首烏米泔浸一宿以竹刀刮去皮忌鐵器白蒺藜搗去尖各三兩大附子一個鑽九孔麵包火煨面熟為度去皮當歸酒浸一宿三兩上為細末煉蜜為丸如彈子大每一丸空心細嚼好酒送下以乾物一口壓之男女同服忌房事烏雞丸魯府經驗方治婦人無子又治百病生血養血服百日有效香附米一斤分四制酒醋童便米泔各浸四兩炒乾白茯苓去皮四兩懷生地黃酒拌砂鍋蒸黑四兩當歸酒洗二兩川芎一兩白芍酒炒一兩陳皮一兩白朮去蘆土一兩山藥一兩小茴鹽酒炒一兩吳茱萸五錢水浸去苦汁蓮肉去心皮二兩酸棗仁炒一兩知母酒炒一兩大附子一個泡製看虛實黃耆蜜炙五錢真阿膠蛤粉炒五錢黃柏去皮酒炒一兩上用烏骨白毛雄雞一隻吊死去毛屎淨蒸熟連骨搗爛同前為末煉蜜為丸如梧子大每服二錢臨經之日每日三服服半月見效男子陰痿者多致無子不可不慮也惟其救嗣之急易庸醫之惑或以附子蛇床石脂為內補或以蟾酥啞芙蓉為外助陽事未興內熱已作玉莖雖堅頑木無用以致終身無子或有夭折者吾見此輩無辜而受醫藥之害遍訪諸方無越此者出以示人命曰壯陽丹懷生地黃酒拌蒸黑四兩巴戟去心破故紙酒炒各四兩仙靈脾一兩真陽起石煅另研桑螵蛸焙各五錢上六味合陰之數研末煉蜜為丸如梧子大每三十丸空心溫酒下不可恃此自恣也戒之戒之一男子服治精冷遺精舉而不堅金蓮種子仙方仙茅四兩用米泔水浸一宿去水再用黑豆水浸蒸如此三四次何首烏赤白各四兩制如上法當歸酒洗熟地黃山藥甘枸杞子白茯苓去皮肉蓯蓉蓮蕊各二兩人參一兩半若遺精加白龍骨煅一兩半上為細末煉蜜為丸如梧子大每服五六十丸空心鹽酒送下其精固而堅一女人服治赤白帶下子宮久冷不結胎服之一服子宮壯熱如火立孕仙茅種子方仙茅何首烏二味分兩製法如前當歸酒洗白芍酒炒玄胡索藁本赤石脂人參條芩酒炒陳皮川芎熟地黃白朮去蘆白茯苓去皮白薇大者沉香牛膝去蘆酒炒各二兩肉桂甘草各五錢香附四兩米泔童便各浸三日曬乾用上為末煉蜜為丸如梧子大每服五六十丸空心溫送下凡修合藥要靜室勿令雞犬及婦人見之每料許一人服不許二人服秘之秘之一少年斷喪中年無子婦人血虛不能孕育此方一料夫婦同服服盡即孕屢試屢驗延齡育子丸人參白朮去蘆陳土炒白茯苓去皮牛乳浸曬白茯神去皮木人乳浸曬天門冬去心麥門冬去心生地黃酒洗熟地黃酒蒸菟絲子酒炒巴戟泡去心牛膝去蘆酒洗甘枸杞子鹿角膠鹿角霜二味見雜方柏子仁山藥石棗酒蒸去核肉蓯蓉酒浸連蕊沙苑蒺藜各五兩酸棗仁炒二兩遠志甘草水泡去心五味子石斛各二兩上二十四味合二十四氣一百單八兩合一年氣候之成數為生生不息之妙各製為末將鹿角膠以酒化開和煉蜜為丸如果丸大每男服九十丸女服八十丸空心滾白湯送下忌煎炙蔥蒜黑白仙靈酒治男子元陽虛損不能直射子宮山公羊尾連腰子及骨肉砍下一具約二斤用淫羊藿二兩共入好燒酒一金花壇文武文煮化埋土中一旦夕出火毒濾去渣每晨服一二鍾興陽生子生子秘方治婦女子宮寒先生後久不生湯陰艾好花椒先將艾揉碎花椒研末鋪艾撒椒艾三層椒二層用細布一層緞子一層做兜肚晝夜常穿汗出為度二三日口內聞椒艾香妙溫腎散治陰痿不起精薄而冷鍾乳粉肉蓯蓉酒洗酥炙遠志甘草水泡去心蛇床子去殼炒山藥蒸煙塵續斷有模皺紋酒洗鹿茸酥炙上為細末每服二三匕空心好酒調服賽金蓮種子方夜交藤三斤竹刀切米泔浸五次即何首烏淫羊藿二斤切碎羊油炒即仙靈脾肉蓯蓉一斤細麵包蒸去面切碎懷生地黃半斤酒浸曬乾懷熟地黃即懷生地黃半斤酒拌砂鍋內蒸黑上共合一處裝入絹袋內懸吊壇中入酒五十壺用筍葉扎口細泥糊入水鍋煮五炷香放一七後日進三服通神魯府螽斯丸夫婦同服妙不可言巴戟去心二兩半菟絲子酒製二兩鹿茸酥炙一兩吳茱萸白及白茯苓去皮各一兩大附子童便浸三日曬乾五錢牛膝去蘆酒洗細辛各五錢石菖蒲厚朴姜炒桂心人參白蘞沒藥各四錢當歸三錢乳香二錢上為細末鹿髓為丸梧子大每五六十丸空心溫酒送下鹽湯亦可壬子日修合男女每日服之無男子婦人勿服亦不過服恐成雙胎此傳秘方不可輕視予親見魯國主珍重每制此藥以銀盒封固饋送縉紳無嗣者有得嗣而謝書盈幾足徵其效如此之多也去妒方治婦人妒妾誤夫無子天門冬去皮心赤黍米去殼微炒薏苡仁去殼炒各四兩上為細末煉蜜為丸每七八十丸食遠白湯送下婦人常服不妒正士入朝小人忌之美色入室少婦妒之咸服此可免妒忌之病也妊娠婦人經候不行身無病似病脈滑大而六脈俱勻乃是孕婦之脈也精神如故惡聞食氣或但食一物或大吐或時吐清水此名惡阻切勿作寒病治之凡胎前一切諸病悉宜此紫蘇和氣飲加減治之紫蘇和氣飲主方治胎前諸病紫蘇當歸酒洗川芎白芍酒炒陳皮大腹皮黑豆水洗香附炒甘草上銼作劑生薑蔥白水煎溫服一方加人參氣虛者亦可一妊娠胎氣不和湊上心腹脹痛依本方加木香一妊娠嘔吐不止乃惡阻也加白朮茯苓半夏砂仁藿香神麯丁香一妊娠胎漏下血加熟地黃阿膠炒白朮條芩砂仁艾葉糯米如胎漏下血心腹脹痛者或先以當歸尾川芎各五錢酒煎入童便一服立止妊娠胎氣不固常慣小產預服此以固胎元加熟地黃阿膠條芩砂仁桑寄生白朮糯米一妊娠因事動胎致胎不安動撞不已及下血欲墜者加熟地黃人參白朮白茯苓條芩阿膠砂仁一妊娠咳嗽吐痰加桑白皮杏仁貝母或用茯苓補心湯亦效一妊娠泄瀉加白朮白茯苓妊娠瘧疾加檳榔草果青皮良薑半夏茯苓乾葛妊娠胎痛加阿膠玄胡索條芩妊娠七八個月前後面目四肢浮腫加熟地黃茯苓澤瀉白朮條芩梔子麥門冬厚朴一妊娠口噤不醒人事言語錯亂加生地黃半夏茯苓麥門冬遠志石菖蒲竹茹一妊娠心痛加玄胡索乳香各五分一妊娠腰痛狀不可忍加破故紙小茴杜仲一妊娠白濁白帶加熟地半夏茯苓蒼朮牡蠣龍骨一妊娠小便淋漓不通加木通車前滑石一妊娠大便秘澀艱難加生地黃黃連枳殼一妊娠至九個月加枳殼白朮條芩砂仁名達生散服數劑以保臨產無慮如胎肥加黃楊腦七個一妊娠臨產驚恐氣結連日不下加枳殼一妊娠孕成之後覺氣不安或腹微痛或腰間作痛或飲食不美或胎動下血及五六個月內常服數劑甚妙加熟地黃條芩白朮砂仁人參阿膠炒按上方治妊娠百病宜對病選用一妊娠腹痛須驗其面赤舌青者此胎已死用平胃散加朴硝三錢化下後隨用八珍大補等湯調補之若唇口俱青吐出痰沫者子母俱死也若面舌俱青者母死子活產下亦死按上方驗妊娠生死訣芎歸補中湯治婦人血熱性急常慣小產服此保全當歸一錢半川芎一錢半白茯苓八分黃耆蜜炙一錢條芩酒炒一錢陳皮五分白朮陳壁土炒一錢續斷酒浸二錢桑寄生酒浸七分阿膠蛤粉炒五分香附童便浸一錢砂仁炒二分按月加減至一錢甘草五分上銼生薑三片水煎空心服蓮砂散治婦人常慣小產常服此以保胎孕十月完足湖蓮肉去心四兩砂仁炒二兩上為末每服二三匕米飲調下日服三四次千金保孕丹專治屢慣墮胎久而不育者過七個月不必服當歸酒洗一兩懷生地黃酒蒸一兩人參一兩半白朮去蘆炒四兩條芩酒炒二兩陳皮一兩香附童便浸一兩川續斷酒浸一兩半杜仲鹽酒炒一兩半上為末糯米飯為丸每服七十丸白湯下一方去人參加砂仁川芎阿膠艾葉益母草治孕婦作淋者乃三焦胞絡元氣虛而胎墜壓迫溺道不能通利宜四君子湯加當歸芍藥甘草梢五六個月加升麻白朮八九個月加木通大腹皮一孕婦八個月胎下墜或動面黃體倦飲食少思此脾氣虛弱用補中益氣湯倍白朮再加蘇梗三十餘劑而安金匱當歸丸胎成後理肝健脾胎安子穩當歸酒洗川芎白芍酒炒白朮去蘆條芩去朽各一兩上為末煉蜜為丸梧子大每五十丸空心鹽湯酒任下又方黃芩三錢白朮二錢水煎服能益胎氣按上方預防妊娠墮胎之劑治孕婦嗽則便自出此肺氣不足腎氣虧損不能司攝用補中益氣湯以培土金六味丸加五味以生腎氣而愈治孕婦咳嗽用貝母去心麩炒黃色去麩為末研砂糖拌勻為丸如雞頭實大每一丸含化茯苓補心湯治孕婦血虛發熱咳嗽吐痰上壅喘急胸膈痞悶五心煩熱咳唾吐血懷娠惡阻嘔吐悉宜服之當歸川芎白芍酒炒熟地黃陳皮白茯苓半夏姜炒枳殼桔梗前胡乾葛紫蘇人參甘草薑棗煎服按上方治妊娠咳嗽痰涎發熱喘急之劑治妊婦心痛不可忍用銀硃雞糞炒焦為末二味等分和一處每一錢熱酒調服即出冷汗而愈治孕婦心疼玄胡索五分當歸一錢乳香五分甘草一錢上水一鍾煎至半鍾溫服靜臥少傾即愈按上方治孕婦心疼之劑治妊娠腰痛破故紙不拘多少瓦上炒令香熟為末嚼胡桃肉半個每服二錢空心溫酒調下治孕婦下痢赤白腹中疼痛當歸五分白芍一錢白朮五分白茯苓五分澤瀉五分木香三分檳榔三分黃連五分黃芩五分甘草三分上水煎溫服白痢腹痛甚恐有寒也去芩連加乾薑三分妊娠轉胞不得小便者此湯服之探吐數日愈胞非轉也由孕婦中氣怯弱不能胎胎壓其胞胎繫了戾而小便不通耳故用二陳四物四君子三合煎湯而探吐之所以升提其氣上竅通而下竅自利也一方治小便不通小腹腫脹用八味丸料加車前子一服即通治不得尿名為轉胞利小便即愈瘦胎散治胎肥壅隘動止艱難臨月服之縮胎易產枳殼去穰麩炒五錢香附子二錢甘草一錢半上為末每服二錢百沸湯調服治胎孕九個月將產消息用豬肚一個依常法著蔥五味煮熟食之不盡再食不可與別人食一孕婦不語非病也不須服藥臨產日但服四物湯之類產後便語治婦人懷鬼胎及血氣痛不可忍斑貓去頭翅足制延胡索炒各等分上為末每服半錢溫酒調下以下穢物為度治婦人血塊如盤又孕難服峻藥香附四兩醋煮桃仁去皮尖一兩海石二兩醋煮白朮去蘆炒一兩上為細末神麯打糊為丸梧子大每服四五十丸白湯下治孕死得效方鹿角屑二三方寸匕煮蔥豉湯和服之立出治兒在腹中哭用多年空房下鼠穴中土一塊令孕婦噙之立止四君子湯四物湯六味丸補中益氣湯俱見補益二陳湯見痰飲產育凡婦人臨月腰腹痛時未可便服催生符藥亦不可便坐草常宜行立不可慌忙如果在殼中氣足自脫苟日月未足用藥一催即有橫生逆產之患如此死者乃自殺耳凡婦人難產者皆因燥澀緊斂故產戶不得開通宜於降誕之月自月之日用長流水調益元散日三服產必易產後亦無一切虛熱氣血不和之疾未入月則不宜服之以滑石滑胎故也然此藥惟宜婦人壯盛胎肥者可服若胎怯者可服保生無憂散保生無憂散主方治妊娠身居富貴口厭甘肥憂樂不常食物不節既飽便臥致令胞胎肥厚根蒂堅牢行動艱難因致臨產必是難生入月可服此藥日進二服補其血而順其氣使子易生而胎易落也當歸川芎白芍酒炒各一錢木香五分枳殼麩炒一錢乳香一錢血餘燒存性甘草五分上銼一劑水煎日二服凡欲斷臍帶先以系物墜下後可斷之否則胞衣上即衝心而死若胞衣既破其血已涸或元氣困憊用八珍湯斤許加益母草半斤水數碗煎熟時時飲救之飲盡再製亦有得生者孕婦臨月預服此藥日進二服則子易生而胞易落也一妊娠子死或未死胎動芎歸湯加紫蘇酒水各半煎服死者即下未死者即安烏金丸治臨產艱難橫生逆產死胎不下及產後諸病真阿膠一兩八錢蛤粉炒蘇木一兩熟艾端午日收去梗二兩穀麥芽曬乾各二兩龍衣即蛇退要全者一條焙乾又要蛇頭下山的好上為細末煉蜜為丸如芡實大每用一丸童便和酒化下凡修合此藥揀天月二德夭天一生氣吉日凝神安慮灑掃淨室盡太極而生兩儀九宮而分八卦所忌婦人雞犬聲喊音要至夜間寂靜齋戒至誠先念淨口淨心淨身淨天地神咒文唸咒曰天精精地靈靈精精靈靈左朝北斗右朝北辰人逢此藥各保安寧急急如律令治臨產其子逆下用絹針刺兒腳心三七刺用鹽水少許擦刺處即時順生治橫生逆產或胎死不下血海乾涸死在須臾百發百中戴雷門皮硝二錢壯者三錢虛者加大附子三片用酒半鍾童便半鍾入硝煎一二沸溫服立下亦治胞衣不下一婦人胎死腹中服皮硝下穢水肢體倦怠氣息奄奄用八珍湯倍參術加桂姜調補而愈治難產及橫生逆產蛇退皮焙乾一條為末每服五分黃酒調下立效治橫生逆產三五日不下死在須臾用往下蛇退一條長尺余者燒灰存性鵓鴿糞等分為末黃蠟為丸一個皮硝化水吞下治婦人臨產心慌驚恐怕死致令難產用金箔大者五片小者七片將金箔入鍾內水少許用指研勻再添溫水至大半鍾一面先令一人扶產婦虛坐又令一婦人用兩手將大指按定產婦兩肩上肩井穴處方將前藥溫服其胎立下如產月未足又能安之治橫生逆產死胎不下其效如神柞木刺枝一握淨洗銼碎要一葉一刺者處處有之甘草一錢長流水煎熱服二三碗立下治逆產須臾不救母子俱亡華佗方蛇退一條蟬蛻十四個頭髮一握並燒灰須用胎髮上為末分作二服酒調下須臾又進一服難產破水三五日不下將死未絕者神效江月池傳魚鰾用大者三寸香油浸過燈上燒之滴下油入酒內其灰為細末酒調服之立下催生湯治胎死腹中或產母氣乏委頓產道乾澀五積散去麻黃加川烏附子南星阿膠炒杏仁木香治妊娠產五七日不下垂死者及產婦交骨不開當歸川芎各一兩自死干龜殼一個酥炙婦人油發一握燒存性上銼細每服三錢水一盞半煎服約人行五里不問生死胎立下其油發用生男女者交骨不開陰氣虛也芎歸湯主之一治死胎不下兼難產及橫倒生桂心為末每二錢痛陣密時溫童便調下治難產瀝漿胞於胎不得下香油蜂蜜各一碗和勻用銅銚內慢火煎一二沸掠去沫調滑石末五錢頓服外以油蜜抹母腹上下灸難產先露手足灸婦人右腳小趾頭尖三壯立產治胞衣不下用伏龍肝研末每三錢溫水調服治胞衣不下秘方用蓖麻子十四粒去殼研塗兩腳心衣即下可即洗去如不去則腸頭出如此時就以此藥貼頂心縮回其腸多用此藥不妨如腸入則洗去神效盤腸產每臨產則子腸先出然後產子其腸不收名曰盤腸穩婆以醋水各半盞默然噀產婦面眥才收不可不知古方以蓖麻子仁四十九粒研塗產母頭頂腸收上急洗云其腸若干以磨刀水少許濕潤之再用磁石煎湯服之即收上磁石須陰陽家用有驗者若以水噀母面眥恐驚則氣散一方以半夏為末搐鼻中腸自上治盤腸生產花腸俱出用大薊搗汁和醋在盆內將生腸放汁上須臾即上令產婦睡一日將芭蕉莖塞陰戶即已臨產腰腹作痛取好乳香一塊如小指頭大濃磨水一合蕩溫服後破水即進催生藥在前用柞木枝者是治產難湊心不下者蛇退燒灰用麝香少許研細溫酒調下立產一胞衣不下用雞子清三個去黃以酸醋一合和之啜入口中即下婦人胞衣不出胸腹脹疼手不可近用失笑散滾酒調下惡露胞衣並下一胞衣不下令產婦銜自己髮尾於口中令嘔噦衣即下治倒生手足冷口禁以葵子炒令黃搗為末每二錢酒調服則順八珍湯芎歸湯俱見補益五積散見中寒失笑散見產後產後產後脈洪數產前脈細小澀弱多死懷孕者脈主洪數已產而洪數不改者多死產後諸疾以藥治之大補氣血為主大凡產前不可用熱藥產後不可服涼藥產後傷寒不可輕易汗下恐產時傷力其發熱有去血過多有惡露不盡有三日蒸乳發熱或早起勞動或飲食停滯俱有發熱惡寒狀類傷寒不可便用發表攻裡之劑凡有傷力發熱或早起勞動發熱或去血過多發熱脈必虛大無力內無痛者此熱非有餘之熱也乃陰虛不足生熱用芎歸調血飲加減治之治產後諸病無不奏效如大熱不退必加炒黑乾薑神效乾薑性熱能引血藥入血分生新血引氣藥入氣分補氣芎歸調血飲主方治產後諸病當歸身酒洗川芎白芍火煨切片酒炒熟用懷生地黃酒蒸黑白朮去油蘆土炒白茯苓去皮陳皮香附童便炒甘草炒初產臨服加童便一鍾好酒半鍾同服是能行瘀血退熱如神上銼作劑生薑一片棗一枚水煎溫服看病加減於後一產後昏憒不語加荊芥一產後口苦咽乾加麥門冬一產後看氣惱加木香烏藥一產後發熱不止加炒黑乾薑一產後生腸不收加黃耆人參一產後咳嗽加五味杏仁一產後兩脅痛加青皮肉桂一產後吐痰加半夏貝母一產後嘔吐不止加砂仁半夏去地黃一產後盜汗自汗加黃耆酸棗仁一產後泄瀉不止加黃耆乾薑炒去地黃一產後瘀血不行心腹兒枕作痛加官桂五靈脂蒲黃玄胡丹皮去熟地白朮一產後去血過多頭暈眼暗口噤加荊芥人參乾薑炒黑一產後胸膈脹悶加砂仁枳實山楂厚朴一產後惡露不行加益母草牡丹皮加童便和酒服一產後血大下不止另用加蒲黃炒黑入前湯藥調服一產後心腹痛去白朮茯苓加玄胡牡丹皮桃仁紅花青皮澤蘭一產後驚悸怔忡加遠志麥門冬酸棗仁一產後驚悸亂語精神不定用好硃砂為末每服錢許酒調下按上方治產後諸虛百病宜加減用之家傳黑神散治婦人胎死腹中胞衣不下敗血攻心眩暈欲絕併產後一十八症當歸一兩赤芍一兩白朮一兩生地黃一兩熟地黃一兩香附炒一兩五靈脂一兩蒲黃炒一兩乾薑炒一兩玄胡索一兩棕炭一兩乳香五錢沉香五錢上為細末每服二錢童便和酒調下產後一十八症俱童便酒下失笑散治產後心腹絞痛欲死或血迷心竅不知人事及尋常瘀血積血作痛並小腸氣痛加玄胡索五靈脂炒蒲黃炒各等分酒煎熱服或半水半酒煎產後小腸作痛成塊俗名兒枕痛以手按之腹愈痛此是瘀血宜服此若按反不痛是血虛宜四物湯加參朮茯苓若痛而作嘔是此虛宜六君子湯若痛而作泄是脾虛宜六君子湯加肉豆蔻一產後惡露不行攻衝心腹疼痛或眩暈寒熱交攻益母草銼一大劑水煎去渣入童便黃酒各一盞溫服立效按上方治產後惡露不行敗血為病對症選用五積散新產之後以此藥祛除敗血補生新血調和榮衛滋養臟腑使陰陽不相勝負邪氣不能相干則無寒熱之患又治新產氣虛或外感寒邪頭痛身痛發熱惡寒或但發熱者並加米醋少許同煎服按上方治新產諸病及外感寒邪之劑當歸羊肉湯產後蓐勞有因生理不順疲極筋力憂勞心慮致令虛羸喘乏寒熱如瘧頭痛自汗肢體倦怠咳嗽痰逆腹中絞刺當歸酒洗七錢人參七錢黃耆一兩生薑五錢上銼用羊肉一斤煮清汁五大盞去肉入前藥煎至四盞去渣作六服早晚頻進參歸湯治產後諸虛不足發熱盜汗內熱晡熱等症當歸身人參各等分上銼散用豬腰子一個去膜切片子以水三升糯米半合蔥白二根煮未熟取清汁一盞入藥三錢煎至八分不拘時服三分散治產後日久虛勞發熱四物湯四君子湯小柴胡湯加黃耆按上方治產後蓐勞諸虛發熱宜之治腰子粥治產後蓐勞發熱豬腰子一對去白膜切作柳葉片同鹽酒拌先用粳米一撮入蔥椒煮粥鹽醋和將腰子鋪盆底以熱粥蓋之如作𨠭生狀空心服治產後嘔吐不止韭汁薑汁童便調血竭末服治產後惡露過多不止百草霜二兩井花水一鍾炒過鹽一捻水調服治產後血暈不省人事眼黑耳鳴用當歸川芎荊芥各等分銼散水煎入童便服治產後不語人參石菖蒲石蓮肉去殼留心水煎溫服又方治產後目閉不語白礬生研末每服一錢熟水調下獨參湯治產後血暈下血過多不省人事者氣血大脫而神不用也兼治一切失血惡寒發熱作渴煩躁或口禁耳鳴自汗盜汗或氣虛脈脫手足逆冷蓋血生於氣故血脫補氣陽生陰長之理也人參二兩水一碗煎半碗溫服故用人參甘溫益元氣之品可以固氣可以生血身熱氣急者加童便一鍾身寒氣弱者加大附子三錢外以炭火以釅醋沃之使醋氣熏蒸入鼻則能收斂神氣治產後血痢小便不通臍腹痛生馬齒莧搗取汁三合煎一沸下蜜一合調頓服治產後赤白痢疾黃耆人參白朮去蘆炒白茯苓粟殼甘草上各等分水煎服治產後泄瀉黃耆白朮茯苓白芍酒炒川芎乾薑炒滑石甘草炙上各等分水煎空心服治產後瘧疾紫蘇陳皮半夏赤苓川芎白芷青皮良薑草果乾葛甘草上棗姜煎當發日侵早連進二服一婦人食角黍煩渴痞悶腹痛大便欲去不去用大酒麴炒為末每二錢溫酒調服俄間腹鳴良久仍下粽而愈一產婦大便不通火麻仁人參枳殼杏仁各等分水煎服即通一產婦大便七日不通飲食如常腹中如故此腹未滿也用八珍湯加桃仁杏仁至廿一日服滿欲去用豬膽汁潤去而安一治產婦大小便閉結諸治不應令飲人乳而通一用牛乳亦通治產後咳逆方用乾柿一個切碎水一盞煎至六分熱呷之即止治產後陰門不閉發熱惡寒用十全大補加五味子數劑而寒熱退又用補中益氣加五味數劑而斂若初產腫脹焮痛而閉者用加味逍遙散若腫既濟而不閉者補中益氣湯切忌寒涼之劑治產後生腸不收蓖麻子去殼研成膏貼頭頂心即收再服補中益氣湯倍升麻去柴胡加益母草治產後陰門痛不可忍桃仁泡去皮尖研如泥用一兩塗即愈治陰門癢極不可忍用食鹽塗入即止按上方治產後諸疾宜對症選用十全大補湯治產後諸虛百損五勞七傷自汗盜汗或內熱晡熱潮熱發熱或口乾作渴喉痛舌裂或胸乳膨脹脅肋腰痛或臍腹陰冷二便不調或頭頸時痛眩暈目花或心神不寧恍惚不寐或形容不充舉體作痛或鼻吸氣冷急趨氣促或因飲食勞役起居失宜或更有一切虛熱之症但服此藥補其根本諸症悉退而四君子湯合四物湯加黃耆肉桂按上方治產後諸虛百病神效一治產後因子死經斷不行經半載一日小腹忽痛陰戶內有物如石硬塞之而痛不禁此石瘕也四物湯加桃仁大黃三稜檳榔玄胡香附澤瀉血竭水煎服八珍湯四君子湯四物湯六君子湯補中益氣湯俱見補益加味逍遙散見調經小柴胡湯見調經五積散理中湯俱見中寒乳病夫婦人者以乳病為重性命之根也坐草以後風冷襲虛榮衛凝滯乳為小兒所吹或飲而不泄或斷乳之時捻出乳盡出汁停蓄之間為氣血搏而腫痛內結硬塊至於手不能近則乳癰之患成矣凡婦人四十以下血氣周流此則易療年壽既高血氣耗澀患此則難療矣觀音救苦散主方治吹乳乳癰痛腫不可忍者金銀花皂角刺穿山甲當歸尾白芷梢天花粉瓜蔞仁貝母甘草節上銼酒煎服一方治吹乳用滾綠豆湯入無嘴錫壺熱即傾出用壺口合乳穗上立效治吹乳神方凡有兒者名為外吹乳有孕者名為內吹乳可以急治蔥一大把搗爛作餅一指厚攤乳上以罐貯炭灰覆蔥上須臾汗出腫立消治吹乳乳癰海上仙方朱賓湖傳蜘蛛三個紅棗三枚去核每棗一枚入蜘蛛一個夾於內炒熟口嚼吃用燒酒送下未成者立消已成者立潰治吹乳腫痛未成膿者用生半夏一個為末將蔥白半寸搗和為丸綿裹塞鼻一夜即愈左乳塞右右乳塞左鼻神效一用韭菜地中蚯蚓糞研細末醋調厚敷於上干則再易三次即愈治吹乳用皂角火燒黃色蛤蜊一個火燒成灰共為細末每服三錢滾黃酒調服汗出愈衝脈飲子治婦人乳癰初已而又致穿破不得收功黃耆每一兩用桂一錢煎湯拌耆碗盛飯上蒸熟每劑用二錢人參一錢半白朮一錢茯苓七分當歸身二錢白芍酒炒一錢生地黃酒浸一錢川芎一錢柴胡五分青皮五分宣木瓜四分皂角子一錢甘草三分上水一鍾煎至七分食後少間溫服渣再煎服若大便不通加火麻仁炒黃連酒炒二錢婦人乳汁乃氣血所化在上為乳在下為經若氣血虛弱而不能化生則乳汁短少治宜壯脾胃養氣血又有怒動肝膽而乳腫汁出宜清肝火若累產無乳或大便澀滯當滋化源當歸補血湯治氣血虛無乳當歸二錢黃耆一兩蔥白十根水煎服三母散治產後無乳貝母君知母佐牡蠣使為末豬蹄湯下治產婦少乳用穿山甲燒存性為末空心熱酒調服又方用穿山甲天花粉各五錢入豬蹄同煮爛去渣吃蹄食湯愈治乳汁不行用核桃仁十個去皮淨搗爛入川山甲末一錢溫酒調服婦人奶岩始有核腫如鱉棋子大不痛不癢五七年方成瘡初便宜多服疏氣行氣之藥須情思如意則可愈如成瘡之後則如巖穴之凹或如人口有唇赤汁膿水浸淫胸脅氣攻疼痛用五灰膏去其蠱血生新肉漸漸收斂此疾多生於憂鬱積忿中年婦人未破者尚可治成瘡者終不可治宜服十六味流氣飲加青皮十六味流氣飲治乳岩當歸川芎白芍黃耆人參官桂厚朴桔梗枳殼烏藥木香檳榔白芷防風紫蘇甘草上銼劑水煎頻頻溫服乳癰加青皮治婦人慾斷乳方歸尾赤芍紅花酒洗牛膝去蘆酒洗水煎服治婦人血氣方盛乳房作脹或無兒食乳脹痛憎寒發熱大麥芽炒一二兩水煎服立消產後乳汁自出乃胃氣虛宜服補藥止之若乳多滿痛用溫帛熨之未產而乳自出謂之乳泣生子多不育此症氣血俱虛用十全大補湯主之婦人雜病交腸病婦人有此病者糞從小便出尿從大便出混濁不分必是夏月伏暑而致須用五苓散加牛膝海金砂木通通草但令大小便各歸本臟即安西園公治臨穎徐少川母服此藥而愈加車前子治婦人陰中生瘡如蟲咬疼痛桃葉搗爛綿裹納陰中三四易瘥凡婦人淫亂思色久之必有貓鬼相侵似睡不睡情意相通交接昏迷淫精泄漏病人隱而不說不肯言鬼宜用鹿角屑搗散以水調方寸匕與服即言實也千金斷產方婦人有臨產艱難或生育不已而欲斷之用油煎水銀一日方息空心服棗大一丸永斷其孕且不損人千金去胎方用大麴五升清酒一斗煮二沸去渣分五服隔夜勿食旦再服其胎如糜母無所苦千金不傳治陰癢脫方燒白礬一味研為末每日空心酒調方寸匕日服三次一婦人陰中寒冷小便澄清腹中亦冷飲食少思大便不實下元虛寒治以八味丸一月飲食漸加大便漸實又月餘諸症悉愈一婦人陰中挺出五寸許悶痛重墜水出淋漓小便澀滯夕與龍膽瀉肝湯利濕熱朝與補中益氣湯升補脾氣諸症漸愈再與歸脾湯加山梔茯苓川芎黃柏間服調理而愈後因勞役或怒氣下部濕癢小水不利仍用前藥開愈一婦人每交接出血作痛此肝火動脾不能攝血用補中益氣湯歸脾湯二方而愈若出血過多而見他症但用前藥調補肝脾神秘萬靈丹方上異人傳專治婦人一切胎前產後諸般病症三十六種冷血風八十二種風疝氣乳中風淋血聚婦人胎孕不安死胎不下不過二三丸胎衣不下只一丸產後腹內攪痛臍下如刀刺者只服一丸胎前產後赤白帶下嘔逆嗔塞心氣煩滿懷胎近產一日一丸臨產不覺若經脈不通或來頻並或赤白帶下飲食無味面赤唇焦手足頑麻遍身生黑點血斑者一切諸疾但服一丸細嚼溫酒送下又治產後傷寒中風體如板者用麻黃湯下何首烏去皮用黑豆拌九蒸九曬忌鐵器川當歸酒浸兩頭尖各五錢川烏去尖用火炮草烏去尖用水煮過大茴香川芎人參去蘆防風去蘆上毛白芷荊芥穗桔梗米泔浸麻黃用水煮三四沸去節甘草炙天麻以上十二味各二兩白朮米泔浸木香不見火遼細辛血竭另研以上各五錢蒼朮半斤米泔水洗過入酒浸一宿曬乾為末上共二十味俱為細末煉蜜為丸如彈子大每服一丸細嚼黃酒送下五苓散方見中暑八味丸方見補益龍膽瀉肝湯方見便毒補中益氣湯方見內傷歸脾湯方見健忘
