body:
  text: 離集卷六眩暈夫眩者言其黑暈者言其轉無痰不能作眩此痰在上火在下火炎上而動其痰經云諸風眩暈皆屬於肝木風則有汗寒則掣痛暑則熱悶濕則重滯此四氣乘虛而眩暈也又或七情鬱而生痰痰因火鬱迫氣上厥此七情致虛而眩暈也淫欲過度腎家不能納氣歸元使諸氣逆奔而上此氣虛而眩暈也吐衄崩漏肝家不能收攝榮氣而使諸血失道妄行此血虛眩暈也左手脈數熱多脈澀而有力為死血右手脈實有痰積脈大是久病為氣血俱虛痰濁不降也半夏白朮天麻湯治眩暈眼黑頭旋噁心煩悶氣短促上喘無力懶言心神顛倒目不敢開如在風雲中痰厥頭痛身重如山四肢厥冷不得安臥此乃胃氣虛損停痰而致也陳皮半夏姜炒麥芽炒各七分半白朮神麯炒各五分黃耆蜜炒人參白茯苓蒼朮天麻澤瀉各三分半乾薑炒二分黃柏酒炒一分半上銼一劑水煎食前可一服而愈按上方治氣虛濕痰眩暈之劑清暈化痰湯主方治眩暈之總司也陳皮去白一錢半半夏一錢半南星姜炒六分茯苓一錢半枳實麩炒一錢黃芩酒炒八分川芎八分白芷七分羌活七分防風六分細辛六分甘草三分氣虛加人參七分白朮一錢血虛加當歸倍川芎有熱加黃連六分上銼散生薑三片水煎服以此方作丸為末稀糊為丸梧桐子大每七十丸薑湯送下祛風豁痰湯治肥人日常頭眩眼昏卒時暈倒者名日痰暈天麻半夏南星蒼朮川芎陳皮茯苓桔梗枳殼烏藥酒芩羌活竹瀝薑汁按上方治風痰眩暈之劑姜附湯治一時為寒所中口不能言眩暈欲倒乾薑一兩大附子生去皮臍一枚上為末每銼三錢水煎溫服按上方治虛寒眩暈之劑芎歸湯治一切失血過多眩暈不蘇川芎當歸虛甚加大附子制銼散水煎服按上方治血虛眩暈之劑清陽除眩湯治氣一虛痰火炎上以作眩暈人參六分白朮一錢茯苓一錢陳皮二錢半夏薑製一錢天麻八分旋覆花八分檳榔八分甘草四分生薑三片煎服按上方治氣虛眩暈之劑清火化痰湯治有痰有火而作眩暈者法制半夏一錢赤茯苓一錢甘草炙五分黃芩酒洗七分黃柏酒炒七分知母七分石膏一錢白朮一錢半薄荷五分川芎五分黃連五分橘紅一錢上銼一服生薑三片臨臥服按上方清火化痰除眩暈之劑一婦人素頭暈不時而作月經足而少此中氣虛弱不能上升而頭暈不能下化而經少用補中益氣湯而愈後因勞仆地月經如湧此勞傷火動用前湯加五味子一劑而愈前症雖雲氣無所附實因脾氣虧損耳一男婦氣血虛弱而作眩暈者十全大補湯加陳皮半夏天麻清暈豁痰丸安節吳大巡方清頭目止眩暈扶元氣健脾胃清火化痰頑痰能化結痰能開風痰能祛濕痰能除清三焦火邪治一切痰證嫩黃耆蜜水炒一兩人參一兩白朮去蘆米泔浸炒二兩白茯苓去皮一兩陳皮去白一兩半夏薑礬牙皂同煮半日四兩膽星四兩枳實麩炒一兩海石火煅一兩天花粉二兩枯黃芩去朽清炒二兩川黃柏去皮酒炒一兩知母酒炒二兩當歸身酒洗四兩天麻火煨三兩防風去蘆二兩白附子煨二兩甘草生三錢綿紋大黃酒拌蒸九次要蒸如墨用五兩上為細末神麯二兩打稀胡為丸如梧子大每服七八十丸茶水任下麻木夫麻木者風濕熱下陷入血分陰中陽道不行亦有痰在血分者症自合則渾身麻木癢者血不榮肌腠手麻木胸中有濕痰死血是也治當活法庶無誤矣一云麻是氣虛木是濕痰死血加味八仙湯主方治手足麻木或疼痛當歸酒浸一錢川芎七分白芍酒炒八分熟地黃酒蒸一錢人參六分白朮去蘆炒四分白茯苓去皮一錢陳皮八分半夏曲七分桂枝三分柴胡四分羌活五分防風五分秦艽六分牛膝去蘆酒洗六分甘草炙四分銼作一劑薑棗煎食遠溫服按上方治氣血兩虛麻木之劑參耆益氣湯治兩手十指麻木四肢困倦怠墮嗜臥乃熱傷元氣也黃耆蜜炒八錢人參五錢白芍酒炒三錢柴胡二錢半升麻二錢五味子一百四十個炙甘草一錢生甘草五錢水煎稍熱空心服按上方治氣虛麻木之劑除濕補氣湯治兩腿麻木沉重無力多汗喜笑口中涎下身重如山語聲不出右寸脈洪大黃耆蜜炒三錢當歸二錢蒼朮泔制四錢陳皮五錢藁本二錢柴胡一錢升麻黃柏酒炒二錢知母酒炒二錢五味一錢生甘草二錢上銼每一兩水煎空心服待少時以早飯壓之按上方除濕補氣治麻木之劑開結舒經湯治婦人七情六郁氣滯經絡手足麻痹紫蘇陳皮香附臺烏川芎蒼朮羌活南星半夏當歸各八分桂枝四分甘草四分上銼生薑煎入竹瀝薑汁服按上方順氣化痰除麻木之劑治十指盡麻並面目皆麻此氣虛也以補中益氣湯加木香附子麥門冬羌活防風烏藥立已按上方治內傷麻木之劑治感風寒濕氣手膊或痛或木或遍身麻木用五積散主之按上方治虛人感寒麻木之劑止麻消痰飲治口舌麻木涎及嘴角頭面亦麻或嘔吐痰涎或頭眩眼花噁心並遍身麻木黃連半夏瓜蔞仁黃芩茯苓桔梗枳殼陳皮天麻細辛南星甘草血虛加當歸氣虛加參亦有十指麻木胃中濕痰死血加二術少加熟附子行經中死血者四物湯加桃仁紅花韭汁忌生冷魚腥發風發熱之物治面上木處用桂枝為末用牛皮膠和少水化開調敷之厚一二分治腳底硬木處用牛皮膠熔化入生薑汁調和仍用南星末五錢和勻用厚紙攤貼二三分乘半熱裹貼腳底上用溫火烘之驅風豁痰湯治手足頑麻及口眼喎斜蒼朮一兩半陳皮三兩南星一兩半半夏二兩半白茯苓二兩半防風一兩半羌活六錢天麻三兩半白殭蠶一兩大川烏六錢麵裹煨去皮臍粉草六錢上銼生薑三片水煎臨服入薑汁三匙溫服治婦人遍身麻痹謂之不仁皆因血氣受風濕所致用祛風散送下五補丸祛風散生川芎白朮白芷各三錢甘草二錢為末調酒吞下五補丸五補丸黃耆一兩人參五錢大附子一錢當歸三錢白芍五錢為末煉蜜為丸梧子大每三十丸用祛風散送下不仁者謂不柔和也痛癢不知針火不知是也經曰諸虛乘寒而鬱冒不仁蓋其血氣虛弱不能周流於一身於是正氣為邪氣所伏故肢體頑麻不知痛癢寒過厥如死屍而鬱且冒也用桂麻各半湯不愈者補中益氣湯入薑汁設或身汗如油喘不休喘而直視水漿不入者此為命絕也痙病原來痙病屬膀胱口噤如癇身反張此是傷風感寒濕故分兩證見柔剛無汗為剛須易識有汗為柔見的端二證皆宜續命飲剛痙去桂用麻黃柔痙去麻當用桂只依此法最為良小續命湯麻黃去節人參黃芩酒炒白芍酒炒川芎酒洗防己杏仁去皮尖桂枝甘草各一錢防風大附子炮去皮臍各五分如聖飲治剛柔二痙口噤身反張手足攣搐頭面赤項強急與瘛瘲同治法柴胡黃芩半夏赤芍川芎白芷當歸羌活防風烏藥甘草有汗是柔痙加白朮桂枝無汗是剛痙加麻黃蒼朮口噤咬牙大便實加大黃利之凡痙病有出汗多變痙有因去血過多元氣虧極或外邪相搏以致牙關緊急四肢痙強或陰火內動或腰背反張肢體搐搦若有汗而不惡寒者曰柔痙若無汗而惡寒者曰剛痙由去血過多筋無所養故傷寒汗下過多潰瘍膿血大泄多患之乃敗症也急以十全大補湯治之如不應急加附子多有攻蘇者狂言辨狂言者大口開與人語語所未常見之事即狂言也譫語辨譫語者合目自言言說日用常行常見之事即譫語也鄭聲辨鄭聲者聲戰無力不相接續造次出於喉中也癲疾癲脈搏大滑者生沉小緊急不治癲脈虛可治實則死夫癲者喜笑不常而癲倒錯亂之謂也故心熱甚則多喜而為癲也癲為心血不足多為求望高遠不遂其志者有之治以安神養血兼降痰火又曰癲者精神不守言語錯亂妄見妄言登高罵詈是也防風通聖散治一切大風癲狂之疾依本方加生地桃仁牡丹皮清心化痰湯主方治一切癲疾牛膽南星大半夏泡陳皮茯苓黃連姜炒當歸酒炒生地黃川芎人參酸棗仁炒石菖蒲各錢甘草二分生薑五片水煎服白金丸治癲狂失心白礬三兩鬱金七兩為末水糊丸梧子大每五六十丸溫湯下抱膽丸治一切癲癇風狂或因驚恐怖畏所致及婦人產後血虛驚氣入心並婦女經脈通行驚邪蘊結並效水銀二錢鉛一錢半硃砂一錢研乳香一錢研上將鉛入銚子內與水銀結成砂子次下朱乳乘熱用柳木棍研勻丸如芡實大每一丸空心井花水吞下病者得睡切莫驚動覺來即安再一丸除根黃白丹治五癲五癇風症用黃丹白礬各一兩用磚鑿一窩可容二兩許安丹在下礬在上用木炭五斤煅令炭盡取為末以不經水豬心血為丸如綠豆大每二三十丸橘皮湯下一婦人患癲疾歌唱無時逾垣上屋乃營血迷於心包所致逍遙散加桃仁遠志紅花蘇木生地有熱者加小柴胡湯加生地黃辰砂琥珀定志丸專補心生血定魄安魂扶肝壯膽管轄所魂驚戰虛弱氣乏之疾並皆治之南星半斤先將地作坑用炭十八斤在坑內燒紅去灰淨用好酒十餘斤傾在坑內即入南星在內上用如坑口大瓦盆蓋覆周圍以炭火擁定勿令泄氣次日取出為末琥珀一兩皂角水洗去油硃砂二兩公豬心割開入內用線縛住懸胎煮酒二碗幹人乳二兩用薑汁製過人參三兩白茯苓去皮三兩石菖蒲豬膽汁炒二兩遠志水泡去心豬膽煮過曬乾再用薑汁製白茯神去皮木三兩上為末煉蜜為丸如梧子大每夜臥時鹽湯送下曬乾人乳法用人乳汁數碗入瓦盤中莫攪動四圍曬乾刮一處干則再刮乳干以薑汁拌曬用狂疾狂脈實大生沉小死夫狂者狂亂而無正定也故肝熱甚則多怒而為狂也狂為痰火實盛治內下之及狂之始發少臥少飢自賢者貴妄笑妄空心高而歌棄衣而走也此皆實症宜瀉而不宜補宜大黃湯治之清心滾痰丸下之亦可大黃湯治癲狂熱病大黃四兩酒浸一宿水三升煎之分三服清心滾痰丸治癲癇驚狂一切怪症神效大黃酒蒸四兩黃芩四兩青礞石硝煅五錢沉香二錢半牙皂五錢犀角五錢麝香五分硃砂五錢上為末水丸硃砂為衣每三四十丸滾水下苦參丸治發狂無時披頭大叫欲殺人不避水火苦參為末蜜丸梧子大每服三十丸薄荷湯送下治狂言鬼語用蛤蟆一個燒存性為末酒調服治氣心風即是痰迷心竅發狂亂作用花蕊石煅酒淬一次為末每一錢黃酒送服治心恙狂惑用無灰酒二碗真麻油四兩共和勻楊枝二十條逐一條攪二十下換遍楊枝直候油酒相加如膏煎至七分狂者強灌之令熟睡或吐或不吐覺來即省雄朱丸治因驚憂失心或思過多氣結不散積成痰涎留空心包窒塞心竅以致狂言妄語叫呼奔走不避親疏硃砂結塊者二錢半研雄黃二錢半明淨者白附子一錢上和勻以豬心血和丸如梧子大另用硃砂為衣每服三丸用人參菖蒲煎湯下常服一粒能安魂定魄補心益腎五癇癇病一月數發者易治周年一發者難治夫癇者發則仆地悶亂無知嚼舌吐沫背反張目上視手足搐搦或作六畜聲者是也亦因金衰木旺生風外由驚邪入內以致之經曰風盛則動正謂此也治法當先以瓜蒂散吐之頑涎既盡以通聖散下之再服硃砂安神丸清心鎮墜之劑而復調理之又滾痰丸下之亦可瓜蒂散治癲狂不止得之驚憂極者甜瓜蒂不拘多少為末每服一錢井水和一盞投之即大吐如吐不止煎蔥白湯咽三五口立解吐後熟睡勿令驚起即效治人病癇神志不寧時發狂躁多言好怒面容不澤生地黃姜焙五錢橘紅貝母茯苓黃連甘草少許遠志甘草水泡去心石菖蒲酸棗仁炒枳實瓜蔞仁天花粉生薑煎服牛黃化痰丸祛風清水豁痰理氣開心定志安神鎮驚一切癲癇怔忡之疾牛黃五分硃砂六錢為衣雄黃一錢天竺黃一錢膽星一兩青礞石一兩火硝一兩入傾銀罐內大火煅如黃金色烏犀角一錢二分半沉香一錢二分半石菖蒲去毛一兩殭蠶薑汁炒七錢蟬退去足五錢天麻薑汁炒五錢黃芩二兩炒大黃酒浸九蒸九曬二兩豬心血二個上為細末竹瀝打稀糊入豬心血同和為丸如綠豆大每六十丸空心臨臥薄荷湯下忌驚恐怒氣治驚癇白礬一兩半生半枯荊芥穗二兩為末麵糊丸黍米大硃砂為衣每服二十丸薑湯送下寧神丹祛風化痰寧心定志清熱降火補養氣血不時潮作者可服久服此藥者拔去病根永不再發人參五錢白朮去蘆炒五錢白茯神去皮木五錢當歸身酒洗一兩川芎三錢懷生地黃一兩南星泡一兩半夏泡一兩陳皮二錢遠志甘草水泡去心五錢麥門冬去心五錢黃連薑汁炒五錢黃芩酒炒三錢石膏煅一兩荊芥五錢獨活五錢天麻七錢白附子三錢犀角五錢辰砂五錢另研珍珠三錢牛黃三錢殭蠶五錢甘草三錢酸棗仁炒五錢金箔三十片上為細末酒打稀糊為丸如梧子大每服五十丸空心白湯下追風祛痰丸治諸風癇暗風防風天麻殭蠶炒去絲白附子煨各一兩全蠍去毒炒木香各半兩豬牙皂角炒一兩白礬枯半兩半夏湯炮七次研為末秤六兩分作二份一份用皂角洗漿作曲一份用生薑汁作曲南星三兩銼一半白礬水浸一半皂角水浸一宿硃砂七錢半另研為衣上為細末薑汁糊為丸如梧子大每七八十丸食遠臨臥淡薑湯下薄荷湯亦可虛弱加人參白朮茯苓當歸川芎桔梗枳實各一兩久服奏效治遠年近日風癇心恙風狂中風涎潮牙關緊閉不開破傷風搐者皂角不蛀肥者一斤半去皮弦切碎以酸漿水一碗浸春秋三四日夏一二日冬七日濾去渣將汁入銀石器慢火熬以槐柳枝攪成膏取出厚紙上陰乾收貯用時取手掌大一片以溫漿化在盞內用竹筒灌入病人鼻孔內良久涎出為驗欲涎止服溫鹽湯一二口便止忌魚生冷濕面之物千金保命丹治諸風瘛瘲不能言語怔忡健忘恍惚去來頭目眩暈胸中煩郁痰涎壅塞精神昏憒心氣不足神志不寧驚恐憂慘虛煩少睡或發癲狂小兒驚癇風搐大人暗風羊癇風癇發叫如雷硃砂二錢珍珠一錢膽星三錢甘草麻黃去根節白附子炮雄黃薄荷各一錢五分防風琥珀金箔牛黃各一錢殭蠶炒犀角鎊麥門冬去心枳殼桔梗地骨皮神麯炒茯神去木人參白朮遠志甘草水泡去心柴胡各三錢天麻二錢膽礬一錢七分冰片少許黃芩七錢麝香少許紫河車七錢天竺黃一錢荊芥七錢蟬退一錢七分川芎牙皂各一錢上為細末煉蜜為丸如彈子大每服一丸薄荷湯研化服不拘時候忌豬羊肉核桃動風之物此藥丸用蠟包尤好藏久健忘夫健忘者徒然而忘過也症由憂思過度損其心胞以神宮不職意念不清遇事多忘然過思傷脾亦能令人健忘蓋脾主意與思心亦主思思憂過度使人健忘法當理心脾則神凝意定其症自除丹溪曰健忘者有始無終言談不知首尾此係為病之名非比生成愚頑不知世事大抵由精神短少亦有痰者歸脾湯主方治思慮傷脾不能攝血致血妄行或吐或下或健忘怔忡驚悸不寐發熱盜汗或心脾傷痛嗜臥少食大便不調或血虛發熱或肢體重痛婦人月經不調赤白帶下或晡熱內熱或瘰癧流注不能消散潰斂或思慮傷脾而作瘧疾加柴胡梔子名加味歸脾湯神不寧而健忘倍加酸棗茯神當歸加柏子仁黃耆蜜水炒人參白朮去油蘆炒白茯苓當歸酒洗龍眼肉遠志甘草水泡去心酸棗仁炒各二錢二分木香一錢甘草炙五分上銼薑棗煎服加減補心湯治諸虛健忘等症人參三錢白朮去蘆三錢白茯苓去皮五錢陳皮五錢當歸酒洗五錢白芍酒炒五錢生地黃酒洗五錢遠志甘草水洗去心五錢石菖蒲三錢麥門冬去心五錢酸棗仁炒五錢黃柏酒炒五錢知母酒炒五錢甘草三錢水煎溫服天王補心丹寧心保神益血固精壯力強志令人不忘清三焦化痰涎祛煩熱療咽乾除驚悸定怔忡育養心神大補元氣讀書勞神勤政勞心常宜服之生地黃酒洗四兩天門冬去心麥門冬去心當歸酒洗柏子仁酸棗仁炒五味子各一兩遠志甘草水泡去心人參白茯神去皮木玄參丹參桔梗各五錢一方加黃連二兩酒炒大中丞松石劉公加石菖蒲百部杜仲甘草一方加枸杞子石菖蒲上為細末煉蜜為丸如梧子大硃砂為衣每服二三十丸臨臥燈草竹葉煎湯送下燈心棗湯亦可若飲食少思大便不實恐不宜也安神定志丸清心肺補脾腎消痰清火臺閣勤政勞心燈窗讀書刻苦最宜服之屢用奇效四川王御史傳人參一兩半白朮去蘆油微炒白茯苓去皮白茯神去皮木遠志甘草水泡去心石菖蒲去毛忌鐵酸棗仁炒麥門冬去心各一兩牛黃一錢另研辰砂二錢半水飛為衣上為末圓眼肉四兩熬膏和煉蜜三四兩為丸如梧子大辰砂為衣每服三丸清米湯下不拘時日三服聰明狀元丸治不善記而多忘者此藥開心通竅定智凝神石菖蒲五寸九節者佳白茯神去皮木遠志肉甘草水泡去心麥門冬去心當歸身酒洗各一兩巴戟天泡去骨五錢人參三錢敗龜甲酥炙龍骨入雞腹中煮一宿各一兩上為細末用白茯苓去皮二兩黏米二兩共打粉用石菖蒲三錢打碎煎湯去渣煮糊為丸每日食後午時臨臥各服三四十丸白湯下久久服之能目記千言紫河車治癲狂健忘怔忡失志及恍惚驚怖入心神不守舍多言不定此藥大能安心養血補益虛損八仙散服三十日精神倍六十日氣力強志意足少壯素稟虛弱或勞傷早衰多忘服之天門冬懷生地黃中桂白茯苓去皮各一兩石菖蒲五味子遠志甘草水泡去心石韋各三兩上為細末每服一錢或湯或酒任調食後服勝如天王補心丹怔忡驚悸夫怔忡者心胸躁動謂之怔忡此心血不足也多因富貴戚戚貧賤不遂所願而成驚悸者即動悸也動之為病惕然而驚悸之為病心下怯怯如人所捕皆心虛膽怯之所致也又曰驚者恐怖之謂悸者怔忡之謂怔忡健忘驚悸三症名異而病同清火安神湯主方治驚悸怔忡心神慌亂當歸一錢二分川芎七分白芍酒炒八分生地黃一錢片芩八分黃連八分梔子仁七分酸棗仁炒一錢遠志甘草水泡去心七分麥門冬去心一錢甘草二分上銼一劑生薑煎服硃砂安神丸治血虛心煩懊憹驚悸怔忡胸中氣亂硃砂五錢水飛為衣川黃連酒洗六錢當歸身二錢半懷生地黃一錢半甘草炙二錢半上除硃砂外四味共為細末湯浸蒸餅為丸如黍米大以硃砂為衣每服二三十丸津液嚥下食後臨臥溫水晾少許下亦可此近而奇偶制之緩也寧神定志丸當歸酒洗一兩川芎七錢白芍酒炒一兩懷生地黃酒洗一兩半白茯神去皮木一兩酸棗仁炒五錢遠志甘草水泡去心七錢麥門冬去心一兩黃連姜炒五錢陳皮去白一兩貝母一兩甘草三錢硃砂一兩為衣上為末煉蜜為丸如綠豆大每服五七十丸食遠棗湯下加味寧志丸元氣虛憊精神恍惚心思昏憒氣不足健忘怔忡人參白茯苓去皮遠志甘草水泡去心石菖蒲米泔浸酸棗仁炒黃連去毛當歸酒洗生地黃酒洗各八錢柏子仁一兩木香四錢不見火硃砂研水飛一兩半入藥半為衣上為末煉蜜為丸綠豆大半飢時麥門冬去心煎湯下五六十丸參歸腰子治心氣怔忡而自汗者不過一二服即愈人參五錢當歸身五錢豬腰子一枚上先以腰子用水三碗煮至一碗半將腰細切入二味藥同煎藥渣焙乾為細末山藥糊為丸梧子大每三五十丸米湯送下妙香散治心氣不足志意不定驚悸恐怖悲憂慘慼虛煩少睡喜怒不常夜多盜汗飲食無味頭目眩暈常服補益氣血安神鎮心麝香一錢木香二錢半山藥薑製茯神茯苓黃耆蜜炒遠志甘草水泡去心各一兩人參桔梗去蘆甘草各五錢硃砂三錢上為末每三錢酒調下上方治消渴小便澀數而瀝兼有油濁用燈心茯苓煎湯下又治飲酒行事酒熱瘀心經致成黃疸茵陳煎湯調下日三服又治心虛遺精白濁又治虛勞心氣不平小便膩濁驚悸健忘怔忡失志不寐心風皆是膽涎沃心以致心氣不足若用涼劑太過則心火愈微痰涎愈盛而病益深宜理痰氣一婦人驚悸怔忡無寐自汗盜汗飲食不甘怠惰嗜臥用歸脾湯而愈方見健忘定志丸治心氣不足恍惚怔忡驚悸健忘遠志甘草水泡去心石菖蒲各二兩人參一兩白茯神去皮木三兩上為末煉蜜為丸如梧子大硃砂為衣每服二十丸米湯下不寐久視傷血久臥傷氣久立傷骨久行傷筋久坐傷肉大抵人之形氣時靜時動其機運而不滯久於動靜未免有傷也睡不厭熒覺不厭舒熒者曲膝卷腹以左右肋側臥修養家所謂獅子眠是也如此則氣海深溝丹田常暖腎水易生益人弘多舒體而臥則氣直而寡蓄神散而不潛故臥惟覺時可舒體耳凡睡常習閉口而睡為佳口開即失真氣且邪從口入凡睡而張口者牙齒無不早落可以驗之安神復睡湯主方當歸身酒洗川芎白芍酒炒懷生地黃酒洗益智仁酸棗仁炒山藥圓眼肉遠志甘草水泡去心麥門冬去心甘草上銼燈心水煎溫服養心湯勤政勞心痰多少睡心神不足人參麥門冬去心黃連姜炒白茯苓去皮白茯神去皮木當歸酒洗白芍酒炒遠志甘草水泡去心柏子仁酸棗仁炒陳皮甘草上銼蓮肉四個去心水煎溫服人參湯治膽虛常多畏恐不能獨臥如人捕狀頭目不清人參枳殼去穰五味子桂心甘菊花白茯神枸杞子各三分山茱萸去核三分柏子仁熟地黃各一錢上為細末每服二錢溫酒調服酸棗仁湯治多睡及不睡酸棗仁和皮微炒人參白茯苓去皮各等分上銼水煎服如不要睡即熱服如要睡即冷服治心下怔忡眠倒即大聲打鼾睡即醒不寐用羚羊角烏犀角各用水磨濃汁入所用湯藥內服之蓋打鼾睡者心肺之火也暮臥咒暮臥以手撫心上咒曰天靈至榮願得長生五龍君侯願得安寧男一七遍女二七遍長生不病婦人科脈訣女子尺中須要盛浮細沉遲是虛證忽然診得寸口盈六部無邪身有孕女人尺脈常盛而右手脈大皆其常也若腎脈微澀或浮或滑而斷絕不勻或肝脈沉而急皆經閉不調之候也調經論曰經者常候也謂候其一身之陰陽愆伏知其安危故每月一至太過不及皆為不調陽太過則先期而至陰不及則後時而來其有乍多乍少斷絕不行崩漏不止皆有陰陽衰盛所致蓋先期而至者血熱也有因脾經血燥加味逍遙散有因脾經鬱火歸脾湯有因肝經怒火加味小柴胡湯有因血分有熱加味四物湯有因勞役動補中益氣湯後期而至者血虛也有因脾經血虛人參養榮湯有因肝經血少六味地黃丸有因氣虛血弱八珍湯蓋血生於脾土故云脾統血凡血病當用甘苦之劑以助陽氣而生陰血也大抵經病趲前為熱退後為虛血滯宜行血枯宜補常時與經前作痛為血積經後作痛為血虛晡時發熱為血虛有積經行發熱為血虛有熱此大法也經行不調或紫或黑論丹溪曰經水者陰血也陰必從陽故其色紅稟火色也血為氣之配氣熱則熱氣升則升氣降則降氣凝則凝氣滯則滯氣清則清氣濁則濁上應於月其行有常名之月經為氣之配因氣而行成塊者氣之凝也將行而痛者氣之滯也來後作痛者氣血俱虛也色淡者亦虛也而有水混之也錯經妄行者氣之亂也紫者氣之熱也黑者熱甚也今人但見其紫者黑者作痛者成塊者率指為風冷乘之而行溫熱之劑禍不旋踵矣良由病原論月水之病皆曰風冷乘之宜相習而成俗也或曰黑者北方水之色也紫者黑之漸也非冷而何予曰經云亢則害承乃制熱甚者必兼水化所以熱則紫甚則黑也況婦人性執而鄙嗜欲加倍臟腑厥陽之火無日不起非熱而何若曰風冷必須外得設或有之吾恐一百而一二也婦人氣血不足用八珍湯中氣不足用補中益氣湯脾氣不足用六君子湯脾氣鬱結用歸脾湯手足發熱用六味丸凡臟虛寒手足逆冷用八味丸四物湯主方治血虛或因失血或因克伐或因瘡毒潰後以致晡熱內熱煩躁不安若脾虛不能生血者宜四君加當歸白朮炒以補脾土其血自生若血虛發熱誤服寒涼克伐之劑以致發熱作渴目紅面赤脈洪大而虛此血脫煩躁急用當歸補血湯方見補益當歸酒洗川芎白芍酒炒懷生地黃酒拌碗盛入砂鍋內蒸黑忌鐵器諸症用熟地黃俱用此法制上銼水煎服看病加減於後經水將來作痛者血實氣滯也或心腹連腰作痛用生地黃加黃連香附桃仁紅花玄胡牡丹莪朮青皮經水過期不來作痛者血虛有寒加桃仁紅花香附肉桂蘇木木通甘草經水先期來者血虛有熱用生地加黃芩香附黃連阿膠艾葉黃柏知母甘草經水過期而來紫黑成塊者氣鬱血滯也用生地加桃仁紅花牡丹青皮香附玄胡甘草經水去多久不止發腫滿者是脾經血虛也加白朮茯苓砂仁大腹皮木香陳皮厚朴蘇子豬苓木通香附玄胡牛膝甘草經水月久不行發腫者是瘀血滲入脾經也去地黃加桃仁紅花牡丹乾薑肉桂厚朴枳殼木香香附牛膝玄胡經水先期而至血紫有塊腰腹痛手足冷痹口乾頭眩用生地加條芩荊芥香附小茴香玄胡續斷杜仲地榆甘草錯經妄行於口鼻者是火載血上氣之亂也用生地加黃芩梔子牡丹犀角阿膠茯苓麥冬陳皮凡經血逆行或血腥或吐血衄血用汁服自清經水行後作痛者氣血虛也加四君子湯二方合劑服之加炒乾姜妙經水過期而來色淡者痰多也加陳皮半夏茯苓甘草生薑煎服經水適來適斷或有往來寒熱先宜服小柴胡湯後以此湯和之肥白人經水過期者是痰多用二陳湯加南星蒼朮滑石及川芎當歸香附經水過多久不止者成血崩用生地加白朮條芩阿膠茯苓山梔地榆荊芥香附甘草久不止加茅根磨墨同服骨蒸勞熱加地骨皮知母柴胡黃芩妊娠胎動不安下血不止加艾葉阿膠條芩血臟虛冷崩中去血過多加阿膠艾葉血崩加生地蒲黃黃芩一方阿膠艾葉條芩風虛眩暈加秦艽羌活發熱心煩不得眠加黃連梔子虛寒脈微自汗氣短自利加乾薑中濕身重無力身涼微汗加白朮茯苓筋骨肢節疼及頭疼憎寒加羌活防風藁本細辛臍中虛冷腹疼腰脊間痛加玄胡川楝子經水過多加黃芩白朮經水澀少加葵花紅花赤白帶下加香附白芷血痢加阿膠黃連產後血痢腹痛加槐花黃連粟殼血熱相搏舌乾口渴加天花粉麥冬大渴引飲加知母石膏腑臟秘澀加大黃桃仁虛煩不眠加竹葉人參酸棗仁目暴赤作翳疼加羌活防風防己酒浸龍膽草因熱生風加川芎二錢半柴胡五錢虛熱口乾加麥門冬黃芩產後惡露不通加桃仁蘇木牛膝加味四物湯即四物湯加柴胡壯丹皮梔子按上方治諸病屬血虛者宜之加味逍遙散治肝脾血虛有熱遍身瘙癢或口燥咽乾發熱盜汗食少嗜臥小便澀滯等症又治瘰癧流注虛熱等瘡當歸酒洗白芍酒炒白茯苓去皮白朮炒甘草炙各一錢柴胡牡丹皮山梔炒各五分按上方治諸病發熱屬肝脾血虛者宜之三分散治婦人室女月事不調寒熱往來痰嗽虛損狀若勞症遷延歲月不能孕育勻經消痰去熱和表裡養陰陽倍飲食小柴胡湯合四物湯加白朮白茯苓薑棗煎服按上方治心脾虛肝火盛而寒熱痰嗽者宜之婦人橫痃一名便癰一名便毒俗名㾦子或肝經濕熱下注或鬱怒傷損肝脾其外症或兩拗小腹腫痛或玉門焮腫作痛或寒熱往來憎寒壯熱其內症或小便澀滯或腹內急痛或小腹痞悶或上攻兩脅或晡熱重墜若兩拗小腹腫痛肝經濕熱壅滯也用龍膽瀉肝湯玉門腫脹肝火血虛也用加味逍遙散及龍膽瀉肝湯加木香若概投散血攻毒之劑則誤甚矣龍膽瀉肝湯治肝經濕熱兩拗腫痛或腹中疼痛或小便澀滯等症龍膽草酒拌炒澤瀉各一錢車前子炒木通生地黃酒拌當歸酒拌山梔炒黃芩炒甘草各五分上銼水煎服兼治玉莖生瘡或便毒懸癰囊脫腫痛潰爛睪丸懸掛按上方治肝經濕熱兩拗腫痛宜之小柴胡湯治肝膽經症寒熱往來晡熱潮熱身熱默默不食或怒火口苦耳聾咳嗽發熱脅下作痛甚者轉側不便兩脅痞悶或瀉痢咳嗽或吐酸食苦水皆用此藥主之柴胡二錢黃芩一錢半人參半夏各七分甘草炙五分上薑棗水煎服依本方加山梔炒龍膽草炒當歸芍藥名九味柴胡湯治肝經濕熱下注便毒腫痛或小腹脅肋結核凡肝膽經部分一切瘡瘍或風熱結核瘰癧加味小柴胡湯治肝膽經風熱耳前後腫痛或結核焮痛或寒熱晡熱或經候不調等症即小柴胡湯加山梔牡丹皮又加味小柴胡湯治婦女經行感冒發熱熱入血室寒熱如瘧晝則安靜夜則發熱妄語或素血虛大勞大怒火動熱入血室亦能致此即前小柴胡湯加生地黃一室女寒熱肝脈弦長而出寸口用小柴胡湯加生地烏梅治之而愈既嫁而諸症悉痊按上方治肝膽經諸病寒熱潮熱晡熱口苦耳聾脅痛痰嗽宜照各病選用加味調經湯治經水不及期有熱經行色紫黑或淋瀝妄行夏月尤宜服之當歸身酒洗上川芎中白芍中生地黃上黃連上黃芩上梔子上香附上青皮中上用荊芥穗七個水煎空心服忌油膩蔥蒜按上方治經水不及期而來屬血虛有熱者宜之加味八珍湯治經水過期者用此方即能調正當歸一錢半川芎七分白芍酒炒一錢熟地黃一錢半人參一錢白朮去蘆一錢白茯苓去皮一錢香附八分陳皮八分甘草五分上銼水煎服腹痛加艾葉小茴玄胡各四分或為末煉蜜為丸亦可按上方治經水過期屬氣血兩虛者宜之加減益氣湯治婦人多怒經行旬余方止淋瀝無期肌體倦瘦口乾內熱盜汗如洗日晡熱甚皆由肝脾虧損無以生髮元氣黃耆人參當歸白朮茯神去皮木遠志甘草水泡去心麥門冬五