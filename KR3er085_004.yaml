body:
  text: 震集卷四補益虛損百病脈法氣虛脈細或緩而無力右手弱血虛脈大或數而無力左手弱陽虛脈遲陰虛脈弦真氣虛脈緊男子久病氣口脈弱則死強則生女人久病人迎脈強則生弱則死夫虛損者因虛而致也若能恬淡虛無真氣完實病從何來或大病未復使合陰陽或疲極筋肋飢飽失節盡神度量或呼吸走氣榮衛虛損百疴交作或吐血或衄血便血瀉血遺精白濁洞瀉盜汗潮熱發熱嘔吐咯血痰飲涎沫等症須用補氣養血之藥亦當以益胃消痰藥佐之蓋人以穀氣為本所謂積氣由穀氣而生古人以五味以養其病凡男女寸脈弱而微者上虛尺弱滑而澀者下虛也尺滑而澀疾為血虛浮而裡虛也四君子湯治脾胃虛弱飲食少進或肢體腫脹肚腹作痛或大便不實體瘦面黃或胸膈虛痞痰嗽吞酸若因脾胃虛寒而致宜香砂六君子若因脾經鬱結而致宜歸脾湯若因肝木侮脾胃而致宜用六君加木香芍藥若命門火虛而致宜用八味丸人參白朮去蘆炒白茯苓去皮各二錢甘草炙一錢上銼劑薑棗水煎服異功散治久咳不已或腹滿少食或面腫氣逆又治脾胃虛弱飲食少思等症即前方加陳皮六君子湯治脾胃虛弱飲食少思或久患瘧痢若見內熱或飲食難化作酸乃屬虛火須加炮姜其功甚速即四君子加半夏陳皮香砂六君子湯即前方加香附藿香砂仁按上方治諸病屬氣虛者宜之四物湯治肝脾腎血虛發熱或日晡熱甚頭目不清或煩躁不寐胸膈作脹或脅作痛宜用此湯若脾氣虛而不能生血宜用四君子湯若脾氣鬱而虛宜用歸脾湯若腎水涸而不能生肝血宜六味丸當歸酒洗懷生地黃酒拌砂鍋內蒸黑各三錢白芍酒炒二錢川芎一錢五分上銼水煎服加味四物湯即前方加白朮茯苓柴胡丹皮穹歸湯即前方去白芍地黃按上方治諸病屬血虛者宜之八珍湯治氣血虛弱惡寒發熱煩躁作渴或不時寒熱眩暈昏憒或大便不實小便赤淋或飲食少思小腹脹痛即四君四物合方按上方治諸病屬氣血兩虛者宜之十全大補湯凡人元氣虛弱或因起居失宜或因飲食勞倦或因用心太過致遺精白濁盜汗自汗或內熱晡熱潮熱發熱或口乾作渴喉痛舌裂或胸乳膨脹脅肋作痛或頭頸眩暈眼花或心神不寧寤而不寐或小便赤澀莖中作痛或便溺余滴臍腹陰冷或形容不克肢體畏寒或鼻氣急促或更一切熱症皆是無根虛火本方加麥門五味培其根本諸症自息黃耆蜜水炒人參白朮去油蘆炒白茯苓去皮當歸身酒洗川芎白芍酒炒熟地黃肉桂甘草炙上銼薑棗煎服相火旺加酒炒黃柏知母下焦虛寒加大附子麵裹煨去皮臍童便浸焙乾肉桂按上方治諸病屬氣血兩虛而挾寒者宜之補中益氣湯治中氣不足肢體倦怠口乾發熱或飲食無味勞倦身熱脈洪大而虛或頭痛惡寒自汗或氣高而喘身熱而煩或脈微細軟弱自汗體倦少食或中氣虛弱而不能攝血或飲食勞倦而患瘧痢或瘧痢因脾胃虛而不能愈或元氣虛弱感冒風寒不勝發表宜用此代之或入房而後感冒或感冒而後入房亦用此湯急加附子或瀉痢腹痛急用附子理中湯嫩黃耆蜜水炒一錢半楝參一錢甘草炙一錢陳皮二錢白朮去蘆微炒一錢當歸身酒洗二錢柴胡五分升麻五分此兩味能升提陽氣下陷柴胡能使胃中之清氣左旋而上達升麻能使胃中之清氣從右而上遷上銼作一劑生薑三片棗一枚水煎熱服少加酒炒黃柏以救腎水瀉陰中之伏火也紅花三分入心養血若元陽虛寒加大附子麵裹煨去皮臍或三分重則五分肉桂五分若陰虛火動加黃柏知母俱酒炒各五分若口乾作渴加麥門冬天花粉若自汗盜汗加麻黃根浮小麥酸棗仁炒若五心煩熱加生地黃麥門冬若痰盛加半夏貝母若咳嗽盛加五味子天門冬若夜臥不寐加酸棗仁炒心下怔忡恍惚加遠志肉麥門冬白茯神按上方治諸病屬內傷元氣者宜之獨參湯治元氣虛弱惡寒發熱或作渴煩躁痰喘氣促或氣虛卒中不語口噤或痰涎上湧手足逆冷或婦人難產產後不醒喘急等症好人參一兩至二兩炮姜五錢作一劑水煎徐徐服蓋人參性寒故姜佐之如不應急加炮大附子去皮臍按上方治元氣虛憊者宜之歸脾湯治脾經失血少寐發熱盜汗或思慮傷脾不能攝血以致妄行或健忘怔忡驚悸不寐或心脾傷痛嗜臥少食或憂思傷脾血虛發熱或肢體作痛大便不調或婦人經候不準晡熱內熱或瘰癧流注不能消散潰斂黃耆蜜炒人參白朮炒白茯苓去皮龍眼肉當歸遠志甘草水泡去心酸棗仁炒各一錢木香甘草炙各五分上銼薑棗煎服加味歸脾湯即此方加柴胡山梔按上方治思慮損傷心脾者宜之當歸補血湯治男婦肌熱燥熱目赤面紅煩渴引飲晝夜不息其脈洪大而虛重按全無內經曰脈虛血虛脈實血實又曰血虛發熱證象白虎惟脈之虛實為辨也若誤服白虎必死此病得之於飢飽勞役黃耆炙一兩當歸酒洗二錢上銼水煎服人參養榮湯治脾肺俱虛發熱惡寒四肢倦怠肌肉消瘦面黃短氣食少作瀉若氣血虛而變見諸症莫能名狀勿論其脈但用此湯其病悉退白芍酒炒一錢半人參黃耆蜜炒白朮去蘆當歸陳皮桂心甘草炙各一錢熟地黃自制五味子白茯苓各七分半遠志甘草水泡去心五分上銼薑棗水煎服按上方治脾肺俱虛者宜之同真飲子大補元氣不足陰陽兩虛飲食少五心熱自汗日晡潮熱精氣滑脫行步無力腰胯疼痛泄瀉脈沉弱嗽少痰多或乾咳者或氣血精神不足肢體倦怠頭目昏眩食少脈虛而數時發潮熱將成勞症者或傷力氣虛脈弱腰背疼痛動輒鼻衄或便血過多而黃瘦憔悴食少氣促者或婦人陰虛瘦悴食少虛熱自汗腹痛面浮腰痛赤白帶下者並宜服之此方藥備五味穀氣沖和無寒熱偏並太過不及之失養血氣理脾胃充益腠理五臟之真精益三焦之元氣生津液而榮衛克利機關而飲食自倍矣嫩黃耆蜜水炒人參白朮去油蘆炒白茯苓陳皮當歸身酒洗熟地黃懷山藥山茱萸酒蒸去核澤瀉五味子補骨脂酒炒杜仲去皮酒炒黃柏酒炒甘草炙上銼劑水煎空心溫服按上方治陰陽兩虛補元氣滋腎水之劑六味地黃丸此壯水制火之劑夫人之生以腎為主人之病多由腎虛而致者此方乃天一生水之劑無不可用若腎虛發熱作渴小便淋閉痰壅失音咳嗽吐血頭目眩暈眼花耳聾咽喉燥痛口舌瘡裂齒不堅固腰腿痿弱五臟虧損自汗盜汗便血諸血凡肝經不足之症尤當用之益水能生木故也此水泛為痰之聖藥血虛發熱之神劑又治肝腎精血不足虛熱不能起床忌鐵器每白蜜一斤慢火煉滴水成珠方入白水一碗攪勻和藥一曬即干凡用蜜丸俱依此制大懷生地黃秤准八兩酒浸入砂鍋內蒸黑取出入後藥同搗山茱萸酒蒸去核取肉四兩懷山藥四兩白茯苓去皮三兩牡丹皮去骨三兩澤瀉去毛三兩上將諸藥精製秤為一處入石臼內杵搗極爛成餅用手搓開曬乾或微火烘乾亦可磨為細末煉蜜加水和為丸如梧子大每服百丸空心白湯下鹽湯酒俱可忌三白腎水不能攝養脾土多吐痰唾薑湯送下加麥門冬五味子名八仙長壽丸加大附子肉桂各二兩名八味丸腰痛加鹿茸當歸木瓜續斷治渴加五味子麥門冬諸淋瀝倍茯苓澤瀉老人夜多小便加益智仁去澤瀉減茯苓一半老人下元虛冷胞轉不得腹脹急切痛四五日困篤垂危者倍澤瀉遺精去澤瀉加牡蠣陰囊腫脹屬陰虛濕熱壅滯加車前子牛膝治腳氣痛連腰胯治虛壅牙齒疼痛治耳聵及虛治耳鳴用全蠍四十九個炒黃為末每三錢酒調送下地黃丸百丸治陰虛火動勞瘵百病地黃丸用紫河車頭生者長流水洗淨砂鍋內碗盛蒸一日極爛和藥末搗和為丸服神效八味丸治命門火衰不能生土以致脾胃虛寒而患流注鶴膝等症不能消潰收斂或飲食少思或食而不化或臍腹疼痛夜多漩溺經云益火之源以消陰翳即此方也又治婦人脬轉小便不通殊效懷生地黃酒蒸八兩山茱萸酒蒸去核八兩懷山藥四兩白茯苓牡丹皮澤瀉各三兩肉桂用三分厚者去皮方能補腎虛引火歸源大附子要一兩五錢重者用麵裹火煨去皮臍切四片童便浸透焙乾各二兩上如六味地黃丸製法為末煉蜜加水和為丸如梧子大每服八十丸滾湯下酒亦可一治腎臟虛弱面色黧黑足冷足腫耳鳴耳聾肢體羸瘦足膝軟弱小便不利或多或少腰脊疼痛用八味丸加鹿茸五味子名十補丸一治腎氣虛寒牙齒作痛面色黧黑精神憔悴腳膝無力飲食少思或痰氣上升小便頻數齒不堅固或口舌麻悶畏飲冷水一治下元虛憊心火上炎渴欲飲水或脾虛不能剋制腎水多吐痰唾而不咳者一治心腎不交消渴引飲有人病渴用渴藥累年不愈用加減八味丸而愈其病本於腎水枯竭不能制火心火上炎是以生渴此藥降心火生腎水養生書云立秋後宜服八味丸治男子虛羸百病眾所不療者久服輕身不老加以攝養則成地仙夏末秋初熱氣酷烈不可於中庭脫露身背受風取涼五臟俞穴並會於背或令人扇風或宣露手足此中風之原若染諸疾便宜服八味丸大能補理腑臟驅御邪氣仍忌三白恐沖剋藥性凡人久服加減八味丸必肥健而多子晚年服此不生癰疽一患癰疽之人雖云有熱皆因虛而得之愈後發渴及先渴而後疽非八味丸不能治人病癰疽多有愈後發渴而不救者治之惟八味丸最效疽安而渴者服此則渴止疽安而未渴者預服此丸則永不生渴氣血如壯或未疽而先發渴者服此不惟渴止疽亦不作加減八味丸治腎水不足虛火上炎發熱作渴口舌生瘡或牙齦潰爛咽喉作痛或形體憔悴寢汗發熱五臟齊損即六味丸加肉桂五味子各一兩一滋養肝腎補益心血利足膝實肌膚悅顏色真衛生之良藥也八味丸依本方加鹿茸當歸五味子各四兩牛膝二兩共十二味精製用五仁斑龍膠酒化加煉蜜為丸如梧子大每服百丸空心鹽湯溫酒任下忌三白凡人有不耐勞不能食冷或飲食作脹大便不實或口舌常破如瘡服涼藥愈盛或盜汗不止小便頻數腿腰無力或咽津或呼吸覺冷氣入腹或陰囊濕癢或手足冷或面白或黧黑或畏寒短氣以上諸症皆屬虛甚八味丸主之此丸用附子有功夫附子一物大辛熱除三焦痼冷六腑沉寒氣味勁悍有回陽之功命門火衰非此不補惟雖有毒但炮製如法或甘草防風同炒或童便久浸以去其毒復與地黃等味同用以制其熱潤其燥緩其急假其克捷之功而駕馭其慓悍之勢則雖久服亦有功而無害惟在善用之而已若執泥有毒果有沉寒痼冷之疾棄而不用其能療乎觀東垣八味丸則瞭然矣加味九仙丸平補之聖藥也人參白朮去蘆炒白茯苓去皮當歸身酒洗大川芎甘草炙白芍酒炒懷生地黃酒蒸黑懷山藥山茱萸酒蒸去核懷牛膝去蘆酒洗各三錢甘枸杞子一斤上為細末煉蜜為丸如梧子大每服百丸空心鹽湯溫酒任下忌三白養元固真丹治諸虛百損五勞七傷水火不濟上盛下虛等症嫩黃耆蜜水炒一兩人參一兩白朮去蘆微炒一兩當歸身酒洗一兩麥門冬去心一兩遼五味子五錢大懷生地黃酒蒸四兩懷山藥炒一兩五錢山茱萸酒蒸去核一兩五錢白茯苓去皮一兩牡丹皮一兩澤瀉五錢上為末煉蜜為丸如梧子大每服七八十丸空心淡鹽湯送下忌三白益腎保元丹治年幼人被誘欲二十根本受傷及稟賦薄又犯勞喪之過隱諱不敢實言以致元氣虛敗或遺精盜汗神疲力怯飲食不生肌肉面白五心發熱夏先畏熱冬又怕寒腰疼膝重頭暈目眩故曰水一虧則火必勝火動則肺金受克而痰嗽矣或勞汗當風面出粉刺已上症見虛損成矣急服此藥大補元氣培填虛損之聖藥也其功難以盡述生地黃八兩真懷慶者皮上有疙瘩掐開內紅紫色者佳酒洗淨竹刀切片用少壯婦人乳汁一鍾好酒一鍾拌勻浸一日入砂鍋內微炒不住手撥將半燥取起日曬夜露干白茯苓四兩堅白者去皮用地黃為末絹包之藏於糯米飯內蒸一熟如此配合引地黃入黃庭宮山茱萸紅潤者佳溫水洗淨去核取肉五兩澤瀉白色不蛀者佳去毛三兩用山茱萸為末絹包飯上蒸一熟配山茱萸入丹田則不為滲矣乾山藥懷慶者佳五兩為末牡丹皮去骨四兩溫水洗淨乘濕拌山藥末絹包砂鍋內白湯蒸一熟曬乾為末引山藥入胞絡而生精血也菟絲子水淘淨四兩用青鹽三錢煎湯煮菟絲子烘乾楮實子水淘淨三兩炒研覆盆子水洗淨二兩微炒研甘枸杞子去蒂淨末四兩柏子仁二兩微炒另研上共為末用蜜二十兩煉將熟以浮小麥面四兩又芡實子粉四兩少壯婦人乳汁三盞入水二鍾打勻復煉極熟和藥杵千餘下丸如梧子大曬乾每服空心一百丸淡鹽湯送下隨即納煮熟去心皮蓮肉十餘個或圓眼之類以助藥力入肺與下元也栗子亦好如少年子弟過傷於陰致相火勝者加酒炒之黃柏三兩鹽水炒知母三兩如遇交夏令服者加北五味子二兩麥門冬去心三兩以上加減服之無不奏效如以此丸藥末宜用五仁斑龍膠和藥為丸更妙是膠也奪先天而補後天生精血復元氣之仙餌久服卻病延年若能洗心改過服之可脫死而全生卻夭而獲壽倘恃斯而復縱欲不悛不智甚矣滋陰補腎丸滋陰補腎平補之藥常人可服懷生地黃酒洗四兩懷熟地黃酒蒸黑四兩天門冬去心皮六兩麥門冬去心四兩石棗一斤酒蒸去核取肉懷山藥二兩甘枸杞子四兩遼五味子一兩懷牛膝去蘆酒洗一兩川杜仲去皮酒炒二兩肉蓯蓉酒浸四兩當歸身酒洗四兩人參二兩川黃柏去皮酒炒鹽水炒二兩半知母鹽水炒二兩白茯苓去皮二兩遠志甘草水泡去心二兩上各精製秤合一處石臼內搗成餅曬乾磨為細末煉熟蜜加水和為丸如梧子大每服三錢空心淡鹽湯下虛損遺精加牡蠣左顧者火煅二兩養心滋腎丸養元氣生心血健脾胃滋腎水止盜汗除遺精降相火壯元神人參一兩酸棗仁炒一兩遠志甘草水泡去心一兩柏子仁炒去油一兩當歸酒洗一兩白芍酒炒一兩五錢懷熟地黃酒蒸黑二兩石菖蒲去毛六錢麥門冬去心二兩天門冬去心二兩懷生地黃酒洗二兩牡蠣火煅一兩遼五味子一兩懷山藥一兩白茯神去皮木一兩蓮肉去心一兩芡實去殼一兩蓮蕊一兩黃柏鹽水炒一兩知母鹽水炒二兩上為細末煉蜜為丸如梧子大每服三錢空心鹽湯送下卻病延年丹能養心滋腎聰耳明目烏須黑髮卻病延年人參一兩天門冬水泡去心懷生地黃酒洗懷熟地黃酒蒸黑甘枸杞子遼五味子覆盆子菟絲子酒煨爛搗餅曬乾當歸身酒洗柏子仁懷山藥白茯苓去皮川巴戟泡去骨懷牛膝去蘆酒洗川杜仲去皮酒炒山茱萸酒蒸去核遠志甘草水泡去心各二兩肉蓯蓉四兩赤石脂石菖蒲川椒去目澤瀉車前子炒地骨皮各一兩加麥門冬水潤去心一兩尤妙上二十四味共為末煉蜜為丸如梧子大每服二三十丸溫酒或鹽湯任下服至百日顏色永不衰朽發白返黑雖是八十老人陰陽強健目視十里氣力不衰常行遠路不乏長春不老丹此方經驗大補諸虛百損五勞七傷滋腎水養心血添精髓壯筋骨扶元陽潤肌膚聰耳明目寧心益智烏須黑髮固齒牢牙返老還童延年益壽長生不老真陸地神仙凡人年過四旬以後方可服後二方年幼慎服仙茅米泔浸一宿黑豆拌蒸九次四兩黃精米泔煮一沸用旱蓮汁薑汁酒熬膏浸半日炒四兩赤白荷首烏各四兩槌碎如棗大入黑豆同蒸一日極黑去豆紫河車取初生男胎包衣一具先以米泔水洗淨次入長流水再洗新瓦上慢慢微火焙乾嫩鹿茸酥炙二兩楝參二兩秋石陰煉者乳汁拌曬一日四兩巨勝子炒二兩甘枸杞子二兩遼五味子二兩菟絲子洗淨酒煨搗餅焙乾二兩覆盆子二兩補骨脂酒炒二兩白茯苓去皮二兩懷生地黃酒洗二兩懷熟地黃用生地酒蒸黑二兩天門冬水浸去心皮二兩麥門冬水潤去心二兩川杜仲去皮酒炒二兩懷牛膝去蘆酒洗二兩當歸身酒洗二兩川巴戟水泡去心二兩肉蓯蓉酒洗二兩鎖陽酥炙二兩青鹽二兩遠志甘草水泡去心二兩柏子仁二兩小茴鹽酒炒二兩川萆薢酒洗二兩懷山藥二兩石棗酒蒸去核二兩川椒去目炒二兩有虛火者加黃柏酒炒知母酒炒各二兩上忌鐵器用黃道吉日精製秤和一處石臼內搗成餅曬乾為末用斑龍膠酒化開為丸如梧子大每服三錢空心溫酒送下忌三白戒房勞燥煿之物神仙延壽丹專補諸虛除百病填精髓助元陽暖丹田壯筋骨悅顏色安五臟和六腑烏鬚髮牢牙齒聰耳明目輕身壯力返老還童延年益壽黃精制同前四兩仙茅制同前四兩赤白荷首烏刺同前各四兩淫羊藿酒洗四兩斑龍霜二兩嫩鹿茸酥炙二兩虎脛骨酥炙二兩大附子麵包火煨去皮臍二兩肉桂去皮二兩嫩黃耆酒炒二兩楝參一兩柏子仁二兩遠志甘草水泡去心二兩白茯神去皮木二兩石菖蒲二兩懷山藥二兩益智仁去殼鹽酒炒二兩補骨脂酒炒三兩川巴戟泡去心二兩懷牛膝去蘆酒洗二兩川杜仲去皮酒炒二兩菟絲子酒焙搗餅焙乾二兩小茴鹽酒炒二兩川椒炒二兩胡蘆巴酒炒二兩金鈴子酒蒸去核二兩川萆薢酒蒸去核二兩青鹽一兩赤石脂火煅二兩沉香二兩乳香一兩辰砂一兩上忌鐵器為細末酒化斑龍膠和為丸如梧子大每服百丸空心酒下陰陽人屬虛寒者宜此方黃龍虎潛丸大補諸虛祛除百病生精養元壯陽種子返老還童延年益壽補養第一仙方效不能盡述當歸身酒浸洗大懷生地黃酒浸砂鍋內蒸黑取出薑汁浸焙乾山茱萸酒蒸去核懷牛膝去蘆酒洗各一兩膃肭臍如無以黃狗腎代之終不如膃肭臍為妙鎖陽酥炙牡蠣火煅童便淬何首烏米泔浸川杜仲去皮酥炙嫩鹿茸去毛酥炙虎脛骨酥炙乾山藥菟絲子酒蒸另研天門冬去心麥門冬去心懷生地黃酒洗各八錢上忌鐵器為細末以大附子一個重一兩者用臘月雄雀二十個去毛腸留肝共附子一處煮熟杵爛加麵糊同前藥共杵千餘下丸如梧子大每服三十丸空心溫酒送下日進二服二月後藥力方行效不可盡述再加枸杞子五味子各八錢龜頭冷加雄羊角陽石各八錢羊角火煅成粉水內飛過用眼花加羌活甘菊花各五錢陰虛加黃柏知母各一兩煉蜜加豬脊髓三條為丸服瓊玉膏人參十二兩白茯苓去皮水飛去浮筋二十五兩白沙蜜五斤煎去沫大懷生地黃去蘆淨洗十斤石器內搗自然汁不犯鐵器上以參苓為細末將地黃汁與蜜攪用密絹濾去細渣入藥末攪勻入好磁瓶或銀瓶內用綿於十數層外加箬葉包封扎瓶口入砂鍋內以長流水浸沒瓶頸用桑柴文武火煮二晝夜取出換蠟紙數重包紮瓶浸沒井中半日以出火毒提起仍入前鍋內煮半日以出水氣然後收藏每日清晨及午前後取一二碗用溫酒一盞調服不飲酒人白湯亦可忌雞犬聲及孝子婦人見之臞仙曰予所制此方加沉香琥珀各五錢其效異於世傳之方補百損除百病返老還童發白復黑勞瘵尤宜若二十七歲服起壽可至三百六十若六十四歲服起壽可至五百歲國朝會議加甘枸杞子半斤天門冬去心半斤麥門冬去心半斤嘗謂一料分五劑可救癱瘓者五人分十劑可救勞瘵者十人一方加白朮去油蘆四兩蜜用生絹濾過生地黃取自然汁不犯鐵器白茯苓去皮一斤半捶碎為細末水飛去浮筋澄曬乾再為末同前藥制服妙二才大補膏補諸虛卻百病烏須黑髮明目聰耳固齒牢牙延年益壽不能盡述天門冬去心四兩麥門冬去心四兩人參四兩大懷生地黃一斤大懷熟地黃一斤懷牛膝去節四兩甘枸杞子四兩何首烏八兩上㕮咀不許犯鐵器同入大鍋內用水二十碗煎至七碗取汁別貯藥渣如前再煎九次共得汁七十碗濾渣極淨別用中等砂鍋入汁七碗慢火煎熬耗汁一碗方添汁一碗六十三碗皆添盡則汁已濃矣蓋只得汁六碗卻用山白蜜去蠟可一斤半同前藥汁入小砂鍋內重湯煮至滴水不散則成膏矣磁罐貯之埋土中七日取出如前再煮一晝夜再埋一宿乃分貯小罌內封固以次取用自煎至煮俱用桑柴火藥本尋常妙在火候不拘時以淳酒調服味美而功多若懲忿窒欲之人又深居簡出時服此膏亦可以善其天年矣七年之艾不可不早為之計取人乳法用無嘴錫壺重湯煮十滾令壺熱取出將乳頭入壺口內勿令出氣須臾乳汁俱收壺中制人乳粉法取人乳汁若干即下銅鍋內煎熬成膏以大磁盤盛於日下曬之用水浸於盤下乃未濟之妙也不然其乳久曬不幹取紅鉛法取室女經血或首經最佳以布帛用燒酒洗過曬乾用之以烏梅水澄之制五仁斑龍膠法治真陽元精內乏以致胃氣弱下焦虛憊及夢泄自汗頭眩四肢無力此膠能生精養血益智寧神順暢三焦培填五臟補心腎美顏色卻病延年乃虛損中之聖藥也鹿角連腦蓋骨者佳自解者不用去蓋至卸淨五十兩截作三寸段新汲淡泉井水浸洗去垢吹去角內血腥穢水盡用人參五兩天門冬去心皮五兩麥門冬去心五兩甘枸杞子八兩去蒂川牛膝去蘆五兩五品藥以角入淨壇內注水至壇肩用筍殼油紙封固壇口大鍋內注水文武火密煮三晝夜足時常加入沸湯於鍋內以補乾耗取出濾去渣將汁復入闊目砂鍋內熬成膠聽用和藥末其角去外粗皮淨者為末名斑龍霜也家傳陰煉秋石法每童子小便一桶用淨水二桶豬牙皂角一條煎湯同投入大缸中以竹棍旋打千余匝待澄清了輕輕倒掣去清水留下自腳又復用清水如前法九遍澄下者乃秋石也用細絹濾過置一灰缽捺一凹於灰上鋪白棉紙三層將濾出秋石傾在紙上待滲干日曬以太陽夜露一太陰以受日精月華也收置宜謹密合藥時以少壯婦人乳汁和之入鹿角膠內夫斑龍秋石系仙家築基之丹非特去病而已也敬之慎之亦可清晨空腹隆冬醴酒調服二三匙合斑龍膠大補功效四聖不老丹松脂透明者一斤四兩以無灰酒砂鍋內桑柴火煮數沸竹杖攪稠黏住火以磁器盛水傾入水內結塊又復以酒煮之九遍一日煮訖次日亦如是如此者三日通計二十七遍清瑩然如玉嘗之不苦不澀乃止為細末淨用十二兩凡煮脂不宜酒少少則易乾焦煮至三分之一就可傾入水白茯苓去皮淨八兩黃菊花家種味甘者淨八兩柏子仁去殼紙裹捶去油淨八兩上三味俱為細末共四味如法制煉得宜煉蜜為丸如梧子大每服七十五丸清晨好酒送下修合時必擇天醫黃道吉星毋令婦人雞犬見之服藥亦擇吉日此方鄖陽王都憲五一翁所傳云渠方伯陝西時授之於一總戎總戎年九十歲自幼服此丸精力倍加胃氣強健飲食日增壽考彌長秘而不傳翁懇得之如法制服不問寒暑今年八十有六矣行步不筇逢人而談論亹亹飲酒可百杯食飲數碗許而饈饌慄核盡其席遍嘗之不輟口其有得於真傳者乎且室御數女皆能有子人以仙稱信不我欺予舟往來兩度詣翁而翁始以是方授予歸筆此以識翁之善云千金還少散補丈夫諸虛不能盡述菟絲子白茯苓山藥牛膝去蘆酒洗肉蓯蓉枸杞子川續斷五味子山茱萸酒蒸去核巴戟水泡去心蛇床子杜仲去皮酒炒上十二味制羅細末酒調服方寸匕日三夜一惟禁醋蒜此外無忌服後五夜知覺十夜力壯若多忘加遠志茯神體澀加柏子仁或煉蜜為丸每服三五十丸日二夜一以頭面身體溫暖為度藥性平和調五臟健力加遠志石菖蒲熟地小茴酒炒延壽甕頭春理脾胃生精血暖丹田助元陽調氣血之聖藥也天門冬去心懷牛膝去蘆川杜仲去皮麩炒肉蓯蓉麩炒補骨脂川椒去目粉草各一兩大附子炮去皮臍五錢以上八味為末和糜入曲內同和糜羯羊脂一斤切淫羊藿米泔水洗淨曬乾一斤頭紅花搗爛曬一斤蒼朮米泔浸去皮炒四兩地骨皮四兩五加皮四兩白茯苓四兩當歸四兩生地黃二兩熟地黃二兩白芍一兩甘菊花一兩以上十二味銼片鋪缸絹袋盛貯縮砂蜜五錢白豆蔻五錢木香五錢丁香五錢以上四味煮酒為細末上藥二十四味共五斤四兩糯米二斗淘洗浸一日夜又淘一次蒸作糜取出候冷用細曲末四斤同天門冬等八味和勻卻將羊油等十二味貯於粗絹袋置缸底將前糜拍實於其上然後投上品燒酒四十斤封固一七日作出澄清方入壇加砂仁等四味封固重湯煮三炷香埋土中三日出火毒每日量飲數杯一百日百竅通暢渾身發熱丹田微癢痿陽立興切忌醉酒飽食行房只待氣血和平緩行無禁久久純熟自然身輕力健百病不生若男女俱服兩精合和一度成胎功效多端不可悉筆御製燒酒方治男婦遠近虛勞癱瘓瘡疥癜風腳氣痰氣疝氣走氣膈咽羸瘦腰膝痛無力聾瘖虛冷下淋經脈不調腹疼膨脹黃瘦口苦飲水嘔逆驚悸盜汗潮熱子宮冷赤白帶下服藥和脾胃養丹田調血氣壯筋骨益精髓安五臟定魂魄潤肌膚悅顏色返老還童延年益壽效不可盡述人參去蘆五錢白朮去蘆三錢白茯苓去皮五錢當歸去頭尾酒洗五錢川芎三錢白芍酒炒三錢生地黃酒洗三錢熟地黃酒蒸三錢天門冬去心皮三錢麥門冬去心三錢杏仁去皮五錢五味子三錢甘枸杞子五錢何首烏米泔浸五錢肉蓯蓉酒浸五錢虎脛骨酥炙三錢牛膝去蘆酒洗三錢官桂二錢小茴香酒炒三錢破故紙酒炒一兩大附子麵裹煨去皮臍三錢乾薑炮二錢川椒去目五錢川烏去皮臍五錢五加皮五錢砂仁五錢烏藥五錢香附三錢厚朴姜炒三錢陳皮去皮三錢半夏姜炒三錢南星姜炒三錢白附子三錢防風三錢麻黃三錢細辛三錢甘菊花三錢荊芥三錢枳殼麩炒三錢蒼朮米泔浸一兩獨活三錢羌活三錢草烏麵裹煨五錢沉香三錢木香三錢甘草炙五錢白花蛇酒浸軟切開兩片酥慢火炙一兩胡桃肉去皮紅棗蒸去皮核酥油各半斤蜂蜜一斤上銼用好燒酒一大壇將藥絹袋盛懸在壇內鍋中重湯煮兩時掘坑埋三個月去火毒取服不過三杯病在上食後服病在下食前服藥渣曬乾木石臼搗為末酒煮麵糊為丸如梧子大每服三十丸前酒下忌萊菔蔥蒜豬羊血桃李胡荽魚鮓羊膻醋鯉魚呂洞賓補屋修牆養生訣少年豪氣望前為豈料中年力弱虧休將藥餌調真息自有元陽養氣時君子小人莫知陰陽相媾之妙幼年之人精強力壯不顧身形惟貪快樂以泄為美不知老之將至百病來侵蓋因年幼骨脈未堅父母愚蒙早取妻室或因幼失父母任意飄蕩醉飽行房以致口苦舌乾虛熱盜汗諸症侵染無藥治療呂公留下秘訣用人參不拘多少切碎將米同煮候熟取起陰乾選小雌雞二三隻每日將米餵養待雞生卵每日食三五七個不過百日之內大有功效形容嬌美返本還元若有烏雞更妙如用雄雞同食此參生抱小雞日往月來其功不可盡述扶桑至寶丹歌扶桑扶桑高拂云海東日出氣氤氳滄海變田幾億載此樹移根今尚存結子如丹忽如漆綠葉英英翠可捫真人採竊天地氣留與紅霞共吐吞濯磨入鼎即靈藥芝術區區未許群飧松有人已仙去我今朝夕從此君葉兮葉兮願玉汶綠陰裡面有桃源胡僧曰蠶食吐絲結成錦繍人食生脂延年除咎蓋嫩葉性本和平不冷不熱生於郊野之外者懼為蛇蠍所治須擇家園中嫩而存樹者採數十斤沅以長流之水摘去其蒂暴於日中以干為度復取巨勝子為臣煉蜜丸如梧子大擇吉日擇一誠實之人面授修煉之方不可委諸童僕仍宜在淨室中屏去婦人女子及雞犬等物既成日服二次約可百丸白滾湯下三月之後體生軫粟此是藥力所行慎勿驚畏旋則遍體光潔如凝脂然半年之後精力轉生諸病不作久服不已自躋上壽老人服之步健眼明須白返黑又能消痰生液補髓添精功效不細述此仙家服食上品秘之不可轉傳非人倘非其人當有殃咎戒之寶之長春封臍膏方上異人傳此藥能鎮玉池存精固漏通二十四骨節血脈鎖三十六道骨節主一身之毫竅貼之血脈流暢龜健不用致乳汁常盈養精神氣有百戰之功壯陽助氣返老還童固下元通透三關乃遂行之道老人貼之夜無小水大小精不泄補益虛損延年益壽至真至寶又治男子下元虛冷小腸疝氣痞疾單腹脹滿並一切腰腿骨節疼痛半身不遂貼三日神效婦人子宮久冷赤白帶下不坐胎產後戰腸風貼之三日神效天門冬生地黃熟地黃木鱉子大附子杏仁蛇床子遠志牛膝肉蓯蓉官桂龍骨菟絲子肉豆蔻虎骨鹿茸麥門冬紫梢花各二錢上為細末入香油一斤四兩文武火熬黑色去渣澄清入黃丹半斤水飛過松香四兩熬用槐柳條攪滴水不散為度再下硫黃雄黃硃砂赤石脂龍骨各三錢為末入內除此不用見火將藥微冷定再下膃肭臍一副阿芙蓉蟾酥各三錢麝香一錢不見火陽起石沉香木香各三錢不見火上共為細末入內待藥終下黃蠟六錢放磁器內盛之封口放水中浸三日去火毒取出攤緞子上或紅絹上亦可貼臍上六十日方無力再換一方加乳香沒藥母丁香各三錢太乙真人熏臍法治諸虛百損勞瘵男婦不足等症及一切肚腹冷痛小腸疝氣百藥罔效如神真麝香五分為末入臍內後用藥末放麝香上將面作一圈圍住上用槐皮灸一百二十壯不時要換槐皮龍骨虎骨蛇骨大附子南木香雄黃硃砂乳香沒藥丁香胡椒夜明砂五靈脂小茴香兩頭尖青鹽各等分上共為細末入臍中用艾灸夫肺為五臟之華蓋聲音之所出入皮毛以之滋潤腎水由之而生腠理不密則為風寒暑濕乘虛而入矣有七情當調抑之有鬱結當解利之或不審而傷於辛燥之藥則氣不散留滯於肺中多生痰疾而喘急咳嗽或傷於房勞飲食不節致使吐血咳血作寒作潮頭暈體倦精神怯弱飲食不思等症醫者治之無益則必用此亟治其效可勝言哉用麝香以引透諸藥入五臟六腑之中大無不入小無不至丁香堅守其胃啟飲食之進青鹽入腎以實其子使肺無泄漏夜明砂以補其血散內傷之有餘乃伏翼之糞食蚊子蓋取其早食雨露夜飲人血而得天人之氣故能補五勞七傷之病非此不能達也乳香沒藥木香小茴升降其氣不致咳嗽龍骨虎骨蛇骨硃砂雄黃以削病根兩頭尖巡視各經絡有推前拽後之功附子胡椒補其元氣使血行血室氣歸氣宅痰散為津液五靈脂能運操其肺削有餘補不足用槐皮之漿閉押者藥之性使無走竄之患臍艾灸之有拔病除毒起死回生之功使其患勞瘵失血陰虛遺精白濁陽事不舉精神倦怠痰火等症婦赤白帶下子宮冷極無子凡百種病無所不能療者用此灸法則接人性命奪造化之成功延年益壽得盧扁之妙術矣其法先用面作一圈將藥一料分作三份先以麝香入臍後以面圈置藥在內按緊以槐皮蓋上以蘄艾灸至三十壯但覺熱氣自上而下或自下而上一身熱透其人必倦怠沉沉而睡矣至六十壯必大汗如淋上至泥丸下至湧泉骨髓內風寒暑濕臟腑中五勞七傷盡皆拔除至一百二十壯則病鮮有不冰釋者矣灸時慎風寒戒油膩生冷酒色其效難以備述世之養生君子當珍藏之慎毋輕泄千古秘訣也神仙接命秘訣治諸虛百損五勞七傷延年益壽不可妄藉非人寶之寶之一陰一陽道之體也二絃之炁道之用也一豪之炁交感於神室之中而成丹也萬卷丹經俱言三家相會盡矣三五合一之妙概學仙者皆不知下手之處神室黃道中央戊己之門比喻中五即我也真龍真虎真鉛真汞金木水火土此四象皆喻陰陽玄牝二物也煉己築基得藥溫養沐浴脫胎神化盡在此二物運用與己一毫不相干即與天地運行日月無二也悟真云先把乾坤為鼎器次將烏兔藥來烹臨驅二物歸黃道爭得金丹不解生此一詩言盡三家矣千言萬語俱講三姓會合雖語句不同其理則一而已矣但周天度數分在六十四卦之內以為筌蹄朝進陽火暮退陰符其數內暗合天機也訣曰此乃先師日日相傳之秘旨也寶之寶之一三二五與三七四九行來五十一六十三兮七十五八十六兮九返七若人知此陰陽數便是神仙上天梯河圖數三五一都三個字古今明者實然稀東三南二同成五北一西方四共之戊己自居生數五三家相見結嬰兒嬰兒是一含真氣十月胎完入聖機先天度數十八六四二溫養火十一九七五三一朝屯暮蒙十月火也暮退陰符十六十四十二十八六四戌時居右自十六起至四止煉己之度數東昇西降詩云河車周旋幾千遭正謂此工夫也朝進陽火十七十五十三十一九七五三寅時居左自三至十七止每圈一次吹噓此道盡之矣塞兌垂簾默默窺待先天氣至自十六起至四至止就換於左起三至十七止即爐用鼎在右自二四六八十吹噓不用上藥右邊數盡即換於左從一三五七九十一行盡工夫吐水而睡其藥周身無處不到自然而然也即沐浴也經云採藥為野戰罷功為沐浴此之謂也自此得藥之後卻行溫養火候之功十月共六百卦終身外有身矣卻行演神仙出殼之功一日十飯不覺飽百日不食不顯飢盡矣秘之秘之此二節工夫待人道周全方可行之於戌時退陰符仍照前行十六至四止將病人仰面平枕口噙熱水或乳香酒一口然後令童女照數吹之忌蔥蒜酸辣之物久久行之則能接補天年如覺內熱可服人乳即解之取紅鉛用未破身童女所行經脈以夏布揉洗令淨或淨花亦可搌下曬乾如用時將熱童便洗下曬乾收起臨用時仍以童便化開滴於橐龠小頭口邊入竅內將大頭令童女口噙吹之如上法病人候吹氣即吸入取紅鉛如用磁器自接尤妙太上老君丹善補接天年紅鉛一兩嬌乳一兩要頭生男二日不食者辰砂三分乳香一錢秋石一錢用童便入烏盆內用掃淨新磚數塊入內浸七日取出冬天放陰地上夏月埋入土窖內要極深日久自生白秋石掃下用上共為末和一處將雞蛋磕一孔將清黃傾去不用紙搌乾淨將藥入內封固嚴密放群蛋內抱三七取出丸如梧子大金箔為衣如干將乳汁和為丸每服三丸人乳送下五更空心服汗出至足為度不可見風如腰痛用淨花一團鋪臍孔上用童女寅時呵氣三十六口戌時呵氣二十四口立效三圖俱名橐翕龠此圖器專治紅痰晝夜不止骨蒸勞熱聲啞肌瘦氣弱若吐血者行七日愈用呵兩鼻孔入三分要與鼻孔一般大緊緊的不可出氣治紅痰每次用小酒杯人乳兩個雞蛋白放少許新鮮豬胰子油切極細入磁鍾內蒸熟每早吃治七日吃七次每呵後方吃此器專治中滿氣蠱用呵臍上亦治女人經水不通兼治夢遺臍上未呵之先將麝香三釐乳香一錢孩兒茶沒藥黃檀香各一錢共為細末將蜜調作一餅貼臍上用生薑一片切如藥餅大半個銅錢厚用蘄艾丸如豆子大不論丸數燒得姜熱覺得臍內微熱即去藥就呵之先一次用此藥以後不必用此器用在馬口內進二分治流精晝夜不止初開馬口竅先用黃蠟條如筷頭透開三樣器總論每呵論病者歲次為呵數每歲一呵要足三百六十下數如病者十歲每轉十呵要三十六呵有零寧可多呵幾呵更好不可缺數凡要去呵氣的男女俱要未呵之先五七日用好酒肉好白米飯與吃補起他的氣方才氣完病者得效更速若男子病用女人呵之若女人病用小孩一二歲者若丈夫呵亦可老人夫二五之精妙合而凝兩腎中間白膜之內一點動氣大如箸頭鼓舞變化開闔周身熏蒸三焦消化水穀外御六淫內當萬慮晝夜無停八面受攻由是神隨物化氣逐神消榮衛告衰七竅反常啼號無淚笑如雨流鼻不嚏而涕耳無聲蟬鳴吃食口乾寐則涎溢溲不利而自遺便不通而或泄由是真陰妄行脈絡疏澀晝則對人瞌睡夜則獨臥惺惺故使之導引按摩以通徹滯固漱津咽液以灌溉焦枯雖云老者非肉不飽肥則生風非人不暖暖則生淫僥倖補藥者如油盡添油燈焰高而速滅老子云以其厚生所以傷生也況有明修禮貌暗伏奸雄曲糵腐其脾胃脂粉惑其清貞孤陽獨盛水穀易消自恃飲啖過人恣造欺天之罪宿緣既盡惡報臨頭其或厭飫沉酯身居勤儉志益貪婪方聚龜毛之氈忽作女子之夢傾天下之色不足止其欲遍天下之財不足愈其貪一老年房有少艾致頭痛發熱眩暈喘急痰涎壅盛小便頻數口乾引飲遍舌生刺縮斂如荔枝然反唇黑裂面目俱赤煩躁不寐或時喉間如煙火上衝急飲涼茶少解已濱於死脈洪大而無倫且有力捫其身體烙手此腎經虛火遊行於外投以十全大補湯加山茱萸澤瀉牡丹山藥麥門五味附子一服熟寐良久脈證各減三四再與八味丸服之而愈卻病延年湯凡高年人但覺小水短少即是病進宜進此湯人參一錢白朮去油蘆炒一錢半白茯苓一錢當歸身酒洗七分白芍酒炒一錢陳皮八分牛膝酒洗去蘆一錢山楂肉蒸去核一錢小甘草五分上銼生薑煎服春加川芎夏秋加黃芩麥門冬冬加當歸倍生薑一日一劑或二劑小水長若舊止藥此丹溪養母之方也若老人陰痿思色精不出內敗小便道澀痛如淋加車前子牛膝入於八味丸內若老人精已竭而復耗之大小便牽痛愈痛愈欲便愈便則愈痛以前藥不應急加大附子若喘嗽吐痰腿足冷腫腰骨大痛面目浮腫太陽作痛亦治以前藥若痛愈若小便仍澀宜用加減八味丸以緩治之補精膏主壯元陽益真氣助胃潤肺牛髓四兩爛搗去柱胡桃仁去皮殼留嫩皮四兩杏仁去皮尖四兩山藥薑汁拌蒸熟八兩人參紅棗肉煮去皮核四兩上將杏仁桃肉山藥棗子四味搗為膏蜜一斤煉去白沫與牛髓同和勻入磁罐內重湯煮一日空心以一匕用酒或白湯化服清香乳酥餅治老人五勞七傷下焦虛冷小便遺精此藥能暖腰膝壯陽道菟絲子一兩酒浸三日曝乾遼五味子一兩大附子一個要一兩重炮去皮臍桂心一兩乾薑二兩炮製銼肉蓯蓉一兩半酒浸一宿刮去皮炙乾川椒去目五錢炒去汗大棗十枚煮去皮核羊髓三兩酥一兩黃牛乳一升半蜜四兩白麵一斤神麯三兩上為末入面以酥蜜髓乳相和入棗瓤搜和入盆中蓋覆勿令通風半日久即將出更搜令熟捏作糊餅火面上以箸子琭之即入爐𨫼中上下以火煿令熟每日空腹食一餅一方入酵和更佳法制豬肚方補老人虛羸乏力豬肚洗淨一個人參五錢乾薑炮二錢川椒去目二錢蔥白七莖上搗為末入糯米三合和入肚內經常水煮爛空心服滋補飛白霜白麥面二斤炒黃色糯米一升炒熟為末綠豆一升煮熟陰乾蓮肉去心一斤青鹽三兩人參一兩花椒去目三兩白茯苓去皮二兩山藥二兩小茴香炒一兩半五味子一兩杏仁去皮尖二兩半枸杞子二兩上為細末每服三四匙空心滾白湯調服調元雲水煎補滋虛弱乾山藥四兩大茴香二兩人參當歸酒洗白芍煨官桂去粗皮天門冬去心麥門冬去心生地熟地酒蒸各一兩白茯苓去皮蒸二兩冬月加乾薑一兩白鹽四兩核桃仁去皮一斤芝麻去皮炒二碗上各為細末將桃芝鹽搗為泥再用炒熟重羅白麵八斤和勻為末清晨滾白水調服忌蔥蒜醋極補諸虛小刀圭黃牛犢一隻用未知陰陽者肥嫩純黃色先期辦後開藥料至臘月初八日或本月戊巳日宰取血撏毛留皮碎切臟腑分寸不遺用長流水大鍋煮至半熟加後項藥人參以牛肉十斤用二兩陳皮留白以牛肉十斤用一兩半黃耆以牛肉十斤用三兩茯苓去皮以牛肉十斤用三兩良薑去梗肉桂去粗皮以牛肉十斤用各五錢甘草以牛肉十斤用一兩花椒去目以牛肉十斤用一兩白鹽臨時斟酌醇酒二斤上下上各件同牛肉煮文武火旋添熟水常以八分為節牛肉爛如泥槌骨內之髓煎化入汁中漉去渣但存爛汁有如稀餳待冷入甕密封掘黃土坑埋齊甕口封固凡早食不拘何樣飲食加此數匕調和人事勞苦並房欲之後以醇酒調服造酒至春來之日如此甚佳大刀圭補虛固髓安五臟壯元氣健脾胃生肌肉服之令人肥健黃犍牛肉不拘多少去筋膜切棋子大河水洗十五次令血水盡仍浸一宿次日再洗一二遍水清為度無灰酒入砂鍋內泥封固用桑柴文武火煮一晝夕取出焙乾為末黃色為度焦黑無用牛肉半斤入後藥一斤為則山藥四兩用鹽炒去蔥皮不用另為末白茯苓去皮為末四兩蓮肉去心皮蔥鹽炒四兩小茴香淨四兩酒炒上為細末用蒸熟棗肉入和為丸如梧子大曬乾空心每服五十丸酒送下勞瘵骨蒸勞熱脈數而虛熱而澀小必殞其軀加汗加咳非藥可除浮滑者生緊大者死勞者勞於神氣傷者傷於形容飢飽過度則傷脾思慮過度則傷心色欲過度則傷腎起居過常則傷肝喜怒悲愁過度則傷肺又風寒暑濕則傷外飢飽勞役則傷內晝感之則病榮夜感之則病衛榮衛經行內外交運而各從其晝夜始勞於一一起為二二傳於心三通於四四干其五五復犯一一至於五邪乃深藏真氣自失使人肌肉消神氣弱飲食減行步難乃其如此則雖有命亦不能生也素問云久視傷血勞傷於心也久臥傷氣勞傷於肺也久坐傷肉勞傷於脾也久立傷骨勞傷於腎也久行傷筋勞傷於肝也是為五勞所傷虛勞不受補者不治虛勞發熱忌服涼藥犯之者死滋陰降火湯治陰虛火動失血發熱盜汗咳嗽痰喘心慌口乾當歸酒洗一錢川芎七分赤芍七分生地一錢黃柏乳汁炒七分知母生一錢陳皮七分白朮去蘆乳汁炒八分麥門冬去心一錢牡丹皮一錢玄參一錢犀角一錢阿膠炒五分山梔子炒黑一錢甘草三分上銼一劑水煎溫服服此方俟血稍止後宜服後滋腎地黃湯兼進地黃丸以愈為度滋腎地黃湯主方治陰虛火動治症同前天門冬去心麥門冬去心生地酒洗熟地酒蒸黃柏蜜炒知母蜜炒當歸酒洗白芍酒炒白朮去蘆炒白茯苓去皮山藥澤瀉牡丹皮山茱萸酒蒸去核甘草炙發熱加柴胡地骨皮陰虛火動潮熱不退加六七歲壯盛童便白者一盞入湯藥內同服立效上銼水煎空心溫服服此再兼地黃丸用紫河車為丸早晚兼服以愈為度天門冬膏治虛勞痰喘吐血咳嗽聲啞其效如神天門冬去心八兩杏仁泡去皮尖四兩貝母四兩百部四兩百合四兩紫菀三兩款冬花五兩上細切用長流水煎三次取汁三次去渣不用將汁入飴糖八兩蜜一斤再熬又入阿膠四兩白茯苓四兩水飛曬乾二味仍入前汁和勻如糊成膏不拘時服太平丸治勞瘵久嗽痰喘吐血聲啞咽痛口乾肺痿肺癰並宜噙服決定除根天門冬去心麥門冬去心知母去毛貝母去心款冬花去梗杏仁泡去皮尖各二兩當歸身酒洗生地黃酒洗各一兩熟地黃酒蒸川黃連去毛阿膠蛤粉炒各一兩半蒲黃京墨桔梗去蘆南薄荷各一兩麝香少許另研上為細末煉蜜為丸如彈子大每服一丸臨臥細嚼薄荷湯下按上方治陰虛火動痰嗽喘熱吐衄盜汗等症服不得參耆者宜之六味地黃丸治虛勞百病滋陰降火補腎生精潤肺寧嗽退熱定喘止汗立效方見補益依本方加人參川黃柏酒炒知母乳汁炒五味子麥門冬去心各二兩補中益氣湯治元氣虛弱脾胃虧損咳嗽吐痰自汗喘急發熱口乾聲啞等症方見補益依本方加黃柏知母天門冬麥門冬五味子杏仁黃芩瓜蔞仁十全大補湯方見補益治虛勞諸虛不足五勞七傷不進飲食咳嗽喘急盜汗潮熱等症太上保真湯治勞瘵百病發熱憎寒咳嗽痰喘自汗盜汗口乾作渴五心煩熱嫩黃耆蜜水炒二錢人參二錢白朮去油蘆乳汁炒二錢赤茯苓去皮八分白茯苓去皮八分當歸身酒洗二錢白芍酒炒一錢懷生地黃酒洗二錢赤芍一錢天門冬去心一錢八分麥門冬去心一錢八分五味子一錢銀柴胡一錢地骨皮酒洗一錢貝母二錢川黃柏三錢分四處一份鹽水炒一份酒炒一份童便炒一份乳汁炒知母二錢蜜水炒一半鹽水炒一半陳皮五分龜板酥炙黃研細一錢五分甘草五分上二十味共作一劑生薑三片蓮肉五枚水煎熟加童便一盞溫服少時又進一服加童便渣再煎服按上方治陰虛火動等症誤投寒涼攻克之劑過多復傷元氣以致氣血兩虛當用參耆等滋陰兼補氣可奏效今之時醫參耆輕不敢用病人也不敢服當服不服誤死多矣可勝嘆哉五龍湯治久咳不已肺間積熱久則成瘡故嗽出膿血曉夕不止嗽中氣塞胸膈噎痛此治咽瘡極效蛤蚧一對肺虛勞嗽有功酥炙令黃熟搗口含少許令人不喘者是真阿膠鹿角膠生犀角羚羊角各一兩上除二膠外皆鎊為屑次入膠分四服每服用河水三升於銀石器中慢火煮至半升濾去渣臨臥微溫細細呷服其渣候服盡再捶都作一服以水三升煎至半升如前服若病人久虛不喜水須當減水若為末煉蜜為丸噙化最妙一治發熱漸成勞瘵者以十全大補湯加柴胡胡黃連如熱在骨髓更加青蒿鱉甲一虛勞胃弱飲食不進宜參苓白朮散方見內傷一好色之人元氣虛弱乾咳嗽者宜瓊玉膏方見補益一虛損人咳嗽宜六君子湯加當歸生地紫菀五味子黃柏知母陰虛火動再加麥門冬參苓白朮造化糕養元氣健脾胃止泄瀉進飲食寧心秘精生津止渴生肌肉壯筋骨人參白茯苓去皮筋膜白朮去油蘆米泔浸微炒蓮肉去心皮懷山藥芡實去殼薏苡仁各三兩共為末倉穀米一升末陳糯米一升末白砂糖一斤半上先將藥末米末攪勻入麻布袋內放甑內蒸令極熱乘熱取出放盆內入砂糖放內用手將藥米末砂糖搓揉令千餘下極勻用木印印之敲出篩子曬乾收用早晚當點心任食地仙丹治虛勞脾胃虛弱不思飲食大便稀瀉白朮去油蘆童便浸一日夜切片陳壁土拌炒去土為末水打糊為丸每服百丸不拘時米湯下秘方治諸虛百損五勞七傷陰虛火動痰嗽喘熱用陰煉秋石以小紅棗水煮爛去皮核和前秋石為丸如梧子大每服五七十丸空心酒下退熱如神秋石方見補益仙家酒治諸虛百損五勞七傷用人乳二盞好酒半盞入錫旋器內燉滾每日五更服小仙丹能起死回生卻病延年取室女經血或首經最佳以棉帛收之陰乾入乳香末少許乳汁為丸如櫻桃大每噙一粒取女人氣一口乳汁送下還元酒治男子勞傷而得瘵疾漸見疲瘠全豬腰一對用童便二盞無灰酒一盞以新瓦甕貯之密封慢火養熟至中夜五更初溫熱飲酒食腰子病篤者一月效平日疲怯者亦可服蓋以血養血全勝金石藥山藥粥補虛勞益氣強志意壯元陽止泄精山藥蒸熟去皮一斤雞頭實半斤煮熟去殼搗為末入粳米半升慢火煮成粥空心食之或入韭子末二三兩尤妙食粥後用好熟酒飲一二杯妙本芝丸蓮肉不拘多少去心不去皮將酒浸一宿入公豬肚內水煮極爛取出焙乾為細末仍用酒煮糊為丸如梧子大每服七十丸空心酒送下丹溪云陰虛之極痰與血病者有蟲者其傳屍一症不可云無宜艾灸之治勞蟲之法宜癸亥日灸兩腰眼低陷中之穴每穴灸艾七炷若灸九炷十一炷尤好先隔一日前點穴方睡至半夜子時一交癸亥日期便灸其蟲俱從大便中出即用火焚之棄於江河中如蟲有黑嘴者則其在內已傷人腎臟矣此不可治蟲宜謹避瘵有數蟲如蜈蚣如小蛇如蝦蟆如馬尾如亂絲如爛面如蒼蠅如壁蚰蟲上紫下白形銳足細而有口或如白蟻孔竅中皆出此皆勞瘵根毒若傳至三人則如人形如鬼狀神授丸治傳屍蟲此方得之河南郡王府濟世既久功不能盡述也用真川椒二斤去子併合口者炒為末酒糊為丸每服二錢空心米飲送下多服奏效凡人得傳屍勞病氣血未甚虛損元氣未盡脫絕者不須多方服食但能早用此藥無有不愈者真濟世之寶也愚嘗治一婦人用川椒二分苦楝根皮一分丸服屍蟲盡從大便中出清化丸治虛勞痰嗽聲啞咽痛青黛五分風化硝一錢硼砂五分冰片三分生甘草一錢半訶子五錢桔梗去蘆二錢薄荷葉一錢上為細末蜜丸噙化治久嗽喉痛烏梅肉五分柿霜二錢天門冬去心二錢麥門冬去心二錢玄參一錢硼砂二錢上共為末蜜丸噙化回生再造丹治勞瘵降虛火復元陽痊百病救危急真仙方也取男女初生臍帶三條五條尤妙名曰茭梨火棗每帶一條用頭生膠濃乳汁一兩此乳要嬰兒未服之先取服過後取之氣不全也用金打成一盒子高三寸此盒如小鼎相似長五寸封固口其養火要離鼎三指三方放火養一七其火溫溫莫大傷丹取出鼎以鹽泥豬毛捶爛固濟曬乾入八卦爐內微微文火打一炷香取出其藥白色上上妙黃色次之研細聽用用上好雲南潔白茯苓八兩去皮研細用人乳一斤半作五次每一次浸茯苓一宿次早用蒸一炷香其人乳日日量度取之五次共有一斤半之數如依五次蒸完曬乾復為末每前藥臍帶末五錢入乳苓三兩用煉蜜為丸如梧子大每服一錢生脈散湯下生脈散楝參五分麥門冬去心一錢遼五味子五粒上銼水一鍾煎半鍾空心服人中白散治陰虛火盛五心煩熱等症人中白二兩黃柏鹽酒拌炒褐色生甘草青黛各五錢上為細末每服二錢童便調服治骨蒸勞熱及五痔腸風下血傳屍勞病並蟲咬心痛用鰻鱺魚酒醋五味煮熟食之此物能殺諸蟲故也治虛勞咳嗽痰喘自汗用公豬肺不見水用銀簪劃爛入莧菜子在內蒸爛五更服治勞瘵好食諸物而有勞蟲者用豬肝心肺一副去膽用白莖蓖麻子仁一兩石膏一錢乳香沒藥各三分蔥白三根用酒研爛灌入豬肺內用河水五十斤桑柴五十斤文武火煮乾為度限三日吃完如肝吃不盡作丸用之效六月咳嗽當視其兩唇若上唇有白點蟲蝕上部下唇有白點蟲蝕下部用獺肝一具陰乾杵末水調下方寸匕日三服未愈再服治勞瘵陽旺倒陽法馬蝗蜞即馬鱉尋起九條入水碗養住至七月七日取出陰乾稱有多少入麝香併合木香三樣一般多研細末用蜜少許為餅遇陽旺時即將餅少許擦左腳心即時陽痿過日陽旺又擦又方治陽旺用絲瓜小藤搗爛敷上陽即倒矣一翰林玉陽張公遘虛損之恙其症痰嗽喘熱盜汗等病因循日久不以為意召予診六脈微澀而數乃陰虛火動之症也以清離滋坎湯加減投以數劑尋愈尋復予為扶溝何御公拘恙召去而玉陽公復召予罔遇遂易他醫謂公之恙非陰虛也乃是公素飲酒厚味之偏釀成積熱之症公曰然哉然哉正昭合吾之病也投以清涼之劑雖未奏效亦未見傷未幾旬日公升南京待郎到任訪得松江府有一明醫差役齎市聘至令診視之即診病立方與予一字不差公竟辭不藥又遠延一醫其醫未至預訪張公諱疾忌醫之情惟言是疾是有餘積熱之症順其意而阿從之公甚悅亦投以寒涼之藥而不數日病愈增劇至此公亦悔悟不噬臍矣遂歸至中途夜卒於驛可俗敝恐人之譏誚而即以萬金之軀一擲於庸醫之手是得於天者乃諱醫自壞用平醫者又誤藥中傷間有一線脈藥之明者又逢迎取利吾不知至明至貴之體而致自昧自喪之愆可哀甚矣予濟世以來屢見有如張公之儔亦未有不如張公之同斃者矣可勝嘆哉今後縉紳之士倘遘斯恙必實心告明醫實心用明醫俾病根斬斷元氣復回而全天所與慎毋蹈張公轍而陷非命云治虛勞痰火秘方神仙發秘機濟世功無比只此小靈丹妙奪陰陽理半斤陰煉石配入首男乳日夜配天中卻從夏至始月月入紅鉛直至中秋止色如桃花鮮鼻喤香甘美日服一分半送以華池水服之至七日體熱何足畏時進蟠桃酒藉以濕靈氣漸至一年餘頓覺超凡類肌體潤且澤延年曆人世陰煉秋石方取紅鉛法俱見神方失血大凡失血脈貴沉細設見洪大後必難治夫失血之症非止一端有吐血有衄血有咳血有咯血有嘔血有唾血有小便血有大便血須有名色之異大概俱是熱症但有新久虛實之不同耳或妄言寒者誤也丹溪曰血從上出皆是陽盛陰虛有升無降血隨氣上越出上竅法當補陰抑陽氣降則血歸經吐血吐血吐出全是血者是火載血上錯經妄行其脈必芤身熱脈實大者難治身涼脈微細者易治血症復下惡痢者其邪易去加味犀角地黃湯主方治上焦火盛口舌生瘡發熱或血熱妄行或吐血或吐衄或下血及不嗽血自來者烏犀角鎊二錢懷生地黃二錢半赤芍一錢半牡丹皮二錢黃連一錢黃芩一錢玄參一錢上銼水煎服如吐血成塊加大黃一錢桃仁十個二和湯治暴吐紫血成塊雖多不妨當歸川芎赤芍生地黃黃連黃芩黃柏梔子上銼水煎服桃仁承氣湯治吐血覺胸中氣塞上吐紫血者桃仁大黃芒硝桂枝甘草上銼水煎服四生散治吐血壅出不止生荷葉生艾葉生柏葉生地黃各等分上取自然汁入童便不拘多少和藥汁溫服干則水煎亦入童便溫服愈嘗治諸虛吐衄咯血藥中每入童便半鍾其效神速或單用以重湯燉服無不應效蓋溲溺降火滋陰又能消瘀血止吐衄諸血先賢有言凡諸失血服寒涼十無一生服溲者百無一死斯言信矣每用童便一鍾少入薑汁二三點攪勻徐徐服之日進二三次如天寒卻以重湯煮溫服此但要與飲食相遠為佳服輪迴湯即自己小便凡諸失血此病初起極要謹慎戒房勞獨宿每臨臥時吃白湯一小鐘至半夜小便解去汙穢飲食濁氣者一次至子時卻一陽生到天明有小便乃一元真氣也卻截頭略解出一些即以碗盛一碗後去尾即解去後面些將小便乘熱入甘草末一錢通口閉眼服隨以甘草末嚼之或生薑一小片嚼之此乃輪迴返元之丹服之終身可延百歲吐血衄血便血虛損服之神效去龍頭截龍尾返本還元歸故里治吐血衄血服前湯藥後用大蒜兩顆煨熟捶爛貼敷兩腳心少頃自覺胸中有蒜氣其血立止若下部出血可以煨蒜敷兩掌心效止血秘方童便上韭汁中薑汁下上三味合和調百草霜末溫服又方用側柏葉陰乾水煎當茶服效百草霜治一切吐血及傷酒食醉飽低頭掬重損傷吐血至多致血妄行口鼻出血但聲末失者投之無不效研末每服三錢米飲送下或井花水調下三服即愈若鼻衄用一捻吹入鼻中一切皮破出血及灸瘡出血百般用藥不止摻半錢或一字立止治吐血如神家園生地黃八兩搗汁大黃生末方寸匕上煎地黃汁一二沸下大黃末調勻空心溫服每飲一小盞日三服血即止定心湯治吐血咳嗽上喘心慌神亂脈洪數用生地黃搗汁半鍾童便半鍾二味合和重湯煮二沸溫服立效人參湯有人忽然吐血下血其症皆因內損或因酒色勞損或心肺脈破血氣妄行血如湧泉口鼻俱出須臾不救用側柏葉蒸焙人參各一兩焙乾二味為末每服二錢飛羅面二錢新汲水調如稀糊服之神效獨參湯治一切失血惡寒發熱作渴煩躁或口噤痰鳴自汗盜汗或氣虛脈沉手足逆冷蓋血生於氣故血脫補氣陽生陰長之理也見補益若大吐血毋以脈論當急用獨參湯救之若潮熱咳嗽脈數乃元氣虛弱假熱之脈尤當用人參溫補此等證候無不由脾胃先損故脈洪大察其有胃氣能受補則可救苟用寒涼止血之藥復傷脾胃返不能攝血歸源是速其危也治吐血成鬥命在須臾貫眾為末二錢血餘燒灰五分側柏葉搗汁一碗上三味放一大碗內重湯煮一炷香取出待溫入童便一小鐘黃酒少許頻頻溫服立止秘方止血嗽用柿餅一個切開摻青黛末炙食之立效治吐血用藕切片蜜蒸爛食之治先吐紅後見痰嗽此陰虛火動痰不下降當歸川芎芍藥生地各一錢五分山梔炒貝母天花粉各一錢牡丹皮八分麥門冬八分上銼水煎臨服入童便少許服治先痰嗽後見吐紅是痰積熱知母貝母瓜蔞仁生地黃芍藥各一錢山梔炒一錢二分天花粉一錢半麥門冬一錢上銼水煎通口服清火涼血湯治吐血一服立已當歸尾酒洗一錢川芎五分赤芍酒洗一錢生地黃酒洗一錢熟地黃五分百合一錢貝母一錢梔子炒黑一錢牡丹皮七分桃仁去皮尖五分麥門冬一錢蒲黃炒黑七分陳膠炒五分上銼加生薑皮一片水煎服衄血衄血者鼻中出血也此出於肺脈沉細者生浮大者死主方治鼻衄因肺火太甚血自鼻中出升麻白芍牡丹皮各五錢懷生地黃二兩半片黃芩五錢側柏葉五錢荊芥五錢上銼作五劑每服一劑水煎食後服治鼻衄神方人乳童便好酒上三味合一處重湯煮沸飲之立止經驗方治血汗鼻衄五七日不止立效人中白不拘多少刮在新瓦上用火逼干研入麝香少許酒調下治鼻衄法如左鼻出者以色線扎右手中指根右孔出血者扎左手中指根兩孔俱出者扎二指根治鼻血不止用大蚯蚓十數條搗爛井花水和稀患輕澄清飲重則並渣汁調服立愈久不復發治鼻衄不止將頭頂發分開百會穴將新汲泉水一匙滴穴上即止治鼻衄法勿令患人知此井花水忽然猛啜其面立止治鼻中出血用小兒胎髮燒灰吹入立止治鼻衄方用山梔子炒黑為末吹入鼻中立已又方用綠豆粉五錢細茶五錢為末冷水調服又方用烏驢糞燒灰入發灰少許為末竹筒吹入鼻中又方用車前草搗汁半茶鍾入蜜二匙重湯燉熱徐徐飲之又方治鼻衄久不止素有熱而暴作諸藥不效者用大紙一張作八折或十折於水內濕置頂中以熱熨斗熨至一重或二重紙於立止咳血因嗽去痰痰內有血者是也當歸芍藥知母桔梗麥門冬各一錢生地黃天花粉各一錢半貝母一錢二分白茯苓八分甘草五分上銼水煎服咯血此出於腎咯出血屑者是亦有痰帶血絲出者當歸芍藥桃仁貝母各一錢白朮去蘆牡丹皮各一錢半山梔炒黑黃芩各八分青皮五分甘草三分上銼水煎服一方無青皮黃芩有知母黃柏麥門冬嘔血先噁心而嘔出血成升碗者是多因怒氣逆甚所致當歸川芎芍藥生地黃山梔炒鬱金上銼水煎臨服入童便韭汁薑汁少許服有痰加竹瀝唾血血隨唾而出者是也此出於腎亦有瘀血內積肺氣壅遏不能下降唾血宜沉弱忌實大天門冬麥門冬知母貝母桔梗黃柏熟地黃遠志或加炒黑乾薑上銼水煎服溺血溺血者小便出血也乃心移熱於小腸故血從精竅中出而不清當歸生地黃焙山梔炒黑蒲黃炒小薊根滑石通草炒藕節淡竹葉甘草各七分上銼水煎空心服治尿血用川升麻一兩水煎空心溫服又方槐花炒川鬱金濕紙包煨熟各等分上為細末每服二錢淡豆豉湯調下治暴熱尿血用山梔子去皮炒水煎溫服治小便下血不止用地骨皮燒酒一盞煎至七分去渣空心服治小便尿血用胡椒一歲一粒生搗研細茶調新汲水服腸澼大便下血有腸風下血必在糞前有臟毒下血必在糞後腸澼下血宜浮小沉遲忌數疾及大人患腸風下血者何也人腸皆有脂裹之厚則腸實而安腸中本無血血緣有風或有熱以消其脂腸遂薄滲入身中血初患者必服冷藥而愈服之過者則腸寒而脂愈不生其血必再作凡熱者其血鮮冷者其血清黑察其冷熱用藥可也冷者用斷紅丸熱者擇諸方治之腸胃流熱則糞門暴腫用蝸牛細研塗之則消滌腸法主方治大便下血大腸痛不可忍肛門腫起大黃黃連黃芩黃柏梔子連翹赤芍枳殼防風甘草上銼水煎空心服外用金鳳花煎水頻洗肛門腫痛立消按上方治便血內有實熱者宜之滋陰清腸湯治大便下血腸風下血當歸生大黃白芍枳殼黃連槐花地榆防風甘草上銼水煎空心服治臟毒下血方當歸川芎白芍生地黃黃連炒枳殼炒防風荊芥槐花炒地榆烏梅甘草樗根白皮即椿根皮上銼水煎食前服治腸風糞前後下血四物湯合黃連解毒湯加苦參槐角子地榆側柏葉治臟毒下血用黃連解毒湯合四物湯相停為末滴水為丸每服八九十丸空心陳米飲送下按上方治便血屬虛有熱者宜之枳連丸治腸胃閉悶下血積熱臟毒黃連四兩炒枳殼四兩炒上為末水糊為丸如梧子大每服七十丸茶清下斷紅散治腸風臟毒下血烏梅肉一兩焙五倍子五錢炒槐花三錢枳殼炒一錢五分黃連三錢炒地榆二錢荊芥穗三錢白芷二錢上為細末每服三錢空心酒調服遠年者亦斷根按上方治臟毒下血專清之劑斷紅丸治臟腑虛寒下血不止面色萎黃日久羸瘦嫩黃耆去蘆當歸酒浸川續斷酒浸真阿膠蛤粉炒側柏葉炒黃鹿茸醋煮大附子炮去皮臍各一兩白礬枯五錢上為末醋煮糊為丸如梧子大每服七十丸空心米飲送下神效丹溪云下血久不愈者後用溫劑先用四物湯加炮薑升麻後服此斷紅丸收功腸風下血熱者其血鮮冷者其血青黑或成塊按上方治臟寒下血溫補之劑滋陰臟連丸治大便下血去多以致陰虛四肢無力面色萎黃用六味地黃丸一料為末加黃連酒拌炒三兩槐花乳汁蒸三兩綿紋大黃酒蒸三兩與地黃丸料和勻裝入雄豬大腸頭內兩頭絲線扎之糯米三升煮飯樣將藥腸藏於飯內蒸一炷香為度待冷取出去兩頭將藥腸搗爛為丸白湯下按上方治經年便血以致陰虛補養之劑治腸風下血楓球微炒曬乾為末每服三錢酒調下米湯亦可治腸風臟毒奇方一兩槐花一兩連只宜同炒不宜研血在糞前槐調酒血中糞後酒調連治大便下血石蓮肉四兩去殼槌碎入公豬肚內水煮爛去蓮肉將肚並湯食之立止自汗盜汗夫汗者心之液也心動則惕然而汗出也有自汗有盜汗自汗者不因發散而自然出也盜汗者睡而汗出及覺則不出矣又曰陰蒸陽分而液出者為自汗陽蒸陰分而液出者為盜汗故陰虛陽必湊發熱而盜汗陽虛陰必乘發厥而自汗此陰陽偏勝之所致也又有驚怖房室勞極屯癤腸癰痰飲產蓐及傷寒風溫等病皆能令人自汗其盜汗乃心虛所致也多汗虛小者吉緊數者凶丹溪曰自汗盜汗之症原由心腎二經人虛則為此症故經曰汗乃心之液法當大補心腎以十全大補湯加牡蠣麻黃根麥門冬浮小麥之類當歸六黃湯主方治盜汗之聖藥也當歸黃耆蜜炒生地黃熟地黃黃柏酒炒黃芩酒炒黃連酒炒各一錢上銼水煎服補中益氣湯方見內傷治自汗效捷影響依本方治氣虛自汗甚者少加附子麻黃根浮小麥治夜出盜汗方周心源傳嫩黃耆蜜炒梔子炒黑各三錢上銼水煎臨服入牡蠣煅研末七分調服立止正氣湯治盜汗黃柏蜜水炒知母蜜水炒各三錢甘草炙一錢上銼作一劑水煎服秘方治出冷汗豬肚洗淨裝入糯米在內令滿用線縫口入砂鍋內水煮令爛將肚並湯一併食之用糯米曬乾為末每用一小盞空心米湯調服獨勝散治自汗盜汗五倍子為末津液調搽臍中一宿而止一方用何首烏為末津液調搽臍中即止一人內傷虛症發熱自汗如雨不止或身體如水或發寒戰黃耆蜜炙一錢五分人參一錢白朮甘草炒陳皮各七分當歸白芍酒炒各一錢升麻柴胡各一分桂枝三分麻黃根七分浮小麥一撮大附子炮三分上銼水煎服服不二三劑而汗止熱亦退而安鎮液丹治自汗盜汗嫩黃耆蜜炒二兩半防風去蘆一兩白朮去蘆微炒一兩白芍酒炒一兩半中桂一兩酸棗仁炒一兩大附子一兩重者麵裹火煨去皮臍童便浸炒上為細末酒糊為丸如梧子大每服五十丸空心酒送下發熱論五臟有邪身熱各異以手捫摸有三法以輕手捫之則熱重按之則不熱是邪在皮毛血脈也重按之至筋骨之分則熱蒸手極甚輕手則不熱是邪在筋骨之間也輕手捫之不熱重力以按之不熱不輕不重按之則熱是邪在筋骨之上皮毛血脈之下乃熱在肌肉也論熱在氣在血之分東垣曰晝則發熱夜則安靜是陽氣自旺於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名曰熱入血室晝則發熱煩躁夜則發熱煩躁是重陽無陰也當亟瀉其陽峻補其陰傷寒發熱是寒邪入衛與陽氣交爭而為外熱陽氣主外為寒所薄而其失職故為熱其脈緊而有力是外之寒邪傷衛也治主外傷暑發熱是火邪傷心元氣耗散而熱邪入客於中故發為熱汗大泄無氣以動其脈虛遲而無力是外之熱邪傷榮也治主內內傷發熱是陽氣自傷不能升達降下陰分而為內傷乃陽虛也故其脈大而無力屬脾肺陰虛發熱是陰血自傷不能制火陽氣升騰內熱乃陽旺也故其數而無力屬心腎經云脈大無力為陽虛脈數無力為陰虛無力為虛有力曰實升陽散火湯治男婦四肢發熱筋骨間熱肌表熱如火燎捫之烙手此病多因血虛而得之或胃虛過食生冷郁遏陽氣於脾土之中火鬱則發之升麻葛根獨活羌活防風白芍人參各六分柴胡三分生甘草一分炙甘草一分上銼一劑生薑三片水煎熱服忌生冷清心連子飲治熱在氣分口乾小便白濁夜間安靜晝則發熱又治口舌生瘡或口苦咽乾煩躁作渴小便赤澀下淋不止或莖中作痛黃芩炒麥門冬去心地骨皮車前子炒甘草各一錢半石蓮肉茯苓黃耆炒柴胡人參各一錢上銼一劑水煎空心服參朮四物湯治午後發熱屬血分當歸川芎白芍熟地黃人參白朮牡丹皮上銼水煎服如熱從左邊起肝火也實則四物龍膽山梔虛則四物參朮黃耆熱從臍下起陰火也四物參朮黃柏知母酒拌炒黑五味麥門肉桂如不應急用加減八味丸不時而熱或無定處或從腳心起此無根虛火也用加減八味丸及十全大補湯加五味麥門主之一婦人年四十餘夜間發熱早晨退五心煩熱無休止時半年後六脈皆數伏而且牢浮取全不應手以東垣升陽散火湯四帖而熱減大半胸中覺清爽勝前再與兩帖熱悉退後以四物湯加黃柏知母少佐以炒黑乾薑服二十劑全安一人虛勞發熱自汗諸藥不能退其熱者以當歸補血湯一服如神方見補益治骨蒸內熱之病時發外寒寒過內熱附骨蒸盛之時四肢微瘦足趺腫者其病在臟腑之中以大白散白石膏火煅為末新汲水調下方寸匕以身無熱為度十全大補湯治虛勞發熱加柴胡地骨皮秦艽惡熱惡熱非熱明是虛證經曰陰虛則發熱陽在外為陰之衛陰在內為陽之守精神外馳淫欲無節陰氣耗散陽無所附遂致浮散於肌表之間而惡熱也當作陰虛火動治之惡寒惡寒非寒明是熱症亦有久服熱藥而得河間謂火極似水熱甚而反覺自冷實非寒也有熱藥而少愈者卒能發散郁遏暫開耳又曰火熱內熾寒必蕩外故惡寒實非寒症凡背惡寒甚者脈浮大而無力者陽虛也用參耆之類加附子少許厥症厥者極也指尖冷者曰厥手冷過肘足冷過膝曰逆陽厥者初得病身熱頭痛大小便閉澀或畏熱或飲水或揚手擲足煩躁不得安臥譫言昏憒蓋陽極則發厥也宜六乙順氣湯主之陰厥者初得病四肢逆冷脈沉而細足攣臥而惡寒引衣蓋覆不欲水或下利清穀而厥逆者陰厥也宜四逆湯或理中湯主之屍厥飛屍卒厥此即中惡也因犯冒不正之氣忽然手足厥冷肌膚慄起頭面青黑精神不守或錯言妄語者緊口噤或昏不知人頭旋暈倒此是卒厥客忤飛屍鬼擊吊死問喪入廟登塚多有此病以蘇合香丸灌之俟稍蘇以調氣散合平胃散余以藿香正氣散加南星木香殊效痰厥者寒痰迷悶四肢厥冷宜姜附湯以生附子代熟附子蛔厥者乃胃寒所生經曰蛔者長蟲也胃中冷即吐蛔宜理中湯加炒川椒五粒檳榔五分吞烏梅丸氣厥者與中風相似但風中身溫氣中身冷以八味順氣散如有痰以四七導痰湯主之調氣散白豆蔻丁香檀香木香各二錢藿香甘草炙各八錢砂仁四錢上為細末每服二錢入鹽少許沸湯點服痰厥者卒然不省人事喉中有水雞聲者是也用牙皂二根白礬二錢二味生研為末吹入鼻中即燒竹瀝薑汁灌之自醒治卒暴痰厥不醒人事以香油一盞入薑汁少許灌入喉中須臾逐痰涎立愈治卒厥不醒人事因痰火氣鬱迷塞心竅者清熱導痰湯殊效虛煩夫虛煩者心胸躁擾而不寧也多是體虛者攝養有乖榮衛不調使陰陽二氣有所偏勝也或陰虛而陽盛或陰盛而陽虛內經曰陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒令人虛煩多是陰虛生內熱所致虛勞之人腎本有虧心火內蒸其煩必躁吐瀉之後津液枯竭煩而有渴惟傷寒及大病後虛煩之症卻無霍亂臨病宜審之巢氏病源曰心煩不得眠者心熱也但虛煩不得眠者膽冷也竹葉石膏湯治大病後表裡俱虛內無津液煩渴心躁及諸虛煩熱與傷寒相似但不惡寒身不疼痛不可汗下宜清補之石膏二錢半夏一錢半麥門冬去心一錢人參一錢甘草一錢上銼一劑青竹葉生薑各五六片粳米百餘粒水煎服溫膽湯主方治病後虛煩不得眠及心膽虛怯觸事易驚短氣悸乏或復自汗並治加酸棗仁炒陳皮去白半夏泡白茯苓枳實炒各二錢竹茹一錢甘草五分上銼一劑薑棗煎服一方加酸棗仁炒遠志肉五味子人參熟地黃尤效八味丸治腎水枯竭不能上潤心火上炎不能既濟心躁煩渴小便頻數白濁陰痿弱飲食不多肌膚漸漸如削或腿腫腳先瘦小宜降心火生腎水其煩頓止方見補益邪祟祟脈論祟脈面色黯慘或斜視如淫凡脈乍大乍小乍浮乍沉乍長乍短乍有乍無或錯雜不倫或刮駃暴至或沉伏或雙弦或鉤啄或袞運或橫隔或促散或尺部大於寸關或關部大於尺部是皆染祟得之刮駃鉤啄多見於脾洪運袞袞多見於肝橫隔促散多見於心肺大抵祟脈心脈虛散肝脈洪盛尤可驗焉蓋心藏神肝藏魂心虛則驚惕昏迷神不守舍而邪氣得以入其魂耳秦承祖灸鬼法治一切驚狂譫妄逾垣上屋罵詈不避親疏等症以病者兩手大拇指用細麻繩扎縛定以大艾炷置於其中兩介甲及兩指角肉四處著火一處不著即無效灸七壯神驗治狐貍精迷人不問男女方外異人傳試之實驗不可妄傳非人凡男女被狐貍精纏迷至死者其狐貍精來先用口來陰戶一搌其女人即昏迷或男子來陽物上一搌即昏迷用桐油抹在陰戶陽物上其怪即大嘔而走效不可言茯神散治妄有所見言語雜亂時或昏昧痰熱茯神一錢半茯苓人參石菖蒲各一錢赤小豆五分上銼散水煎服桃仁丸治與鬼魅交通辰砂另研檳榔當歸桃仁各三錢水銀一錢棗肉一個研令星盡麝香阿魏麵裹煨沉香各五分上為細末煉蜜為丸如梧子大每服十丸空心桃仁湯下治妖鬼貓鬼病人不肯言鬼者用鹿角屑搗散以水調方寸匕即言實也辟邪丹治婦人與鬼魅交通虎頭骨二兩硃砂雄黃雌黃鬼臼皂角蕪荑仁鬼箭藜蘆各一兩上為末煉蜜為丸如彈子大囊盛一丸男左女右係臂上或當病人戶內燒之一切鬼邪不敢進近也一婦人被諸精妖怪狐貍貓犬成精被其纏染以致面黃肌瘦不似人形予以十全大補湯加白茯神遠志酸棗仁麥門冬石菖蒲服之一月奏效半年痊愈中惡中惡脈緊細者生浮大者死客忤者中惡之類也多於道間門外得之令人心腹絞痛腹滿氣衝心胸不即治亦殺人飛屍者遊走皮膚穿臟腑每發刺痛亦作無常遁屍者附骨入肉攻鑿血脈每發不可近見屍喪聞哀聲便作風屍者淫濁四沫不知痛之所在每發昏沉得風雪便作沉屍者纏骨結臟衝心脅每發絞痛遇寒冷便作屍注者舉身沉重精神錯亂昏廢每節氣至則輒至大惡備急丹療心腹諸痛卒暴百病大黃巴豆去皮油乾薑各等分上搗篩末蜜和更搗一千杵丸如小豆大每服三丸老小斟量之若中惡客忤心腹脹滿卒痛如錐刺痛氣急口噤停屍卒死者以暖水若酒服之若不下捧頭起灌令下喉須臾瘥未知更與三丸腹當鳴轉即吐下便愈若口已噤亦須折齒灌之藥入喉即瘥倉公散治卒鬼系鬼痱鬼刺心腹痛如刺下血便死不知人事及臥魘齧腳腫不覺者並治諸惡毒氣病方此是漢文帝時太倉公淳于意方故名白礬生皂角雄黃藜蘆各等分上四味治下篩取如大豆許納管中吹入病入鼻中得嚏則氣通便活若未嚏更吹之以得嚏為度能起死回生一方治急時氣纏喉風漸入咽塞水穀不下牙關緊急不省人事名如聖散加蠍梢十枚吹鼻吐痰立效還魂湯治客忤卒死麻黃三錢去節杏仁七個去皮尖甘草一錢上銼水煎去渣灌之通治卒死治卒中惡用韭搗汁灌鼻中又宜蔥心黃刺鼻孔中血出良中惡卒死用菖蒲生根搗絞汁灌之立瘥治屍厥脈動靜而若死用石菖蒲末吹鼻中仍以桂末安於舌上五絕一曰自縊二曰牆壁壓三曰溺水四曰魘魅五曰產後暈死凡五絕皆以半夏為末冷水為丸如大豆納鼻中愈心溫一日可治治卒死用半夏為丸如大豆許吹鼻中救自縊死凡自縊高懸者徐徐把住解繩不得斷絕上下安被放倒微微捻正喉嚨以手掩其口鼻勿令透氣一人以腳踏其兩肩手挽其頂發當令弦急勿使緩縱一人以手摩將其胸臆屈伸其手足若已僵直漸漸強屈之一人以腳裹衣抵住糞門勿令泄氣又以竹管吹其兩耳候氣從口出呼吸眼開仍引按不住須臾以少薑湯或清粥灌令喉潤漸漸能咽乃止此法自日至暮雖已冷可活自暮至旦陰氣盛為難救心下微溫者雖一日以上亦可活百發百中一法以半夏末吹鼻中治自縊氣已脫極重者只灸湧泉穴男左女右灸三壯又方以藍汁灌之又方心下猶溫者刺雞冠血滴入口中即活男用雌雞女用雄雞救水溺死先以刀斡開溺者口橫放箸一支令其牙銜之使可出水又令一健夫屈溺人兩足著肩上以背相貼倒駝之而行令出其水仍先取燥土或壁土置地上以溺者仰臥其土更以土覆之只露口眼自然水氣翕入土中其人即蘇仍急用竹管各於口耳鼻臍糞門內更迭吹之令上下氣相通又用半夏末搐其鼻又用皂角末綿裹塞糞門須臾出水則活一方艾灸臍中即活救木石壓死並跌磕傷從高處墜下跌死氣絕不能言者取藥不便急劈開口以熱小便灌之救產後暈死用半夏一兩為末冷水和丸如大豆納鼻孔中即愈
