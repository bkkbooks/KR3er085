body:
  text: 艮集卷三諸氣脈理玄要曰下手脈沉便知是氣沉極則伏澀弱難治其或沉滑氣兼痰飲人稟天地陰陽之氣以生藉血肉以成其形一氣周流於其中以成其神形神俱備乃為全人故氣陽而血陰灌溉周身而無一息之間斷也血則隨氣而行載乎血者也有是氣必有是血有是血必乘乎是氣二者行則俱行一息有間則病矣今之人不知忿怒驚恐悲哀而損其身憂愁思慮以傷其氣故人之疾多從氣而生致有中滿腹脹積聚喘急五膈五噎皆由於氣分心氣飲主方治男子婦人一切氣不和多因憂愁思慮忿怒傷神或臨食憂感或事不隨意使抑鬱之氣留滯不散停於胸膈之間不能流暢致心胸痞悶脅肋虛脹噎塞不通噫氣吞酸嘔噦噁心頭目昏眩四肢倦怠面色萎黃口舌乾苦飲食減少日漸羸瘦或大腸虛祕或因病之後胸中虛痞不思飲食並皆治之青皮去穰炒五錢陳皮去白五錢半夏湯泡姜炒三錢半白茯苓去皮三錢半紫蘇二兩大腹皮洗淨五錢桑白皮五錢羌活五錢赤芍三錢半木通三錢半官桂三錢半甘草二錢半上銼一兩生薑三片棗一枚燈草十莖水煎食遠溫服一方去赤芍羌活加枳殼桔梗木香檳榔香附莪朮藿香治憂思鬱怒諸氣痞滿水氣面目浮腫加豬苓澤瀉車前子木瓜葶藶子麥門冬性急加柴胡多怒加黃芩食少加砂仁神麯咳嗽加桔梗半夏胸膈痞悶加枳實香附三焦不和加烏藥氣閉加萊蔔子氣滯腰痛加木瓜枳殼上焦熱盛加黃芩中焦熱盛加山梔子翻胃加沉香磨服四七湯喜怒憂思悲驚恐之氣結成痰涎狀如綿絮或如梅核在咽喉間咯不出咽不下此七情所為也或中脘痞滿氣不舒快痰涎壅盛上氣喘急痰飲嘔逆噁心紫蘇二兩厚朴去皮姜炒三兩白茯苓去皮四兩半夏湯泡切片姜炒五兩上銼生薑七片棗一枚水煎熱服若因思慮過度陰陽不分清濁相干小便白濁用此藥下青州白丸子婦人惡阻尤宜服之痰作臭氣加枳實香附余常用此加桔梗枳實甘草治痰氣痞塞殊效利氣丸治一切氣滯心腹滿悶疼痛脅肋膨脹難消嘔吐酸水痰涎不利頭目昏眩並食積酒毒及米穀不化或下痢膿血大小便結滯不快風壅積熱口苦煩躁涕噴稠黏此藥最能流濕潤燥推陳致新滋陰抑陽散郁破結活血通經治氣分之聖藥也大黃四兩黑牽牛四兩木香一兩檳榔一兩枳殼麩炒一兩香附炒四兩青皮去穰一兩陳皮一兩莪朮煨一兩黃連一兩黃柏去皮三兩上為細末水丸如梧子大每服五七十丸或百丸臨臥淡薑湯送下以利為度如不利再加丸數通利則愈瑞竹堂加黃芩當歸各一兩亦妙剪紅丸李茨峰治諸氣痞塞飲食結聚關膈不通胃脘肚腹疼痛鼓脹水腫諸症皆治三稜醋煮乾莪朮醋煮乾檳榔青皮去穰黑牽牛取頭末大黃生木通滑石各一兩甘遂雷丸各五錢使君子肉三錢上為細末麵糊為丸如梧子大每五十丸空心白滾湯下忌生冷油膩此方神效開膈順氣丸治男婦七情憂鬱胸膈痞悶肚腹脹痛痞塊疼痛不思飲食蒼朮二兩米泔制陳皮一兩半川厚朴薑汁炒一兩香附米四兩醋炒烏藥炒一兩枳殼去穰麩炒一兩青皮去穰七錢莪朮醋炒五錢甘草炙五錢上為細末酒煮稀麵糊為丸如梧子大每服七十丸酒送下薑湯亦可沉麝丸內翰蘇洗方治諸血諸氣痛不可忍及心脾氣血諸痛又治血滯腰痛硃砂沉香血竭沒藥各一分木香半分麝香半分上生為末磁器煮生甘草膏丸如皂子大每一丸姜鹽湯嚼下産後血痛氣痛亦治脾痛血滯腰痛用續斷牛膝桃仁炒煎湯磨下血暈用乳香泡湯研化服上下分消導氣丸功勝分心氣飲黃連姜炒一兩半夏姜炒一兩瓜蔞仁去殼一兩桔梗去蘆二兩桑白皮蜜炙一兩枳殼麩炒二兩川芎一兩川厚朴薑製二兩青皮麩炒二兩香附童便炒二兩白茯苓去皮二兩澤瀉一兩木通一兩檳榔一兩麥芽炒一兩甘草梢五錢上為細末薑湯打神麯糊為丸梧子大每七十丸米湯下作湯劑姜煎服亦可痞滿劉河間曰痞與否同不通泰也心膈悶而不通者為痞滿內外皆急脹者為腫脹聚而成塊者為積塊也夫痞者皆上之症也與脹滿有輕重之分痞則內覺痞悶而外無脹急之形者是也有中氣虛弱不能運化精微為痞者有飲食痰積不能施化為痞者有濕熱太甚為痞者消痞湯主方人參白朮去蘆炒白茯苓去皮陳皮去白半夏姜炒厚朴酒炒枳實麩炒黃連姜炒砂仁澤瀉生薑三片水煎溫服七氣湯治七情所傷憂思鬱結腑臟氣不和平心腹痞悶半夏薑汁炒白茯苓各二錢川厚朴去皮姜炒一錢半蘇梗一錢加香附炒一錢上銼一劑生薑三片水煎溫服補中益氣湯方見內傷治內傷元氣心下痞脹夯悶依本方加白芍酒炒黃連姜炒各一錢厚朴姜炒一錢枳實麩炒木香砂仁各二分內消丸治痞悶氣積食積青皮去穰麩炒陳皮三稜煨莪朮煨神麯炒麥芽炒香附炒上為末醋糊為丸梧子大每三五十丸茶下大消痞丸治一切心下痞滿及年久不愈者黃連土炒六錢黃芩土炒六錢枳實麩炒五錢半夏姜炒四錢陳皮四錢厚朴姜炒四錢白朮去蘆炒一兩豬苓二錢半澤瀉三錢薑黃一兩乾生薑二錢人參四錢神麯炒三錢砂仁三錢甘草炙二錢上為細末湯泡蒸餅為丸梧子大每五十丸至百丸空心白湯下蠱證即鼓脹蠱證大要有二曰單腹脹曰雙腹脹急急氣滿睡臥不安四肢微腫此單腹脹因內傷七情所致取效微遲四肢浮腫肚大身重此雙腹脹因外感風濕所致取效甚速議有水腫氣腫以指按腫處有陷隨指隨起者氣腫先須理氣陷而起遲者水腫只須導水即愈凡人五十以前氣血壯者得效之後善自調攝終身不發五十以來氣血稍衰攝不嚴時或再復此復能治之但屢復屢治元氣耗盡則難矣脈浮洪易治沉細難治詩曰凡觀諸蠱要先知且看臍間亞似梨肚上青筋休要問陰囊無縫定難醫眼黑鼻黑終須死掌上無紋在片時有命只消三四日項僵頭轉二朝危消蠱湯主方治氣作蠱脹但腹滿而四肢頭面不腫紫蘇辣桂青皮陳皮三稜莪朮木香檳榔白豆蔻肉豆蔻蓽澄茄萊蔔子生枳殼半夏砂仁甘草炙薑棗煎服按上方治鼓脹初起及壯盛之人可服補氣健中湯主方治鼓脹元氣脾胃虛損宜補中行濕利小便切不可下人參八分白朮土炒一錢半白茯苓一錢半陳皮去白一錢蒼朮米泔浸炒一錢厚朴姜炒五分麥門冬去心五分黃芩土炒八分澤瀉五分水煎服朝急暮寬者倍參術肥白人氣虛者亦同朝寬暮急者加黃連姜炒當歸白芍炒香附川芎減參黑瘦人氣熱亦同朝暮急者氣血俱虛宜雙補之氣不運加木香木通氣下陷加柴胡升麻六君子湯方見補益治脾虛鼓脹手足倦怠短氣溏泄者服此藥下咽之後必增脹滿勿疑之經曰塞因塞用故用補劑以治脹滿初服則脹久服則通此惟精達經旨者知之俗醫未足道也按上方治鼓脹屬虛弱者可服五子十皮湯治一切蠱脹並氣虛中滿單腹脹紫蘇子菟絲子大腹子車前子葶藶子茯苓皮草果皮五加皮大腹皮牡丹皮地骨皮生薑皮木通皮木瓜皮甘草皮上銼水煎溫服如要斷根將前藥各一錢五分用公豬肚一個不見水先將溫水煮一滾以竹尖鑽孔入藥在內蒸熟切片搗蒜蘸食之不過一二個永不發也按上方治蠱脹專攻之劑清脹丸祕方治積塊消蠱脹青皮去穰一兩陳皮一兩三稜醋炒一兩半莪朮醋炒一兩半乾薑炮五錢香附子一兩半醋煮焙乾陳倉米二兩用巴豆四十九粒同炒黃色裹一宿去豆上為末醋糊為丸梧子大每五六十丸薑湯下按上方治鼓脹腹中有積塊者可服有經驗簡易方開後宜對症選用治氣蠱大蛤蟆一個以砂仁推其口使吞入腹以滿為度用泥灌封固炭火煅至透紅煙盡取出候冷去泥研末為一服或酒或陳皮湯送下候撒屁多乃見其效治氣蠱用粟米緑豆各一抄豬肝一葉切碎三味煮作粥食之重者不過五次其腫自消切忌氣惱生冷祕方治鼓脹氣脹水脹等症羯雞屎一升瓦上炒焦地上出火毒研細以百沸湯三升淋汁濾過每服一大盞調木香檳榔末各一錢日三服以平為期治單腹脹用七八年母豬大腸頭一截並血數塊用原煮血水炆爛食之至半夜腹大痛而大便瀉去一桶即消治鼓脹攻水之方連根葉大戟一握大棗一斗上二物同煮一時去大載不用只吃棗無時服大戟寒而不寒味苦甘有小毒能下十二經之水大棗味甘取其大補脾胃而不為攻下所傷耳海上方專治單腹脹雙腹脹單腹脹在腹中間腫雙腹脹在腹兩旁腫用大水的泡曬乾羅過每早以新水調三四匙咽下吃後放屁吃兩早後病者自知放屁其腫自消切不可將針放水水去即死治蠱症黑牽牛頭末木香甘遂各一錢為末用豬腰一對俱分破將藥撒在二腰子內合住紙包灰火燒熟空心或食一個或食二個大便行膿血見效三花神祐丸治中滿腹脹喘嗽淋閉一切水濕腫滿濕熱腸垢沉積變生疾病久病不已黃瘦困倦氣血壅滯不得宣通或風熱燥郁肢體麻痹走注疼痛風痰涎嗽頭目眩暈瘧疾不已癥瘕積聚堅滿痞悶酒積食積一切痰飲嘔逆及婦人經病不快帶下淋瀝無問赤白並男子婦人傷寒濕熱腹滿實痛久新瘦弱俗不能別辨或泛常只為轉動之藥兼治新久腰痛並一切下痢及小兒驚疳積熱乳癖腫滿並治大戟芫花醋炒甘遂各五錢牽牛二兩大黃一兩輕粉一錢上為末水丸如小豆大每十丸量虛實加減忌熱甘草按上方皆攻克之劑宜壯盛人可服水腫通身皮膚光腫如泡手按成窩舉手即滿者是因脾虛不能制水久漬妄行故也法當補脾使脾氣得實則自健運切不可下忌食羊肉腰以上腫宜發汗腰以下腫宜利小便此仲景之法陽水脈浮數陰水脈沉遲治之初起及壯盛之人宜先服木香流氣飲即效如未效服行濕補氣養血湯若久病虛弱不須服流氣飲即服行濕補氣養血湯及健脾丸腎氣丸之類兼而進之乃收全效不治症先四肢而後歸於腹大便滑泄唇黑缺盆平臍突肉硬男從腳下腫上女從身上腫下脈浮大者生沉細者死木香流氣飲治諸氣痞滯不通胸膈膨脹口苦咽乾嘔吐不食或肩背腹脅走注刺痛及喘急痰嗽面目虛浮四肢腫滿大便閉小便澀又治憂思太過怔忪鬱積腳氣風濕聚結腫痛喘滿脹急凡治蠱脹當先用此藥調順榮衛流通血脈快利三焦安和五臟木香七錢半丁皮七錢半藿香七錢半半夏湯泡切片姜炒二錢五分人參五錢白朮去油蘆五錢赤茯苓五錢厚朴姜炒二兩青皮去穰二兩陳皮四兩草果七錢半檳榔七錢半大腹皮七錢半香附子二兩紫蘇二兩木瓜五錢白芷五錢麥門冬去心五錢莪朮煨七錢半肉桂七錢半木通一兩甘草二兩石菖蒲五錢上每銼五錢生薑三片棗二枚水一鍾加減七分去渣熱服本方去藿香石菖蒲加沉香枳殼大黃名二十四味流氣飲蠱腫加白豆蔻頭面腫加蔥白肚腹腫加枳實倍青皮陳皮臍至腳腫加桑白皮腫滿加黑牽牛按上方治諸水腫初起者宜服行濕補氣養血湯主方治氣血虛弱單腹脹浮腫人參白朮白茯苓當歸川芎白芍蘇梗陳皮厚朴大腹皮萊蔔子海金砂木通木香甘草生薑棗煎服氣虛倍參朮茯苓血虛倍芎歸白芍小便短少再加豬苓澤瀉滑石服後腫脹俱退惟面足不消此陽明經氣虛倍用白朮茯苓調中健脾丸治單腹脹及脾虛腫滿膈中閉塞或胃口作痛黃耆蜜炙二兩人參二兩白朮黃土水拌炒六兩茯苓二兩陳皮鹽水炒三兩半夏泡七次三兩蒼朮米泔浸炒二兩香附童便炒三兩白芍酒炒二兩半黃連吳茱萸萸湯浸炒去吳茱萸二兩半蘇子炒一兩半萊蔔子炒一兩半山楂肉三兩薏苡仁炒三兩澤瀉炒二兩半沉香六錢另磨五加皮二兩炒草豆蔻酒拌炒一兩半法制瓜蔞一兩用大瓜蔞二個鑽一孔每個入三椒三錢多年蔞葉二錢敲米粒大小外以綿紙糊完再用紙筋鹽泥封固曬乾炭火煅通紅取出去泥其黑色一併入藥上為末煎荷葉大腹皮湯打黃米糊為丸如梧子大每服百丸日進三次白湯下此藥不傷元氣大有補益勿輕視之金匱腎氣丸治脾腎虛寒腰重腳腫濕飲留積小便不利或肚腹腫脹四肢浮腫或喘急痰盛已成蠱者此症多因脾胃虛弱治失其宜元氣復傷而變者非此藥不救白茯苓三兩大附子麵裹煨去皮臍切片童便浸焙乾五錢懷牛膝去蘆酒洗肉桂澤瀉車前子山茱萸酒蒸去核懷山藥牡丹皮各一兩懷生地黃酒拌砂鍋內蒸黑四兩上精製稱為一處搗成餅曬乾為末煉蜜為丸如梧子大每服四五十丸空心米湯下按上方治鼓腫令病人空心服金匱腎氣丸已時服行濕補血湯一服未時將渣煎服晚上臨臥服調中健脾丸一服每日如此服四次不可間斷久久服之元氣漸充脾胃漸壯腎水漸生相火漸消濕熱漸除腫脹諸病自瘳矣又方用白商陸根似人形者搗取汁一合生薑汁二點黃酒一盞和服空心三日服一次元氣厚者服五次薄者三次止忌鹽醬凡人年五十以里者可服五十以外者不必服治蠱腫祕方田螺不拘多少水漂加香油一盞於水內其涎自然吐出取其涎曬乾為末每服不過三分酒調下其水自小便而下其氣自大便而出其腫即消再服補養脾胃之藥為妙治腫脹自去水真水銀粉二錢巴豆去油四兩生硫黃一錢同研成膏作餅子先以新棉一片鋪臍上次以藥餅當臍掩之外用帛縛定約人行五里自然瀉下惡水待三五次除去藥溫粥補之久患者隔日取水治水腫膨脹神妙方大田螺四個大蒜五個去皮車前子為末三錢上三件研為一處為餅一餅貼入臍中以手帕縛之貼藥後少頃水從小便出一二餅而愈祕方治水腫脹滿癩蛤蟆一二枚裝在豬肚內用好酒煮一伏時去蛤蟆將豬肚與酒服盡大便屁如雷或水下水腫自消加縮砂些須尤妙祕方治十種水氣五蠱脹氣此方乃臨穎楊運治一人患腹脹陰囊腫大諸醫不治鄉人舉之一劑而病愈病者言遇神仙也又治數人俱效余托諸親友懇求遂得之後屢試屢驗甘遂赤皮細槌不蛀者不拘多少用喬麥面水和作栗餅如紙厚包甘遂在內灰火中燒熟取出曬乾為末每用一錢以細面約一兩許合和水調捏作面片次用商陸二錢半巴豆一個去殼水一碗半砂鍋內煎至一碗去渣再入鐵鍋內入前面片煮熟食之其商陸湯任其意服與不服不在其限服之不一二時水從大便出如是血鼓即下血氣鼓即下氣當時消若有喘嗽盡皆妥貼若腹中有塊亦漸消散只用一服見效忌鹽醬冬瓜香油葷腥之物半月後用鹽亦須炒過用之若蠱症加胡椒一錢與巴豆同煮其巴豆須看虛實加減其壯者加至二三個亦可按上諸單方治水腫皆神效之方也蟠桃丸治男婦渾身頭目手足浮腫肚腹脹滿疼痛沉香木香乳香莙上炙沒藥莙上炙各三錢白牽牛生用取頭末八錢黑牽牛用牙皂煎濃汁浸半日鋪鍋底焙一半生一半熟取出研末八錢檳榔一兩一半生一半用牙皂煎汁浸透焙熟琥珀一錢或五分上為末牙皂水打稀麵糊為丸如梧子大每服二錢七分五更砂糖煎湯送下按上方皆經驗百發百中者此藥專攻宜間而服之不可久服積聚脈宜實大不宜沉小丹溪曰塊乃有形之物氣不能成形痰與食積死血也在中為痰飲在右為為食積在左為死血大法咸以軟之堅以削之行氣開痰為主不可專用下藥徒損其氣病亦不去當消積使之溶化其死血塊去須大補痞塊在皮裡膜外須用補藥香附開之兼二陳湯加補氣藥先須斷厚味指迷七氣湯主方治五積六聚狀若癥瘕隨氣上下發作有時心腹疼痛攻刺脅肋上氣窒塞喘嗽滿悶小腹䐜脹大小便不利三稜莪朮青皮去穰陳皮藿香桔梗肉桂益智仁香附甘草上銼作劑生薑煎服心脾痛加烏藥枳殼按上方治積聚專攻之劑化積湯治婦人氣積血塊癥瘕不拘左右上下年月新久當歸酒洗一錢白芍酒炒二錢川芎一錢生地黃一錢熟地黃薑汁炒一錢赤芍一錢玄胡索一錢桃仁去皮五分紅花三分青皮去穰一錢陳皮去白五分三稜醋炒一錢半莪朮醋炒一錢半貝母一錢半夏姜炒一錢木香三分不見火香附一錢半上共十七味作一劑生薑三片水煎空心服按上方治積聚攻補兼施之劑神仙一塊氣治諸氣食積及噎膈痞滿胸脅刺痛癥瘕疝氣並皆治之青皮去穰陳皮三稜醋炒莪朮醋炒香附童便炒各一兩神麯炒麥芽炒萊蔔子炒白牽牛頭末檳榔鬱金黃連姜炒各五錢枳實麩炒三錢皂角二錢半百草霜二錢半上為細末稀麵糊為丸如緑豆大每三四十丸視疾之上下為食之先後熱酒薑湯任下褐丸子治塊痰三稜炒一兩莪朮炒一兩青皮去穰陳皮去白胡椒胡黃連苦楝子各五錢黑牽牛七錢半生半炒木香四錢萊蔔子二兩微炒上為末麵糊為丸黍米大每六七十丸萊蔔湯下忌腥物生冷每日一服五日後熱退按上方治積塊專攻之劑壯盛之人可服千金化鐵丹治男婦氣血痰飲食積諸般積塊癥瘕脹滿諸症當歸一兩半白芍酒炒一兩半川芎七錢半生地黃酒洗一兩半白朮去蘆炒一兩半白茯苓去皮一兩陳皮去白一兩青皮去穰七錢半木香二錢半檳榔五錢香附炒一兩枳實麩炒七錢半半夏姜炒一兩厚朴去皮姜炒一兩萊蔔子炒五錢三稜醋炒一兩半莪朮醋炒一兩半桃仁去皮五錢紅花五錢乾漆炒五錢硇砂用磁器盛放灰中煎過五錢琥珀五錢上共二十二味為末醋糊為丸如梧子大每六七十丸米湯下按上方治積塊攻補兼施之劑化痞膏肥皂煎水皮硝大蒜蔥白生薑各四兩上五味入石臼內搗爛入水二碗取汁將潭再搗入水二碗取汁再搗仍入水二碗取汁共搗三次約水四五碗慢火熬入大黃末四兩同熬至一碗許即成膏矣先將塊上五花各灸五七壯將紙攤膏貼塊上二日一換內服化鐵丹一月塊消神效貼男婦腹中積塊及小兒癖疾硃砂三錢硇砂三錢血竭三錢巴豆去油三錢為末聽用每一帖用大黃二兩朴硝二兩為末將前藥四味止用一錢入內加雞子兩個搗成膏如調不濕又加好醋加在油紙上貼患處如干取下來加醋再搗三日一換按上方治積塊外治之方神化丹消癖塊破血氣下鬼胎通經脈及諸癖積血硇砂乾漆炒血竭各一錢紅娘子二十個斑貓二十個乳香一錢半上為末棗肉為丸碗豆大每一丸服至三五丸臨臥棗湯下或薑湯或紅花蘇木煎湯下取積丹綿紋大黃為末以好醋熬成膏丸如梧子大每服百丸量虛實大小休吃晚飯用好墨濃磨好酒送下次日見膿血為效保安丸治癥積心腹內結如拳漸上撞心痛及腹痛不可忍大黃三兩酒浸一宿蒸切片焙乾乾薑炮一兩大附子炮去皮五錢鱉甲一兩半醋煮一伏時炙黃上為末陳米醋一升煮去四五合後和藥丸梧子大每二十丸五更醋湯下天明時不動再服五丸取積如魚腸膿血爛泥而下三稜煎丸治過傷飲食痞悶疼痛食不消化久而成癖又治婦人血積血塊乾血氣經閉大黃八兩為末三稜莪朮各一兩二味濕紙包煨為末上先將大黃銀石器內好醋漬令平慢火熬微干入二味為丸如緑豆大每服十丸二十丸食後白湯下看虛實加減服大人如梧子大每服四十丸按上方治積塊皆專攻之劑宜對症選用五疸大抵脈大者死微細者生無脈鼻氣冷者不治也其症有五黃汗黃疸酒疸谷疸女勞疸病雖有五不過濕熱而已丹溪治疸症不必分五同是濕熱如盒曲相似周身皮膚並眼如梔子汁染因食積黃者量虛實下之其食積自消但以利小便為先小便利白其黃自退清熱除濕湯主方黃連炒黃芩炒梔子炒黑茵陳豬苓澤瀉蒼朮米泔燙炒青皮去穰炒草龍膽各五錢谷疸加三稜莪朮陳皮砂仁神麯銼散水煎溫服治發黃疸身面俱黃如金色小便如濃煮柏汁諸藥不效柴胡黃連黃芩黃柏梔子茵陳龍膽草木通滑石升麻甘草銼劑燈心煎服大便實加大黃目睛黃倍龍膽草虛弱人倍人參茵陳五苓散治黃疸專屬濕熱盒曲相似茵陳三錢白朮去蘆一錢半赤苓一錢半豬苓一錢澤瀉一錢蒼朮一錢二分山梔一錢二分滑石一錢二分官桂二分甘草二分燈心水煎服按上方治五疸除濕熱之劑治五疸黃腫緑礬不拘多少炒至白色上為細末煮紅棗肉為丸如櫻桃大每服五丸早午晚各一服用冷黃酒送下忌醋生冷發物百發百中或有蟲即吐出治酒疸遍身面目發黃如金色者蔣雲山傳好茵陳一兩黃酒一鍾半煎至八分食後溫服不過四五服全安治黃病如神安陵馬進齊傳露珠即土豆形如姜搗爛取汁半碗服之按上方治黃疸必效之方也胃苓湯治黃疸倦怠脾胃不和食少小便赤加滑石鐵砂丸治黃腫豬苓澤瀉白朮去油蘆赤茯苓各五錢蒼朮砂仁香附厚朴各二兩烏藥茵陳草果針砂醋煅七次各一兩木香青皮去穰陳皮各七錢上為細末老酒打麵糊為丸梧子大每七十丸酒送下忌魚雞有塊加三稜莪朮各一兩治虛弱人久病黃疸肌瘦二方神效補中益氣湯依本方加茵陳蒼朮梔子豬苓澤瀉黃連滑石赤茯苓共十六味六味地黃丸依本方加蒼朮白朮茵陳黃柏各三兩與前湯藥兼服又當間服緑礬丸緑礬丸治五疸良方茅山蒼朮米泔浸一宿去粗皮咀片再用泔洗曬乾六兩陳皮洗川厚朴去皮姜炒各五兩白朮去油蘆炒甘草各二兩緑礬米醋拌慢火炒乾傾磚上冷定再炒如此三次炒用砂鍋一兩半小人用一兩上為細末用神麯二兩打糊為丸如緑豆大每服五七十丸白湯送下治黃疸口淡怔忡耳鳴腳軟微寒發熱小便白濁此為虛症宜四君子湯吞下八味丸茵陳四逆湯治發黃脈沉細而遲肢體逆冷腰以上自汗茵陳一兩大附子一枚乾薑炮一兩半甘草炙一兩上切四劑水煎服治女勞疸四苓散合四物湯去川芎加茵陳麥門冬滑石甘草按上方治黃疸殊效宜選而用之治黃疸病醫不愈耳目俱黃食飲不消胃中脹熱生黃衣蓋胃中有干糞致病耳用豬脂一小升溫熱頓服之日三次燥屎下去乃愈疝證睪丸痛連小腹痛者是也有痛在睪丸內者有痛在五樞穴無形無聲或有形如爪有聲如蛙素問皆以為寒也專主肝經經絶無相干宜灸大敦三陰交二穴法治諸疝用鹽半斤炒極熱以舊帛包尉痛處一方用蔥白搗如泥捏餅置臍中上用尉斗尉之或上置艾灼之妙神效七疝湯治七疝寒水筋血氣狐㿗之總司也枳實橘核山梔炒山楂吳茱萸湯泡荔枝核寒疝囊冷結硬得於寒濕而發冬月者加吳茱萸桂枝乾薑水疝腎囊腫痛陰汗時出囊或腫如水晶得於飲水醉酒者加豬苓澤瀉茯苓筋疝陰莖腫脹或莖中痛痛極則癢或挺縫不收得於房勞所致加炒黃連白朮茯苓血疝狀如王爪在小腹兩旁橫骨兩端紋中俗云便癰也又或強制情欲當泄不泄亦成斯疾加桃仁挾虛加參術氣疝其狀上連腎區下及陰囊或因號哭忿怒氣鬱而復發者加柴胡青皮香附狐疝其狀如瓦臥則入小腹行立則出小腹入囊中者加青皮香附米蒼朮㿗疝陰囊腫縮如升如斗不癢不痛得之地氣潮濕加白朮茯苓豬苓澤瀉蒼朮神仙救苦丸方見通治治諸疝疼痛殊效一捻金主方治七疝及奔豚氣痛不可忍者水山劉太府纍驗玄胡索小茴香川楝子全蠍炒人參大附子炮山梔子木香上各等分為末每服三錢黃酒調服治疝氣偏墜尹臣川青鹽二錢木通一錢甘草一錢川烏炮三錢燈草一錢水煎服治偏墜氣愛泉經驗川楝子小茴香胡蘆巴酒炒黑牽牛炒大黃吳茱萸青鹽烏藥木香木通滑石甘草水煎服治偏墜疝氣小腸氣南塘驗豬苓澤瀉蒼朮赤苓桂皮川木通白芍川