用陳雞屎四五升沸湯發之將腳蒸洗神仙救苦丸方見通治治腳跟疼痛神效痿躄痿音威不能舉也躄音壁跛跛不能行也風痹痿軟宜虛濡忌急疾夫痿者手足不能舉持是也又名軟風下身瘦弱不能趣步及手戰搖不能握物此症屬血虛血虛乃陰虛陰虛則內熱熱則筋弛步履艱難而手足軟弱此乃血氣兩虛風淫之症古方通用風藥治之等也我東垣丹溪二公治法始合經意而以清燥湯主之子和云痿因肺熱相傳四臟其脈多浮而大不可作寒濕腳氣治之主方治痿躄四肢軟弱不能舉動當歸身酒洗一錢熟地黃二錢白芍酒炒一錢川芎七分人參五分白朮去蘆一錢茯苓一錢麥門冬去心一錢五味子十二粒牛膝去蘆酒洗一錢杜仲去皮酒炒一錢蒼朮米泔浸炒一錢黃連酒炒五分黃柏酒炒一錢知母五分水煎空心服清燥湯治濕熱成痿以燥金受濕之邪是絶寒水生化之源絶則腎虧痿厥之病大作腰以下痿軟癱瘓不能動黃耆人參白朮蒼朮陳皮茯苓黃連當歸生地黃黃柏麥門冬五味子豬苓澤瀉柴胡升麻神麯甘草上銼生薑一片水煎服按上方治痿躄攻補兼施之劑治兩足痿躄不能動履鹿茸人參各五錢銼一劑水煎空心連進數服而愈按上方治痿躄屬氣虛者宜之鹿茸膠丸治氣血兩虛雙足軟弱不能健運行走久臥床褥鹿角膠八兩鹿角霜四兩懷熟地黃用懷生地酒蒸四兩川牛膝去蘆酒洗一兩白茯苓去皮一兩菟絲子酒製一兩人參一兩當歸酒洗六兩白芍鹽酒炒二兩白朮去蘆土炒二兩川杜仲去皮薑汁炒二兩虎脛骨酥炙一兩龜板酥炙一兩蒼朮泔浸二兩黃柏去皮鹽酒炒二兩上為細末將鹿角膠好酒溶化和為丸如梧子大每服百丸空心鹽薑湯下忌生冷寒濕之物起痿丹治腎氣虛憊腰膝痠疼行步無力菟絲子酒淘浸蒸二兩五錢肉蓯蓉酒浸川萆薢破故紙胡蘆巴酒炒沙菀蒺藜微炒川牛膝去蘆酒洗川杜仲去皮酒炒甘枸杞子防風酒洗各二兩河間方去枸杞加桂減半上為末酒煮豬腰子搗爛和丸梧子大每七八十丸空心溫酒下按上方治兩足軟弱大補之劑久服奏效治兩足痿弱不能行用新磚火燒紅用好醋澆之將濕紙包烙腳上遍處立能行痹痛附白虎歷節夫痹痛即痛風也四肢百節走痛是也因風寒濕三氣合而成痹故曰痛痹筋骨掣痛也曰著痹著而不行也曰行痹走痛不定也曰周痹周身疼痛也皆邪氣有餘之候也痹之為病寒多則掣痛風多則引注濕多則重著爾主方治一切遍身骨節流注作痛人參白朮去蘆油白茯苓去皮當歸川芎赤芍生地黃防風羌活獨活天麻南星陳皮黃芩酒炒甘草生薑煎服參伍秦艽湯治痛風腰背手足肢節疼痛乃血虛氣弱經絡枯澀謇滯而然也痛甚者乃曰白虎歷節風走注風膝大脛瘦曰鶴膝風是也當歸一錢川芎七分赤芍酒炒七分生地黃一錢秦艽一錢半蒼朮童便浸一錢羌活一錢半川獨活一錢萆薢一錢五加皮二錢黑狗脊去根毛一錢黃連薑汁炒二錢黃柏酒炒一錢黃芩酒炒一錢半紅花酒洗八分黃耆酒炒二錢人參二錢牛膝去蘆酒洗一錢半杜仲去皮每一兩用小茴香一錢鹽二錢水煎拌炒二錢甘草生三分上銼桃枝七根每長一寸半燈心七根煎熟入童便好酒各一盞空心溫服忌酒面鯉魚羊鵝如天將作雨陰晦時日而預先覺痛甚者加防風升麻天麻午後夜甚者血弱陰虛加升麻五分牡丹皮一錢早上午前甚者氣滯陽弱加連翹沉香竹瀝乳汁痛甚者倍羌活紅花芩連酒炒涼血則痛止按上方攻補兼施止痛之劑虎脛骨方治白虎風走注疼痛兩膝熱腫虎脛骨酥炙黑附子炮製去皮臍各一兩上為細末每服二錢空心溫酒調下七日再服如聖散治一切風疾血脈凝滯經絡手足拘攣四肢骨節疼痛行步艱難半身不遂口眼喎斜及遍身盡痛又治婦人兒枕痛玄胡索炒當歸身酒洗官桂各等分上為末每服三錢酒調早晚各一服腰痛加杜仲酒炒小茴香酒炒各等分乳香定痛丸朱柳河治諸風遍身骨節疼痛或腿膝痛及筋骨風蒼朮米泔浸二兩川烏炮去皮一兩當歸一兩川芎一兩乳香沒藥各三錢丁香五錢上為末棗肉為丸如梧子大每五六十丸酒下按上方治遍身筋骨疼痛專攻之劑十全大補湯治勞倦遍身痛加製半夏倍桂按上方治虛弱之人遍身疼痛之劑五積散見中寒治遍身四肢骨節痛加羌活獨活川山甲隨所痛取甲炒成珠入麝香少許薑棗水煎服按上方治感寒邪遍身骨節疼痛之劑一治因感濕患白虎歷節風症遍身抽掣疼痛足不能履地者三年百方不效身體羸瘦骨立幾死以木通二兩銼細長流水煎汁頻服後一時遍身癢甚上體發紅斑隨出隨沒出汗至腰上體不痛矣次日又服又發斑出汗至足底汗乾後遍身通暢而無痛矣按上方木通乃利濕之藥濕去則痛除矣治兩手臂麻木疼痛當歸川芎白芷黃芩酒炒黃連姜炒蒼朮羌活防風桔梗南星姜炒半夏姜炒桂枝甘草生薑煎服治兩足麻木疼痛當歸白芍白朮蒼朮陳皮半夏茯苓黃柏牛膝威靈仙桃仁紅花甘草生薑煎入竹瀝服一婦人年七十餘遍身作痛筋骨尤甚不能伸屈遍身作癢如蟲行口乾目赤頭暈痰壅胸膈不利小便短赤夜間殊甚用六味地黃丸料加山梔子柴胡續斷丸治寒濕之氣痹滯關節麻木疼痛黃耆酒炒一兩人參七錢白朮去蘆七錢白茯苓去皮一兩熟地黃三兩山藥一兩山茱萸酒蒸去核一兩牡丹皮一兩薏苡仁一兩續斷一兩麥門冬去心一兩石斛一兩防風一兩一錢桂心一兩鹿角膠二兩上為末煉蜜為丸如梧子大每服五十丸空心溫酒下一治中年人濕痰壅滯經絡不運兩臂作疼不能梳洗及治手足疼痛麻痹行步艱難服之即效陳皮鹽水炒二兩半夏二兩用白礬牙皂生薑各一兩煎湯浸七日白茯苓去皮一兩半風化硝一兩三錢海桐皮酒洗一兩片子薑黃一兩木瓜一兩薄桂去皮五錢甘草炙四錢白芍酒炒二兩黃耆鹽水炒二兩上為細末薑汁竹瀝為丸如梧子大每服百丸空心白湯送下祕傳藥酒方治男婦風濕相搏腰膝痛或因坐臥濕地雨露所襲遍身骨節疼痛風濕腳氣並治白芷桔梗白芍川芎麻黃茯苓半夏肉桂甘草各一兩陳皮厚朴薑汁炒枳殼麩炒當歸各一兩半蒼朮米泔浸炒四兩牛膝去蘆二兩杜仲酒炒一兩木瓜一兩半檳榔一兩半烏藥二兩防己一兩獨活一兩半各銼以苧布袋盛之用好酒三斗用藥袋懸墜於壇內密封固壇口鍋內煮之一時久然後取出過三日後去藥隨量飲之渣曬乾為末酒糊為丸如梧子大每服七八十丸空心酒下腿膝疼痛加川烏虎脛骨腰痛加肉蓯蓉破故紙枸杞子洗痛風方治手足冷痛如虎咬者用樟木屑一斗以急流水一擔熬沸入大桶內桶邊放一圓凳令坐桶邊放腳在內外以草荐一領圍之勿令湯氣入眼恐壞眼其功甚捷一治遍身上下前後攻作疼痛此寒邪在表宜用大粗碗盛柴灰火填實一碗以燒紙蓋之外又以麻布蓋住噴熱酒在上撲在患處拖遍身上下須臾腫消毒散治風濕痹痛諸風腫痛防風荊芥川芎白芷羌活苦參威靈仙何首烏楮槐榆柳桑條煎湯洗患處膏藥方生薑帶皮取汁一碗蔥連須帶葉取汁一碗用牛皮膠半斤慢火熬成膏入麝香一錢在內用布攤膏藥貼痛處取出濕水如汗即愈凡得氣流注之病痛不可忍用金銀花帶葉和酒糟研爛用淨瓦礫放火中烘熱敷患處立愈消渴脈宜洪大忌微小上消者肺也多飲水而少食小便如常中消者胃也多飲食而小便赤黃下消者腎也小便濁淋如膏之狀三消皆禁用半夏丹溪曰三消者多屬血虛不生津液俱宜四物湯為主治上消者四物湯加人參麥門冬五味子天花粉入生藕汁人乳飲酒人加生葛根汁中消者四物湯加知母石膏滑石寒水石以降胃水下消者四物湯加黃柏知母熟地黃五味子以滋腎水又當間與繅絲湯為上策繅絲湯治三消渴如神如無繅絲湯卻以原蠶繭殼絲綿煎湯皆可代之無時飲之殊效三才膏治三消渴黃連天花粉二味為末藕汁人乳生地黃汁佐以蜜薑汁為膏和二末留舌上徐徐以白湯少許送下能食者加石膏天花散治消渴如神天花粉一兩生地黃一兩麥門冬去心五錢五味子五錢乾葛五錢甘草五錢上銼一兩糯米一撮水煎頻服加減八味丸治常人平日口乾作渴因飲酒食炙煿補藥房勞凡若此類過多故有此症後必有癰疽發也宜先服此以絶其源及癰疽愈後服此有益懷生地黃酒浸蒸曬乾二兩山藥一兩白茯苓去皮八錢山茱萸酒蒸去核曬乾一兩澤瀉酒浸飯上蒸過曬乾八錢五味子一兩半肉桂五錢牡丹皮八錢上為細末煉蜜為丸如梧子大每服五六十丸五更時溫酒或淡鹽湯下參耆五味湯治腎水枯竭不能運上消渴恐生癰疽黃耆人參粉草炙五味子麥門冬去心各等分上銼水煎入硃砂少許不拘時服黃耆六一湯治消渴飲水大多致生癰疽黃耆蜜炙黃六兩甘草一兩棗一枚水煎無時溫服生地黃膏治消渴通用生地黃束如常碗大一把人參五錢白茯苓去皮一兩麥門冬去心一兩五味子五錢上將地黃洗切研細以新水一碗調開用蜜煎至半次入下藥末拌和磁器密收匙挑服有人消渴引飲無度或令食韭苗或炒或作羹無入鹽日服三五兩其渴遂止玉壺丸治消渴引飲無度人參天花粉等分為末煉蜜為丸梧子大每三十丸麥門冬湯下有人病渴用渴藥纍年不愈用加減八味丸而愈其疾本以腎水枯竭不能制火心火上炎是以生渴此藥降火為最降心火生腎水凡消渴之人當防患癰疽所怕者一飲酒二房勞鹹食及面俱宜忌也黃連豬肚丸清心止渴治中消黃連五兩麥門冬去心知母去毛瓜蔞仁去殼各四兩上為末入雄豬肚內縫之熟蒸乘熱於石臼內搗爛如干加煉蜜丸如梧子大每百丸食後米湯下玄兔丹治三消渴神藥菟絲子酒浸軟乘濕研焙乾取末十兩白茯苓去皮三兩蓮肉三兩遼五味子七兩酒浸另研山藥六兩上為末酒煮麵糊為丸梧子大每服五十丸用天花粉五味子煎湯下腳膝無力木瓜湯下濁證夫白濁者因思慮過度嗜欲不節遂使水火不交精元失所由是為赤白濁之患赤濁者心虛有熱多因思慮而得之白濁者腎虛有寒過於嗜欲而得之旋腳澄下凝如膏糊是也用中和之藥治之使水火既濟脾土自堅其流必清矣清心蓮子飲主方治心中發熱煩躁思慮憂愁抑鬱小便白濁或有沙膜夜夢走泄遺瀝沙痛便赤如膏或酒色過度上盛下虛心火炎上肺金受克故口乾燥漸成消渴四肢倦怠男子五淋婦人帶下赤白五心煩熱此藥溫平清心養神黃耆蜜炒二錢赤茯苓去皮二錢人參二錢半石蓮肉去心二錢半麥門冬去心黃芩地骨皮車前子各一錢五分甘草炙一錢上銼一劑燈心五根生薑三片水煎服上盛下虛加酒炒黃柏知母熱加柴胡薄荷各一錢半內經論便濁之症因脾胃之濕熱下流滲入膀胱故使便尿赤白渾濁不清也宜燥中宮之濕用升麻柴胡提氣使大便潤而小便長不宜純用寒涼傷血之藥主方陳皮八分半夏八分姜炒茯苓一錢蒼朮七分米泔浸黃柏七分酒炒柴胡七分升麻三分白朮五分去蘆炒神麯五分炒牡蠣煅三分梔子仁一錢蛤粉三分滑石一錢甘草三分上銼一劑生薑三片白果也枚水煎空心服渣再煎服忌煎炒辛辣之物水火分清飲治赤白濁益智仁五分萆薢五分石菖蒲五分赤茯苓七分車前子五分豬苓五分澤瀉五分白朮五分陳皮五分枳殼五分麻黃五分甘草三分上銼一劑半水半酒煎空心溫服久病去麻黃易升麻治赤白濁症木通去節七錢滑石三錢粉草四錢黃荊子一勺上銼水煎空心服治白濁淋瀝痛因房欲不節或精未施泄而成將成下疳者緑豆不拘多少擂井花水澄清空心服洗法用花椒三錢蔥白七根水煎先熏後洗清濁鎖精丹治白濁大能化痰枯白礬二兩滑石二兩上為末早米糊為丸如梧子大每五十丸米飲空心下治白濁經年不愈或時夢遺形瘦當作心虛治用定志丸加黃柏酒炒硃砂蛤粉為衣夢泄邪客於陰神不守舍故心有所感夢而後泄也其候有三年少氣盛鰥曠矜持制情欲不自覺知此泄如瓶之滿而溢者也人或有之是為無病勿藥可矣心家氣虛不能主宰或心受熱陽氣不收此泄如瓶之側而出者也人多有之其病猶輕合用和平之劑臟腑積弱真元久虧心不攝念腎不攝精此泄如瓶之罅而滿者也人少有之其病最重須當大作補湯或為夢泄尤甚於房勞此世俗習聞其說也獨不觀證候之有輕重乎外此又有一輩神氣消靡橫異橫生風邪乘其虛鬼氣干其正往往與妖魅交通是又厄運之不可曉者也法藥相助誠哉是言永濟湯治男子失精女人夢交自汗盜汗六脈芤動微緊桂枝白芍酒炒龍骨牡蠣各三錢甘草炙二分一銼棗一枚水煎空心溫服按上方治遺精盜汗兩治之劑白濁遺精蓋心神寧靜則精固君相火息則溺清有是證者始因擾乎心搖乎精而然也龍雷火動其水濁而不澄尾間不禁即精關弛而不固治宜補心寧神滋陰固本主方黃耆蜜炒一錢半人參三錢白朮去蘆炒一錢白茯苓去皮木一錢當歸身一錢白芍酒炒一錢麥門冬去心二錢巴戟去心三錢五味子十二粒夏月十六個益智去殼一錢酸棗仁炒一錢山藥一錢澤瀉一錢升麻五分黃連酒炒一錢半黃芩二錢黃柏酒炒七分知母二錢蓮花須一錢生甘草梢一錢半上銼水煎空心溫服按上方治遺精心腎虧損補益之劑玉環丹治遺精白濁五色龍骨煅左顧牡蠣煅蓮花蕊芡實去殼石蓮子去殼五味子川黃柏酒炒各一兩上為細末用金櫻子煎為糊入臼內搗千餘下成劑為丸如梧子大每三十丸空心鹽湯下固精安神丸治心神不安腎虛自泄精黃柏酒炒一兩知母一兩炒龍骨煅牡蠣煅芡實去殼蓮鬚白茯苓遠志去心山茱萸酒蒸去核各三錢上為細末煮山藥糊為丸如梧子大硃砂為衣每五十丸空心鹽湯下按上方澀精之劑治男子水臟虛憊遺精盜汗往往夜夢鬼交公豬腰子一枚以刀開去筋膜入附子末一錢匕以濕紙裹煨熟空心稍熱服即飲酒一二盞多飲亦妙三五服效石蓮散魯藩王府方治遺精石蓮肉蓮鬚芡實人參麥門冬白茯神遠志甘草上銼水煎空心服按上方養心澀精之劑樗根丸治白濁夢泄遺精及滑出而不收樗根白皮有莢者是黃柏炒褐色蛤粉炒青黛乾薑炒微黑滑石上為末水和丸如梧子大每百丸空心溫酒下虛勞者四物湯吞下固本鎖精丹治元陽虛憊精氣不固夢寐遺精夜多盜汗遺泄不禁並治之此大補元氣澀精固陽健脾胃除濕熱嫩黃耆蜜水炒二兩五錢人參一兩半甘枸杞子二兩鎖陽二兩遼五味子二兩石蓮肉二兩半山藥二兩海蛤粉二兩川黃柏去皮酒拌曬乾炒赤色二兩知母去毛酒拌曬乾炒二兩上為細末用白朮去蘆油六兩水五碗煎至二碗傾出術汁另放再用水四碗煎至二碗去渣與前二碗汁同煎熬至一碗如膏搜和前藥末為丸梧子大每五十丸加至六七十丸空心溫酒或淡鹽湯下按上方治夢遺精滑大補元陽之劑六味地黃丸治精不固加牡蠣火煅二兩按上方滋陰補腎澀精平補之妙劑也固真丸治精滑久不愈用好龍骨細研水飛過每服一錢用好燒酒調服又方牡蠣不拘多少砂鍋內煅醋淬七遍為末醋糊為丸如梧子大每五十丸空心鹽湯下一方加鹿角霜按上方澀精專攻之劑珍寶玉堂丸治夢遺精滑晝夜長流神效蓮鬚色黃者佳一斤石蓮肉淨半斤芡實淨肉十二兩麥門冬去心四兩用公豬肚一個入家蓮肉帶心皮一斤砂鍋內入水煮爛去肚將蓮肉曬乾同前藥為細末煉蜜為丸如梧子大每百丸空心蓮鬚煎湯送下祕精丹治遺精用桑螵蛸韭子各一兩芡實仁白茯苓各二兩柏子仁遠志去骨各一兩半人參二錢甘草一錢半上為末煉蜜為丸梧子大每服七十丸空心酒下淋閉附尿血夫五淋者氣石血膏勞是也氣淋為病小便澀常有餘滴石淋莖中痛尿不得卒出膏淋尿似膏出勞淋勞倦即發痛引氣衝血淋遇熱即發甚則尿血候其鼻頭色黃者小便難也大抵此證多由心腎不足積蘊熱毒或酒後房勞服食熱燥七情鬱結所致海金砂散主方治五淋服此小便內打下砂石子後服六味地黃丸收功或加車前子牛膝去蘆當歸酒浸雄黃川牛膝去蘆酒浸大黃酒浸木香海金砂各等分上為細末每服一錢半臨臥酒調服立效按上方治五淋皆效治淋濁妙方牙皂滑石竹葉燈心皮硝少許熬湯露一宿次早溫服立效按上方治淋滑皆治之劑治久下泔不止效當歸川芎白芍熟地陳皮半夏升麻柴胡牛膝黃柏知母白朮蒼朮茯苓甘草各一錢水煎露一宿空心服按上方治下淋屬陰虛有濕者宜之補中益氣湯方見內傷治五淋夫淋多是膀胱之氣虛損不能運行水道故滯而不通而成諸淋也此方補元氣故有大效按上方補元氣則水道運行而淋不作矣治血淋阿膠炒二兩豬苓澤瀉赤苓各一兩車前子五錢水煎空心服治苦病淋而莖中痛不可忍者六君子湯加黃柏知母滑石石韋琥珀水煎服六味地黃丸方見補益治尿血因心腎氣結所致或憂勞房室過度而得之實由精氣滑脫陰虛火動榮血妄行耳尿行則不痛尿淋血行則痛依本方加黃柏知母海金砂琥珀作湯藥服之殊效八味丸方見補益若老人陰痿思色精不出而內敗小便道澀痛如淋依本方加車前子牛膝若老人精已竭而復耗之大小道牽痛愈痛愈欲便愈便則愈痛此藥最效遺尿夫尿者賴心腎二氣之所傳送膀胱為傳送之腑心腎氣虛陽氣衰冷致令膀胱傳送失度則必有遺尿失禁之患矣經云膀胱不利為癃閉不約為遺尿也大宜溫補清心寡欲又有産後不順致傷膀胱及小兒脬冷俱能令人遺尿各須隨症照後方治之滋榮養衛湯主方治身體虛瘦夜常遺尿失禁及小兒頻數人參八分白朮去蘆麩炒一錢山藥一錢益智仁七分山茱萸酒浸去核七分當歸酒洗一錢白芍酒炒一錢黃耆蜜炙一錢酸棗仁炒七分甘草炙四分水煎溫服縮泉丸治脬氣不足小便頻數日夜百餘次益智仁天台烏藥大如臂者上各等分為末酒煮山藥打糊為丸如梧子大臨臥時用鹽酒送下五七十丸治小水頻方此疾乃下元虛所致人參五錢黃柏酒浸五錢益智仁六錢如用後覺少去此甘草一錢上各為末煉蜜丸梧子大五更臨臥每五六十丸白滾水下用酒亦可治遺尿失禁遺尿者枯礬牡蠣煅等分為末米湯調下益智仁七個桑螵蛸七個上為末酒調服用熟白果七個送下治小便不禁有熱者五苓散去桂加黃連黃柏梔子山茱萸五味子水煎空心服治小便虛弱不禁者五苓散合四物湯加山茱萸五味子水煎空心服治老人氣短小便不禁四物湯加黃耆人參煎湯送下通關丸加味地黃丸治腎與膀胱俱虛冷氣乘之不能約制故遺尿不禁或睡中自出懷生地黃酒蒸四兩懷山藥二兩牡丹皮一兩半澤瀉一兩白茯苓一兩山茱萸酒蒸去核二兩破故紙酒炒二兩益智仁炒一兩人參一兩肉桂五錢上為細末煉蜜為丸如梧子大每服七十丸淡鹽湯送下治夜多小便用胡桃慢火煨熱臨臥溫酒下嚼治夜多小便用益智子二十四個捶碎入鹽同煎服有奇驗治小便多者夜煎萆薢一味服之永不夜起治小便桶內起泡盈桶此腎氣衰也用紅雞冠為末每三錢空心溫酒調下小便閉附轉胞導赤散治小腸實熱小便祕赤懷生地黃木通甘草淡竹葉水煎空心服八正散治心經蘊熱臟腑閉結小便赤澀癃閉不通及熱淋血淋如濁後恣欲而得者則小便將出而痛既出而癢以此藥主之大黃瞿麥木通滑石萹蓄車前子梔子仁甘草各等分上銼劑燈心水煎服治小便不通麝香少許半夏末填臍中上用蔥白田螺搗成餅封臍上用布帶縛住下用皂角煙燻入陰中自通女人用皂角煎湯洗陰戶內卒下得小便不通炒鹽內臍下即通治小便不通皮硝一合連須蔥一根搗為一處用青布攤在上似膏藥樣貼臍上用熱瓦尉之治小便不通蚯蚓五七條研爛投涼水一碗攪勻澄清去泥飲水即時通大解熱疾不知人事欲死服之立效又方治小便不通用豬膽投熱酒中服之立通治小便不通腹脹疼痛欲死野地蒺藜子不拘多少焙黃色為末溫黃酒調服治小便不通登時見效火麻燒灰黃酒調服治小便不通心腎有熱並治血淋尿血車前子草不拘多少連根帶葉搗自然汁入蜜少許同服立通治小便不通大黃酒煮乾為末酒丸用扁竹根煎水送下治小便不通服涼藥日久不通脹滿幾死附子理中湯加琥珀末同服立通治小便不通並傷寒雜症而不可以通利之藥者用此即通皮硝煎化用青布蘸水搭臍上並小便上熱則易之治小便不通如神用螻蟈一個焙熟嚼吃黃酒送下治小便不通兩尺脈俱沉微乃陰虛故也曾服通滑之劑不效者大附子一枚重一兩者炮去皮臍鹽水浸澤瀉一兩二味銼作四劑燈心七根水煎食遠服治小便不通小腹脹滿不急治即殺人用連根蔥白一斤搗爛炒熟以布裹分作兩處更替尉臍下即通加些麝更妙治小便不通諸藥無效或轉胞至死此法用之小便自出豬尿胞一個傾出尿用鵝毛筒去頭尾插入竅孔內線系定以口吹氣令滿胞用線管下再扎住將管口放在小便頭上向竅孔解後一線手搓其氣透里自然小便即出一陰陽關格前後不通尋常通利大腑小水自行中有轉胞一證諸藥不效失救則悶亂而死豫嘗以甘遂末水調敷臍下內以甘草節煎湯飲之及藥汁至臍二藥相反胞自轉矣小便來如湧泉此救急之良訣也八味丸治小腹急痛不得小便不問男女孕婦轉胞小便不利命在反掌此藥一服小便如湧而安方見補益大便祕大便祕結其名有五有風祕氣祕濕祕寒祕熱祕風祕者風痰結於大腸祕而不通也氣祕者氣滯後重煩悶脹滿大便結燥而不通也寒祕者年高腸冷及痃癖冷氣結滯大腸而不利也熱祕者內臟積熱消耗津液大便結燥而不通也濕祕者濕熱鬱結津液不行大便祕結也此證皆由體虛之人攝養乖方三焦氣滯轉運不行而凝滯於腸胃之間遂成祕結之患又有年老之人新産之婦氣血虛腸胃結澀而祕結者不可妄用通利之藥恐傷元氣惟當滋血潤燥而已大抵祕結治法燥則潤之澀則滑之祕則通之寒則溫之熱則涼之風則散之氣則順之要在隨症審察焉治大便閉塞不通主方細茶一撮生芝麻一撮生桃仁七枚生大黃一錢或二三錢甘草五錢上用長流水生搗爛服立通祕方治大便閉結用商陸搗爛敷臍上立通並小便不通亦效一方用生大黃末二錢皮硝五錢用好熱燒酒一碗泡化服立通一方用皮硝五錢熱酒化開澄去渣加香油三四茶匙溫服立通一方用大黃皮硝牙皂三味等分水煎一服立通一方用生蜜一盞入芒硝三錢滾湯調服一方治大便不通用黃荊子涼水吞服按上方俱治實熱閉結者擇便選用通幽潤燥湯主方治大便難幽門不通上衝吸門不開噎塞不便燥閉氣不得下治在幽門以辛潤之當歸身一錢生地五分熟地五分桃仁一錢紅花一錢升麻一錢甘草炙大黃煨一錢火麻仁一錢上銼一劑水煎去渣調檳榔末五分稍熱食前服潤服丸當歸酒洗二兩生地黃一兩熟地黃五錢火麻仁一兩半枳殼去穰七錢杏仁去皮尖五錢上為末蜜丸每服七十丸空心溫湯送下治大便不通並傷寒雜症用藥不行者立通孫遁庵方粟米水煮至熟入火麻仁微炒不拘多少入粥內再煮三二沸飲湯立效按上方治血枯虛閉者宜之六磨湯治氣滯腹急大便閉結沉香木香不見火檳榔烏藥枳殼去穰大黃各等分用熟水磨濃汁合而服之立通仁子粥能順氣滑大便火麻子仁紫蘇子不拘多少二味研爛水濾取汁煮粥食之按上方治氣閉不通者宜之治大便不通及老人風虛閉結陳皂角燒灰存性以碗蓋在地上一宿空心酒下立通或以萊蔔子擂冷水下立通豬膽汁導法治自汗小便利而大便燥硬不可攻以此法導之豬膽一枚傾去一小半仍入醋在內用竹管相接套入穀道中以手指捻之令膽汁直射入內少時即通蓋酸苦益陰以潤燥也治大便不通腹脹死在須臾竹管蘸蔥汁深入大便內以香油一半溫水一半同入豬尿泡內捻入竹管將病人倒放腳向上半時即順立通蜜導法治自汗大便閉結不通且便於老人並日久不能服藥者蜜煉如飴乘熱捻如指大長二寸兩頭如鏡納穀道中良久下燥糞若加皂角末少許更效如無蜜以香油灌入穀道中亦效治大便閉結至極昏不知人大田螺二三枚鹽一撮和殼生搗碎置患者臍下一寸三分用寬帛緊繫之即通亦治腳氣治大便不通用烏桕木方停一寸來劈破以水煎取小半盞服之立通不用多施其功神聖兼能取水治氣血乾涸津液枯竭時常大便祕結八珍湯加肉蓯蓉久服自通去燥糞生薑削如小指長二寸鹽塗之內下部中關格夫關格者謂膈中覺有所礙欲升不升欲降不降欲食不食此為氣之橫格也必用吐以提其氣之橫格不必在出痰也有痰以二陳湯探吐之吐中便有降有氣虛不運者補氣藥中升降丹溪曰此症多死寒在上熱在下也寒在胸中遏絶不入無入之理故曰格熱在下焦填塞不通無出入之由故曰關格則吐逆關則不得內經云人迎與氣口俱盛四倍已上為關格關格之脈羸不能極於天地之精氣則死矣兩枳三陳湯治關格上焦痰壅兩寸脈盛是也陳皮半夏各二兩白茯苓一兩半南星枳殼枳實甘草各一兩上銼每服五錢水煎服用鵝毛患人咽喉探吐之如病虛弱不可用也大小便祕治關格脹滿大小便不通用獨頭大蒜燒熟去皮綿裹納下部氣立通又治腹滿不能服藥以此導之冷即易便溺不通非細故也期朝不通便令人嘔名曰關格又曰不通而死矣一見嘔症便不可救經曰出入廢則神機化滅升降息則氣立孤危此之謂也治大小便閉結不通肚腹脹滿咽喉閉塞水漿不入痰壅氣喘傷寒結胸臥不倒床此幽門氣閉不通死在須臾儋陽吳進士傳甘遂五分麵裹火煨熟取出為末入麝香三釐搗飯為丸淡薑湯下治大小便不通六七月間尋牛糞中有大蜣蜋不拘多少用線串起陰乾收貯用時取一個要全者放淨磚上四面以灰火烘乾以刀從腰切斷如大便閉用上半截小便閉用下半截各為末新汲水調服二便俱閉則全用之治大小便不通蝸牛三枚連殼為泥再加麝少許貼臍中以手揉按之立通田螺亦可治大小二便不通連根蔥一莖洗帶土生薑一塊淡豆豉二十一個鹽兩匙同研爛捏餅烘熱掩臍中以帛縛定良久氣自透即通不然再換一餅鐵腳丸治大小便不通皂角去皮子炙不拘多少為末酒麵糊為丸如梧子大每服三十丸酒下顛倒散治臟腑實熱或小便不通或大便不通或大小便俱不通大黃六錢滑石三錢皂角三錢上為末黃酒送下如大便不通依前分兩服如小便不通黃三錢石六錢角如前如大小便俱不通黃石均分角亦如前二便俱閉甚難醫急炒鹽來塞滿臍蒜片覆鹽堆艾尉利便良法少人知治大小便不通經三五日者不蛀皂角燒灰以米湯調下三錢治大小便不通豬牙皂角末豬膽調竹筒吹入糞門小便不通蔥津吹入馬口即愈痔漏夫痔漏者肛門邊內外有瘡是也或成㿔不破者曰痔破潰而出膿血黃水浸淫淋瀝久不止者曰漏也皆由濕熱風燥四氣相合而致也痔有五種謂牡痔牝痔脈痔腸痔血痔也古方又有酒痔氣痔蟲痔翻花螻蛄等痔之名不一究其因亦不過久嗜辛熱炙煿新酒及房勞憂思蘊積熱毒憤郁之氣所致也或藏於肛門之內或突於肛門之外若蘊毒深者其狀大蘊毒淺者其狀小大者蓮花雞冠核桃之狀小者如牛奶雞心櫻桃之類或流膿水或出鮮血有妨行坐久而不愈則成漏矣治法在外者宜貼之洗之在內者宜祛其風而除其濕消其熱解其毒斯得治之法矣大抵脈滑而大者易治懸絶者難也主方治痔瘡腫痛黃連一錢黃芩一錢黃柏一錢連翹一錢赤芍一錢梔子一錢槐花一錢苦參一錢半大黃一錢半上銼水煎空心服逐瘀湯治痔漏疼痛內有瘀血作痛要通利大小腸取下惡物立效兼赤痢血痢如神川芎白芷枳殼麩炒赤芍阿膠炒茯苓莪朮生地黃茯神木通甘草五靈脂炒各一錢桃仁去皮尖大黃各一錢半生薑三片蜜三匙水煎空心服以利為度治痔漏如神先用豬澀脾三條竹刀刮開將鱉斬去頭取血將澀脾焙熱用鱉血塗上乘熱坐在糞門上冷則再換其癢不可當冷則取出澀脾有小蟲在上無其數然後服後藥蔓荊子二錢槐花二錢條芩三錢黃連二錢生甘草梢五分上銼一劑水煎空心服又一方用豬肚上屎皮貼在痔上夾住引出小蟲為效治蓮花痔瘡余紹坤黃連三錢烏梅三個大黃三錢穿山甲炒三錢上銼散水煎服治痔漏神方二府陳灼無陳棕燒有性一兩魚鰾一兩廣膠一兩二味用炒為珠柏子仁炒一兩共為末每服三錢酒調下四治丸治痔漏脫肛便血黃連多用酒浸約三日許淨四兩枳殼去穰麩炒二兩防風去蘆二兩當歸用全四兩上四味為末以前浸黃連酒和麵糊為丸如梧子大每六七十丸空心米飲或沸湯送下忌煎炒酒面羊鵝魚之物潤腸化毒丸治痔漏方槐花一兩枳殼麩炒一兩蝟皮二兩雷丸三錢蘄艾一兩梔子一兩上共為末入公豬大腸內煮極爛搗千下為丸每服五六十丸空心滾水送下按上方治痔漏專攻之劑壯盛者宜之臟連固本丸凡衣食豐饒之人患痔漏必干於飲食色欲所致及有乘酒犯房若要除根必須服此滋陰內補藥宜戒酒厚味寡欲乃可也懷生地黃六兩山藥四兩白茯苓去皮三兩牡丹皮三兩山茱萸酒蒸去核四兩澤瀉二兩川黃連四兩川黃柏去皮四兩知母去毛三兩槐角三兩人參三兩當歸二兩皂角二兩天花粉一兩上各為末用雄豬大腸頭一段去脂油灌藥末於內兩頭用黃絲線縛住用糯米二升煮飯將半熟撈起去湯藥腸盤藏於飯中如蒸飯之熟待冷些取出去兩頭無藥線縛之腸將藥腸淨石臼內杵爛撿出腸渣筋如不黏加些飯杵之丸如梧子大曬乾每空心百丸白湯下三補丸治痔漏神方白茯苓去皮赤茯苓去皮沒藥各二兩補骨脂四兩上藥俱不犯鐵器於石臼內搗成一塊春秋酒浸三日夏二日冬五日取出木籠蒸熟曬乾為末酒糊為丸梧子大每二十丸緩緩加至五十丸止酒送下按上方治痔漏虛弱之人可服痔病成㿔不破也黑牽牛白牽牛頭末各一錢半用豬腰一個竹刀劈開入藥末在內線扎紙裹水濕火煨熟去紙空心嚼吃至巳時打下先膿後血毒氣出盡永不再發魯藩韓內相傳治痔效方皮硝一斤入豬大腸內填實扎實入罐內封固火煅存性取出為末每服二錢黃酒調下一料除根治痔漏用公豬肚一個內入皂角刺一兩槐花一兩縫住煮爛去渣任意食肚不用鹽醬淡服二三枚極效治漏痔肛門周圍有孔數十諸藥不效用熟大肉蘸濃鹽汁空心食之七日自安治漏瘡土茯苓每服四兩水煎當茶食之渣曝乾烙干餅食之忌豬肉食及緑豆按上方治痔瘡專攻之劑治痔漏臥床非策杖不能移步者旱蓮草一把連根水洗淨用粗碗研極細如泥極熱酒一盞衝入飲之渣再搗爛敷患處重者不過三服治婦人久病心焦多怒遂成痔疾狀如蓮子熱腫而痛熊膽入片腦研豬膽汁調塗瘡立已一方用蔥頭共蜜搗點一指頭腫處冰冷即消治痔穀道中蟲癢不止用水銀棗膏各二兩同研相和捻如棗形狀薄綿片裹納下部明日蟲出而已治痔並漏極痛者橄欖核燒灰存性一錢熊膽五分冰片二分上為細末先將冬瓜皮煎湯洗淨如無臭桐葉湯洗將指蘸藥抹上一二次立已治肛門邊腫硬癢痛白礬三分碎研用童便二盞化開洗痔上一日二三次洗之治漏瘡血水不止蛇皮燒灰三錢五倍子龍骨各五錢川續斷五錢麝香少許上為末用津吐調敷濕則乾摻奇效治痔漏用鰻鱺魚燒煙燻糞門痔蟲盡死治久冷漏瘡用活鱔魚五六條擲地以竹針貫之覆瘡良久當有蟲如線復之使盡用檳榔黃連末敷明日以干艾作湯投白礬二三錢洗不月而愈一洗痔妙方曲曲菜小蟲臥單馬齒莧豬牙草花椒槐條茄根上煎水先熏後洗後用珍珠煅一錢琥珀一錢片腦二錢為末搽上洗漏痔魯府田承奉傳槐皮槐子槐花蘄艾焙乾上煎水先熏後洗令淨將真紅鉛捻入不二三次拔去病根治痔瘡腫痛脫肛生桐子去外皮用肉搗爛煎水先熏蒸待溫浸洗不過二次全愈熏洗痔漏良方枳殼三兩當歸二兩荊芥二兩五倍子二兩黃葵花二兩木賊一兩朴硝一兩甘草一兩水煎乘熱熏過溫洗年深痛不止者藥到立已生肌散五倍子炒黃色二兩乳香沒藥孩兒茶各一錢枯礬五分上為末每次用管吹入漏瘡內熏洗痔漏祕方茄根蔥艾馬齒莧五倍皮硝更用椒七味煎湯熏洗過多年痔漏一齊消治漏瘡冬瓜瓤燒滾水入罐內洗數次妙刺蝟皮一個切碎艾一塊拳大頭髮一兩黑驢干糞五六枚醋浸曬乾三四次地下為一小坑入藥留小口點著照糞門藥熏半日瘡干為度灸痔疾先以柳枝濃煎湯洗痔便艾灸其上連灸三五壯忽覺一道氣轉入腸中因火轉瀉先血後穢洗痔妙方用地茄根水煎洗之三次即愈神效按上方皆外敷貼熏洗之劑治漏瘡惡水自大腸出用黑牽牛頭末一分入豬腰子內以線扎青荷葉包火煨熟細嚼溫鹽酒送下愚按治痔之法不過涼血清熱而已至於治漏初則宜涼血燥濕久則宜澀竅殺蟲而兼乎溫散也或曰痔漏屬火何故而用溫澀之藥殊不知痔只出血始終是熱漏流膿水始是濕熱終是濕寒蓋此方雖溫散又兼補養故丹溪云漏當大補氣血為主蓋有所自矣余每治痔漏久不愈先服千金不換刀圭散以去風濕之毒則愈如未愈即服後方追風補腎十漏大金丹庚申甲子成除日合當歸二兩人參一兩生地黃一兩熟地黃二兩天門冬一兩麥門冬二兩破故紙二兩小茴一兩大茴三兩肉蓯蓉二兩山藥二兩白茯苓二兩麝茸二兩大附子一個川烏一兩丁香五錢木香一兩青木香一兩砂仁一兩厚朴一兩青皮一兩陳皮一兩枳殼二兩枳實三兩香附四兩烏藥一兩白芷二兩肉蔻一兩天麻一兩杏仁二兩松節四兩硇砂五錢乳香一兩沒藥一兩上為細末煉蜜為丸如彈子大金箔為衣每服一丸空心酒化下張驛宰服效按上方治漏經年不愈屬虛者宜之脫肛夫脫肛者肛門翻出也蓋肺與大腸為表裡肛者大腸之門肺實熱則祕結肺虛寒則脫出腎主大便故肺腎虛者多此症肺虛者用補中益氣湯腎虛者六味地黃丸若大腸濕熱用升陽除濕湯自下而上者引而竭之柴胡升麻防風豬苓澤瀉蒼朮陳皮神麯麥芽甘草冒寒腸鳴加益智仁半夏治脫肛腸出數寸大蜘蛛瓦上焙焦為末每少許擦上即收治脫肛用浮萍草為末敷之治大腸久積虛冷每因大便脫肛按不得入石灰炒令熱故帛裹坐其上冷則易之治脫肛白礬五倍子煎水洗又用浮萍末摻肛上諸蟲夫人身有諸蟲若無則人身不成不立蟲與人俱生狀如馬尾或如筋出則在脾入則在腸古方論凡人皆有之固不待辨而知矣皆由脾胃俱虛飲食生冷甘肥油膩等物節宜不時腐敗停滯所以發蟲之為病嘔吐噁心口出涎沫有去有來乍發乍止是也九蟲形狀一曰伏蟲長四分二曰蛔蟲又曰長蟲動則吐清水出則心痛貫心則殺人三曰白蟲長一寸又曰寸白蟲相生子孫轉大長至四五尺或因臟腑虛弱而動或因食甘肥而動其發動則腹痛發作腫聚去來上下有休息亦攻心痛口喜吐涎及吐清水貫傷心者死四曰肉蟲狀如爛杏令人煩滿五曰肺蟲狀如蠶令人咳嗽六曰胃蟲狀如蛤蟆令人嘔逆吐喜噦七曰弱蟲狀如瓜瓣又名膈蟲令人多唾八曰赤蟲狀如生肉令人腸鳴九曰蟯蟲形至細微狀如菜蟲居洞腸之間因臟腑虛弱而致發動則為痔為疥癬因人瘡處以生諸癰疽癬瘻瘑疥齲蟲天所不為穀道蟲者由胃弱腸虛而蟯蟲下乘之也穀道肛門大腸之候蟯蟲者九蟲之內一蟲也在於腸間若臟腑氣爽則不妄動胃弱腸虛則蟯蟲乘之輕者或癢或蟲從穀道中溢出重者侵食肛門瘡爛治蛔蟲或心如刀刺口吐清水用生艾取汁夜宿勿食但取肥香脯一方寸片先吃令蟲聞香然後飲艾汁當下蟲效大七氣湯治諸般痞積面色萎黃肌體羸瘦四肢無力皆緣內有蟲積或好食生米或好食壁泥或好食茶炭咸辣等物者只此一服除根青皮去穰陳皮去白三稜醋炒莪朮醋炒香附益智仁藿香官桂桔梗大黃檳榔甘草上銼水煎露一宿空心溫服不得些少飲食不然則藥力減而蟲積不行矣服後食頃腹必痛當下如魚凍或長蟲或血鱉至日午蟲積下盡方用溫粥止之後服緑礬丸一料而愈方見五疸萬應丸治諸蟲黑牽牛四兩大黃八兩檳榔五兩上各為末外用苦楝根皮一斤皂角肥而不蛀者十枚二味用水一大碗熬成膏子入前三味攪加一處為丸如梧子大先用沉香為衣後用雷丸木香為衣每服三丸四更時用砂糖水送下三味各一兩如心脾痛有蟲者必面上白斑唇紅又痛後便能食時作時止者是也上半月蟲頭向上易治下半月蟲頭向下難治先以肉汁及糖蜜食下則引蟲頭向上然後用藥打出治下部蟲癢大棗蒸取膏以水銀和捻長三寸以綿裹宿內下部明早蟲皆出一人腹中積塊面黃肌瘦腹大如鼓死在旦夕用端午日收下菖蒲陰乾切薄片放碗內用滾米湯泡熟蓋之待溫飲之打下蜈蚣數百條內有一大條長二尺余病即愈蟲已食下部肛盡腸穿者取長股蛤蟆青背者一枚雞骨一分燒為灰合吹下部令極深大驗去蟲積檳榔一味為末蜜水調下令患者先一日少吃飯臨晚亦勿食次早五更服之治婦人陰蝕瘡陰戶中有蛔蟲其癢不可當食入臟腑即死令人發寒熱與勞症相似用豬肝切大片以花椒蔥拌豬油煎乾待冷入陰戶中少頃取出再換一片其蟲入肝盡出再以洗榻散洗淨五倍子花椒蛇床子苦參白礬蔥等分水煎洗一方治婦人陰癢不可忍以鹽納陰中即好治下部生蟲食其肛爛見五臟便死艾葉入雄黃末入管中熏下部令煙入即已治蛔蟲方用苦楝根生子者東向不出土者刮去外粗皮取內白皮二兩以水三碗煮取一碗半去渣用晚粳米三合煮糜粥空心先以炒肉一二片吃引蟲向上然後進藥粥一二口少頃又吃一二口漸加至一碗或二碗其蟲盡下而愈張秀才年近六旬素稟虛怯憂思過度面黃肌瘦飲食少思精神昏倦忽患遍身上下狀如蟲行因循日久似覺蛇在皮里行走逮半年漸漸長大每五更覺在丹田食精微微響動或遊走上下不定使人昏沉心不自在十分難過一日三兩次攻作若覺昏沉自己將心執正抖搜精神其物不見忽一日其蛇自腹中下至左膝腿後被患者將兩手緊拿左腿不放一時許坐在書屋不見人至手力氣盡不得已而放之其蛇永不下腳異乎怪哉症出多端難以名狀諸醫調治皆用殺蟲化痰攻擊之過以致虛羸之甚召余診左手澀數右脈洪滑氣口緊盛豫曰此元氣虧損脾胃虛弱不能運化精微使抑鬱之氣釀哉痰火結聚化為斯疾豫以補中益氣湯加半夏茯苓貝母枳實香附晚服以補元氣理脾胃兼化痰清郁以六味地黃丸加遠志石菖蒲人參當歸早服以養心滋腎二藥兼進服至一月其物攻作漸減服至兩月間或攻作三月痊愈身體康強如舊其物永不見蹤
